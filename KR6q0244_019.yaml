body:
  text: 僧録司右闡教兼靈谷禪寺住持淨戒重校祖師機緣六祖下第九世第十世宗師二十五人機緣七十則升州清涼院法眼文益禪師嗣羅漢琛行腳次值天雨忽作溪流暴漲轎寓城西地藏院因參琛和尚琛問曰上座何往曰邐迤行腳去曰行腳事作麼生師曰不知曰不知最親切師豁然開悟頌曰而今飽學似當時脫盡纖塵到不知任短任長休剪綴隨高隨下自平持家門豐儉臨時用田地優游信步移三十年前行腳事分明孤負一雙眉法眼開堂次子方上座自長慶來師舉先長慶稜和尚偈問曰作麼生是萬象之中獨露身子方舉拂子師曰恁麼會又爭得曰和尚尊意如何師曰喚甚麼作萬象曰古人不撥萬象師曰萬象之中獨露身說什麼撥不撥子方豁然悟解頌曰萬象之中獨露身一回相見一回親東西南北吾皇化莫向江南苦問津浮山遠離念見佛破塵出經現成家法誰立門庭日逐舟行江練靜春隨草上燒痕青撥不撥𦗟叮嚀三徑就荒歸便得舊年松菊尚芳馨天童覺法眼因僧惠超問如何是佛師曰汝是惠超僧於是悟入頌曰問佛從頭理不虧莫同巧妙騁鋒機真金若不爐中鍛爭得將金喚作泥汾陽昭江國春風吹不起鷓鴣啼在深華裏三級浪高魚化龍癡人猶戽夜塘水雪竇顯巇嶮行時問路難有人相問北村南長安無限人來往幾箇無鈴過得關投子青僧問如何是佛師云汝是惠超禮拜進前義手思量十萬迢迢慈明圓𨒫官買賣不相饒問佛言云是惠超嗟見衲僧生異解認他虹虹作仙橋天衣懷當臺明鏡絶精粗誰道胡來便現胡法不相饒人莫問可憐天下亂名模佛印元木人行千里駿馬不移蹄落日依南土因風向北嘶正覺逸妙用不須霜刀劒能彈何必玉絃絲嚴冬午後夜三點閒坐閒眠雲散時翠巖真才到元正便是年暖風無處不陶然途中多少尋春客誤𦗟黃鸝作杜䳌佛慧泉一文大先錢買得箇油糍喫向肚裏了當下便不飢白雲端擊石乃出火火光終不然碧潭深萬丈直下見青天草堂清一顆靈丹大似拳服來平地便升仙塵緣若有𮈔毫在蹉過蓬萊路八千慈受深三千里外望家鄉雲水重重客路長向道莫行山下去果聞𤠔呌斷人腸上方益望風鳴處困鹽車伯樂回觀價萬殊可笑如今虞坂上錯將駑馬作龍駒普融平問佛如何答惠超稱鎚雖定價相饒雲中不覩雙鵰落箭過新羅十萬遙長靈卓問佛云言是惠超當機一句不相饒遲疑更向途中覓重疊關山十萬遙雲溪恭覿面相呈見不難髑髏鑑覺尚顢頇巨靈擡手擘不破始信從前踢突國南華昺問佛分明答惠超半斤八兩不相饒藂林萬古為殃禍惡語傷人恨不消真歇了病遇良醫飢逢王膳醬裏得鹽雪裏送炭圓悟勤借婆裙子拜婆朝問佛唯言汝惠超萬古石頭城下水終歸大海作波濤佛燈珣問佛還云是惠超和根帶子上枝條春風浩浩難回避發起乾坤那一苗楚安方微酸梅子始生仁鶯老花殘迹已陳一夜南風移斗柄明朝烟柳不關春正堂辨一字入公門九牛拔不出咄這野孤精鼻孔都打失月林觀惠超問佛佛何遙機就機兮答惠超到此直須揮劒刃不然漁父便棲巢覺鐵觜法眼因僧問如何是曹源一滴水師曰是曹源一滴水頌曰曹源一滴水是即波濤起桃花流出洞中來漁舟夜宿蘆花裏楊無為曹源一滴是曹源萬派滔滔向海門無限乘槎人不薦風濤鼓處有龍蟠照覺總曹源一滴久澄清流出千江絶浪聲大海幾多遊玩者茫茫空繞水邊行白雲端守株非得兔罔象獲玄珠一滴曹源水分明灌五湖佛心才曹溪一滴異常流流入滄溟冠九州垂釣幾番波浪嶮未曾聞道失漁舟草堂清一滴曹源立問端清涼答處在言前衆流截斷窮源底百川依舊勢朝天佛燈珣得人一牛還人一馬珍重曹源可知禮也雷奔洶湧海濤生誰解截流那下行那下行通玄日午打三更韶禪師應口曹源一滴時誰知依樣畫猫兒袖中三尺龍泉劒落盡髑髏人不知別峯印法眼答此話時天台韶國師聞已豁然開悟平生疑滯渙然冰釋以所悟聞于師師曰汝向後當為國王所師致祖道光大吾不如也頌曰曹源一滴水相罵饒插觜鷃雀空啾啾驊騮已千里月窟清法眼因僧問承教有言從無住本立一切法如何是無住本師曰形與未質名起未名頌曰沒踪跡斷消息白雲無根清風何色散乾蓋而非心持坤輿而有力洞千古之淵源造萬象之模則𠛴塵𨒫會也處處普賢樓閣門開也頭頭彌勒天童覺法眼問覺上座船來陸來曰船來師曰船在甚麼處曰船在河裏覺退師却問傍僧曰你道適來這僧具眼不具眼頌曰水不洗水金不金昧毛色而得馬靡𮈔絃而樂琴結繩畫卦有許事喪盡真淳盤古心天童覺法眼問修山主毫𨤲有差天地懸隔兄作麼生會修曰毫𨤲有差天地懸隔師曰與麼道又爭得曰某甲只與麼師兄作麼生師曰毫𨤲有差天地懸隔修遂禮拜頌曰宗師故故問同人一擊毫𨤲兩路分再審便能明的旨自然清白不從聞汾陽昭六國當時已太平太平才久不知兵修公換得長蛇陳天下人人會死生佛印元堪悲堪笑修山主因地起兮因地倒覿面難藏苐一機令人却憶雲門老正覺逸石城親切問同參不話東西便指南明暗兩條來往路依俙屈曲在𤇆嵐保寧勇金鱗欲化遭它點額舉頭看湧波瀾𭶹浪拏雲處風高天地寒佛慧泉稱頭蠅坐便欹傾萬世權𢖍照不平斤兩錙銖見端的終歸輸我定盤星天童覺毫𨤲有差天地隔龍濟清涼何失得魚魯刀刁孰可分水中有乳鵝王擇本覺一一道如弦直長安信已傳萬邦皆入貢四海息狼烟掩室開法眼示衆曰識得凳子周匝有餘雲門出云識得凳子天地懸殊頌曰不知將甚報君恩雲起江湖浪皺痕一片古帆乘興去與誰相逐過天門保寧勇一不是二不成落花流水裏啼鶯閒庭雨散夜將半片月還從海底生象田卿識得凳子四腳著地要坐便坐要起便起在菴賢法眼因僧來𠫵次師以手指簾尋有二僧齊去捲簾師曰一得一失頌曰松直𣗥曲鶴長鳬短𦏁黃世人俱玄治亂其安也潛龍在淵其逸也翔鳥脫絆夫何祖祢西來得失是非相半蓮隨風而轉空船截流而到岸箇中伶俐衲僧看取清涼手𫨻天童覺老將高提白玉鞭雙駒一策去翩翩古今得失論量底空看西山暮雨前正堂辨清涼指出二僧捲起一得一失誰解相委只見桃花逐水流幾人親到桃源裏肯堂充法眼因僧問古佛堂前什麼人先到師曰不動步者頌曰古佛堂前到者稀相見難逢掣電機死水有龍終不聖驚起依前眼𭿇天衣懷法眼因僧問如何是塵劫來事師曰盡在于今頌曰塵劫來事盡在于今祖師不會靣壁沈吟楊無為法眼問僧從什麼處來僧云泗州來師曰大聖今年曾出塔麼曰不出師曰去僧便去師却問傍僧曰你道這僧曾到泗州也無僧亦無對頌曰妙圓金地絶纖塵到者當觀無相真莫道玄門難近向舉頭便是塔中人雪竇宗法眼聞齊魚問僧還聞麼適來若聞如今不聞如今若聞適來不聞頌曰耳𦗟如聾口說如啞法眼舌頭孰真孰假𡰱無著總法眼因僧問聲色兩字如何透得師召大衆曰諸上座且道這箇僧還透得也未若會此問處透聲色即不難頌曰親口問來求透路作家直為指昏朦眼耳忽然春夢覺鶯吟燕語盡圓通大洪遂聲色本來惟兩字作家曾共辨言端若人識得其僧問直透色聲應不難本覺一聲色都來兩箇字衲僧不透眼中沙黃鶴樓前吹玉笛江城五月落梅花慈受深襄州清溪山洪進禪師嗣羅漢琛問修山主曰眀知生不生性為什麼為生之所流修曰筍畢竟成竹去如今作篾使還得麼師曰汝向後自悟去在曰紹修所見只如此上座意旨如何師曰這箇是監院房那箇是典座房修禮謝頌曰進老分明到五臺修師真箇入閩來維那院主門相對說著令人兩眼開正覺逸豁落無依高閒不羈家邦平帖到人稀些些力量分階級蕩蕩身心絶是非是非絶分立大方無軌轍天童覺撫州龍濟山主紹修禪師嗣羅漢琛行腳時同悟空法眼到地藏向火舉話次藏入來乃問山河大地與上座自己是同是別師曰不別藏竪兩指云兩箇三人因此同參頌曰入院高茅總不疑都緣未達祖師機妄空學問爭長短虗記閒詞一肚皮大地山河君可別報云不別恰如癡當人被息狂迷者見成舉措不揚眉汾陽昭山河大地同兼別口中未有娘生舌多知禪客強分踈甕裏何曾走却鱉佛印元地藏當機竪指頭諸老至今猶未瞥天回地轉却等閒千古萬古兩條鐵白雲端商量同別有多般老倒何曾舉舌端今古不能提得去一雙靈劒倚天寒保寧勇休爭自己與山河撥動干戈不奈何看取將軍施武略兩條寒劒定龍蛇冶父川火爐頭話幾多般自己同時作麼觀直下起來呈伎倆山河大地黑漫漫虗堂愚龍濟示衆曰具足几夫法凡夫不知具足聖人法聖人不會聖人若會即是凡夫凡夫若知即是聖人此語具一理二義若人辨得不妨於佛法中有箇入處若辨不得莫道不疑頌曰凡全是聖聖全凡究實遺名直下參廓徹逈超凡聖處無言童子口喃喃靈源清剗除露布葛藤不用之乎者也饒君句下精通未免喚驢作馬卍菴顏融峯強萬丈未話足先酸若不緣雲去那知星斗寒虗堂愚龍濟因僧問劫火洞然大千俱壞未審這箇壞不壞師曰不壞曰為什麼不壞師曰為同大千頌曰問若剜心答若劈腹句裏反身何勞迅速劫火俱然同大千全機不動劒鋒旋龍濟山頭龍退骨𦦨摩天上鼓驚湍龍濟示衆曰是柱不見柱非柱不見柱是非已去了是非裏薦取頌曰是與不是俱不是亦無不是謾勞推兩頭截斷歸家後獨露乾坤更是誰靈源清薦得是移花兼蝶至薦得非擔泉帶月歸是也好鄭州梨勝青州棗非也好象山路入蓬萊島是亦沒交涉著稱鎚硬似鐵非亦沒交涉金剛寶劒當頭截阿呵呵會也麼知事少時煩惱少識人多處是非多全菴已是是非非來却易非非是是去還難是非從此銷磨盡一顆圓明照膽寒雲衲慶鼎州梁山緣觀禪師嗣同安志僧問如何是空劫已前事師曰擊動乾坤鼓時人𦗟不聞頌曰虛空為鼓須彌槌擊者雖多𦗟者稀半夜髑髏驚夢破滿頭明月不思歸丹霞淳梁山因僧問如何是祖師西來意師曰莫亂道頌曰國令嚴嚴擬者危毫𨤲才動鐵輪隨心萌口應三千里齒露言來苦怨誰投子青梁山因僧問祖意教意是同是別師曰金烏東上人皆貴玉兔西沈佛祖迷頌曰靈山會上言雖普少室峯前句未形瑞草蒙華含月秀寒松蓊鬱出雲青丹霞淳梁山因僧問如何是日用事師曰碧玉點破琉璃色滿目紅塵不見沙頌曰劫火洞然無相宅金門不覩玉樓家寶天雲淡銀河冷浩浩波瀾豈動沙丹霞淳懷安軍雲頂山德敷禪師嗣護國遠成都師請就衙升座有樂營將出禮拜起回顧下馬臺曰一口吸盡西江水即不問請師吞却階前下馬臺師展兩手唱曰細抹將來營將猛省頌曰吞却階前下馬臺逢人有口亦難開戲衫莫怪重拈出曾是村歌社舞來笑翁堪襄州石門紹遠禪師嗣石門徹僧問如何是祖師西來意師曰布袋盛烏龜頌曰剖出驚人句布袋裏烏龜衲僧莫錯會黑豆未生時洞山聰鼎州文殊應真禪師嗣德山密僧問萬法歸一一歸何處師曰黃河九曲頌曰問法窮因歸何處黃河透過碧波瀾須知雲外千峯上別有靈松帶露寒投子青路窮崖斷進無門賴有山翁指出原九曲黃河清徹底誰知別是一乾坤懶菴需九曲那容眨眼看操舟誰解別波瀾文殊曾展回天手直得朝宗萬𣲖乾木菴永文殊真因僧問古人垂一足意旨如何師曰坐久成勞頌曰馳書才去返匆匆一足垂酬繼後踪坐久成勞誰委悉紅爐點雪自相通投子青南嶽南臺勤禪師嗣德山密僧問如何是祖師西來意師曰一寸龜毛重七斤頌曰等閒不語未逢人語便傷直似太親不顧火中鸞鳳息驚他石虎暗生瞋投子青蘄州五祖師戒禪師嗣雙泉寬僧問如何是佛師曰著稱鎚硬似鐵頌曰著稱鎚硬似鐵懞懂禪和猶未瞥三冬嶺上火雲生六月長天降大雪雲峯恱著稱鎚硬似鐵此時有理不能說新羅國裏火星飛直向雲門指上熱白雲端信步紅塵裏無人問短長歸來天欲暮片月照滄浪京兆府天寧璉牧童歸去倒騎牛白日城中晚未休著稱鎚硬似鐵那知船子下楊州佛陀遜五祖戒因智門問暑往寒來即不問林下相逢事若何師曰五鳳樓前𦗟玉漏問曰爭奈主山高案山低師曰須彌頂上擊金鍾頌曰高高峯頂翻銀浪深深海底起紅塵金鍾玉漏相酬酢疑殺滔滔天下人苟非作者孰問關津執鞭回首四海良鄰君不見仲尼溫伯雪傾蓋相逢也奇絶圓悟勤五鳳樓前𦗟玉漏須彌頂上擊金鍾巨靈擡手無多子擊破華山千萬重即菴覺隨州智門光作禪師先住復州北塔嗣香林遠僧問蓮華未出水時如何師曰蓮華曰出水後如何師曰荷葉頌曰蓮華荷葉報君知出水還同未出時江北江南問王老一狐疑了一狐疑雪竇顯蓮華荷葉有由哉泥水分時絶點埃堪憶九龍初沐處東西一步一花開白雲端蓮華荷葉共池中華葉年年緑間紅春水漣漪清徹底一聲啼鳥五更風張無盡烟籠檻外差差緑風撼池中柄柄香多謝浣沙人不折雨中留得蓋鴛鴦慈受深蓮華荷葉的須分無限清香付與君彈指若知霄漢路便能平地步青雲長靈卓香苞冷透波心月緑葉輕搖水面風出未出時君看取都盧只在一池中佛鑑勤泥水未分紅菡蓞雨餘先透碧波香千般意路終難會一著歸根便廝當佛燈珣蓮華荷葉非妙非玄碧潭澄徹明月初圓最好太平無一事儘教樵唱滿江村佛心才白藕未明非隱的紅花出水不當陽游人莫用傳消息自有清風透遠香丹霞淳荷花荷葉為君通問答還同箭拄鋒覿面清香來不盡須知不在藕池中本覺一出水何如未出水蓮華荷葉有來由定光金地遙招手智者江陵暗點頭太源嶽荷葉團團擎翠蓋蓮花灼灼鬪紅粧馨香越格無人薦又遂薰風過野塘雲耕靜荷華荷葉意在言前神仙妙訣父子不傳石田薰智門因僧問如何是般若體師曰蚌含明月曰如何是般若用師曰兔子懷胎頌曰一片虛凝絶謂情人天從此見空生蚌含明月深深意曾與禪家作戰爭雪竇顯蚌含明月兔懷胎無限禪人劈不開鐵眼銅睛何擬擬三千里外笑咍咍長靈卓蚌含明月秋波冷兔子懷胎夜𩲸寒皎皎清光成一片直須回首好生觀佛鑑勤蚌含玄兔𭥍何深體用明來絶古今雪曲唱高還和寡不知何處是知音本覺一玉兔懷胎蚌含明月乘時正在中秋莭一顆明珠轉玉盤徹底無瑕光皎潔慈受深智門因僧問如何是佛師曰踏著草鞋赤腳走曰如何是佛向上事師曰拄杖頭上挑日月頌曰路上忙忙赤腳人草鞋踏破走風塵東西南北忙中畔拄杖頻挑日月輪佛國白破草鞋赤腳走衲僧到此無窠臼拄杖頭邊挑日月九州四海任遨遊真如哲智門真得祖家風放出雲門廣長舌大智如愚大巧若拙用盡工夫參不徹莫於平地上增堆休向虗空裏釘橛天童覺拄杖頭上挑日月藏身北斗何殊絶三千剎海夜沉沉新出紅爐一點雪南堂興破草鞋赤腳走胸中憤氣衝牛斗須彌頂上擊金鍾百戰場中師子吼破草鞋赤腳走堂堂向外揚家醜只知斂衭出人前不覺衣穿露兩肘最菴印天台蓮華峯祥菴主嗣奉先深示寂日拈拄杖示衆曰古人到這裏為甚麼不肯住衆無對師乃曰為它途路不得力復曰畢竟如何以杖橫肩曰楖𣗖橫擔不顧人直入千峯萬峯去言畢而逝頌曰眼裏塵沙耳裏土千峯萬峯不肯住落花流水太茫茫剔起眉毛何處去雪竇顯住不住兮日卓午蓮華菴主誰相許楖𣗖橫擔不顧人千峯萬峯是何處翠巖真作者仍甘在半途半途不住竟何如橫擔楖𣗖千峯去雲外何人得見渠本覺一石火光中爛熳遊白拈臨濟未同儔掀反華嶽連天黑幾箇知身在御樓無菴全汾州太子院善昭禪師嗣首山僧問如何是祖師西來意師曰青扇子足風涼頌曰叢林傑出鎮汾陽譽走名馳振八方人問西來祖師意解云扇子足風涼正覺逸青扇子足風涼斷際全機善舉揚月眀三峽猿啼夜何處人聞不斷腸佛慧泉青扇子足風涼親得搖來始息狂只愛團團無縫者人前空自眼如羊白雲端青扇子足風涼日用何曾有覆藏堪笑塵中無限客手遮西日汗如湯慈受深汾陽青扇價難酬為有涼風卒未休不見鹽官多少衆競頭爭角覓犀牛上方益風格團團妙意深等閒拈出示知音汗流浹背曾施手氣爽中宵便負心佛鑑勤二祖意宗師先漏泄團團青扇足風涼禪人未曉重相問獨自凄凄過洛陽親得搖來始息狂風動荷花滿座香自從一得真歸趣無意涼人人自涼椘安方呷醋咬陳薑波斯鼻孔長得些滋味子婆是阿爺娘肯堂充青扇子足風涼標格團團不覆藏信手拈來隨處用清機元不在汾陽頑石空汾陽示衆曰識得拄杖子行腳事畢三角云識得拄杖子入地獄如箭頌曰平地無端立話端揭天聲撼怒濤寒直饒識得拄杖子也是封皮作信看笑翁堪汗漫學屠龍人言枉費工自非親到者誰與論窮通虛堂愚妙峯善著語云錯又舉三角語了云錯老僧則不然識得拄杖子錯乃頌曰妙峯三箇錯不是無病藥龐公賣笊籬清平道木杓汾陽示衆曰夫說法者須具十智同真若不具十智同真邪正不辨緇素不分不能與人天為眼目决斷是非如鳥飛空而折翼如箭射的而斷弦弦斷故射的不中翼折故空不可飛弦壯翼牢空的俱徹作麼生是十智同真與諸上座點出一同一質二同大事三總同參四同真志五同遍普六同具足七同得失八同生殺九同音吼十同得入又曰與甚麼人同得入與阿誰同音吼作麼生是同生殺甚麼物同得失阿那箇同具足是甚麼同遍普何人同真志孰能總同參那箇同大事何物同一質有點得出底麼點得出者不吝慈悲點不出來未有參學眼在切須辨取要識是非面目見在徑山杲云汾陽末後若無箇面目見在一場敗關雖然如是喪我兒孫喝一喝頌曰兔角龜毛眼裏栽鐵山當面勢崔嵬東西南北無門入曠劫無明當下灰十智同真面目全於中一智是根源若人要識汾陽老擘破三玄作兩邊洪覺範十年湖海覓冤讎不得冤讎未肯休芍藥花開菩薩面棕櫚葉長夜又頭鼓山圭畫得真如活花間翅展開黃鶯偷眼覷不敢下枝來正堂辨陽春白雪人難和藻鑑冰壺豈易觀一把柳𮈔𠬧不得和風搭在玉闌干或菴體汝州葉縣廣教院歸省禪師嗣首山僧問如何是學人密用心處師曰閙市輥毬子曰意旨如何師曰溥請衆人看頌曰輥毬閙市衆人看一陳清風吹面寒定亂不須雙刃劒活人何必九還即菴覺襄州谷隱山蘊聰禪師亦曰石門聰亦曰慈照聰嗣首山僧問日往月來遷不覺年衰老還有不老者麼師曰有曰如何是不老者師曰虬龍筋力高聲呌晚後精靈轉更多頌曰洞裏無雲別是天桃花如錦柳如烟仙家不會論冬夏石爛松枯是一年無量壽慈照聰因僧問如何是道師曰臘月三十日頌曰臘月三十日開口便為勑更擬問如何明朝正月一無凖範臘月三十日真人好消息戴帽空山行穿靴水上立雲衲慶汝州廣慧院元璉禪師嗣首山初到首山山問近離甚處師曰漢上山竪拳曰漢上還有這箇麼師曰這箇是甚麼碗鳴聲山曰瞎師曰恰是拍一拍便出他日又問學人親到寶山空手回時如何山曰家家門前火把子師大悟云某甲不疑天下老和尚舌頭也山曰汝會處作麼生與我說來看師曰秪是地上水碙砂也山曰汝會也師便禮拜頌曰空手歸時誰肯信驢䭾馬載入門來家家舉起火把子半夜天如白日開白雲端寶山到日事如何空手回時所得多家家門前火把子明如日月照山河佛鑑勤潭州北禪智賢禪師嗣福巖雅嵗夜小參曰年窮嵗盡無可與諸人分嵗老僧烹一頭露地白牛炊黍米飯煮野菜羹燒榾柮火大家喫了唱村田樂何故免見倚他門戶傍他墻剛被時人喚作郎下座歸方丈至夜深維那入方丈問訊曰縣裏有公人到勾和尚師曰作甚麼曰道和尚宰牛不納皮角師遂將下頭帽擲在地上那便拾去師下禪床攔胸擒住呌曰賊賊那將帽子覆師頂曰天寒且還和尚師呵呵大笑那便出去時法昌遇為侍者師顧昌曰這公案作麼生昌曰潭州紙貴一狀領過頌曰納它皮角要輸機放下尋時結抄歸一任這回黃雪落滿家圍火掩柴扉白雲端佛性要當時莭顯北禪除夜啓玄津當筵獨恣庖丁刃直至如今此話新靈源清來勾皮骨訪知音一語當機直萬金帽子擲來如未曉眼前爭免拾花針分皮納角牛何在叉釧瓶盤只一金大用莫言無軌則當機須是芥投針草堂清白牛露地直須烹分嵗間和野菜羹莫謂個中滋味少須知四海飽膨脝普融平北禪分嵗烹白牛官中文字急來勾立地交他納皮角連忙擲下舊兜鍪文殊道北禪夜分嵗特地巧安排維那出隻手線去又𮈔來田郎催拍板鮑老舞三臺若教行正令活作一坑埋石菴玿白牛烹了正熙熙皮角官中却要追捋下帽簷輸納了燈前更鼓夜遲遲天目禮北禪因僧問如何是佛師曰𢁈挑不上頌曰𢁈挑不上筋撥不開合掌讚言善哉善哉踈山仁瑞州洞山曉聰禪師嗣文殊真常自負柴上山路逢一僧問山上有柴何故將去師放柴於地曰會麼曰不會師曰我要燒頌曰此行莫擬幾時回北去應須到五臺若遇文殊放光處殷勤為我記歸來虛堂愚柴火煎熬擔在身相逢狹路不堪論淡烟落日青山外滿地難收刀斧痕石林鞏洞山聰曰一大藏教只是箇之字頌曰點畫分明無道理老胡幾度提不起不如分付王將軍無限風流歸手裏白雲端洞山聰因僧問既是泗州大聖為什麼在揚州出現師曰君子愛財取之有道頌曰泗州忽示現揚州天下宗師話路稠君子愛財取有道南海波斯鼻孔粗慈明圓玉堂有路通人到金榜無名只自慚長恨貧儒書讀盡老來不得一青衫柏永眀州雪竇山重顯禪師嗣智門祚示衆曰龍泉與刀斧同質利鈍懸殊駑駘與驥馬同途遲速有異頌曰說似琅玕猶是玉謂言鍮石又如金自慚識性多庸下未有昭昭至鑒心佛鑑勤雪竇示衆曰譬若世界壞時大水競作其間無量衆生或沒未沒互相悲號仰望蒼蒼皆云相救當是之時四禪天人一見高聲便喝咄哉衆生我預曾報汝令頻頻上來汝却不𦗟如今有什麼救處乃拍手云歸堂頌曰却外濤聲滿世間羣生無處可躋攀寥寥天外清虛境誰解陵空上帝關圭堂居士雪竇住翠峯時有數僧到師曰新到那僧曰是師曰參堂去僧才行師復喚曰來來僧回首師曰洞庭難得師僧到與你一碗茶喫頌曰入門句子已先酬喚去呼來苐二頭到此不知茶味者紛紛空買洞庭舟虗堂愚雪竇改船子漁父頌曰夜靜水寒魚不食滿船載得月明歸頌曰閃爍金鱗躍浪時華亭貪玩下鈎遲誰知雪老垂𮈔慣不犯波濤取得伊白雲端雪竇因僧問如何是諸佛本源師曰千峯寒色曰未審向上更有事也無師曰雨滴巖花頌曰千峯寒色事如何雪上加霜凍滑多若遇鄒陽吹暖律巖花應不待春和楊無為千峯寒色冷堆青雨滴巖花照眼明若問個中端的旨休將鶴唳作鶯聲本覺一雪竇因僧問山花開似錦澗水湛如藍學人分上為什麼不會師曰枯木裏瞪眼曰恁麼則從苗辨地因語識人也師曰三十棒且待別時頌曰一枝枯草強遮羞明鏡當軒燭盡幽滿面慚惶移步去清光灼灼避無由白雲端雪竇頌革轍二門曰劫火曾洞然木人淚先落可憐傅大士處處失樓閣一德雲間古錐幾下妙峯頂喚它癡聖人擔雪共填井二祖佛未生前已震塗毒鼓如今誰樂聞請試分回互三宛轉復宛轉真金休百鍊喪却毗耶離無人解看箭四頌曰迦葉聆箏起舞淵明聞鍾皺眉息耕斗室危坐半窗凍日熙熙虗堂愚風卷浮雲盡青天絶點埃山川俱在目何必上高臺葛蘆覃雪竇頌曰三分光陰二早過靈臺一點不揩磨區區日逐貪生去喚不回頭爭奈何頌曰業識茫茫無本可據咄哉癡漢便恁麼去肯堂充鋸解稱鎚油煎石碟兩手擎來有功者賞且菴仁無禪才云雪竇老漢顢顢頇頇儱儱侗侗更參三十年也未會禪在然雖如是土曠人稀試𦗟下箇注腳乃頌曰瞎却摩醯三隻眼南北東西路不分千林落葉無人掃獨自松門展腳眠雪竇與李殿院坐次有秀才并道士到院李問云三教中那箇為貴師側身義手而立李曰有口何不道取師曰對夫子而難言頌曰擊碎髑髏敲出骨莭明眼人前自彰醜拙木菴永相州天平從漪禪師嗣清溪進師到西院兩錯公案首山念云據天平作恁麼解會未夢見西院在何故話在頌曰禪家流愛輕薄滿肚參來用不著堪悲堪笑天平老五老峯前古觀基老君元是一牟尼時難只得同香火莫𦗟它人說是非南堂興雪竇因僧問如何是佛師曰四山圍繞頌曰狂狗趂塊瞎驢趂隊只許我知不許伊會雪竇因僧問如何是諸佛向上人師曰白雲覆青山曰莫便是和尚為人處也無師曰淥水徒長蕖頌曰雪嶠層層翠瑣深風生寒岫結重雲夜來鳳冲霄漢𦗟曉樵人逐鴈羣投子青雪竇問大龍語者默者不是頌曰三軍不動旗閃爍龍蛇陳上看謀略令人長憶李將軍萬里晴空飛一鶚復菴封潭州雲蓋繼鵬禪師嗣智門祚初謁雙泉雅禪師泉令充侍者示以芭蕉拄杖話經久無省發一日泉向火次師侍立泉忽問拄杖子話說舉來與子商量師擬舉泉拈火筯便摵師豁然大悟頌曰與奪雙行驗正邪才爭拄杖便亡家驀然鐵棒如風疾失却從前眼裏花白雲端誰謂當初悔行腳錯錯西院清風頓銷爍復云忽有箇衲僧出來道錯雪竇錯何似天平錯雪竇顯把纜放船膠柱調絃遠水不救近火短綆那汲深泉天平老太忽草為兩錯悔行腳大地茫茫愁殺人眼裏無筋一世貧圓悟勤彼呼我諾彼啐我啄聞如不聞將錯就錯金剛眼睛槵子換却會與不會都盧是鍇佛鑑勤兩錯將來竟不成從而南北路頭分後來費盡分踈語半是思君半恨君雲衲慶郢州太陽警玄禪師嗣梁山觀僧問如何是和尚家風滿瓶傾不出大地沒飢人頌曰荊山美玉何須辨赤水玄珠不用拈岡象無心黃帝重卞和有智楚王嫌丹霞淳太陽玄問梁山如何是無相道場山指觀音曰這箇是吳道子畫師擬進語山急索曰這箇是有相底那箇是無相底師有省便禮拜山曰何不道取一句師曰道即不辭恐上紙筆山笑曰此語上碑去在頌曰路窮崖仞問山翁別指巖西東嶺東擬進霧垂嵐色重回頭忽見太陽紅投子青真空無相絶名模立底精兮畫底粗道即不辭難上紙西天鬍子沒髭止泓鑑天台山德韶國師嗣法眼示衆曰青蘿寅緣直上寒松之頂白雲淡竚出沒太虛之中萬法本閒唯人自閙頌曰等是垂慈為你來舌頭拖地語如雷葛藤滿地無人剪狼藉春風又一回竹屋簡韶國師示衆曰通玄峯頂不是人間心外無法滿目青山頌曰心外本來無一法國師見處未為親若言滿目青山是認著還生眼裏塵無隱鑒金陵清涼泰欽法燈禪師嗣法眼師問僧如何是祖師西來意僧曰不東不西師不肯僧却問如何是祖師西來意師曰不東不西僧遂領旨頌曰西來祖意不東西𤠔鳥春深抱樹啼多少行人空悵望青山孤聳白雲低保寧勇不東不西一句全提軟似生鐵硬如爛泥投針未諳鉢水刮膜再用金鎞雲瑣家山歸路絶回頭翻笑杜鵑啼肯堂充雲居齊和尚法燈會中為知藏燈一日謂師曰有人問我西來意答他曰不東不西藏主作麼生會師對曰不東不西燈曰與麼會又爭得曰道齊秖恁麼未審和尚尊意如何燈曰它家自有兒孫在師頓明厥旨有頌曰接物利生絶妙外生終是不肖它家自有兒孫將來用得恰好頌曰他家自有兒孫在父祖田園都不愛平生活計剎那中東頭買得西頭賣大洪恩人問西來祖師意燈公對道不東西它家自有兒孫在多是隨言却自迷本覺一金陵報恩院玄則禪師嗣法眼初問青峯如何是學人自己峯曰丙丁童子來求火後謁法眼眼問甚處來師曰青峯眼曰青峯有何言句師舉前話眼曰上座作麼生會師曰丙丁屬火而更求火如將自己求自己眼曰與麼會又爭得師曰某甲秖與麼未審和尚如何眼曰你問我我與你道師問如何是學人自己眼曰丙丁童子來求火師於言下頓悟頌曰末上一回稱八兩又稱恰重半斤來定盤星在誰人手爭著𮈔毫可怪白雲端丙丁求火己躬明法眼青峯古路行行到水窮知盡處坐看雲起見平生照覺總丙丁求火問青峯叵耐韓獹逐塊蹤賴得清涼重點破一聲雷震化為龍大洪遂問處分明答處親青峯八字打開門頭頭盡是吾家物何必臨歧更問津佛燈珣丙丁童子來求火再問炎炎燎面門過現未來三世佛不離其中轉法輪冶父川丙丁童子來求火南方丙丁又屬火桉劒宗師奈若何是君心下意不過卍菴顏一回醉倒玉樓前𩯭亂叉橫語笑顛最是惱人腸斷處借婆衫子拜婆年皖山凝昔見非真今見非假字經三寫烏焉成馬寶葉源杭州永明開山道潛禪師嗣法眼初參法眼眼曰子參請外看什麼經師曰華嚴曰總別同異成壞六相是何門攝師曰世出世間一切法皆具六相曰空具六相不師無對曰何不問去師却問空具六相不曰空師於是開悟曰子作麼生會師曰空眼然之頌曰空兮空兮無背面拈起豁然成兩片擔向南屏山角頭千古萬古少人見要見麼以拂子打圓相云金烏飛上琉璃殿斷橋倫聯珠頌古通集變本加麗句章𣗥句愈出而愈多如蜂房釀百花之蜜蟻𮈔穿九曲之珠食其蜜者念其蜂好其珠者慕其蟻余作是說有客進曰忽遇不食蜜不好珠不嗜語言文字者此集又將奚為余曰病其病者不能自病客慚而退於是乎書天童雲岫題
