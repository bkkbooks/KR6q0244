body:
  text: 僧録司右闡教兼靈谷禪寺住持淨戒重校祖師機緣潭州谷山有緣禪師嗣大光僧問如何是祖師西來意師曰夜半烏兒頭戴雪天明啞子抱頭歸頌曰瑞靄祥煙鎖玉樓妙年王子恣優遊琉璃殿上騎金馬明月堂前輥繡毬丹霞淳京兆白雲善藏禪師嗣大光僧問如何是深深處師曰矮子渡深溪頌曰白頭童子智尤長半夜三更渡渺茫任運往來無間斷不消船艇與浮囊丹霞淳吉州禾山無殷禪師嗣九峯示衆曰習學謂之聞絶學謂之鄰過此二者謂之真過有僧問如何是真過師曰禾山解打鼓曰如何是真諦曰禾山解打鼓又問即心即佛則不問如何是非心非佛師曰禾山解打鼓曰如何是向上事師曰禾山解打鼓頌曰布毛拈起費人言爭似禾山一句傳打鼓一聲喧宇宙冰寒千丈忽生蓮投子青一拽石二搬土發機須是千鈞弩象骨老師曾輥毬爭似禾山解打鼓報君知莫莾鹵甜者甜兮苦者苦雪竇顯一二三四五禾山解打鼓觀音妙智力能救世間苦正覺逸當陽打動番南鼓萬象森羅立地聞不是大家齊則劇難消白日到黃昏雪菴瑾草履為冠松作叉一般瀟灑眼頭乖清音只在風簷下終日無人不下階虛堂愚禾山解打鼓大地無寸土不是邯鄲人切忌學唐步無相範洪州鳳棲山同安常察禪師嗣九峯問僧眼界無光如何得見僧曰北斗東轉南斗西移師曰夫子入太廟曰與麼則同安門下道絶人荒去也師曰橫抱嬰孩擬彰皇簡頌曰新羅海南嶽天台纖塵不礙豈涉去來回頭斂念解脫門開反憶善財尋勝友百城遊遍不知回雪竇宗同安因僧問如何是鳳棲家風師曰鳳棲無家風曰既是鳳棲為什麼却無家風師曰不迎賔不待客曰恁麼即四海參尋當為何事師曰盤飣自有傍人施頌曰三世如來一口吞故山深靜月黃昏光分頂後千門曉坐看春回入燒痕自得暉同安因僧問如何是天人師師曰頭上角不全身上毛不出頌曰祕殿重圍曉尚寒丹墀苔潤未排班寶香鳳燭煙雲合寂寂簾垂不露顏丹霞淳同安因僧問新嵗方來殘年已去莫有不受嵗者麼師曰有曰如何是不受嵗者師曰作麼生曰恁麼則不受嵗也師曰城上已吹新嵗角窗前猶點隔年燈頌曰舊嵗新年作問端同安從此放顢頇憑仗高樓莫吹笛大家留取倚闌干懶菴樞樓上嗚咿角已吹燈前蝴蝶夢猶迷如今要識不遷義日出東方夜落西無機惠新羅泊巖和尚五燈會元作新羅國百巖嗣谷山藏僧問如何是禪師曰古冢不為家曰如何是道師曰徒勞車馬迹曰如何是教師曰貝葉𭣣不盡頌曰故國清平久有年白頭猶自戀生緣牧童却解忘功業懶放牛兒不把鞭古冢不為家丹霞淳二四十九年成露布五千餘軸盡言詮妙明一句威音外折角泥牛雪裏眠貝葉𭣣不盡貝葉𭣣不盡一句無私萬法印千聖滿口不能宣嶺梅漏泄春光信雪竇宗四古冢不為家漁翁舉棹出蘆花湛水無風江月逈長空撒盡暮天霞不勞車馬迹文王去後無消息月華影裏釣魚磯萬古清風長歷歷一鏃三關俱透脫從前汗馬休拈掇須知舊閣快龍舟當年曾把錦標奪新羅國大嶺禪師嗣谷山藏僧問如何是一切處清淨師曰截瓊枝寸寸是寶折栴檀片片皆香頌曰乾坤盡是黃金國萬有全彰淨妙身玉女背風無巧拙靈苗花秀不知春丹霞淳杭州佛日和尚嗣雲居夾山一日大普請維那請師送茶師曰某甲為佛法來不為送茶來那云和尚教上座送茶師曰和尚尊命即得乃將茶去作務處搖茶碗作聲夾山回顧師曰釅茶三五碗意在钁頭邊山曰有傾茶意籃中幾箇甌師曰有傾茶意籃中無一甌便傾茶行之時大衆皆舉目師曰大衆鶴望請師一言山曰路逢死蛇莫打殺無底籃子盛將歸師曰手執夜明符幾箇知天曉山曰大衆有人歸去歸去從此住普請頌曰路逢死蛇莫打殺無底籃子須𩗺下往往事從間話生莫將間話為間話朴翁銛擔板漢沒拘束餓死首陽山誓不食周粟虛堂愚洪州鳳棲山同安丕禪師嗣雲居僧問如何是和尚家風師曰金雞抱子歸霄漢玉兔懷兒向紫微曰忽遇客來將何祗待師曰金果朝來猿去摘玉花晚後鳳𠾑歸頌曰日午煙凝山突兀夜央天淡月嬋娟混然寂照寒宵永明暗圓融未兆前丹霞淳尺素如殘雪結成雙鯉魚要知心裏事看取腹中書方菴顯白玉階前金鳳舞黃金殿上玉雞鳴正中來與兼中到昨夜雪深月正明雪巖欽同安丕因僧問依經解義三世佛冤離經一字即同魔説此理如何師曰孤峯逈秀不挂煙蘿片月行空白雲自異頌曰雲自高飛水自流海天空闊泳孤舟夜深不向蘆灣宿逈出中間與兩頭丹霞淳歙州朱溪謙禪師嗣雲居韶國師到參次聞犬咬靈鼠聲韶便問是甚麼聲師曰犬咬靈鼠聲曰既是靈鼠為甚麼却被犬咬師曰咬殺也曰好箇犬師便打曰莫打某甲話頭師休去頌曰針頭削鐵佛面刮金無處若有出手便驚月堂昌鼠既不靈官馬相踏借使乘風廝挨廝拶干戈中立太平基凜凜嘉聲振蘭若佛燈珣朱溪問僧甚處來曰廣南來師曰彼中還有奇特尊宿麼曰奇特尊宿並無人説著只有一人大無慚愧師曰誰僧便指師師曰果然無慚愧曰若不是朱溪時人岡措師以手掩鼻僧近前師便打曰恰是師曰老僧住持事繁僧拂袖便出師呵呵大笑曰盤陀石上藕頌曰亂走到家來到家便亂走捉得玉麒麟咬斷別人手月堂昌問著奇特尊宿指出無慚愧漢力戰當場彩旗撩亂頭尾兩全始終一貫蟠桃一熟三千年藕生石上誰親見佛燈珣撥草瞻風客機鋒劈箭來盤陀石上藕一夜鐵花開方菴顯奇特老尊宿大無慚愧人盤陀石上藕喜見一番新石溪月雲居山第二世道簡禪師嗣雲居僧問孤峯獨宿時如何師曰間著七間僧堂不宿阿誰教你孤峯獨宿頌曰法爾非修本十成平常酬答最分明端然指出長安道無奈遊人不肯行丹霞淳豁開萬仞崖劈面通消息一條白練飛界破青山色率菴琮雲居因僧問路逢猛虎時如何師曰千人萬人不逢如何却是你逢頌曰不搽紅粉色不挂緑羅衣一般間態度淡墨畫蛾眉率菴琮雲居簡因僧問如何是朱頂王菩薩師曰問這赤頭漢作麼高菴悟云這箇便是超宗越格底事直是無你會處須是悟了更能履踐始得諸人還明得麼乃頌曰朱頂王菩薩元是赤頭漢驚怪李三黑一生只賣炭廬山歸宗懷禪師嗣雲居因僧問截水停輪時如何師云磨不轉頌曰千尋竿上反筋斗大海波心擲釣鈎大體還他肌骨好不塗紅粉也風流南華昺大用縱橫掣電機爍迦羅眼尚膠黐迷途夢裏爭唇吻却憶隨他去一回夢菴信新羅雲住和尚嗣雲居僧問如何是諸佛師師曰文殊聳耳頌曰無相光中未兆身清虛渺邈豈為鄰一輪明月當軒照玉殿蕭蕭不見人丹霞淳撫州荷玉山光慧禪師嗣曹山僧問如何是西來的的意師曰不禮拜更待何時頌曰虛堂寂寂夜深寒携得瑤琴月下彈不是知音徒側耳悲風流水豈相干丹霞淳𢖍州常寧縣育王山弘通禪師嗣曹山僧問如何是和尚家風師曰渾身不直五分錢曰太恁貧寒生師曰古代如是曰如何施設師曰隨家豐儉頌曰祖代家風沒一丈清貧中更是清貧著衣喫飯隨豐儉物物頭頭用最親丹霞淳撫州金峯從志禪師嗣曹山拈枕子示僧曰一切人喚作枕子金峯道不是僧曰未審和尚喚作甚麼師拈起枕子曰恁麼則依而行之師曰你喚作甚麼曰枕子師曰落在金峯窠裏頌曰天作孽猶可違自作孽不可逭皖山凝金峯窠裏絶譊訛枕子拈來會也麼回鴈一聲春夢斷始知身世悟南柯方菴顯渾崙拈起好風規石火明明已較遲不落金峯窠窟裏會須赤手討便冝石溪月金峯因僧問是身無知如土木瓦石此意如何師下禪床扭僧耳朵僧負痛作聲師曰今日始捉著箇無知漢僧作禮出去師召闍梨僧回首師曰若到堂中不可舉著曰何故師曰大有人笑金峯老婆心頌曰扁舟劃斷曉江雲一曲高歌遠送君驚起灘頭野鴨子海天飛去不成羣西岩惠是身土木無知漢忍痛聲中一皺眉好是南山射石虎縱饒沒羽亦徒為石溪月金峯於僧堂喫餅次自拈一枚餅從卜板頭轉一匝大衆見一時合掌師曰縱饒你十分起手也只得一半至晚有僧請益云今日行餅見僧合掌和尚道縱饒十分起手也只得一半請和尚全道師作拈餅勢復云會麼曰不會師曰金峯也只得一半頌曰金峯糊餅只許一半若要完全後五日看方菴顯金峯見駢道者來擎起經作攬衣勢以目視之駢提坐具以目視師師曰一切人道你會禪曰和尚作麼生師曰草賊大敗頌曰龍起滄海虎出林端直下來也急著眼看石溪月金峯因僧問四海晏清時如何師曰猶是階下漢頌曰四海煙塵已晏然當軒皓月照人寒大功不賜將軍賞寶馬金鏘頓懶看丹霞淳撫州曹山慧霞禪師嗣曹山僧問佛未出時如何師曰曹山不如曰出世後如何師曰不如曹山頌曰日隱青山瑞氣高梧藏丹鳳覷無寥無端石馬潭中過驚起泥龍翻海潮投子青古木靈巢鸐夢迷崑崙白象倒騎歸魚鱗水漲舟橫岸羊角風生花落溪湛堂深曹山不如花根本艷不如曹山虎體元班江南地暖塞北春寒一把柳𮈔𭣣不淂和煙搭在玉闌干石菴玿曹山不如是馬非驢不如曹山虎不食斑龍吟霧起虎嘯風寒達觀之士兮一見便見中下之機兮千山萬山瘥病不假驢馱藥延齡何用九還丹辛菴儔曹山霞因僧侍立師曰道者可煞熱曰是師曰秪如熱向甚處回避曰向鑊湯爐炭裏回避師曰秪如鑊湯爐炭又作麼生回避曰衆苦不能到頌曰崑崙片玉火中潤碧落孤蟾水底圜一念翛然無異色任從滄海變桑田丹霞淳衆苦不能到特地好乾坤風光都買盡不費一文錢枯禪鏡賀家湖上天華寺一一軒窗面水開不是間門防俗客愛間能有幾人來天目禮瞎却頂門三隻眼鑊湯爐炭裏優遊若言衆苦不能到端的何曾有地頭少室睦瑞州黃檗山慧禪師嗣踈山問踈山剎那便去時如何山曰畐塞虗空汝作麼生去師曰畐塞虗空不如不去山便休去頌曰畐塞虛空不如不去前後際斷令亦無住倒騎佛殿出三門𨚫把三門挂露柱懶菴需隨州護國守澄禪師嗣踈山因演化大師在湖南報慈值慈升堂次化出問如何是真如佛𪫬慈云誰無化不契遂請益師師曰汝但問來化理前問師曰誰有化於言下契悟乃云首座或在衆或住持某甲誓終身相助後化亦繼師住護國即護國遠頌曰誰無誰有句中玄擊碎重關道宛然若是子期聽品弄肯將松韻作秋蟬大洪遂朝三莫四一何少莫四朝三何太多多少未能知量有無從此見譊訛不譊訛唵蘇嚧悉哩薩婆訶佛𪫬泰誰無誰有全機道言下反身不唧𠺕直饒未舉已先行錯認簸箕作尉斗阿呵呵若人便解倒騎驢一生不著隨人後秀巖瑞護國澄因僧問如何是本來心師曰犀因玩月紋生角象被雷驚花入牙頌曰三腳靈龜荒徑走一枝瑞草亂峰垂崑崙含玉山光潤涼兔懷胎月未知丹霞淳護國澄因僧問如何是梵音相師曰河北驢鳴河南犬吠頌曰目連求佛梵音相運盡神通不見邊誰悟驢鳴并犬吠圓音落落示人天大洪遂護國澄因僧問如何是本來父母師曰頭不白者曰將何奉獻師曰殷勤無米飯堂前不問親頌曰出門遍界無知己入戶盈眸不見親虗室夜寒何所有碧天眀月頗為鄰丹霞淳護國澄因僧問鸐立枯松時如何師曰地下底一場懡㦬問會昌沙汰時護法善神向甚麼處去師曰三門前兩箇一場懡㦬問滴水滴凍時如何師曰日出後一場懡㦬頌曰鶴立孤松類莫齊豈同鵝鴨狎羣雞遼陽化去無蹤迹靈木迢然鳳不棲大洪遂古寺門前護法神會昌沙汰鼻頭辛時來天地皆同力究竟還他有道君冰生滴水事清高日出東方便不牢溪澗豈能留得住終歸大海作波濤壯志稜稜鬢未秋男兒不患不封侯反思清白傳