body:
  text: 池州報息寺沙門法應集紹興天衣禪寺住持普會續集僧録司右闡教兼鍾山靈谷禪寺住持淨戒重校佛世尊一十九則文殊四則舍利弗一則賔頭盧一則殃崛摩羅二則那吒一則七賢聖女一則城東老姥一則維摩一則傅大士七則善財五則布袋一則跋陀尊者一則志公一則天台智者一則釋迦牟尼世尊初降生一手指天一手指地周行七步目顧四方云天上天下唯吾獨尊後雲門云我當時若見一棒打殺與狗子喫貴圖天下太平琅瑘覺云可謂將此深心奉塵剎是則名為報佛恩頌曰四月八佛降生日指天指地第一九龍噴水金軀摩訶般若波羅蜜洞山聰指天指地語琅琅送語傳言出畫堂使者尚能多意氣主人應是不尋常泉大道寶殿龍樓忽降時周行七步豁雙眉開言不是無謙遜天上人間更有誰野軒遵開基創業前王事端拱持盈後帝心劒戟盡為農器用此時誰報太平音佛印元才降王宮示本然周行七步又重宣指天指地無人會獨震雷音遍大千海印信混沌未分人未曉乾坤才剖事全彰天生伎倆能奇怪末上輸他弄一場保寧勇七步周行手指天衲僧棒下命難全母胎出後成何事爭似閻浮未降前張無盡周行七步便尊家醜那堪放出門只向母胎度人畢也須一棒一條痕長靈卓才生能步便英靈天上人間我獨尊可笑瞻前不顧後那知身後有雲門草堂清一火鑄成金彈子團圞都不費鉗鎚拈來萬仞峯頭放打落天邊白鳳兒慈受深無憂樹下誕金身七步周行事斬新相見謂言侵早起誰知更有夜行人南華昺老胡不免出胞胎也解人前恁麼來指地指天第一衆生四十九年災鼓山圭老漢才生便著忙周行七步似顛狂賺他無限癡男女開眼堂堂入鑊湯徑山杲兜羅綿手指天地紺目重瞳顧四維七步周行渾屬我一生賣弄小孩兒佛燈珣黑白未分全體妙才彰文彩便成乖因茲漏泄家風甚末代兒孫鼻孔喎月菴果才出胞胎便逸羣周行七步獨尊當時若見雲門老不到如今纍子孫踈山如老胡種空意氣一手指天兼指地當時𥁞謂獨尊今日翻思誰不是人人盡在光明裏臨文不用更加諱育王達千年石虎産麒麟一角通身五彩眀金鎖玉關渾掣斷毗盧界內鼓𤇆塵雪竇宗美如西子離金閣嬌似楊妃下玉樓猶怕琵琶半遮面不令人見轉風流佛鑑勤毗嵗園裏喪嘉聲分手徒勞布惡名決定一文偷不淂至今虛作不良人瞎堂遠五天一隻蓬蒿箭攪動支那百萬兵不淂雲門行正令幾乎錯認定盤星石窗恭周行四顧獨尊平地無風起浪痕𥚟及私門猶自可誰知千古纍兒孫懶菴需掀翻地軸乾坤窄撥轉天輪宇宙寬須向強中呈好手虛空打碎劫初看正堂辨奴兒婢子十生九死於裏不正被外邊使縱饒開口便過頭未免渾身輥泥水月堂昌無憂樹下浴嬰孩清曉薔薇帶露開轉過衲僧相見處後檀驢馬出胞胎天童淨草木無端拈出來更加注腳轉癡呆西天此土誰知已夜半優曇火裏開應菴華走出門風相副東西南北更無人看來不淂韶陽老未免兒孫惹客塵或菴體指天指地無處回避瞿曇瞿曇討甚巴鼻月林觀自謂五更侵早起誰知更有夜行人條風塊雨非云昔堯舜垂衣萬國賔運菴岩未曾撞入摩耶腹兩手知他甚處安右脅出來魔境現只堪惆悵不堪看天目禮一聲哇地便吒哩突出如斯大闡提此土西天起殃害堂堂洗土不成泥北澗簡七步周行猶倣佛指天指地不分明是非既落傍人耳洗到驢年也不清盧堂愚兩手指天地周行步更多可憐黃面老螃蟹落湯鍋西岩惠生來自恨錯同條鐵鑄心肝也合消還你獨尊三界內奈何今日又明朝覺菴真僧問九峯處云承聞和尚有言諸聖間出秖是傳語人是否師曰是曰世尊一手指天一手指地云天上天下唯吾獨尊和尚為甚麼却喚作傳語人師曰秖為一手指天一手指地所以喚作傳語人頌曰妙相圓明不可親奴兒婢子自殷勤指天指地稱尊大也是傳言送語人丹霞淳世尊未離兜率已降王宮未出母胎度人已畢頌曰大象本無形至虛包萬有末後已太過靣南看北斗王宮兜率度生出胎始終一貫初無去來掃蹤滅迹除根蒂火裏蓮華處處開圓悟勤是非海裏橫身入豺虎群中自在行莫把是非來辨我平生穿鑿不相干鼓山圭利刃有蜜不須舐蠱毒之家水莫嘗不舐不嘗俱不犯端然衣錦自還鄉徑山杲未離兜率降王宮便就刀山入鑊湯等間擒下白拈賊滿眼俱為敗露贓瞎堂遠垂鈎不似迷津客張網誠非待兔人半夜烏雞何處去天明吞却玉麒麟正堂辨肌骨當初赫赤窮靣皮今日厚千重撩頭搭尾應更點贏賽闍𥠖齋後鐘或菴體世尊初於臘月八日明星出時忽云奇哉一切衆生具有如來智慧德相但以妄想執著不能證得頌曰瞿曇失却眼睛時雪裏梅花只一枝而今到處生荊𣗥却笑春風惱亂吹晦堂心黃靣瞿曇不丈夫明星現處自塗糊如今好覔生蛇弄免使兒孫在半途佛心才一見明星夢便回千年桃核長青梅雖然不是調𦎟味曾與將軍止渴來雪竇宗出得山來早是遲却於世上討便冝直饒一念超三界好與拳頭劈靣椎佛照光此老從來謾自誇無端病眼見空華直教當下超三際撿點將來未到家無用全六年落草野狐精跳出渾身是葛藤打失眼睛無處覔誑人剛道悟明星天童淨二千年前黃靣老舉頭莫是見明星茫茫宇宙人無數幾箇男兒眼有睛肯堂充雪嶺崎嶇嵗月深何曾夜半見明星可憐業識茫茫者蹉過如來正法輪妙峯善夜半明星出現時分明喪盡目前機若言總具如來相也是空拳誑小兒頑石空六載隈藏在雪山灰頭土靣自慚顏今朝忽覩明星現始覺從前被眼瞞鐵山仁六載將身草裏埋當時有眼幾曾開果然見得明星現未到門冷似灰介石朋雪嶺六年修苦行今朝打失主人公普天匝地無尋處百億分身是脫空天目禮正覺山前失眼睛是凡是聖盡生盲至今夜夜明星現誰肯向伊行處行癡絶沖明星見處月三更箇箇眉毛眼上橫平地起堆黃靣老夢中説夢可憐生大歇謙明星一見眼皮穿漢語胡言萬萬千暴富乞兒休説夢誰家竈裏火無煙無量壽金鍾夜擊九重城六載歸來改瘦形待得衆生心眼活雪山依舊碧崚𡾓虛堂愚輊金輪位重草座金彈換人泥彈丸末世衆生心眼巧明星空照雪山寒間極雲月滿長空星滿天瞿曇一見眼皮穿長安市上人無數何似家家夜莫眠千峯琬世尊一日升座大衆才集定文殊白槌云諦觀法王法法王法如是世尊便下座頌曰聲振大千龍虎伏無人解和法王才言下便明猶是鈍頓教千眼一時開明招謙文殊白槌報衆知法王法令合如斯會中若有仙陀客不待眉間毫相輝北塔祚列聖聚中作者知法王法令不如斯會中若有仙陀客何必文殊下一槌雪竇顯百萬靈山似葦麻風行雲集已周遮當時不是文殊老往往瞿曇更撒沙佛印元頭角麟龍衆若干當時一例受欺謾法王真子揮楗稚直至如今作笑端正覺逸未兆之前早二三白槌之後更那堪當時若有仙陀客不到如今強指南海印信七佛之師下一槌鵝王成鴨鱉成龜滿筵龍象齊傾耳笑殺靈山老古錐野軒遵巍巍頂相終難見舒卷何當如掣電彼時若有此時人文殊槌下分針線白雲端諦觀法王法法王法如是玉輪影射珊瑚枝一陳清風動天地地藏恩月在波心徹底寒澄澄應不許龍蟠五湖多少未歸客却被傍人把釣竿上方益彌盧出海橫天外南北東西不見邊一幅素縑描不得競將天下與人傳大洪遂據坐凝眸語未形一槌直下意何明倒行此令如相委無限清風動地生夢菴信一假真風見也麼元元化毋理機梭織成古錦含春象無奈東君漏泄何天童覺一輪明月映天心四海生靈荷照臨何必西風撼丹桂碧霄重送九秋音佛鑑勤法王法令若為酬老到文殊強出頭負纍釋迦猶可事至今千古閙啾啾龍門遠銀蟾皎潔豈容摸剛被文殊強塗糊千古兒孫無覔處三條椽下觜盧都月菴果金槌影動寶劒光寒百萬之衆齊著眼看楚安方瞿曇按指文殊據令漏泄天機一槌打正南華昺正令付全提不存凡聖機牢關百雜碎石火電光輝尼無著總古皇前化超羣檄無事印文明劃劃今時衲子若當陽往往半千成五百正堂辨法王法令沒周遮一片凝絶點瑕槌下不開諸聖眼幾多騏驥困鹽車靈巖安見成活計莫周遮椎下分踈事轉差若是咬人師子子何須牙上更安牙月林觀道泰時清才子貴家肥國富小兒嬌不因紫陌花開早爭見黃鶯下柳條木菴永世尊因五通仙人問云佛有六通我有五通如何是那一通世尊召仙人仙人應諾世尊曰那一通爾問我頌曰仙人一問通皆備却是瞿曇一物無捉得兔來依舊放幾多山鬼暗相呼佛印元那一通爾問我令人慚愧釋迦老只知步步踏紅蓮不覺茫茫入荒草正覺逸無量劫來曾未遇如何不動到其中莫言佛法無多子最苦瞿曇那一通保寧勇問佛如何那一通世尊當面指迷蹤祥雲密密微微雨大震雷音匝地風雲溪恭汝問如何此問親嶺梅江柳共芳春抱贓不用行搜檢已自當堂露賊身長靈卓那一通你問我玄關倒插無鬚鎖等間一掣掣得開三箇老婆相對坐咄斷橋倫那一通你問我口是禍門招因帶果慚愧慈悲大法王丙乙離壬不屬火寶葉源世尊因外道問云不問有言不問無言世尊據坐外道讚曰世尊大慈大悲開我迷雲令我得入作禮而去後阿難問佛外道有何所證而言得入世尊曰如世良馬見鞭影而行頌曰鞭影分明指似君多聞瞥地爽精神汾陽報汝諸禪侶信手拈來莫厭塵汾陽昭機輪曾未轉轉必兩頭走明鏡忽臨臺當下分妍醜妍醜分兮迷雲開慈門何處生塵埃因思良馬窺鞭影千里追風喚得回雪竇顯雙鋒覆護兩俱摧迷雲從此豁然開收得劫初鈴子後輕輕一振動雲雷天衣懷萬丈寒潭徹底清錦鱗夜靜向光行和竿一掣隨鈎上水面茫茫散月明白雲端經過遇夜宿荒草開得眼來天大曉空心赤腳唱歌歸路上行人已不少保寧勇特地殷勤問有無因風應不費工夫迷雲縱得開令入未免區區在半途淨照臻雪覆喬林同一色清光上下含虗碧採樵人立渡頭寒極目圓蟾為誰白成枯木外道心慣險夷老胡鞭影露針錐行人拾得東門兔誰管韓獹精力疲長靈卓世尊恰似青銅鏡挂向虗空秋月靜表裏無私照膽寒高低一一皆相映佛鑒勤杲日連天照有無孰云善逝坐跏趺如今要見當年事邪正由來在半途龍門遠有無不問語先墯明鏡當臺雙照破迷雲散𥁞曉天空杲日團團紅似火佛性泰露影藏身問世尊瞿曇一點不加文迷雲舒卷從斯入十倍精神減八分佛燈珣迷悟髑髏前何勞更舉鞭只持雞狗戒不學祖師禪鼓山圭兩處牢關擊不通纖塵不動自乖宗忽然業鏡百雜碎黃面瞿曇失却蹤徑山杲外道殷勤來問佛有言不問及無言大雄不費纖毫力良馬何曾用舉鞭照堂一世尊隻眼通三界外道雙眸貫五天華意正濃桃臉笑春光不在柳梢邊雪巢一不問有言無言説甚見影見鞭露柱口挂壁上燈籠倒退三千瞎堂遠陷虎機關兩處安湍流一截萬源乾駿駒瞥尓窺鞭影凜凜霜蹄毛骨寒尼無著㧾獵涉榮枯未是奇到頭誰是出家兒故鄉漠漠無消息時有孤雲嶺外歸正堂辨赤日輝空照大千佛魔俱盡䪺超然悠悠莫論途中事露出胸襟子細看大溈智不問有無先話墮軒轅古鏡忽臨臺雖然當下分妍醜依舊迷雲撥不開肯堂充自把碌磚空裏擲必端自打自家頭灼然自痛自難説自著摩挲歸去休斷橋倫不問無言及有言坐觀成敗自安然仙陀瞥爾知宗墮誰謂世尊曾舉鞭本覺一疾焰過風苐二頭不堪惆悵只堪愁一聲振鬣長鳴後萬馬皆瘖一戰收北澗簡世尊因外道問昨日説何法曰説定法又問今日説何法曰説不定法云云頌曰古鑑從來絶點痕隨其妍醜目前分而今鑑破無光影風輥長江水色渾塗毒䇿昨日與今日説定説不定寰中天子勑塞外將軍令外道當年入夢鄉直至如今猶未省高安悟昨日定今日不定正令已行皆逐正卓下靈山皂纛旗百萬魔軍皆乞命山堂淳世尊因調達謗佛生身陷地獄佛勑阿難傳問云汝在地獄中安否云我雖在地獄如三禪天樂佛又令阿難傳問你還求出不云我待世尊來便出阿難云佛是三界大師豈有入地獄分云佛既無入地獄分我豈有出地獄分頌曰好笑提婆達多入捺落十小劫波然得三禪妙樂吹布毛須還鳥窠湛堂凖大隱居小隱居山各得其所隨分安間何必更來論出入人生在處有餘歡別峯雲地獄天堂八字打開誰知無去亦無來若言已得三禪樂未免將身自活埋松源嶽萬仞崖頭𢬵得去不知何處覔全尸業風吹起再蘇省卻問如今是甚時虗堂愚世尊因長爪梵志索論義預約云我義若墮我自斬首以謝世尊云汝義以何為宗梵志云我義以一切不受為宗世尊云是見受不志拂袖而去行至中路有省乃謂弟子云吾當回去斬首以謝世尊弟子云人天衆前幸當得勝何以斬首志云我寧於有智人前斬首不於無智人前得勝乃歎云我義兩處負墯是見若受負門處是見不受負門處細一切人天二乘皆不知我義墯處唯有世尊諸大菩薩知我義墮回至世尊前云我義兩處負墯故當斬首以謝世尊云我法中無如是事汝當回心向道於是同五百徒衆一時投佛出家證阿羅漢頌曰是見若受破家門是見不受與誰論匾簷驀折兩頭脫一毫頭上現乾坤天衣懷一切不受逞家風片言雙破兩頭攻赤幡奪了回光處始信言前墯己宗本覺一是見受時眼著屑見如不受事猶乖賊身已露徒回首鬼面神頭一處埋無用全世尊因乾闥婆王奏樂其時山河大地𥁞作琴聲迦葉起舞王問迦葉豈不是阿羅漢諸漏已𥁞何更有餘習世尊曰實無餘習莫謗法也王又撫琴三遍迦葉亦三度作舞王曰迦葉作舞豈不是世尊曰實不曾作舞王曰世尊何得妄語世尊曰不妄語汝撫琴山河大地草木𥁞作琴聲豈不是王曰是世尊曰迦葉亦復如是實不曾作舞王乃信受頌曰輕輕撥轉一條弦聲振三千興大千賴得飲光知密意肯將羅袖惹春煙塗毒䇿有三尺劒可以謁趙國無千里眼難以見懸𮈔巍巍堂堂三界大師虗堂愚世尊在忉利天為母説法優填王思佛命匠雕旃檀像及至世尊下來像亦出迎頌曰紫金光聚照山河天上人間意氣多曾勑文殊領徒衆毗耶城裏問維摩虗堂愚世尊一日坐次見二人舁豬子過這箇是甚麼其人云世尊具一切智豬子也不識世尊曰也要問過頌曰捨筏懷兼濟逢耕更問津却將未歸意説與欲行人木菴瓊首座世尊三喚三應乃云無為真佛實在我身頌曰真佛無為在我身三呼三應太惺惺若人不悟元由者塵劫茫茫認識神世尊一日勑阿難食時將至汝入城持鉢難應諾曰汝既持鉢當依過去七佛儀式難遂問如何是七佛儀式佛召阿難難應諾佛曰持鉢去密菴云大小世尊被阿難輕輕靠著未免喚鍾作甕頌曰從前七佛儀式慶喜何曾欠少堪笑黃面瞿曇無端打箇之繞遁菴演世尊因靈山會上有五百比丘得四禪定具五神通未得法忍以宿命智通各各自見過去殺父害母及諸重罪心內懷疑於甚深法不能證入於是文殊承佛神力手握利劒持逼如來世尊謂文殊曰住住不應作逆勿得害吾吾必被害為善被害文殊從本已來無有我人但以內心見有我人內心起時我必被害即名為害於是五百比丘自悟本心如夢如幻於夢幻中無有我人乃至能生所生父母於是五百比丘同聲讚嘆曰文殊大智士深達法源底自手握利劒持逼如來身如劒佛亦𠇍一相無有二無相無所生是中云何殺頌曰為渠中路惹埃塵致使全機截斷雲佛劒兩忘何處去還鄉曲調一番新象田卿佛祖由來捴是冤電機𢭀處直如弦金毛若解和聲拶月裏麒麟笑揭天瞎堂遠文殊當日逼如來五百聲聞眼豁開欲會如劒佛亦爾青蛇匣裏吼風雷本覺一世尊敲髑髏問𦒿婆生何道曰生人道又敲一曰生何道曰生天又敲一𦒿罔措頌曰如來一擊少人知直下分明更是誰無限月光隨水去片雲偏向故山歸塗毒䇿老胡一擊許誰知大冶紅爐片雪飛青草冢間留不住白雲還望故山歸瞎堂遠世尊因地布髮掩泥獻華於然燈佛燈見布髮處遂約退衆乃指地云此一方地宜建一梵剎時有賢于長者持標於指處插云建梵剎已竟時諸天散花讚云庶子有大智矣頌曰百草頭上無邊春信手拈來用得親丈六金身功德聚等間擺手入紅塵塵中能作主化外自來賔觸處生涯隨分足未嫌伎倆不如人天童覺一枝修竹建精藍風捲蟭螟入海南惡水潑來成苐二鈍根蹉過問前三張無𥁞世尊因廣額屠兒日殺千羊一日至世尊前揚下屠刀云我是千佛一數世尊云如是如是頌曰昔日為刀今日佛今朝為佛佛能刀能刀能佛無差別便見眉間白玉毫圓悟勤放下屠刀處棒打不回頭雲自帝鄉去水歸江漢流退菴休世尊因波斯匿王問勝義諦中有世俗諦否若言無智不應一若言有智不應二一二之義云何世尊曰大王汝於過去龍光佛法中曾問此義我今無説汝今無𥊸無説無𥊸是名一義二義頌曰問處奇特答處殊絶一二義諦驪龍角折真如哲無𥊸無説意無窮鐵壁銀山一線通何處是璩真聖諦秋風昨夜到梧桐東谷光世尊昔至多子塔前命摩訶迦葉分座令坐以僧伽𥠖圍之遂告云吾有正法眼藏密付於汝汝當護持傳授將來母令斷絶頌曰密傳分半座正好驀靣唾不與麼且放過子孫未免遭殃禍海印信僧問興化多子塔前共談何事化曰一人傳虗萬人傳實頌曰於道無所證方通萬法路或明或暗行不慎亦不護月來松色寒雲去青山露今古天台橋幾人能得度投子青世尊因黑齒梵志運神力以左右手擎合歡梧桐樹兩株至靈山獻佛佛云梵志志應諾佛云放下著志放下左手一株佛又云放下著志放下右手一株佛又云放下著志云我兩手𥁞空未審更放下箇甚麼佛云吾非教汝放捨其華汝當放下內六根外六塵中六識無一可捨是你免生死處志忽然大悟頌曰梵志誰知有過愆閻王業鏡照無偏因茲見佛成羅漢方信壺中別有天南堂興兩手擎來教放下空身立地更疑猜根塵識界無尋處多謝春風爛漫開心聞賁截斷千崖路風前活計新誰知席帽下元是昔愁人無際𣲖世尊臨入涅槃文殊請佛再轉法輪世尊咄云吾四十九年住世未嘗説一字汝請吾再轉法輪是吾曾轉法輪邪頌曰四十九年打之繞下梢大作師子吼雖然未始轉法輪畢竟分踈成應口無際𣲖末上何曾轉法輪只今再轉謾勞神路行人不知天曉猶把靈符執夜明北澗簡老漢生平太脫空將無作有誑盲聾臨期一語方真實也是闍黎飯後鐘別山智世尊臨入涅槃以手摩胸普告人天大衆云汝等諦觀吾紫磨金色之身瞻仰取足莫令後悔若言吾滅度非吾弟子若言吾不滅亦非吾弟子頌曰言吾入滅非吾子言吾不滅亦非親但見落花隨水去不知流出洞中春釋迦老茗為鄰臨行賣弄紫金身雙林𥁞道泥洹也夜夜群星拱北辰佛鑒勤老倒瞿曇不識羞臨行猶自逞風流摩胸示衆歸何處啼鳥一聲山更幽皖山凝滅度不滅度總非吾弟子更把雙趺展示人苦瓠連根苦雲耕靜雙林樹下手摩胸説有談無恣脫空若謂瞿曇曾入滅錯教啼鳥笑春風舟度世尊涅槃日迦葉最後至世尊乃於槨中露雙趺示之迦葉乃作禮請如來以三昧火而自闍維即時金棺從七寶牀升舉繞俱尸羅城七匝却還本處化火光三昧而自焚之頌曰慚愧老胡槨示雙趺金色尊者還會也無目前悟得未辨精繞七匝兮成何事個箇男兒是丈夫地藏恩未出王宮已涅槃何須雙足露金棺致令迦葉雙眉皺慶喜門前倒剎竿佛鑒勤文殊師利在靈山會上諸佛集處見一女子近佛坐入於三昧文殊白佛云何此女得近佛坐佛云汝但覺此女令從三昧起汝自問之文殊繞女子三匝嗚指一下乃至托上梵天𥁞其神力而不能出佛云假使百千文殊亦出此女定不得下方過四十二恆沙國土有罔明菩薩能出此女定須罔明至佛所佛勑出此女定罔明即於女子前鳴指一下女子於是從定而出頌曰文殊托上梵天罔明輕輕彈指女子黃面瞿曇看他一倒一起天衣懷千眼莫辨來由孤坐是何三昧文殊著力雖多女子隨邪亦殺罔明關捩有誰知兩過春山如潑黛佛慧泉罔明彈指也尋常豈是文殊智不長因憶江南二三月鷓鴣啼處百華香佛印元佛性天真事誰云別有師罔明彈指處女子出禪時不費纖毫力何曾動所思衆生捴平等日用自多疑真淨文百千文殊出不得罔明不費纖毫力落霞與孤鶩齊飛秋水共長天一色雲居祐獨坐靈山誰得知罔明出定破羣迷如今四海皆通達信道無心捴不疑雲蓋智文殊用𥁞平生力罔明彈指便回來不是老胡深有意雙眸未肯為渠開成枯木拂拭瑤琴月下彈調高雪曲和還難五侯費𥁞平生志從此詩書懶更看寶峯照坐擁群峯覆白雲鶯啼深谷不知春岩前花雨紛紛落夢覺初回識故人石門易一拳拳倒黃鶴樓一踢踢翻鸚鵡洲欲識罔明彈出定青山不動水長流智海清當機密薦個中玄女子何因坐佛前切莫途中為解礙刻舟求劒實徒然禾山方女子文殊與罔明禪徒畢竟如何委除非格外妙投機始信波濤元是水龍牙才出定只消彈指佛法豈用工夫我今要用便用不管罔明文殊洪覺範𥁞得天然別花間試展開黃鶯偷眼覷不敢下枝來慈受深出得出不得初不離是定聖者超凡情凡人而乃聖倒用與橫拈扶邪及顯正春雨春風竹戶涼落花啼鳥千峰靜龍門遠瞿曇身心如泥女子肝腸似鐵文殊貪尋鍋子岡明由來著楔歷觀大地衆生不解閉門作活不動干戈建太平雨過青山如黛潑佛燈珣女子與瞿曇自起還自倒無限傍觀人投身入荒草月菴果二菩薩出定笑殺老禪和富嫌千口少貧恨一身多圓覺演不假文殊神通休要罔明彈指𠇍時靈山會中女子從定而起鼓山圭出得出不得是定非正定罔明與文殊喪却窮性命徑山杲文殊出不得罔明却出得叵耐這冤家冷地裏作賊白楊順文殊彈指罔明出定今日重新打翻舊令女子瞿曇在我心鏡楚安方入定出定因邪打正堪笑文殊春行秋令石明長江輥底浪如銀秋日白蘋紅蓼新莫怪扁舟難到岸行船由在把梢人慈受深大定等虗空廓然誰辨的女子與瞿曇據令何調直師子奮迅兮搖蕩乾坤象王回旋兮不費餘力孰勝孰負誰出誰入雨散雲收青天白日君不見馬駒殺天下人臨濟未是白拈賊圓悟勤抹粉塗壞恰我呆神頭鬼面舞三臺千千萬萬人窺看子細不知誰見來開福寧懷藏日月八面玲瓏袖裏金鎚鮮血通紅香風𩖼𩖼花雨濛濛兵隨印轉處萬里長虹將逐符行時些子神通南堂興四箇沒意智漢做處捴無畔岸一狀領過階前與伊據欵結案開善謙出得出不得滿面是埃塵愁人莫向愁人説説向愁人愁殺人應菴華金不金水不洗水兩既不成一何有爾罔明文殊靴裏動指尼無著捴一畝之地三蛇九鼠子細看來是何面觜佛照光苦瓠連根苦同坑無異土二千年已前一火破落戶或菴體出得何如未出時瞎驢成隊喪全機如今四海平如砥蘆笛迎風撩亂吹密菴傑人平不語水平不流瞿曇女子鬼面神頭肯堂充出得出不得攧落精靈窟何處不風流祖師無妙訣松源嶽子不嫌母醜犬不厭家貧舉頭天外看誰是我般人孤峯深文殊罔明休卜度瞿曇女子謾針錐推倒鐵山歸去也縱橫十字更由誰石菴玿誰在畫樓西相逢語笑低到家春色晚花落鷓鴣啼雪菴瑾文殊繞三匝罔明輕彈指世尊努眼睛女子從定起幻菴覺鵲鴉午夜破雲飛寶印無私孰解提若道罔明能出定是人拔舌入阿鼻劒門分古老相傳鬼呌坑看來人鬼不多爭早知鬼便是人作夜半三更也可行無準𫈣𫙙寂眼下安眉趙哥口邊著耳驀然狹路相逢兩個是甚面觜斷橋倫出得出不得渠儂得自由神頭并鬼面敗闕當風流無門開是定出得不得關捩初無多子文殊神通太過罔明輕輕彈指橫川珙文殊師利令善財童子採藥云是藥者採將來善財遍採無不是藥却來白云無不是者殊云是藥者採將來善財拈一枝草度與殊殊接得示衆云此藥能殺人亦能活人頌曰是藥拈來更不疑師資相見在臨時從茲病甚無醫處殺活還應作者知佛印元信手拈來草最靈一枝能殺亦能生曼殊室利開金口直至如今藥道行正覺逸大地蒼生病似麻吉祥靈藥示無涯其間殺活難分辨又是重添眼裏花保寧勇藥病相治貶更褒當機殺活按吹毛毗盧海闊煙波靜誰把長竿釣巨鰲照覺捴歷劫何曾異明明百草頭甘和苦澀味死活病須瘳好笑文殊老憐兒不覺羞雲溪恭善財拈起一枝草持來度與文殊老殺活雖然在手中遍界不藏光杲杲楚安方善財採藥不知名度與文殊用得靈便把黃連當甘草等間殺活幾多人鐵山仁採藥與用藥相逢一會家殺人活人不眨眼白玉無瑕却有瑕石田薰一莖草上定綱宗殺活全歸掌握中未舉已前先薦得分明鷂子過遼東掩室開文殊問菴提遮女云生以何為義女云生以不生生為生義殊云如何是生以不生生為生義女云若能明知地水火風四緣未嘗自得有所和合而能隨其所宜以為生義殊又問死以何為義女云死以不死死為死義殊云如何是死以不死死為死義女云若能明知地水火風四緣未嘗自得有所離散而能隨其所冝以為死義頌曰生以不生生死以不死死根本豁然明應時超佛祖隨宜離散與和合十字縱橫活鱍鱍金剛寶劒倚天寒外道天魔皆膽懾圓悟勤生以不生生為生指天指地四方行死以不死死為死雙林樹下亦如此生不生死不死四十九年無一字掣斷金鎖天麒麟突出金毛師子子南堂興生無所生死無所死風動塵飛波澄浪止和合離散隨處發現滿月彎弓雙雕一箭佛性泰問處分明答處端當機覿面不相謾死生生死元無際月上青山玉一團簡翁敬文殊三處度夏一月在魔宮一月在長者家一月在坊夏畢却歸世尊會中解制迦葉欲白槌擯出才舉此念見會中有無量釋迦無量文殊無量迦葉無量楗稚迦葉既見世尊云汝擯那箇文殊頌曰千峯月照楚江秋衲子初開布袋頭聞道淮南米價賤便隨船子下楊州褚衲秀大象不遊兔徑燕雀安知鴻鵠據令宛若成風破的渾如齧鏃遍界是文殊遍界是迦葉相對各儼然舉槌何處罰好一劄金色頭陀曾落節圓悟勤剎剎塵塵見不難頭陀何苦被他瞞當初若論收姦細莫把瞿曇做佛看心聞賁天高雲靜月彎彎雨過秋空眼界寬百億文殊真妙體分明只在一毫端正堂辨三處移場定是非頑心全不改毫釐胡言漢語憑誰會鐵額銅頭也皺眉密菴傑錦衣公子春遊慣白首佳人懊恨多波富尚嫌千口少自貧無奈一身何月忠賔頭盧尊者赴阿育王宮大會王行香次作禮問曰承聞尊者親見佛來是不者以手䇿起眉毛曰會麼王曰不會者曰阿耨達池龍王請佛齋吾是時亦預其數頌曰拈起眉毛示育王當時凡聖絶商量從來對衆難收拾眼上依前兩簇長佛印元一翳在眼空花亂墜狹路相逢難為回避大王還識老僧無似雪眉毛長窣地佛慧泉我佛親見賔頭盧眉長髮短雙眉阿育王猶疑狐唵摩呢噠哩悉哩蘇嚧保寧勇靈山會上舊家風脫略從茲勢莫窮金斗峯前重漏泄莫將附子當天雄正堂辨尊者親曾見佛來雙眉䇿起笑顏開古今不隔𮈔毫許天上人間孰可陪佛照光以手䇿起眉毛千聖從來不識一會靈山儼然説甚今朝昨日月林觀䇿起眉毛答問端親曾見佛不相謾至今應供四天下春在梅梢帶雪寒天童淨尊者當時親見佛眉毛䇿起有來端頂門歡瞎金剛眼恩大難酬雨露恩枯禪鏡厖眉䇿起貌稜層見佛元來却不曾南嶽天台相撞著被人喚作捉齋僧巳菴深䇿起眉毛示育王分明佛面露堂堂至今阿耨池中水流落人間潤八荒天目禮君王一語出如綸尊者眉毛八字分四海風清煙浪靜碧天無際水無垠無凖範尊者䇿眉王不會十方剎土古風清佛齋勝會親曾預不是尋常粥飯僧橫川珙舍利弗入城遙見月上女出城弗心口思惟此姊見佛不知得忍不我試問之才近便問甚麼處去女曰如舍利弗與麼去弗云我方入城汝當出城云何言如舍利弗與麼去女云諸佛弟子當依何住弗云諸佛弟子當依大涅槃而住女云諸佛弟子既依大涅槃而住而我如舍利弗與麼去頌曰淡籠煙深瑣霧鶖子寧知此條路直饒撞入涅槃城未免隨他與麼去月上女實堪悲愛將青黛畫蛾眉佛慧泉本來正體徹根源出入同途只此門已住如來大解脫掌中至寶耀乾坤圓悟勤重城曉入冒輕煙閙市相逢豈偶然一句等間相借問平田忽爾浪滔天月上女實堪憐雲髻高梳何處去借婆裙子拜婆年佛性泰涅槃一路同來往寸步寧虧達本鄉鶖子黠兒輕借便由如啞子喫生薑月上女太無良不塗紅粉自風光金瑣玄關留不住百尺竿頭信腳行佛燈珣出入分明報己知更言何處有狐疑但如鶖子恁麼去莫管傍人説是非文殊道如舍利弗與麼去千人萬人攔不住優遊自在涅槃城步步蓮華隨足舉且菴仁相逢打鼓弄琵琶須是還他兩會家曲罷不知何處去夕陽斜映暮天霞石菴玿有禮有樂能放能收人平不語水平不流漢地不收秦不管又騎驢子下楊州無際沠月上女曾與麼去我今亦依如是住明明今古不曾藏一點靈光常獨露月林觀大地絶纖塵面南看比斗嫁雞逐雞飛嫁狗逐狗走雪菴瑾舍利弗因維摩詰室有一天女散花次問言汝何不轉却女身曰我從十二年來求女人相了不可得當何所轉即時天女以神通力變舍利弗作天女天乃化身如舍利弗而問言何不轉却女身弗以天女像而答我今不知何轉而變為女身天曰舍利弗若能轉此女身則一切女人亦當能轉如舍利弗非女而現女身一切女人亦復如是雖現女身而非女也即時攝舍利弗身還復如故而問言女身色相今何所在舍利弗言女身色相無在無不在天曰一切諸法亦復如是無在無不在頌曰鶖子已圓無漏種換却身形捴不知通途一貫非他物午夜胡僧步雪歸正堂辨殃崛摩羅未出家時事外道受教為憍尸迦欲登王位用千人拇指為花冠所得九百九十九唯欠一指遂欲殺母取指時佛在靈山以天眼觀之乃化作沙門在殃崛前殃崛遂釋母欲殺佛佛徐行殃崛急行追不及乃喚曰瞿曇住住佛告曰我住久矣是汝不住殃崛聞之心忽開悟遂棄刃投佛出家佛即授與落髮披衣頌曰殃崛雄雄方勇鋭瞿曇住住息風波殺人作佛當頭劄覆雨翻雲在剎那踈山如急行緩步無前後渾長安路一條殃崛回頭知住處便能平步上雲霄花冠不用娘生指髮寧煩費力搖好是移花兼蝶至等間買石得雲饒佛燈珣我住久矣是汝不住是汝若住鼻孔相拄不動步而遍界遊師姑畢竟女兒作雲居悟從人求覔枉奔波過在孳生口數多殺却渾家仍自殺誰能奈得你儂何野雲南殃崛摩羅既出家為沙門因持鉢入城至一長者家值其婦産難子母未分長者云瞿曇弟子汝為至聖當有何法能免産難殃崛曰我乍入道未知此法當去問佛却來相報遽返白佛具陳上事佛告曰汝速去説我自從賢聖法來未曾殺生殃崛往告其婦人聞之當時分免母子平安頌曰聖法從來不殺生本無生殺亘精明是諸人我皆空相一切冤親𥁞假名甘露才霑除熱惱玉蓮金子兩敷榮覺海元月裏姮娥不畫眉只將雲霧作羅衣不知夢逐青窵去猶把花枝蓋面歸鼓山圭華陰山前百丈井中有寒泉徹骨冷誰家女子來照影不照其餘照斜領徑山杲不遲一步不疾一刻明眼衲僧如何會得粉骨碎身未足酬一句了然超百億𡰱無著捴賢聖劫來未曾殺而今斷這一刀休果然葛怛胸中落笑殺靈山老比丘密菴傑不因一事不長一智不曾殺生了無忌諱傳言送語當風流拈得口兮失却鼻木菴永賢聖中來不生殺其家子母自團圓陰陽造化初無迹春在花枝特地妍天目禮綵仗神旗獵曉風雞人催唱鼓鼕鼕銅壺漏永何時歇如此相催即老翁南叟茂非食不療飢非藥不療病黃面老瞿曇識𥁞衆生性寶葉源我瞿曇佛具正遍知子母分解只在當時橫川珙那吒太子析肉還母析骨還父然後現本身運大神力為父母説法頌曰骨還父肉還母何者是身分明聽取山河國土現全軀十方世界在裏許萬劫千生絶去來山僧此説非言語骨肉都還父母了未知那箇是那吒一毛頭上翻身轉一一毛頭渾不差徑山杲那吒太子本來身卓卓無依不受塵雲散水流天地靜籬間黃菊正爭春自得暉析骨還父肉還母不知那箇是那吒夜深失腳千峯外萬古長空片月斜少室睦骨還父肉還母日西沉水東注良久露北澗簡雨散雲收後崔嵬數十峰王維雖敏手難落茟頭蹤無凖範七賢聖女姊妹同遊尸陀林一姊指尸曰尸在此人在甚處諸姊妹諦觀皆悉悟道乃感帝釋雨花讚曰我是帝釋見諸姊悟道故來供養但諸姊有何所須我能給施女曰我家四事七悉皆具足唯要三般物一要無根樹一株二要無陰陽地一片三要呌不應谷一所帝釋曰一切所須我悉有之若此三物我實無女曰汝若無此爭解濟人遂同往白佛佛言我諸弟子不解此義唯有諸菩薩乃解此義頌曰寒林裏忽逢伊帝釋行檀恨已遲三物索來何處有却令諸姊皺雙眉憍尸迦知不知更獻天華三兩枝佛慧泉尸在此兮人何在疾雷破山風振海雲飛雨散相見時髑髏眼睛放光彩龍牙才帝子遊春不逐他相邀諸姊入尸陀死人堆裏出身路撥動煙塵見也麼靈利漢不消多回頭著自家底洞雲深處舊𤇆蘿佛燈珣談玄談妙實堪誇帝釋才聞便雨花臨機須索三般物看看愁殺憍尸迦歷劫不曾違背面明明借問却周遮大溈智無陰陽地無根樹谷呼不應當頭露羅列七森太虗動地雨花無量數天帝釋七賢女明明指出真金處無生無法本如如只個如今離言語圓悟勤無陰陽地呌不響山無根樹子大家攀七賢女太嬌癡却將紅粉畫蛾眉憍尸無此三般物那得天花撩亂飛佛鑒勤無根樹子枝條纍山谷無聲句最親陰陽不到間田地結子開花朵朵新正堂辨觀之不可見𥊸之不可聞家有三般寶富貴壓乾坤月菴果無根樹子一株山翁不費誅鋤鎚碎千年桃核不須緣木求魚蒙菴嶽無陰陽地一片明明賣貴賣賤死尸無處活埋露出三頭兩面不應山谷一所透出千門萬戶清曉一聲杜鵑勸人不如歸去無陰陽地有甚巴鼻無根樹子荒得人死呌不響山谷摩醯亞三目作麼作麼因禍致福惱得憍尸迦大笑却成哭退菴奇七八寶任君需三物從來的是無若向無中拈得出不須見佛問何如天目禮昔城東有一老姥興佛同生而不欲見佛每見佛來即便回避雖然如此回顧東西捴皆是佛遂以手掩面於十指掌中亦捴是佛頌曰覺城東際老婆婆白髮𣯶𣯶意氣多與佛同生嫌見佛惡人無奈惡人何笑翁堪開眼也著合眼也著回避無門將錯就錯祥麟只有一隻角掩室開城東聖姥坐蓮臺大地衆生正眼開與佛同生嫌見佛一身難作二如來虛堂愚平生不願佛相逢十指尖頭現紺容夾路桃華風雨後馬蹄無處避殘紅石室輝雙林善慧大士因梁武帝請講經士升座以尺拊案一下便下座武帝愕然志公乃問陛下會麼帝云不會志云大士講經竟頌曰不向雙林寄此身𨚫於梁土惹埃塵當時不得志公老也是悽悽去國人雪竇顯遠別雙林事有因金陵眀主慕仁人良哉高座登臨次一擊大千經出塵正覺逸大士何曾會講經志公方便且相成一揮案上俱無取直得梁王努眼睛白雲端大士講經時揮案成注腳一丸消衆病不假驢駝藥慈受深案上一聲嗚嚗嚗已是重重添注腳梁王何事不回頭志公將錯還就錯佛鑑勤身受龍華三會主槌開鳳閣九重城梁王築倒金剛佛更問如何不講經剋符道者兩口眀眀一無舌同生同死為君決那吒頂上喫蒺藜金剛腳下流出血東山空大士錯解注志公錯注解臭肉積屠門堪笑無人買無凖範雙林大士太無端又向梁朝露一班經旨未分玄路絶一揮案上動龍顏葛廬覃傅大士見梁武帝不起群臣曰大士見上為甚不起士曰法地一動一切不安頌曰梁國令他魏國愁渡江投水暗隨流雖然寸土居無動爭奈雙林半樹秋投子青傅大士一日披衲頂冠靸履朝見梁武帝帝問是僧邪士以手指冠帝云是道邪士以手指靸履帝云是俗邪士以手指衲衣頌曰道冠儒履釋袈裟和會三家作一家忘却率陀天上路雙林端坐待龍華湖隱濟身披壞衲片雲寒腳著朝靴頂戴冠要使三宗同一轍捏沙終是不成團笑翁堪泥封三詔出𤇆霞直到金陵帝主家自古多能誰得及道冠儒履釋袈裟寶葉源非儒非道亦非禪杜撰修行𫻪可憐擔闍一身三不了至今八百有餘年一衲戒傅大士頌云夜夜𢬘佛眠朝朝還共起起坐鎮相隨如形影相似欲識佛去處秖者語聲是頌曰誰有單于調換取假銀城良久曾被雪霜苦楊花落也驚天衣懷要眠時便眠要起時即起水洗面皮光啜茶濕却觜大海紅塵生平地波濤起呵呵阿呵呵囉哩哩囉哩保寧勇傅大士頌云空手把鋤頭步行騎水牛人從槗上過槗流水不流頌曰六月上伏八月中秋人平不語水平不流心聞賁魚行水濁鳥飛毛落大士橫身不受一鑿木菴永狗走抖擻口猴愁樓搜頭瑞巖門外水自古向西流斷橋倫傅大士云須芥子父芥子須爺山水坦然平敲冰來煮茶頌曰須納芥不容易芥納須匹似間長河攪著成酥酪輕輕擊透祖師關圓悟勤傅大士頌云有物光天地無形本寂寥能為萬象主不逐四時淍頌曰有中有無中無細中細粗中粗土面灰頭不染塵花街柳巷樂天真金雞唱曉瓊樓夢玉樹花開浩劫春足菴鑒布袋和尚常在通衢或問在此何為師云等箇人來曰來也師曰汝不是這個人或解布袋百物俱有撒下曰看看又一一將起問人曰這箇喚作甚麼或袋內探果子與僧僧擬接師乃縮手曰汝不是這箇人或見僧行過乃拊背一下僧回首師曰把一錢子來有時倚袋終日憨睡或起行市肆間小兒譁逐之或拄杖或數珠與兒戲有僧問如何是祖師西來意遂放下布袋叉手而立僧曰秖此別更有在師拈起布袋肩負而去頌曰勒既非布袋不是是非兩忘金生麗水至寶滿袋貴買賤賣若解商量不勞三拜詮了義注大乘月裏螢光日下燈布袋枕頭眠一覺倚天山色碧層層野軒遵拈起即行放下便歇瞌睡阿師弄巧成拙佛意祖意寧知裙子褊衫百結有時獨立兮誰是知音歸去來兮一天眀月佛慧泉困來𢬘囊無語傍觀盡生疑慮未免開獻諸人是甚間家破具莫訝衣裳破碎入𮠔且無忌諱橫身要道等人那箇便知圈繢雲峯恱千般萬樣有誰能會瞌睡老僧收拾滿袋心無諸受觸處三昧巷尾街頭貴買賤賣圓通秀都盧一箇布袋裏面討甚奇怪困來且得枕頭携去亦無妨礙有時閙市打開多是自家買賣白雲端咄這憨皮袋眉粗兼眼大終日在街頭市行無買賣阿呵呵歸去來典錢還却債保寧勇分身百億混塵埃氣兒憨憨勿可猜一袋挑擎隨處去千般撒下復拈來人間天上相呈示市尾街頭睡覺回等得箇時還不是至今猶是老黃梅佛國白天不能蓋地不能載包括乾坤全歸布袋十字街頭大打開般般拈起隨人愛靈源清三千威儀都不修八萬細行全不顧只因閙市裏等人被人喚作破落戶兜率內院久拋離縱歸忘却來時路稽首勒世尊得與麼寬腸大肚徑山杲接著一箇半箇覔得三文兩文誰知破布袋裏許多勒世尊瞎堂遠拊背覔錢成漏逗回頭轉腦昧真機可憐閙市無人識空手肩擔布袋歸佛照光長汀汀上風顛子曳杖回頭等阿誰向道那人元不在汝須知有轉身時天目禮轉得頭來已是遲恰如曾未轉頭時一錢覔得無安處猶自區區誑阿誰北澗簡逢人乞一文袋裏敵國富不是下生遲嫌佛不肯作環溪一跋陀尊者因生法師論衆微聚曰色衆微無自性曰空者云只眀得因中色空未明得果上色空法師問如何是果上色空者云一微空故衆微空衆微空故一微空一微空中無衆微衆微空中無一微頌曰靈光滿目簇山河幻境之中物像多體妙已知緣不礙執情還被境消磨雙泉瓊色空空色色空空閡却潼關路不通劫火洞然毫末𥁞青山依舊白雲中天衣懷東西南北十萬八千空生罔措火裏生蓮堂堂色裏無空相皎皎空中絶色形直下色空無一二色號元來不我名靈隱本維摩居士示病毗耶離城自念寢疾于床世尊大慈寧不垂愍佛知其意告文殊師利言汝行詣維摩詰問疾文殊白言世尊彼上人者難為酬對深達實相善説法要辨才無滯智慧無礙一切菩薩法式悉知諸佛祕藏無不得入降伏衆魔遊戲神通其慧方便皆已得度雖然當承佛聖旨詣彼問疾頌曰咄這維摩老悲生空懊惱臥病毗耶城全身太枯稿七佛祖師來一字俱屏掃請問不二門當時便靠倒不靠倒金毛獅子無處討雪竇顯佛病法病最難醫獨有維摩也大奇文殊稽首讚居士失却金毛師子兒天衣懷毗耶城裏維摩詰知伊畢竟徹不徹金毛師子未到來一室屏除先漏泄及乎回問不二門推出一團無孔鐵剛被文殊下一槌千年萬載成凹凸大洪遂冷坐毗耶城百病一時發不得文殊來幾乎無合殺徑山杲千人萬人射一鴈箇箇手親并眼辨刮地西風鴈影高可憐發𥁞弦中箭猿臂將軍仰面看弓開秋月影團圓飛星一點天邊去羽翼離披落眼前廣鑒英冤憎會苦愛別離苦鈍置瞿曇一場莽鹵咄正堂辨示疾毗耶方丈文殊亦難近傍看來無藥可醫只是忌口為上浙翁琰詐病從來不可醫文殊特為下針錐事褫一喙長三尺問著依前似鼓椎無凖範一箇病維摩無風自起波富嫌千口少貧恨一身多湖隱濟善財初詣娑羅林中參文殊文殊指往南方勝樂國謁德雲比丘次弟至勒樓閣所歸至普門城外思惟佇立欲得奉覲文殊文殊伸手過百十由旬與摩其頂即見微塵數知識即受行其教頌曰日出升空高下周昆崙源𣲖入川流春山雲逗風無𥁞鴈去回南天地秋五十三人指路人因循流落百餘城草鞋破成何事爭似歸家罷問程鐵山仁茫茫夢裏去遊南五十三參發指端大士臂長衫袖短善財腳瘦草鞋寬大川濟善財詣妙峰山參德雲比丘四維尋覔七日方見在別峰上徐步經行頂禮聞法入佛境界得憶念諸佛普見法門證發心住頌曰妙高峯頂尋知識南北東西望何極德雲遙自別山來重分身千百億延慶忠妙高峯頂草茸茸步步相隨不見蹤若謂別山親覿面片帆已過海門東別山智淡𤇆草茸茸七日徘徊信不通一步竿頭輕蹉腳海門波卷白蘋風𣗥田心善財詣那羅素國參毗目瞿沙仙人無量仙人同音讚已下床執手佛剎現前悟真淨智卷舒自在得無勝幢法門證童真住頌曰毗目仙人下寶床摩頭執手看殊祥十方佛境同時現萬像森羅忽䪺彰無勝妙幢騰瑞色遮那文藏顯靈光却還本座求端的轉覺平生見處長佛國白坦然古路勿迀踈霽月涼風動十虛毗目善財當日事好如潘閬倒騎驢或菴體善財詣佛會中參普賢菩薩見乘白象王處紅蓮座一心親近咨聞法要智悲圓滿行願功成即獲佛德顯同果海得一切佛果微塵數三昧法門頌曰百一由旬摩頂歸片心思見普賢師堂堂現在紅蓮座落落分明白象兒沙劫智悲方滿日微塵行願正圓時佛功德海重宣説愁見波濤轉渺瀰佛國白打鼓弄琵琶還它一會家木童能撫掌石女解煎茶雲散天邊月春來樹上華善財參遍處黑豆未生芽延慶忠善財歷百十城參五十三位善知識後到毗盧樓閣前曰是解空無相無作之所住處云云見樓閣門閉善財暫時斂念曰大慈大悲願樓閣門開令我得入尋時勒領諸眷屬至善財前彈指一下樓閣門開善財得入入已還閉見百千萬億樓閣一一樓閣有一勒領諸眷屬并有一善財面在前立勒復彈指云善男子起法性如是頌曰妙意童真末後收善財到此罷南遊豁然頓入毗盧藏悔向他山見比丘張無𥁞妙峰孤頂無知識百十成遊喪善財樓閣若還彈指現分明有眼不曾開或菴體五十三人一縷穿小兒雖小膽如天茫茫𤇆水無重數買得風光不用錢北澗簡問處分明答處端還同雙劒倚天寒一從樓閣門開後滿面慚惶無處安浙翁琰知識曾參五十三精金百鍊罷鎚鉗回頭萬壑𤇆雲散午夜蟾光浸碧潭坦堂圓南方經歷幾雲𤇆收得奇貨滿船彈指便風帆到岸一時翻作大光錢無凖範天台智者大師在南嶽誦法華經至藥王品曰是真精進是名真法供養如來於是悟法華三昧獲旋陀羅尼見靈山一會儼然未散頌曰世尊三昧安詳起師悟藥王精進時靈鷲山中人未散不因南嶽有誰知楊無為溪山𥁞處夕陽斜溪上冬風雪滿沙便是江南舊行路和𤇆隔水見梅花蘿月瑩舍𥁞家財與己財只將真法供如來當初一路今何在觸目靈山翠作堆天目禮好將真法供如來花在幽岩險處開一夜狂風吹欲𥁞落英無數點莓苔虛堂愚心迷念念法華轉心悟時時轉法華誰知百萬靈山客𥁞是天台眼裏沙此山應金陵志公和尚或名寶公令人傳語南嶽思大云何不下山教化衆生一向目視雲霄作麼思云三世諸佛被我一口吞𥁞何處更有衆生可度頌曰一口吞𥁞三世佛牙如劒樹眼如鈴斷弦不必鸞膠續只要知音側耳𥊸虛堂愚佛與衆生一口吞纖毫不立道方存杖頭日月才挑起鼓動三千海嶽昏𡰱間林英目視𤇆霄臥白雲不知山下有乾神從何更有衆生度三世如來一口吞本覺一
