body:
  text: 僧錄司右闡教兼靈谷禪寺住持淨戒重校祖師機緣六祖下第四世趙州諗三十四則附京兆寬一則芙蓉訓二則大禪佛一則普化六則秘魔岩一則祇林一則公畿一則趙州因僧問久嚮趙州石橋到來只見畧彴師曰汝秖見畧彴且不見石橋曰如何是石橋師曰度驢度馬頌曰趙州石橋本無星急水游魚不易停橋上只觀驢馬迹誰人敢向御街行北塔祚孤危不立道方高入海還須釣巨鼇堪笑同時灌溪老觧云劈箭亦徒勞雪竇顯我愛趙州對揚瀟洒僧問石橋度驢度馬碧眼胡僧笑點頭其餘誰是知音者地藏恩異𩔗渠行李心真出語親隨流自得妙到岸不迷津京兆府天寧璉長鯨已壓浪頭飛跛鼈橋邊尚碾泥度馬度驢難觧會綠楊影裏路東西地藏恩趙州石橋只見畧彴度驢度馬應病與藥換步移身在富全貧當頭如認著東魯問西秦月堂昌趙州聞沙喝㕘向侍者曰教伊去侍者乃教去沙便重師曰沙淂入門侍者在門外頌曰得入門在門外說向人人不會更高聲我耳背鼓山珪瑟瑟風松蕭蕭雨檜師子咬人韓驢逐塊徑山杲趙州因僧問狗子還有佛性也無師曰無曰上至諸佛下至螻蟻皆有佛性狗子為甚麼却無師曰為伊有業識性在又問狗子還有佛性也無師曰有曰既有為什麼入這皮袋裏來師曰知而故犯頌曰大用全機得自由有無雙放却雙𭣣幾多業識逢人犬從此時時憶趙州佛印元少年學觧昧宗途老倒依還滯有無古佛純金誰辨色惑為機智競躊躇圓通秀有無雙放復雙收趙老機關世莫儔試上海門高處望千江萬𣲖盡東流普融平趙州口裏有雌黃句下誰人見短長堪笑幾多逐塊狗夜深無故吠虗堂慈受深道有道無無剩語千呼萬喚不回頭尋香逐氣隨他去空使流光暗度秋成枯木有佛性無佛性正却倒倒却正踏破澄潭水拗折無星秤火熱水靣紅橛從空裏釘肯𩔗盲龜嚙死蛇一對牙関緊咬定正覺逸趙州古佛言言中的話有話無燕金趙璧更有布衫重七斤天上人間無價直地藏恩佛性分明脫有無醋酸何用掛葫蘆薄霧輕烟留不住扁舟已過洞湖瞎堂遠狗子佛性無狗子佛性有從來只向兩頭走未能一鏃破雙関業識依前還作狗本覺一狗子佛性有毘盧愛飲勒酒狗子佛性無文殊醉倒普賢扶扶到家中全酩酊胡言漢語罵妻奴正堂辨無直路却縈紆趙州東壁上依舊挂葫蘆有張公喫村酒李公醉不醒面南看北斗石菴玿狗子佛性無斫額路上逢子胡業識性在遭一口大地全無碧眼胡狗子佛性有春風吹動千株柳知而故犯可憐生一一靣南看北斗無菴全狗子佛性全提正令纔涉有無喪身失命無門開趙州因僧問狗子還有佛性也無師曰無頌曰言有業識在誰云意不深海枯終見底人死不知心真淨文趙州露刃劒寒霜光𦦨𦦨更擬問如何分身作數叚五祖演力壯年高膽更雄清風隨虎雲從龍啀喍無限尋聲跡掛角羚羊不見蹤寶峯祥宣德門前過回頭便招禍若要無事時且㱕堂裏坐鼓山珪有問狗佛性趙州荅曰無言下滅胡族猶為不丈夫徑山杲狗子無佛性慈悲似海深尋言逐句者埋沒丈夫心踈山如狗子佛性無寶劒出䂓模落在將軍手橫按立當途椘安方問頭既實荅亦堪誇洛陽雖好爭似我家趙州苦口太饒舌儂家信手摘楊花大溈智趙州狗子無佛性七佛如來合掌聽湏弥岌㟧舞三臺海水騰波行正令南堂興趙州狗子無佛性萬疊青山藏古鏡赤脚波斯入大唐八臂那吒行正令稠巖贇乙己大人丘叢林為𭁵讎利牙如劒㦸生殺有來由南巖勝至道無難言端語端趙州開口露出心肝典牛游連馬連人劈一刀虗空迸血湧波濤千千萬萬人爭看誰觧分開盖膽毛中菴空銕壁銀山一箭穿過潦倒趙州口能招禍尼無著捴狗子無佛性全提摩竭令纔擬犯鋒喪却窮性命潛菴光貧無所依兩親相擊旱地雷聲青天霹靂或菴軆狗子佛性無老蚌吐眀珠西川鳴杜宇江南啼鷓鴣文殊道趙州狗子無佛性當空掘出秦時鏡光眀渾不見星兒上下四維俱徹暎誰菴演狗子無佛性殺人便償命苦痛萬千般囙邪却打正密菴傑大食波斯飲百盃停停把柂萬人魁逆風使過黃牛峽不問瞿塘灔澦堆東山空狗子無佛性打破大圓鏡七九六十三一切智清淨咦菴鑒狗子無佛性羅睺星入命不打殺別人被人打殺定南書記狗子佛性無門上釘桃符千邪俱不入百恠盡消除松源岳狗子無佛性泥捏活大聖不是泗州人說著也不信別峯雲狗子無佛性勸君不用舉欲透萬重關湏是千鈞弩己菴深二十四州鐵鑄成一箇錯𩗺在大街路無人踏淂着即菴然狗子佛性無還他大丈夫是非雖入耳東壁挂葫蘆朴翁銛無之一字殺人無數多少英雄橫屍當路鉄山仁二八佳人刺綉遲紫𠛼花下囀黃鸝可憐無限傷春意盡在停針不語時堂仁利刀截斷命根跳出狐群狗隊拈起萬煆蒺蔾鐵額銅頭粉碎石菴玿趙州曰無崖崩石裂未舉先知只淂一橛少室睦狗子佛性趙州無呂公一箇藥葫蘆接來醫却人間病大死一回方見渠葛廬覃狗子無佛性干將入椘一禪三首落千古淂虗名千峯琬京兆寬囙問狗子還有佛性也無師曰有曰和尚還有也無師曰無曰一切眾生皆有佛性和尚為甚麼却無師曰我非眾生曰既非眾生莫是佛否師曰不是佛曰畢竟是何物師曰亦不是物曰可見可思否師曰思之不可及見之不可議是名不可思議頌曰拈却這僧問去却京兆荅浩歌歸去來清風遍六合五祖演裂破湏弥鼻孔踏反大海乾坤面前百千諸佛盡是我家兒孫椘安方趙州問一婆子甚麼處去曰偷趙州筍去師曰忽遇趙州又作麼生婆便與一掌師休去頌曰彎弓直勢射難當䧟虎之機理最長雖是貪他一粒米誰知失却半年粮海印信趙州筍被婆偷去遭摑如何肯便休合出手時湏出手淂抽頭處且抽頭野軒遵趙州老捉箇賊當面勘渠返遭一摑賊不成罪歸己天下衲僧知幾幾地藏恩趙州挨拶老婆時迦葉難陁盡皺眉却被老婆揮一掌從來多事落便冝張無盡從來柔弱勝剛強捉賊分眀已見贓當下被他揮一掌猶如啞子喫生薑佛鑑勤虎穴魔宮到者稀老婆失脚人懷疑趙州喫掌無人會直至如今成是非金陵俞道婆去若丘山重來如一羽輕去來無別路傾盖白頭新瞎堂遠一路雄兵犯界河煙塵塞路絕人過安邦頼有張良在畫角城頭唱椘歌雪竇宗驟馬加鞭上酒樓何如坐地看楊州是非長短俱栽了鼠竊終難似狗偷無凖範相見又無相觸忤攔腮便掌不相饒思量箇樣無滋味莫是趙州身命招閑極雲趙州示眾曰看經也在生死裏不看經也在生死裏諸人且作麼生出淂去僧便問只如俱不留時如何師曰實即淂若不實爭能出淂生死頌曰看經也在生死裏飯蘿裏坐無喫底不看經也在生死裏錦衣堆裏無着底忽然烏鵲呌一聲反身踴躍渾家喜休擬議如令拋向眾人前千手大悲提不起趙州問新到曾到此間麼曰曾到師曰喫茶去又問僧僧曰不曾到師曰喫茶去後院主問曰為甚麼曾到也云喫茶去不曾到也云喫茶去師召院主主應喏師曰喫茶去頌曰趙州有語喫茶去天下衲僧㹅到來不是石橋元底滑喚他多少衲僧冋汾陽昭見僧被問曾到此有言曾到不曾來留坐喫茶重去青煙時換綠紋苔投子青趙州有語喫茶去眀眼衲僧皆賺舉不賺舉未相許堪笑禾山解打鼓雲峯恱曾到還將未到同趙州依舊展家風近來王令關防緊從此人情緫不容佛印元趙州驗人端的處等閒開口便知音覿面若無青白眼宗風爭淂到如今黃龍南一甌茶自振家風遠近高低一徑通未薦清香往來者誰諳居止院西東照覺捴此間曾到不曾到人義人情去喫茶院主不知滋味好却來爭看盞中花佛國白藂林宗匠實難加臨事何曾有等差任是新來將舊住殷勤只是一甌茶正覺逸三等擎甌禮數全一般平挹更無偏石橋破院無味且夾油麻一例煎佛慧泉寶匣龍泉發夜光寥寥長掛在虗堂四來高客如相訪茶罷休勞話短長大溈秀趙州喫茶話自古至及今易開終始口難保嵗寒心雲盖智相逢盡道喫甌茶大抵風流出當家休問曾到未曾到自有行人滿路誇踈山常驪珠絕類玉無瑕馬載驢䭾帝子家曾到不曾休擬議與君同泛一甌茶羅漢南箇中滋味若為論大展家風說早春三度口行人事了這回莫道不沾唇佛鑑勤趙州一甌茶驗盡當行家一期雖自好爭免事如麻龍門遠趙州滋味最為親覿面承當有幾人三度傳來親切處馨香滿口又全真椘安方三等接人喧海宇一茶驗客播叢林高山流水深深意不是子期誰賞音雲巖因高下來相訪只點一甌茶人情厭踈淡骨肉生冤家爭似盧仝閉関自煎喫發輕汗平生不平事盡向毛孔散石明趙州喫茶宗門奇特到與不到正白拈賊黃龍新曾到不曾到且喫一盃茶待客只如此冷淡是僧家牧菴忠曾到喫茶去未到喫茶去趙州老禪和口甜心裏苦心裏苦直至如今無雪處慈受深趙州喫茶我也怕他若非債主便是冤家倚墻靠壁成羣隊不知誰觧辨龍蛇應菴華百尺竿頭㲲布巾上頭題作酒家春相逢不飲空歸去洞裏桃花笑殺人自淂暉人來訪趙州唯道喫茶去無端院主不惺惺更與一甌令醒悟本覺一趙州三度喫茶禾山打鼓難比休於句下尋求識取口中滋味若識淂觀音院裏有弥勒佛性泰曲𥁞周遮禮數頻苦茶何用勸三巡鼻中若有通天竅終不回頭問別人文殊道曾到未到普請喫茶口甜似蜜心毒如蛇淳菴淨趙州喫茶逆毒蛇虗空落地鐵樹開花夜叉羅剎弥勒釋迦改頭換面無窮數莫道風流出當家普菴玉趙州喫茶去毒蛇橫古路踏着乃知非佛也不堪作松源岳趙州老漠熱心膓一盞麄茶驗當行回首路傍橋斷處白蘋紅蓼映斜陽浙翁琰趙州逢人喫茶誰知事出急家反手作雲作雨順風撒土撒沙引淂洞山無意智問佛也道三斤麻無禪才趙州囙僧問萬法歸一一歸何所師曰老僧在青州作淂一領布衫重七斤頌曰編擗曾挨老古錐七斤衫重幾人知而今拋向西湖裏下載清風付與誰雪竇顯七斤衫重豈難提日出東方定落西一擊珊瑚枝粉碎轟轟雷雨滿山溪白雲端獨坐獨行真竭斗無䂓無矩老禪和四方八面難拘檢天下誰能柰你何保寧勇問來親切布衫酬指出青州是舊游皓月當空澄巨浸鯨鯢無柰不吞鈎照斍捴趙州布衫重七斤問處分眀荅處親大地山河都盖却誰是當機裁剪人文殊道七斤衫重絕纖埃妙手何人觧剪裁堪笑東村王大伯滿身風雨入門來普融平青州七斤衫盡力提不起打破趙州關緫是自家底徑山杲趙州老對靣人難曉一歸何處青州布襖金銀琉璃硨磲碼碯龍牙言夜半黑漆黑捉淂一箇賊點火照來看元是王大伯鼓山珪等閒提起七斤衫多少禪流著意㕘盡向青州作窠窟不知春色在江南運菴巖鑊湯無冷地黃河輥底流金剛難插觜腦後掛燈毬或菴軆拶到懸崖撒手時七斤衫重有誰知寒來暑往渾無用掛在趙州東院西石菴玿當機覿面提覿靣當機疾開眼放癡頑鞭逼人上壁北磵簡趙老七斤衫提來用恰好若更問如何且去青州討断橋倫趙州在東司上見遠侍者過驀召文遠遠應諾師口東司上不可與汝說佛法頌曰老僧正在東司上不將佛法為人說一般屎臭旃檀香父子之機俱漏泄鼓山珪趙州有密語文遠不覆藏演出大藏教功德實難量徑山杲東司上不說佛法喚來與伊劈靣踏不用重論報佛恩將此深心奉塵剎無菴全眀眀道不說此理憑誰識春風一陣來滿徑花狼籍蒙菴聡趙州因真定帥王公携諸子入院師坐而問曰大王會麼王曰不會師曰自小持齋身已老見人無力下禪床王尢加禮重翌日令客將傳語師下禪床受之侍者曰和尚見大王來不下禪床今日軍將來為甚麼却下禪床師曰非汝所知苐一等人來禪床上接中等人來下禪床接末等人來三門外接頌曰上等接人了無回互據坐堂堂是何謂度帥王用處若軒昂為渠拽倒破禪床天目禮跏趺迎上客曲彔對旌幢不是家風別他居禮樂鄉西巖惠折脚禪床接斷薪猶堪偃首揖高賔明知列土熏天富難闘他家徹骨貧石溪月人王爭似法王尊不下禪床接上根休說君臣猶有間入山先要主賔分月坡眀趙州三等見人未舉已先話墮都衙喚淂便回頭也是大蟲看水磨枯禪鏡禪床不下不擡身自小持齋到老人只有箇牙堪喫飯那知世有大王尊閑極雲趙州囙侍者報大王來也師曰萬福大王者曰未到在師曰又道來也頌曰報客傳言信已通义手頭便鞠躬對面一雙清白眼當頭蹉過住山翁椘安方侍者來言報大王趙州曾揖下禪床憐兒不覺傍觀醜爭柰全身在帝鄉天童覺一句機鋒無價萬福承當不下看他拈尾作頭又道大王來也褚衲秀驥子駑駘滿道途皮毛孰敢辨精麄若無伯樂當時鑒失却追風千里駒慈受深許由臨岸洗耳巢父不飲牛水侍者親入帝鄉趙州只在草裏南嵓勝來也宮殿隨身去也笙歌滿路侍者白頭如新趙州傾盖如故別峯印趙州到一菴主處問有麼有麼主竪起拳頭師曰水淺不是泊船處便行又到一菴主處問有麼有麼主亦竪起拳頭師曰能縱能奪能殺能活便作禮頌曰問荅元來緫一般當頭一著莫瞞頇將軍自有佳聲在不淂封侯也是閒佛迹昱疋馬單鎗戰祖関死生只在剎那間趙州最是難容漢菴主當頭楔兩拳文殊道無星秤子兩頭平提起應湏見淂眀若向箇中爭分兩知渠錯認定盤星佛性泰趙州老漢少喜多嗔不會為客勞煩主人湛堂凖虎步龍驤徧九垓會從平地起風雷等閒喚出菴中主便見千江水逆回佛心才老作藂林是趙州兩拳提起不輕酧無星秤在當人手斤兩都盧在裏頭椘安方五陵公子爭誇富百衲高僧不厭貧近來世俗多顛倒秪重衣衫不重人三聖昌上菴竪起拳頭趙州左眼半斤下菴竪起拳頭趙州右眼八兩君看陝府鐵牛何似嘉州大像若謂緫涉誵訛露柱燈籠合掌慈受深換手槌胷哭老爺棺材未出死屍斜不如掘地深埋却管取來年喫嫩茄瞎堂遠菴主當年用淂親衲僧眼裏要生筋趙州舌有龍泉劒開口等閒疑殺人自淂暉水淺不是泊船處能縱能奪自有據一槌擊碎兩重関填溝塞壑無回互尼無著緫菴主拳頭舉處親趙州話魯指西秦知音不在千盃酒一盞空茶也醉人順水張帆逆風把柂釣盡江波不出者箇月林觀菴主拳頭沒兩般趙州平易作艱難叢林多少杜禪衲誰觧出頭天外看鉄山仁閃爍旌旗驟往來幾人遙望起疑猜此時若淂樊公脚一踏鴻門兩扇開無凖範趙州囙文遠侍者在佛殿禮拜次師見以拄杖打一下曰作甚麼曰禮佛師曰用禮作甚麼曰禮佛也是好事師曰好事不如無頌曰文遠脩行不落空時時聸禮紫金容趙州拄杖雖然短分破華山千萬重徑山杲禮佛無端撞趙州却將知見作冤讎如今四海平如掌雲自高飛水自流照堂一只知聸禮紫金容不覺腦門遭霹靂平生心膽向人傾相識還同不相識蒙菴聡趙州回僧問如何是趙州師曰東門西門南門北門頌曰句裏呈機劈靣來爍迦羅眼絕纖埃東西南北門相對無限輪槌擊不開雪竇顯四廓関閎鎮趙州幾於城下起戈矛將軍戰馬今何在野草閑花滿地愁照覺揔袖裏金槌一擊開東西南北絕纖埃石橋南畔臺山路報你游人歸去來普融平豁達門開入趙州東西南北任遨游龍樓鳳閣依然在失却來時好路頭羅漢南四門開豁往來游脚下分眀到地頭四五百條花柳巷二三千處管絃樓圓通仙趙州老有一訣四門開路頭徹入門來眀皎潔出門去莫漏泄通一線為君說元正日太平莭黃龍新者僧問趙州趙州荅趙州淂人一馬還人一牛人平不語水平不流受恩深處先冝退得意濃時正好休徑山杲南北東西老趙州見人騎馬也騎牛清風月下尋歸路夫子門前問孔丘瞎堂遠趙州因僧問初生孩子還具六識也無師曰急水上打毬子僧却問投子急水上打毬子意旨如何子曰念念不停留頌曰六識無功伸一問作家曾共辨來端茫茫急水打毬子落處不停誰觧看雪竇顯初長嬰兒急水毬衲子隨波卒未休若問德山行正令何似當時問趙州天衣懷何謂識𠔃還具六八萬四千殊不足初生孩子尚喃喃急水打毬攔口𡎺白雲端朝日𢗅𢗅打箇毬生來念念不停㽞若知落地無蹤跡始會雲門六不收慈受深急水打毬子念念不停㽞未能全六識先見轉雙眸紹續門風只這是不湏向外更尋求佛性泰初生孩子始徒然六識聦明心性巧急流水上打毬子出出沒沒人不曉既為掌上珠湏作家中寶好老趙州恁麼道佛鑑勤趙州囙僧問和尚姓甚麼師曰常州有曰甲子多少師曰蘇州有頌曰蘇州有常州有湏信親言出親口趙州古佛豈徒然世界壞時渠不朽若能於此究根源决定面南看北斗雪竇顯常州有蘇州有吃嘹舌頭師子吼壽山高兮福海深八十一𠔃九箇九若能直下便回光千古萬古名不朽佛鑑勤常州有福州無江風作惡浪花麄不用刻舟徒記劒片帆已過洞𨓍湖淳菴淨蘇州有常州有未到蘇常不知有既到蘇常何處有今人不識古人意空向城中顛倒走退菴奇蘇州有與常州有三月江南啼鷓鴣堪笑有年無德漢被人拶著強分踈退耕寧趙州問一座主講什麼經曰講涅槃經師曰問一叚義淂否曰淂師以脚趯空吹一吹曰是什麼義曰經中無此義師曰脫空謾語漢此是五百力士揭石義便道無頌曰一趯方令地軸反一吹還又轉天関講師不識圓陁義空捨前山過後山圭堂居士揭石從來義不同洪波深處逞神通高標不在蘆花岸隊隊雙雙趂曉風獃堂定趙州囙僧問十二時中如何用心師曰汝被十二時辰使老僧使淂十二時乃曰兄弟莫久立有事商量無事向衣鉢下坐窮理好老僧行脚時除二時粥飯是雜用心處除外更無別用心處若不如是大遠在頌曰百年三萬六千日一日朝昬十二時使殺老僧渾不管不知閙裏有誰知鼓山珪使淂十二時辰呼來却教且去倚官挾勢欺人茫茫無本可據徑山杲鍾送黃昏雞報曉趙州何用間煩惱裂破虗空作兩邊古廟香爐出芝草雪菴瑾安貼邦鄉老趙州時辰使淂最風流今朝有酒今朝醉眀日愁來眀曰愁野菴璇趙州在南泉井樓上打水次見南泉過便抱柱懸却脚曰相救相救南泉上胡梯曰一二三四五師少頃却去禮謝曰適來謝和尚相救頌曰南泉趙州用最密後人不了轉尋覔往返之言子細看二人把手並頭立汾陽昭趙州自作自受南泉外頭相救直饒數目分眀也是私路上走月堂昌描不成塑不就樓上懸身呌相救南泉敲處有來由一叚風流如錦綉阿呵呵一二三四五大蟲咬猛虎訥堂思等閒施設豈徒然平地波瀾欲浸天更向胡梯敲數下兔教失脚墮黃泉佛性泰趙州囙在殿上過乃喚侍者者應諾師曰好一殿功德者無對頌曰殿上從來好功德如何侍者却疑惑趙州露出赤心肝問著依然墨漆黑照堂一殿上喚來先應諾不知業識太茫茫雖然功德已成就爭柰當初不放光鼓山珪好一殿功德緫是過去佛百福相嚴身不使旃檀刻日日香煙夜夜燈看來當甚乾蘿蔔徑山杲趙州囙到臨濟方始洗脚濟便問如何是祖師西來意師曰正值老僧洗脚濟乃近前側聆師曰若會便會更㗖啄作麼濟拂袖去師曰三十年行脚今日為人錯下註脚頌曰洗脚處更不安排側聆時非是㗖啄趙州臨濟二老人相見何勞下註脚鼓山珪一人眼似鼓椎一人頭如木杓兩箇老不識羞至今無處安著徑山杲臨濟趙州禪林宗匠特地相逢恰似撲相撞見今時行脚僧呼為兩箇閒和尚雪菴瑾趙州見僧來便靣壁書梵字僧展坐具禮三拜師轉身僧收坐具出去師曰苦苦僧呵呵大笑頌曰苦苦向誰語發機要是千鈞弩三十三天撲帝鍾大地山河俱作舞典牛游苦苦苦中苦樂中苦誰道黃金如糞土象骨老師曾輥毬秘魔权下捉老鼠應菴華苦中樂樂中苦趙州這僧俱欠悟直饒頓徹根源也是泥中洗土佛照光不昧當陽第一籌臨機拳趯不輕酧焦磚打著連底凍赤眼撞著火柴頭掩室開趙州到雲居居云老老大大何不覔箇住處師曰什麼處住淂居云前靣有古寺基師曰與麼即和尚自住取師又到茱萸萸云老老大大何不覔箇住處去師曰什麼處住淂萸云老老大大住處也不識師曰三十年弄馬騎今日却被驢撲頌曰展陣開旗各運謀箭鋒相敵未輕休等閒露出反身句直淂千江水逆流掩室開突出山前古寺基趙州聞淂便攢眉寥寥今古無人共一片斷雲天外飛率菴琮趙州因僧問二龍爭珠誰是淂者師曰老僧只管看頌曰風雲頭角黑𥻘皴苦死交爭額上淨洗眼來閒地看老僧未免費精神圓悟勤珠在浪花深處白拏雲霧志悠哉老僧秖管從邊看淂失從渠眼自開咦菴鑑趙州囙僧問如何是祖師西來意師曰欄中失却牛頌曰欄中失却牛有問即有詶更若求玄妙猢孫築氣毬慈雲照趙州上堂纔有是非紛然失心還有荅話分也無僧舉似洛浦浦扣齒又舉似雲居居曰何必僧回舉似師師曰南方大有人喪身失命曰請和尚舉師纔舉前語僧指傍僧曰這箇師僧喫却飯了作恁麼語話師休去頌曰坐底見立底立底見坐底咄老趙州白日眼見鬼無相範趙州因僧問如何是南泉真師下禪床立僧曰如何是和尚真師上禪床坐頌曰師下禪床立神號并鬼泣師上禪床坐龍蟠并虎臥一槌打與兩分張拈起元來是雙破本斍一趙州囙一秀才云和尚是古佛師曰秀才是新如來頌曰廣寒宮殿淨無埃已是逢君八字開桂不湏零碎折等閒和樹將來南叟茙趙州因僧問毫𨤲有差時如何師曰天地懸隔僧去毫𨤲無差時如何師曰天地懸隔頌曰毫𨤲有差天地隔毫𨤲無差天地隔隔不隔俱端的但能信手摘楊花湏會風生前栢趙州關好標格曹溪路上沒蹤跡長靈卓一道如弦直長安信已傳萬邦皆入貢四海息狼煙掩室開趙州囙僧問路逢逹道人不將語默對未審將甚麼對師曰人從陳州來不淂許州信頌曰滿滿彎弓射不著長長揮劒斫無痕堪笑日月不到處箇中別是一乾坤大溈行病餐毒藥訪良醫醫使元餐藥治之病去藥回滋味別舌頭具眼者方知佛性泰一世有逃形畏影人奔程告訴謾勞神若知形影元無二坐對高堂秋月輪趙州囙僧問南泉遷化向什麼處去師曰東家作驢西家作馬頌曰脫淂驢頭載馬頭東家西家卒未休問君還有幾多愁恰似一江春水向東流懶菴樞趙州示眾曰此間佛法道難即易道易即難別處難見易識老僧這裏即易見難識若能會淂天下橫行頌曰識不識見非見說易說難如油入松源岳趙州臨順世令僧持拂子與趙王曰若問何處淂來便說此是老僧平生用不盡底頌曰一生受用應無盡這箇都來有幾莖分付趙王千古在任他南北竟頭爭保寧勇趙州因僧問如何是祖師西來意師曰冬至一陽生頌曰柳色黃金嫩梨花白雪開若觧知時莭冬至一陽來圓悟勤鐵樹開花千萬朵石頭抽笋兩三莖泥塑金剛開口咲眀朝冬至一陽生佛鑑勤柳色黃金嫩梨花白雪香若知春氣力特地好風光龍門遠冬至一陽生乾坤通一線可憐無限人不識娘生靣徑山杲福州芙蓉山靈訓禪師嗣㱕宗師一日辭歸宗宗問甚麼處去師曰歸嶺中去宗曰子在此多年裝束了却來為子說一上佛法師結束了上去宗曰近前來師乃近前宗曰時寒途中善為師聆此言頓前觧頌曰八十婆婆學畫眉癡心欲比少年時一朝打破當臺鏡始信從前萬事非慈受深芙蓉一日訪同㕘實性大師陞堂以右手拈拄杖倚左邊良久云此事若不是芙蓉師兄大難委悉便下座頌曰陪盡老精神杯盤越樣新誰知村酒店難勸御樓人西嵓惠五臺山大禪佛智通禪師嗣歸宗師初在歸宗會下忽一夜連呌曰我大悟也眾駭之眀日上堂眾集宗曰昨夜大悟底僧出來師出曰某甲宗曰汝見甚麼道理便言大悟試說看師曰師姑元是女人作宗異之頌曰悟來不在苦多端觧了都由瞥尓間定道師姑女人作癡人積雪作銀山汾陽昭半夜高聲似少神箇中眀自有踈親如今隨例傳其響也道師姑是女人保寧勇五月炎威當酷熱浹背汗流無處說匝地清風劈靣來大禪眼裏重添屑草堂清童子學順朱赤處背模黑若將白紙來一點下不淂若下淂翻成紙上塗煙墨黃龍震悟了還同未悟時何湏更說與人知賊贓敗露無藏處便道師姑是女兒大洪遂驚眾連聲呌悟由了知諸聖不相投師姑元是女人作有何佛祖向心頭延壽慧師姑元是女人作百衲禪僧多罔措回沙塞口㗸蘆燕繞紅梁渾不顧破菴先鎮州普化和尚嗣盤山師初於盤山處密受真訣而佯狂出言無度暨盤山順世乃於北地行化或城市或塚間振鐸曰眀頭來眀頭打暗頭來暗頭打四方八面來旋風打虗空來連架打一日臨濟令僧捉住曰揔不恁麼來時如何師拓開曰來日大悲院裏有齋回舉似臨濟濟曰我從來疑着這漢頌曰老倒分眀兩路差箭鋒相拄勿喎斜龍蛇混雜人難辨白日長空下雪花汾陽昭明暗俱打誇無上擒住方知無伎倆伎倆無亂稱呼至今誰觧辨真虗海印信高堂公子醉雙陸亂撒明珠發異光一擲輸嬴誰辨淂滿盤骰子不成雙佛智裕婁羅湏要逞聡眀金牓何曾得掛名捋下幞頭歸去好莫騎驢子傍人門鼓山珪不是風𠔃不是顛長街短巷走如𤇆院裏有齋常記淂時時掛在口皮邊廓菴遠旱天忽震數聲雷遠近飛雲若往來甘雨未曾施一點返將風勢卷將回雲峯恱一拶銀山鐵壁摧大悲院裏趕村齋善財拄杖如無用乞與佯狂老萬回水菴一水急魚行澁峰高鳥不棲世情看冷暖人面逐高低松源岳以此振鈴伸召請旋風連架打將來大悲院裏邏齋去肘露皮穿可恠哉天目禮擺鐸搖鈴恣賣乖大悲院裏趕村齋河陽木塔休穿鑿是甚堂前破草鞋笑翁堪大用全提作者知爍迦眼活電光遅大悲院裏翻身處臨濟甘為小廝兒古嵓璧眀日大悲院裏齋鐵圍山岳盡衝開猪頭象鼻烏觜魚腮石人撫掌呵呵笑寒山拾淂在天台石菴玿普化嘗暮入臨濟院喫生菜濟曰這漢大似一頭驢師便作驢鳴濟謂直嵗曰細抹草料著師曰少室人不識金陵又再來臨濟一隻眼到處為人開頌曰十字街頭金鐸鳴蹇驢生菜恣膨脝狂翻筋斗盤山恠踢倒飯床臨濟驚隻眼未開真瞎漠兩頭俱打震威聲鎮人何必揭棺看會淂來時即去程野軒遵先師會裏呈真處臨濟堂前喫菜時連此三回露栓索咄這㳂臺盤乞兒徑山杲草裏相逢兩赤眉交鋒一陣疾如飛東西旗號渾相似試問何人淂勝歸上方益一箇驢鳴兩箇賊堪與諸方為軌則正賊草賊不湏論大施門開無壅塞徑山杲賸噇生菜似頭驢臨濟堂前捉敗渠聳耳長鳴隨踢踏不知業債倩誰除天目禮普化見馬步使出喝道師亦喝道作相撲勢馬步使令入打五棒師曰似即似是即不是頌曰混俗和光用最難相逢正是兩風顛雖然大化無方所俗宮且不是僧官汾陽昭機境相投是𡚶真入河漸漸見長人受屈遭他一頓棒元來不是好官人江陵柔階頭放下刦初鈴相撲呼他馬使名五棒打來無雪處却言渠不是官行天目禮普化一日同臨濟赴施主家齋濟問毛吞巨海芥納湏弥為復是神通妙用為復法尔如然師遂踢倒飯床濟云太麄生師云這裏什麼所在說麄說細濟休去次日又同赴一施主家齋濟問今日供養何似昨日師又踢倒飯牀濟云太麄生師云瞎漢佛法說甚麼麄細濟乃吐舌頌曰要識真金湏入火再三煆煉見精麄上行買賣不饒讓好物從來價自殊海印信相逢一瞎一麄生齋主渾家喪膽驚誰識二尊龍象駕毘盧頂上等閒行野軒遵蘭羞供養不尋常兩度遭伊踢飯床緫似這般無禮漢將何因果利存亾上方益掣顛掣狂普化張口吐舌臨濟共展大機大用漏泄祖師関捩南山鱉鼻添牙焦尾大蟲插翅南堂興入海湏是崑崙得珠還他罔象飯牀兩次趯翻這漢是甚驢養典牛游臨濟慣白拈普化慣掣顛一場好笑具後世作三玄別峯印普化踢倒飯床臨濟大張其口放出踞地金毛驚得湏弥倒走通身是眼鑑不徹通身是口只隨後不隨後寶劒出厘風雷吼塗毒䇿普化因臨濟一日同河陽木塔在僧堂地爐內坐正說師每日在街市掣風掣顛知他是凡是聖師曰你道我是凢是聖濟便喝師指河陽木塔曰河陽新婦子木塔老婆禪臨濟小廝兒却具一隻眼濟曰這賊師曰賊賊便出去頌曰騏驥駑駘辨者稀淺深毛色混同之若無伯樂垂精鑒千里追風不易騎海印信普化初將示滅乃入市謂人曰乞我一箇直裰人與被襖或與布裘皆不受振鐸而去臨濟令人送與一棺師笑曰臨濟廝兒饒舌便受之乃辭眾曰普化眀日去東門死也郡人相率送出城師厲聲曰今日葬不合青烏眀日南門遷化人亦隨之又曰眀日出西門方吉人出漸稀出已還返人意稍怠苐四日自擎棺出北門外振鐸入棺而逝郡人奔走出城揭棺視之已不見唯聞空中鐸聲漸遠莫測其由頌曰風顛用盡到無餘一箇棺材八箇舁舁出鎮州城外去聽他木鐸自分踈北磵簡撮得虗空作近隣便於北斗裏藏身這掠虗漢何多事猶把空棺誑後人東山源五臺山秘魔巖和尚嗣永泰湍常持一木杈每見僧來禮拜即杈却頸曰那箇魔魅教汝出家那箇魔魅教汝行道得也杈下死道不得也杈下死速道速道學徒鮮有對者一日霍山通和尚訪師纔見不禮拜便攛入懷裏師拊通背三下通起拍手曰師兄三千里外賺我來便回頌曰梨荒老倒眼弥麻自救無療更持杈嶺南獵獠當時見一棒打殺這魔家洞山聡秘魔巖下坐擎杈來者教伊識本家苦切為君都不薦失却真杈捉𡚶杈汾陽昭把斷重津過者難擎杈湏信髑髏乾霍山到後知端的同死同生未足觀雪竇顯叔姪相逢兩不猜到頭撫背似癡獃回首𢙢人生恠笑報云千里賺予來黃龍南手把長杈坐要津乾坤誰是妄游人當時若遇英雄漢往往反成脚下塵佛印元自誇獨握誅龍劒及遇真龍不柰何也似將軍空索戰無功徒枉動干戈海印信祕魔杈子動家邦來往禪人被死降禪佛單刀直入處始知項羽到烏江崇勝珙道淂無言杈下死霍山猛跳入懷中三千里外虗相賺更有何人透此宗夢菴信杈下要分生死路霍山直透重関雖然賺我三千里瞎却眾生眼萬千訥堂思𡽗崖之處無處插觜去却藥忌露當門齒杈下放身捨命箇裏如龍淂水三千里外賺吾來捋虎兮虎尾惠通旦拈淂便用胡麻廝繳冷地看來知恩者少月林觀急水灘頭把釣竿洪波洶湧暮江寒錦鱗也觧隨鈎上一吸滄溟徹底乾率菴琮祕魔為法力求人特地擎杈據要津剛被霍山懷裏坐至今有理不能伸咦菴鑒威風凜凜不容攀跳入懷中便觧顏不是酒腸寬似海爭知詩膽大如山雪菴瑾湖南祇林和尚嗣永泰每叱文殊普賢皆為精魅手持木劒自謂降魔纔見僧來㕘便曰魔來也魔來也以劒亂揮歸方丈如是十二年後置劒無言僧問十二年前為甚麼降魔師曰賊不打貧兒家曰十二年後為甚麼不降魔師曰賊不打貧兒家頌曰信手揮來一一親祇林劒下絕煙塵太平曲調無人會孤負皇家定亂人心聞賁無魔無我已降魔添淂時人眼裏花今日鏌鎁無用處也知賊不打貧家雪菴瑾劒有魔益熾劒無魔自清只頋降魔全失照不知身是老魔精皖山凝河中公畿和尚嗣章敬憚因往羅漢路路逢一騎牛翁師曰羅漢路向什麼處去翁拍牛云道道師喝曰這畜生翁曰羅漢路向什麼處去師却拍牛曰道道翁曰直饒與麼猶少蹄角在師便打翁便拍牛走頌曰問路指路兩無差互彼此拍牛有放有収機鋒相觸針芥相投蕩蕩一條羅漢路大家把手去來休如菴用
