body:
  text: 僧録司右闡教兼靈谷禪寺住持淨戒重校祖師機緣六祖下第三世藥山儼十四則丹霞然六則大㒹通三則長髭曠三則佛陀一則大同濟四則溈山二十五則澧州藥山惟儼禪師嗣石頭師辭馬祖返石頭一日在石上坐次頭問曰汝在這裏作麼師曰一切不為曰恁麼郎閒坐也師曰若閒坐即為也曰汝道不為且不為箇什麼師曰千聖亦不識頭以偈讚曰從來共住不知名任運相將秪麼行自古上賢猶不識造次凡流豈可明頌曰玄微及盡本修然若謂渠間萬八千月印澄江魚不見釣人何必更拋筌丹霞淳任運不知名輕輕著眼𦗟水上青青緑元來是浮萍五祖演擺撥佛祖縛曠然繩墨外一物亦不為縱橫得自在古鑑臨臺明辨去來金槌影動樹花開任運相將不可陪法雲隨處作風雷圓悟勤行行月冷風高步步山寒水深逢人披肝露膽見劈腹剜心瞎堂遠石頭打草要蛇驚密護玄機絶彚情迅馬追風須辨的報云千聖不知名隱靜儼平常閒坐與閒行嶺上無心雲片橫照境俱人不立從前日午打三更雪岩欽藥山首造石頭之室便問三乘十二分教某甲粗知嘗聞南方直指人心見性成佛實未明了伏望和尚慈悲指示曰恁麼也不得不恁麼也不得恁麼不恁麼總不得子作麼生師罔措曰子因緣不在此且往馬大師處去師稟命恭禮馬祖仍伸前問祖曰我有時教伊揚眉瞬目有時不教伊揚眉瞬目有時揚眉瞬目者是有時揚眉瞬目者不是子作麼生師於言下契悟便禮拜祖曰你見甚麼道理便禮拜師曰某甲在石頭處如蚊子上鐵牛祖曰汝既如是善自護持頌曰總不得太無端野老焉知天地寬直饒數到八九十家山猶隔一重關楊無為四海狼烟靜中原信息通罷拈三尺劒休弄一張弓鼓山圭好箇話端阿誰解舉舉得十分未敢相許徑山杲倒腹傾腸說向伊不知何故尚遲疑只今便好猛提取莫待天明失却雞蒙菴聰重疊峯巒俱鎖斷知誰深入到桃源行人只見一溪水流出桃花片片鮮肯堂充坐斷千峯路穿開碧落天那容問端的端的髑髏前松源嶽恁麼不得總不得脫却布衫赤骨律劈頭一搭忽翻身便見口開并眼白雪菴瑾一重山了一重雲行盡天涯轉苦辛驀劄歸來屋裏坐落花啼鳥一般春虛堂愚剖盡枯腸喪盡機通身不掛一毫𮈔清風步步隨身轉明月誰分上下池高峯妙藥山侍奉馬祖三年一日祖問子近日見處作麼生師曰皮膚脫落盡唯有一真實曰子之所得可謂協於心體布於四肢既然如是將三條篾束取肚皮隨處住山去師曰某甲又是何人敢言住山祖曰不然未有常行而不住未有常住而不行欲益無所益欲為無所為宜作舟航無久住此頌曰師資會遇意非輕脫落皮膚轉不親三篾束來成話至今錯認定盤星藥山因僧問如何是道中至寶師曰莫諂曲曰不諂曲時如何師曰傾國不換頌曰道中有至寶濟世無倫匹藥嶠發深藏唯云不諂曲不諂曲傾國相酬未相直壁立萬仞此心真不必當來問彌勒圓悟勤直如絃瑩如玉露膽傾心更無迂曲直饒遍地黃金未免易之不得易不得南海波斯面如墨佛性泰藥山久不升堂院主白云大衆久思和尚示誨師曰打鍾著衆才集師便下座歸方丈主隨後問曰和尚既許為大衆說法為甚麼一言不措師曰經有經師論有論師爭怪得老僧傳燈録與此梢異乃曰一日院主請師上堂大衆才集師良久便歸方丈閉門院主逐後曰和尚許某甲上堂為什麼却歸方丈師曰院主經有經師論有論師律有律師又爭怪得老僧頌曰藥山老應病藥請上堂椎鍾著一丸不再愈㒹狂孤負金仙換骨方野軒遵家法簡嚴非二非三月來明湛水雲退露寒岩真機自得妙處誰參不是文殊白槌後也應千古屈瞿曇天童覺明珠一顆價難酬不是知音便暗投翻笑藥山空費力水清魚現不吞鈎慈受深誰云藥嶠不升堂日日相逢為舉揚獨耀無私常顯露莫將無語錯商量成枯木癡兒刻意止啼錢良駟追風顧影鞭雲掃長空巢月鶴夜寒入骨不成眠天童覺明修棧道暗度陳倉𮈔毫不犯總教滅亡掩室開鋪席宏開見也麼買人何似看人多十成好箇吹毛劒只作陶家壁上梭無凖範鍾鳴衆集歸方丈苦殺當頭請法人法法本來無一法若言無法法纏身橫川珙藥山坐次僧問兀兀地思量什麼師曰思量箇不思量底曰不思量底如何思量師曰非思量頌曰兀兀地思量無可得思量無可思量處真箇好思量大𢈔嶺頭逢六祖鰲山店上見曾即無凖範藥山一日因遵布衲浴佛乃曰這箇從汝浴還浴得那箇麼曰把將那箇來師乃休長慶云邪法難扶玄覺云且道長慶恁麼道在賔在主衆中喚作浴佛語亦曰兼帶語且道盡善不盡善頌曰愛將惡水驀頭澆引得清風慰寂寥無限遠山描不得喬松修竹冷蕭蕭塗毒䇿一番雨過一番晴蠶眼已開桑眼青鵓鳩樹頭啼不已百舌黃鸝相共鳴懶菴樞藥山書佛字問道吾是什麼字曰佛字師曰多口阿師頌曰道吾忽尓見先師問字開拳顯妙機對佛是真真是佛藥山為破肚中疑汾陽昭藥山此問實堪嗟碎啄同風不易誇問佛須知呈妙旨多因於此現空花延壽慧藥山手中書佛字問他端尓要心開只將佛字為酬對元是曾持五戒來橫川珙藥山夜參次不點燈師垂語曰我有一句子待特牛生兒即向你道時有僧曰特牛生兒也何以不道師曰把燈來把燈來其僧退入衆雲岩舉似洞山山曰這僧却會秪是不肯禮拜頌曰犢牛生子頗相諳兩眼通紅色似藍把火照來無覔處大家普請一時參龍門遠藥山看經有僧問和尚尋常不許人看經為什麼却自看師曰我只圖遮眼曰某甲學和尚還得也無師曰若是汝牛皮也須看透長慶云眼有河過玄覺云且道長慶會藥山意不會藥山意頌曰徹底更何疑覷穿會者稀叮嚀由付囑句句是玄機汾陽昭門前自有千山月室內都無一點塵貝葉若圖遮得眼須知淨地亦迷人成枯木遮眼誰同藥嶠看牛皮穿透骨毛寒五湖四海知多少字密行踈總一般保寧勇藥山不許衆看經自是時人眼不明常持經卷去來者學師遮眼不惺惺石門聰看破牛皮徹底穿到頭無義亦無文問伊遮得何人眼梵語唐言總不分天目禮你若學他看牛皮真箇穿長年橫案上字義自然圓橫川珙藥山謂雲岩曰與我喚沙彌來曰喚他來作甚麼師曰我有箇折腳鐺子要他提上挈下曰恁麼則與和尚出一隻手去也師便休頌曰藥山道頭雲岩知尾雖然頭尾相稱要且不識羞耻應菴華豈要共出一隻手只教喚著沙彌來鐵鐺無腳又無耳墻下春深薺葉開橫川珙藥山一日坐次道吾雲岩侍立師指案山上枯榮二樹問吾曰枯者是榮者是曰榮者是師曰灼然一切處光明燦爛去又問岩枯者是榮者是曰枯者是師曰灼然一切處放教枯淡去高沙彌忽至師曰枯者是榮者是曰枯者從他枯榮者從他榮師顧道吾雲岩曰不是不是頌曰落霜黃葉作金錢癡騃啼兒見喜歡捉得獻娘俱道好不知誰是哂傍觀海印信一枝榮一枝枯中心緑葉更扶踈黃鶯任解千般語免得傍人彈子無佛慧泉抹粉塗壞復𮖐頭盡由行主線牽抽鼓皮打破曲吹徹𭣣拾大家歸去休保寧勇說盡榮枯轉見難沙彌平墮語言端老僧遙指猿啼處雲散千空月色寒地藏恩雲岩寂寂無窠臼燦爛宗風是道吾深信高禪知此意閒行間坐任榮枯草堂清藥山用處少人扶堪笑雲岩與道吾猶向榮枯生解會豈知潘閬倒騎驢楚安方年老心孤笑藥山團欒諸子坐忘還從頭細問榮枯事鼻孔元來總一般雲岩因三三兩兩不相同携手行行入草中掇轉腳頭穿繡履何妨臘月鼓春風東谷光藥山因僧問平田淺草塵鹿成群如何射得麈中主師曰看箭僧放身便倒師曰侍者拖出這死漢僧便走師曰弄泥團漢有甚麼限頌曰麈中主君看取下一箭走三步五步若活成群趂虎正眼從來付獵人師高聲云看箭雪竇顯平地飛鐵騎弓矢不開張好箇麈中主穿心向路傍佛心才獵人有神箭射得麈中主箭下便承當跳出曹溪路翻身著上頭關敵勝驚群瞥尓間圓悟勤馬駒出廄腰猶軟鳳子離巢力尚微生就玉蹄千里去養成金翅九霄飛佛鑑勤藥山一日齊時自打鼓高沙彌捧鉢作舞入堂山便拋下鼓槌曰是第幾和曰第二和師曰如何是第一和高就桶內舀一杓飯便去頌曰一般打鼓并作舞與你諸方事不同歷歷正聲霄漢外且非數目落寰中汾陽昭父子相投氣味同擎盂打鼓展家風雖然百味般般有爭奈風吹別調中成枯木聲鼓拈槌第二籌鉢盛香飯飽還休東風扇後韶光美別岸垂楊弄翠柔雪峯預鄧州丹霞天然禪師嗣石頭參石頭執役三載忽一日頭告衆曰來日剗佛殿前草至來日大衆諸童行各備鍬钁剗草獨師以盆盛水頭於頭前胡跪頭見而笑之便與剃髮又為說戒師乃掩耳而出頌曰石頭剗草驗英豪懵懂丹霞眼不高若解轉身行活路至今應不纍兒曹谷源道丹霞於慧林寺遇天寒取木佛燒火向院主訶曰何得燒我木佛師以杖子撥灰曰吾燒取舍利曰木佛何有舍利師曰既無舍利更取兩尊燒主自後眉墮落頌曰古岩苔閉冷侵扉飛者驚危走者迷夜深寒𤑔汀洲火失曉漁家忙自疑投子青雪擁嵓扉凍不春一尊木佛劈為薪眼睛動處眉毛落為謗如來正法輪張無盡老倒霞燒木佛院主眉剛突出罪過從來作底當誰道千虛不博實佛燈珣覿面難藏向上機家風千古為人施銀山鐵壁重重透賴有霞院主知楚安方橫行私路乍赴公筵幞頭腳短腰帶夸圓不是伴郎來勸酒誤他年少覔青氊月堂昌霞燒却木佛院主眉墮落普天匝地人知院主當頭不覺本是醍醐上味爭奈反成毒藥果報自家擔當罪因却是他作叢林浩浩商量未免情識卜度却慮一箇自己直下不須推托更問如何若何要且無繩自縛圓悟勤彭祖八百乞延壽秦皇登位更求仙昨向天津橋上過石崇猶自送窮船文殊道霞寒燒木佛院主因禍得福可憐杜撰巡官秪管胡卜亂卜應菴華丹霞燒木佛院主眉落彎弓射蔚遲須是金牙作無相範荒院天寒燒木佛一堆紅熖對枯床渾身終夜烘烘暖罪過難教院主當橫川珙丹霞一日訪龐公見女子取菜次師曰居士在否女放下菜藍斂手立師又問居士在否女便提藍去師回須公歸女舉前話公曰丹霞在麼曰去也公曰赤土塗牛頌曰丹霞一問女子斂手擬議之間烏飛兔走何人證明菴中野叟赤土塗牛不談子醜妙高臺主露頭露靣便相酬慣出人前不怕羞自是奴奴肌骨好不施紅粉也風流白面郎從來門戶恰相當可憐赤土塗牛打瓦鑽龜亂度量上方益淡薄衣裳取次粧放藍斂手自無良老龐猶更多愁在不到奴奴漏泄香張無盡作者相逢用處親携藍歸去意深深雲收雨散江天淨一曲漁歌過遠村妙峯善爺頑賴兒還債徹底老婆心赤土塗牛北澗簡人前賣俏最風流一釣無端便上鈎縱使菜藍提得去奈何覆水已難𭣣笑翁堪放行把住謾周遮一假風流出當家不是當年漆桶破爭能撒土又拋沙蓬菴會揖問居士在否放下藍兒斂手咄哉一對冤家獨許龐公知有退菴演當風鴉臭氣一箇豆娘兒熏得行人走衝爺皺斷眉西岩惠嘮嘈口觜是霞斂袂携籃已答他要得家私無漏泄歸來莫說與爺爺間極雲丹霞問僧甚處宿曰山下宿師曰甚處喫飯曰山下喫飯師曰將飯與闍𥠖喫底人還具眼也無僧無對頌曰盡機不成瞎按牛頭喫草四七二三諸祖師寶器持來成過咎過咎深無處尋天上人間同陸沉雪竇顯丹霞問龐居士昨日相見何似今日曰如法舉昨日事來作箇宗眼師曰秪如宗眼還著得龐公麼曰我在你眼裏師曰某甲眼窄何處安身曰是眼何窄是身何安師休去士曰更道取一句便得此話圓師亦不對士曰就中這一句無人道得頌曰是眼何窄是身何安昨日今日事無兩般淮南兩浙秋熱春寒恁麼會得也太無端三十年後莫受人謾佛鑑勤昨日今朝事不同一番寒雨一番風太平基業分明在溪澗河源總向東塗毒䇿棊逢敵手著還新得意難藏眼裏身局罷不知何處去空山惆悵爛柯人方菴顯昨日與今日同中却不同獰龍攪滄海俊鶻摩青空宗眼明如日機輪疾似風丹霞回首處遍界覔無蹤石溪月丹霞一日手提數珠居士近前奪却曰二彼空手即休師曰妬忌老翁不識好惡曰捉師公案未著後回終不恁麼師曰吽吽曰吾師得人怕師曰猶少棒在曰年老喫棒不得師曰不識痛癢漢打得也無益曰也無接引機關在師拋下數珠而去曰賊人物終不敢收師回首呵呵大笑士曰這賊敗也師近前把住曰更不諱得士與一掌頌曰龐老無風起浪丹霞浪起風生迤邐雷奔電掣逡巡虎戰龍爭引水插田博飯居山火種刀耕雨散雲收日出信步東行西行南堂興潮州靈山大㒹寶通禪師嗣石頭韓文公一日相訪問師春秋多少師提起數珠曰會麼曰不會師曰晝夜一百八公不曉遂回次日再來至門前見首座舉前話問意旨如何座扣齒三下及見師理前問師亦扣齒三下公曰元來佛法無兩般師曰是何道理曰適來問首座亦如是師乃召首座是汝如此對否曰是師便打趂出院頌曰解展機鋒是大㒹明知不是小因緣一般扣齒叢林異出院韓公始得閒汾陽昭宗師一等展家風盡情施設為韓公師子中無異獸象王行處絶狐蹤黃龍南潮者如山觀者如市本分弄潮人出沒如遊戲可憐不是弄潮人往往須向潮中死海印信一步才行兩步移門前驚起鳳凰兒栖蹤不在梧桐樹羣鳥東西空繞枝保寧勇問來嵗數數珠呈百八循環意甚明底事如何觸風化潮陽從此令嚴行照覺總二文公問處無多子大㒹直答豈千差首座若教能返擲當時二老亦離家佛法無別好商量門前扣齒便承當一般出院難分雪疑殺唐朝韓侍郎佛國白一串摩尼覿面當機賺却首座疑殺昌𥠖弄盡許多窮伎倆春秋元自不曾知石帆衍牙齒唇皮包不過吾家密事俗人知首座出院未為過長老罰油方合宜橫川珙大㒹國韓文公玉白師曰弟子軍州事繁佛法省要處乞師一語師良久公罔措時三乎為侍者乃敲禪床三下師曰作麼平曰先以定動後以智拔公乃曰和尚門風高峻弟子於侍者邊得箇人處頌曰徑截之言問大㒹文公良馬暗窺鞭敏手三平加智拔中霄雲散月當天大洪遂省要之言伸一問宋師據坐不輕酬無端醉後添杯酒惱亂春風卒未休枯禪鏡將軍宴坐碧油幢凜凜威風冷似霜却把機關輕漏泄至今千古錯商量北海心事繁求省要省要事頻繁縱得三平老文公只姓韓西岩惠大㒹因韓文公問如何是佛師曰看頌曰轟然如雷瞥然如電非青非黃非見不見兔角杖龜毛拂萬法宗千聖骨即處分明千百憶何必釋迦又彌勒佛鑑勤潭州長髭曠禪師嗣石頭師初往曹溪禮祖塔回參石頭頭問甚處來師曰嶺南來曰嶺頭一尊功德成就也未師曰成就久矣秪缺點眼在曰其要點眼麼師曰便請頭乃翹一足師禮拜頭曰汝見箇什麼道理便禮拜師曰據某甲所見如紅爐上一點雪頌曰一鋪大悲千手眼十分圓就未開光君看筆下神通現更有靈蹤在上方保寧勇長髭未向嶺南來功德圓成眼已開重善財回首處文殊元不下樓臺智海清撥草瞻風到石頭關山重疊路迢迢嶺頭功德圓成久一點紅爐雪未消草堂清這鋪功德自何來垂足清機孰可猜點雪分明休指注木人心眼自然開禾山方圓光皎皎耀寒虛妙手青畫不如當日石頭輕點破至今赤土亂搽糊普融平嶺頭功德眼倦足等閒垂紅爐一點雪直下廓亡依天童覺國千精奇老石頭毫端點出佛雙眸破繩床上間垂足兩道神光夜不收張無盡大𢈔嶺頭功德成謾言點眼訪知音紅爐片雪明端的象外風光照古今踈山如紅爐一點靈知音瞥不瞥龜毛扇子扇泥牛一點血五祖演一足垂來親點眼嶺頭功德已圓成長髭只怕精神露却指紅爐片雪輕心聞賁南嶽峯前老石頭憐兒何事不知羞為人點眼長伸腳直至而今懶不收無凖範長髭因李行婆來乃問憶得在絳州時事麼曰非師不委師曰多虛少寶在曰有甚諱處師曰念你是女人放你拄杖曰某甲終不見尊宿過師曰老僧過在甚處曰和尚無過婆豈有過師曰無過底人作麼生婆竪拳曰與麼總成㒹倒師曰實無諱處頌曰長髭李行婆相見打破鍋彼此兩無失是非轉多大圓若見伊掃蕩葛藤窠奉勸參學者休哆哆囉囉咄大圓智長髭解接無根樹婆子能挑水底燈燈爛樹生真可笑佳聲千古播乾坤諱得麼方菴顯長髭有僧為點茶三巡後僧問不負從上諸聖如何是長髭苐一句師曰有口不能言曰為什麼有口不能言師乃頌云石師子木女兒苐一句諸佛機言不得也大奇直下是莫狐疑良久云是苐一句苐二句曰不一不二師曰見利忘錐猶自多在僧禮拜師拈起盞子曰直下不負從上諸聖曰直指人心見性成佛又作麼生師放下盞子便歸方丈僧隨後入師翹一足曰大地不容針汝從何處來曰直是維摩也緘口不得師曰偶尓之間又逢猛虎僧便作虎聲師以拄杖作亞鏘勢僧却把住曰大地不容針何處得這箇來師曰不但維摩文殊也緘口不得曰著箭𧆞不可當師與一掌推出方丈頌曰是精識精是賊識賊猛虎鱉蛇釋迦彌勒觀音勢至寒山拾得一盞清茶古今規則南堂興一句兩句葛藤路布維摩文殊緘口無處暗箭藏鋒射中猛虎一掌相酬繪事後袁方菴顯第一句言不及見利忘錐何得何失拈起放下翹足而立文殊維摩繪箭交擊果不可當一掌推出縱是舜若多神額頭也須汗出石溪月鳳翔府法門寺佛陀禪師嗣石頭尋常持一串數珠念三種名號曰一釋迦二元和三佛咜自餘是甚麼碗躂丘乃過一珠終而復始事迹異常時人莫測頌曰三種佳名一箇過邀君把手上高坡時八自沒登山力空負當年一曲歌佛燈珣澧州大同普濟禪師嗣石頭因僧問如何是本來人師曰共住不相識曰恁麼則禮拜去也師曰暗寫愁腸寄阿誰頌曰共住同行世莫知幾人當面便逢伊縱饒紹續家門者半是貧寒乞養兒保寧勇大同一日問龐居士曰是箇言語今古少人避得只如龐公還避得麼曰諾師再舉前話曰什麼處去來師曰非但如今古人亦有此語士作舞出去師曰風㒹老風㒹老自過教誰檢頌曰慣逐羊腸路相逢莫問津江山異今古風物逐時新方菴顯大同因龐居士來訪提起笊籬喚曰大同師大同師師不顧士曰石頭一宗瓦解冰消師曰若不得龐公輩灼然如此士拋下笊籬口寧教不直一文錢師曰錢雖不直缺他又爭得士作舞而退師乃提起笊籬曰龐公龐公士曰你要我笊籬我要你木杓師作舞而退士撫掌笑曰歸去來歸去來頌曰提起笊籬清風滿寰宇放下笊籬黃金如糞土可憐兩箇老古錐相見何用同作舞塗毒䇿你愛我笊籬我愛你木杓主山才放高案山又岌嶪居士大同師將錯便就錯歸去來兮天地寬一對鐵槌何處著瞎堂遠普濟把定被龐公痛處一錐直得左轉右側前依後隨笊籬提起處相呼作舞時若言依樣畫猫兒定把黃金鑄子期石溪月大同因僧問十二時中如何合道師曰汝還識十二時麼曰如何是十二時師曰子丑寅卯僧禮拜師示頌曰十二時中那字別子丑寅卯吾今說若會惟心萬法空釋迦彌勒從茲訣頌曰十二時中別不別通身是口難分說東村王老暗嗟吁達磨西來有妙訣佛鑑勤十二時中時時別終日說兮未嘗說經行坐臥在其中吾今直下為君訣大圓智子丑寅卯何曾別古人今人如是說喪盡靈臺一物無佛祖分明為祕訣塗毒䇿識得子丑寅卯句應須繼紹此門風如王仗劍當堂坐佛魔俱拂一時空石溪月灘州溈山靈祐禪師嗣百丈一日侍立百丈問誰師曰靈祐丈曰汝撥爐中有火否師撥曰無火丈躬起深撥得少火舉以示之曰此不是火師發悟禮謝陳其所解丈曰此乃暫時岐路耳經曰欲見佛性當觀時莭因緣時莭既至如迷忽悟如忘忽憶方省己物不從他得故祖師云悟了同未悟無心亦無法只是無虛妄凡聖等心本來心法元自備足汝今既尓善自護持次日同百丈入山作務丈曰將得火來麼師曰將得來曰在甚處師乃拈一枝柴吹雨吹度與丈丈曰如蟲𬄧木頌曰提起都來只一星豁然騰熖亘天明連延野外猶難救直得三年草不生保寧勇力士曾遺額上珠搜尋無處幾嗟吁傍人為指珠元在始覺平生用意粗大洪遂撥動寒灰火便明曉來山外尚熒熒堪嗟法眼堂前客猶向南方問丙丁上方益大雄山下路遙長父子相將草裏行拈得枯柴呈是火家私穩密自斟量門前幸有通津路信腳何妨步夕陽四海五湖龍世界高梧修竹鳳雛鄉佛燈珣通身是口遍身是舌口欲談而不談舌欲說而不說說不說瞥不瞥皎皎光明遍大千任從天下紛紜說南堂興拈起枯柴吹兩吹應時星𦦨亘天飛可憐癡坐圍爐底面面相看總不知高原泉用盡工夫夜欲闌東挑西撥見還難驀然豆爆寒灰裏便把柴頭作火看別山智重重何必逞風流箇事才知便合休縱使見𤇆非是火也須燒手更燒頭寶葉源根尋到底得星兒冷熖騰輝是此時拈一莖茅輕點著不知燒殺五須彌雪岩欽溈山在百丈為典座因司馬頭陀自湖南來尋得一山名大溈是一千五百人善知識所居之處丈曰老僧住得否曰彼是肉山和尚是骨人若居徒不盈千觀典座可住得丈呼來說與時首座聞得曰合當某去彼何人也丈乃告衆下語出格者得遂拈淨瓶置地上設問不得喚作淨瓶喚作什麼座曰不可喚作木突丈復問典座座乃踢倒淨瓶而去丈笑曰首座輸却山子也因命典座往住山即大溈圓祐禪師也果安千衆頌曰定奪英雄是淨毫𨤲分處更無情太平本是將軍致不許將軍見太平照覺捴正今全提作者知淨拈起定狐疑須知大智無私鑑解道溈山却屬伊佛迹昱淨踢處有來由自是行人不到頭須信春風生大野不風流處也風流兜率恱百丈堂前定大溈金毛獅子振全威淨踢倒還元化千里淳風動地歸智海清不𮨇山前有信旗單刀一直入籌帷長戈短㦸都無用奪得將軍金印歸上方益大用應須作者知當場一踢絶狐疑堪嗟不紹家園者只向邊定是非通照逢淨踢倒贏山子體用全彰邁古今洞徹玄關垂手處到頭須是遇知音踈山如溈山與仰山摘茶次師謂仰曰終日摘茶祗聞子聲不見子形請現本形相見仰撼茶樹師曰子秪得其用不得其體曰未審和尚如何師良久仰曰和尚秪得其體不得其用師曰放子三十棒仰曰和尚棒某甲喫某甲棒教誰喫師曰放子三十棒玄覺云且道過在甚麼處頌曰摘茶更莫別思量處處分明是道場體用共推真應物禪流頓覺雨前香汾陽昭體用全彰用不難當時溈仰自相謾禪流若具金剛眼互換機鋒子細看佛印元龍生龍子鬪全威霹靂聲中掣電機雨過雲收何處去溈山千古獨巍巍野軒遵體用俱非烏飛兔走撼樹默然天長地久三十拄杖令雖嚴也是憐兒不覺醜佛慧泉春暖相呼出翠微時行時坐幾忘歸黃昏一陳東風雨未免渾身透濕衣保寧勇秪聞子聲不見子形茶株撼處太分明要知寂子惺惺處便乃徐徐著眼𦗟慈受深家醜不可外揚父子體用全彰父奪子機猶可子奪父機無良大溈智張翁乍與李公友待罰李公一盞酒倒被李公罰一杯好手手中無好手佛鑑勤溈山得體仰山得用體用俱全夢中說夢喝一喝誰菴演聞聲不見形撼樹却惺惺體用何須論歸家落日明橫川珙溈山問仰山從何處歸曰田中歸師曰禾好刈也未曰好刈師曰作青見作黃見作不青不黃見曰和尚背後是甚麼師曰子還見麼仰拈起禾穗曰和尚何曾問這箇師曰此是鵝王擇乳頌曰不作青黃見其如稻穗何鵝王能擇乳鷂子過新羅天目禮溈山冬月問仰山天寒人寒曰大家在這裏師曰何不直說曰適來也不曲和尚如何師曰直須隨流頌曰北風逞寒威凜凜侵肌骨一句括天寒幾曾容朕迹隨流認得本來身遍界莫非無價圓悟勤吹盡風流大石調唱出富貴黃鍾宮舞腰催拍月當曉更進蒲萄酒一鍾正堂辨大家在這裏兩手扶不起放下近前看是什麼面觜無際𣲖大家在這裏初不礙隨流兩口無一舌葛藤殊未休茫茫大地人無數幾箇男兒解點頭寂岩中大家在裏許南山焦尾虎牙爪利如鋒日輪正當午巳菴深溈山睡次仰山問訊師便面向壁仰曰和尚何得如此師起曰我適來得一夢汝試為我原看仰取一盆水與師洗面少頃香嚴亦來問訊師曰我適來得一夢寂子原了汝更與我原看嚴乃點一碗茶來師曰二子見解過於鶖子頌曰取水烹茶不失機當時原夢善知時如斯始謂仙陀客鶖子神通豈及伊本覺一撥草瞻風孤峯獨宿鼓無絃琴唱無生曲溈仰香嚴鼎之三足臨機不費纖毫力任運分身千百億南堂興神機妙用開眼作夢非時現通顯異惑衆万庵顯一杯晴雪早茶香午睡初醒春晝長拶著通身俱是眼半窗踈影轉斜陽雪岩欽溈山示衆曰老僧百年後向山下作一頭水牯牛左脅書五字曰溈山僧某甲此時喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧喚作甚麼即得頌曰不是溈山不是牛一身兩號實難酬離却兩頭應須道如何道得出常流芭蕉徹古德垂慈力未酬才聞異相便爭牛聲前句後眀玄旨失却溈山見不周且與同袍通一線蘆花雪覆菊當秋汾陽昭千羣萬羣水牯牛不出溈山這一隻無心管帶常現前作意追尋尋不得不大不小有筋力一身兩號少人識隨緣放去草木青遇晚𭣣來天地黑𭣣放須得鼻頭繩若不得繩無凖則世間多少無繩人對面走却這牛賊黃龍南二昔日溈山有水牯而今老倒臥荒丘形容卓犖雖無力灌啖依前是好牛四野草青隨處放千峯雪白早須𭣣若能提舉及時節極目桑田何用憂水牯溈山峭峻機分明人類顯幽奇兩途語出分明處夜烏投林曉復飛道吾真山下為牛山上僧河沙異號未為能常愛暮雲歸未合遠山無限碧層層海印信不道溈山不道牛酌然何處辨蹤由𮈔毫差却來時路萬劫無由得出頭白雲端改却形容換却頭當陽難隱箇蹤由驢名馬字雖呼喚多少傍觀滿靣羞保寧勇山上山僧山下牛披毛戴角混同流普天成佛兼成祖獨有溈山作水牛佛國白蹄角分明觸處周不勞管帶不勞𭣣但知不犯他苗稼水草隨緣得自由真如哲溈山山上老禪翁山下作牛而已矣是非些子不能消說甚參禪明自己寶峯祥反手書空事已成忙忙人問兩頭眀屈原不是逢漁父千古誰人論獨醒佛心才野徑蹄涔賺殺人早曾耕遍大田春有時落草無尋處顯現溈山老漢身張無盡千頭萬頭只一頭騎去騎來得自由放去高原水草足也須時把鼻繩𭣣佛鑑勤異類中行得自由須知千聖亦難𭣣和光日照溪山曉笑指乾坤那一頭楚安方溈山水牯牛禪人聚頭咬可憐負舂人喚作嶺南𫹣天童覺春寒料峭凍殺年少切忌參商別無玄妙龍門遠溈山水牯異常流不是溈山不是牛舉世有誰能道得波聲漁笛釣魚舟南堂興一箇形骸兩姓名入泥入水可憐生回頭掣斷黃金鎖肯向毗盧頂上行別峯印百年猶恐沒人知名字仍將左脅題入水入泥難放牧仰山只得半邊騎虛堂愚溈山上堂云仲冬嚴寒年年事晷運推移事若何仰山進前義手而立師曰我情知汝答這話不得却顧香嚴嚴曰某甲偏答得這話師躡前問嚴亦進前義手而立師曰賴遇寂子不會頌曰晷運推移事若何𮈔來線去定譊訛織成蜀錦千般巧不出當時一隻梭懶菴樞義手進前寂子不會殺人活人好箇三昧這般阿師叢林殃害白雲盡處是青山行人更在青山外月林觀一竿絲線兩金魚不犯清波意自殊斜拽簑衣遮蓋後空餘明月滿江湖石溪月一箭暗穿紅日影雙鵰已落碧雲端不知李廣無玄妙多向弓弦發處看間極雲溈山見尼劉鐵磨來師曰老牸牛汝來也磨曰來日臺山大會齊和尚還去麼師乃放身作臥勢磨便出去頌曰曾騎鐵馬入重城勑下傳聞六國清猶握金鞭問歸客夜深誰共御街行雪竇顯百戰功成老太平優游誰肯共爭𢖍玉鞭金馬間終日明月清風富一生天童覺老牸牛來到此間明朝大會去臺山白雲一曲知音少樵唱漁歌自往還張無盡主人無德客無機石火光中閃電飛同死同生同得失此心能有幾人知中菴空雲巢夢斷月華秋玉女翻身過斗牛卸却花冠歸舊隱玄途鳥道未容𭣣足菴鑒共樂升平道泰時相逢終不展鎗旗隨宣淡飯清茶外困臥間行幾箇知無凖範岸草青青淂自由等間牽著便昂頭通身露出一般白莫是山前水牯牛雪岩欽打鼓弄琵琶相逢一會家陽春同唱罷蘸雪喫冬瓜雲衲慶溈山因僧問如何是百丈真師下禪床義手立曰如何是和尚真師却坐頌曰百丈貍奴面溈山鬼眼睛見人空解笑弄物不知名松源嶽老婦臨粧絳點唇人前自逞好精神顰眉冷笑渾相似不顧傍邊掩鼻人石帆衍溈山問仰山即今事且置古來事作麼生仰義手近前師曰猶是即今事古來事作麼生仰退後立師曰汝屈我我屈汝仰便禮拜頌曰相見錦江頭相携上酒樓會醫還少病知分不多愁師資會遇意何深驀地臨機問古今義手近前還退後曾經百鍊見真金本覺一溈山坐次仰山香嚴侍立師舉手曰如今恁麼者少不恁麼者多嚴從東過西立仰從西過東立師曰這箇因緣三十年後如金擲地相似仰曰亦須是和尚提唱始得嚴曰即今亦不少師曰合取狗口頌曰一窟金毛師子兒相將無事共遊嬉同時啐啄知機變鳳轉龍盤也大奇本覺一溈山垂語辨龍蛇一對驪珠絶點瑕師子窟中無異獸嘉聲動地遍天涯隱靜儼象王嚬呻師子哮吼踞地盤空移星換斗坐斷舌頭合取狗口一回擲地作金聲九曲黃河徹底清南堂興待得郎來月已西寒暄不道醉如泥五更又欲向何去騎馬出門烏夜啼寂窗照溈山坐次仰山入來師以兩手握拳相交示之仰作女人拜師曰如是如是頌曰仰山自外才方入兩手相交復握拳寂子深深女人拜謝師特為老婆禪本覺一佳人十八正嬌癡一曲堂前舞柘枝秪有五郎知稚態更無人道柳如眉慈受深芙蓉月向懷中照楊柳風來面上吹夜半前柘枝舞天明羅袖濕胭脂心聞賁溈山方丈內坐次仰山入來師曰寂子近日宗門令嗣作麼生曰大有人疑著此事師曰寂子作麼生曰慧寂秪管困來合眼健即坐禪所以未曾說著在師曰到這田地也難得曰據慧寂所見秪如此一句也著不得師曰汝為一人也不得曰自古聖人盡皆如此師曰大有人笑汝恁麼祗對曰解笑者是慧寂同參師曰出頭事作麼生仰繞禪牀一匝師曰裂破古今頌曰宗門中令嗣合眼坐禪處平地打毬子急須著眼覷兩挑挑得上三築築不住築得住依前輥向毬門去石溪月溈山問仰山妙淨明心汝作麼生會曰山河大地日月星辰師曰汝秖得其事曰和尚適來問甚麼師曰妙淨明心曰喚作事得麼師曰如是如是頌曰妙淨明心一句全真山河大地日月星辰舒肝瀝膽照徹古今箇中如不昧遍界是黃金雪竇宗溈山因僧問如何是祖師西來意師竪起拂子後有僧到王常侍處舉前話王曰彼中兄弟如何商量曰即色明心附物顯理王曰不是這箇道理上座快歸溈山去某甲寄一封書與和尚僧得書馳上師師開書見一圓相相中書日字師曰誰知千里外有箇知音仰山侍立乃曰雖然如是也秪是箇俗漢師曰子又作麼生仰作圓相於中書日字以腳抹却師乃大笑頌曰南星北斗忽移位四海九州如鼎沸波斯匿王鼻拄天樓至如來腳踏地保寧勇竪起拂子封白紙千里誰知有知己行人莫與路為讎四海五湖王化裏別峯印溈山因僧問如何是道師曰無心是道曰某甲不會師曰會取不會底好曰如何是不會底師曰秪汝是不是別人復曰今時人但直下體取不會底正是汝心正是汝佛若向外得一知一解將為禪道且沒交涉名運糞入不名運糞出污汝心田所以道不是道頌曰雪中送炭堪為喜醬裏添鹽更是佳往往盡隨言語轉却同蛙步𩥇泥沙東叟穎溈山問仰山什麼處來曰田中來師曰田中多少人仰插鍬子義手而立師曰南山大有人刈茅仰拔鍬子便行玄沙云當時便踏倒鍬子頌曰溈山問處少知音插地酬他佛祖沈踏倒玄沙傍不肯免教蒼翠帶春深投子青淺種深耕正及時入泥入水更同誰南山茅草多人刈獨是爺兒兩箇知保寧勇借問親從甚處來插鍬義手口慵開雖然不犯當頭令爭奈音聲遍九垓成枯木盡道溈山父子和插鍬猶自帶干戈至今一井明如鏡時有無風匝匝波黃龍震老覺情多念子孫而今慚愧起家門是須記取南山語鏤骨銘肌共報恩天童覺金鞭擊動蒼龍窟吐霧拏雲出海門溟渤吸𠃵天上去空餘雷電滿山川佛心才數目分明舉即難衲僧無不膽毛寒須知別有壺中路但向須彌頂上看龍門遠插鍬義手異何同要顯全機立大功雖然有數通呈了留得高傳振祖風楚安方義手當胸鍬插深幾人遺劒刻舟尋面前水牯全頭角田裏生涯自古今雪後始知松柏操事難方見丈夫心刈茅盡是南山事達磨休言在少林佛鑑勤試問田中有幾人插鍬義手意分明可憐不逐南山去撒手歸家罷問程佛性泰插鍬義手事希奇誰識溈山父子機回首南山山下路刈茅人去已多時文殊道賊火相逢恰五更見成贓物不須爭暗中多少都分了天曉依然各自行無凖範一日頻來三五度有時歡喜有時瞋改頭換面休疑著元是尖簷帽下人虛堂愚溈山坐次仰山問和尚百年後有人問先師法道如何祗對師曰一粥一飯曰前面有人不肯又作麼生師曰作家師僧仰便禮拜師曰逢人不得錯舉頌曰莫分彼我彼我無殊困魚止濼病鳥棲蘆逡巡不進泥中履爭得先生一卷書溈山在百丈因司馬頭陀問野狐話作麼生會師以手撼門扇三下陀曰太粗生師曰佛法不是這個道理頌曰因果雙行孰共知茫茫四海路多岐擡頭拶出初生月便效張公畫翠眉佛心才春至自花開朱顏安在哉可憐園裏色不入鏡中來龍門遠盲人來與啞人抓說著無因話病苗一下被他抓著後平生癢處一時消佛燈珣溈山因仰山問如何是西來意師曰大好燈籠曰莫只這個便是麼師曰只這個是什麼曰大好燈籠師曰果然不識頌曰覿面提來付與伊分明此意沒東西腕頭有力千鈞重誰道通身是水泥雪岩欽溈山問仰山終日與子商量成得個什麼邊事仰空中畫一畫師曰若不是吾終被子惑頌曰盡曰商量古佛言當時一畫却成冤至今尚有溈山在莫道宗枝絶子孫佛印元松直𣗥曲烏玄鵠白末後商量空中一畫若言向上玄關走殺諸方禪客地藏恩父子雖親共較量𦚾中爭信有刀鎗當時一畫畫得斷遍界葛藤無復生蕳翁敬溈山一日見野火乃問道吾還見火麼曰見師曰從何處起曰除却經行坐臥請師別致一問來師便休去頌曰野火連天誰云不見道吾有凖聊通一線坐臥經行風力所轉妙辨縱橫機輪掣電還會麼若也擬議事久多變大圓智連天野火了無涯起處猶來辨作家眼裏瞳人雙翳盡面前遍界絶空華道吾老也堪誇且道畢竟從什麼處起汲水僧㱕林下寺侍船人立渡頭沙佛燈珣野火炎炎何處起紫烟紅𦦨便燒人須知坐臥經行裏見得無殊用得親石溪月溈山因僧問如何是露地白牛師曰叱叱僧云噉餧何物師曰喫喫頌曰白牛生下是白牛現起堂堂莫外求是我不能藏委曲直下分明是一頭般若柔白牛露也沒遮闌在處橫眠在處閒水草恣情甘美足醍醐純出潤良田汾陽昭玉角霜毛露地牛人間天上顯蹤由不同雪嶺時時吼肯若溈山日日𭣣冷吸月光無影像遍經塵國任遨遊牧童忽上須彌頂指出乾坤那一頭洞山聰露地白牛起問端隨緣叱叱齒牙寒不知飲啄是何物喫喫直教滄海乾天童覺溈山問僧甚處來曰西京來師曰還得西京主人公書來麼曰不敢妄通消息師曰作家師僧天然猶在曰殘羹餿飯誰人喫之師曰獨有闍𥠖不喫僧作嘔吐勢師曰扶出者病僧著僧便出去頌曰莫怪相逢無信息誰能長作置書郵直饒說盡千般事那箇心中得到頭懶菴樞
