body:
  text: 僧録司右闡教兼靈谷禪寺住持淨戒重校祖師機緣六祖下苐六世苐七世宗師二十六人機緣一百二十九則洪州雲居道膺禪師嗣洞山因僧在房內念經師隔窗問闍𥠖念者是什麼經曰維摩經師曰不問維摩經念者是什麼其僧從此得入頌曰不問維摩念甚麼新羅鷂子穿雲過杖頭擊著沒威靈惆悵嵩山破竈墮佛惠泉念底却是維摩經一回舉著一回精鸚鵡故鄉歸不得大都言語太分明楊無為問經不問念維摩念底分明見也麼欲入塵沙法門海一言演出不須多越州天章和尚順風將欲到揚州風轉船頭水逆流把柂全憑王老力瞥然到岸不須憂道場如須彌山高不見巔大海水深不見底簸土揚塵無處尋回頭撞著自家底南堂興雲居因僧問截水停輪時如何師曰磨不轉頌曰雲居有語機關絶不轉令君返照看截鐵閉關停妄解百花俱發一花園開花結果從他有因地抽條長碧天汾陽昭截水停輪話已圓借婆裙子拜婆年後人不見雲居老往往思量落二邊佛印元截水停輪中此情吾師知道不惺惺微露一言令省覺不轉何曾更有停般若柔雲居示衆云老僧二十年前住三峯菴時魏府有興化長老來問云權借一問以為影草時如何老僧當時機思遲鈍道不得為伊置得箇問頭奇特不敢辜他伊云想菴主答這話不得不如禮拜了退而今思量當時不消道箇何必後因化主到魏府興化乃借問山中和尚住三峯菴時老僧曾問伊話祗對不得而今道得也未化主遂舉前話興化云雲居二十年只道得箇何必興化即不然爭如道箇不必頌曰何必不必一七二七龍樹馬鳴𦦨光透出道吾真雲居道何必興化道不必眼若不開夢中呌屈月堂昌何必不必綿綿密密覿面當機有人續得末後句許你親見二尊宿大慧杲何必不必金刀玉尺甜者如檗苦者如蜜二十年來無處雪屈咦別峯印何必不必方圓曲直眉目分明若為辨的影草既隨身覿面當機疾一雙孤鴈忽高飛兩隻鴛鴦還獨立最菴印何必不必綿綿密密覿面當機官馬廝踢無得慈雲居上堂曰如人將三貫錢買箇獵狗祗解尋得有蹤迹底忽遇羚羊挂角莫道蹤迹氣息也無僧問羚羊挂角時如何師曰六六三十六曰挂角後如何師曰六六三十六僧禮拜師曰會麼曰不會師曰不見道無蹤迹其僧舉似趙州州曰雲居師兄猶在僧便問羚羊挂角時如何州曰九九八十一曰挂後如何州曰九九八十一曰得恁麼難會州曰有甚麼難會曰請和尚指示州曰新羅新羅又問長慶羚羊挂角時如何慶曰草裏漢曰挂後如何慶曰亂呌喚曰畢竟如何慶曰驢事未去馬事到來此五燈會元所載與傳燈録稍異傳燈曰師謂衆曰如好獵狗只解尋得有蹤迹底忽遇羚羊挂角莫道迹氣亦不識僧問羚羊挂角時如何師曰六六三十六又曰會麼僧曰不會師曰不見道無蹤迹有僧舉似趙州州曰雲居師兄猶在僧乃問羚羊挂角時如何州曰六六三十六頌曰羚羊挂角向甌峯獵犬茫然不見蹤却是石橋橋畔老三千里外解相逢正覺逸羚羊挂角六六卅六貧兒淂古錢瘦馬餐枯粟報你參玄人𥊸取無生曲昨夜火燒空跳出水中浴草堂清獵狗迷蹤還觳觫氣息全無何處逐趙州城裏忽相逢依然六六三十六雲居因新羅僧問是什麼得與麼難道師曰有甚麼難道曰請師道師曰新羅新羅頌曰新羅僧問答新羅飛騎將軍意氣多奪得鎗來騎賊馬不勞餘刃罷干戈率菴琮即此非此離此全此平步青霄高山仰止目前包褁不爭多森羅萬象眼中花就身打劫新羅新羅雲居因僧問僧家畢竟如何師曰居山好僧禮拜師曰你作麼生會曰僧家畢竟於善惡生死逆順境界其心如山不動師乃打曰孤負先聖喪我兒孫又問傍僧你作麼生會僧禮拜曰僧家畢竟眼不觀玄黃之色耳不𥊸𮈔竹之聲師曰孤負先聖喪我兒孫黃龍南云作麼生道淂一句不孤負先聖喪我兒孫若人道得到處青山無非道場若道不淂有寒暑兮促君壽有鬼神兮妬君福頌曰突兀嵯峨萬仞橫四邊無路不通行自古兩輪光不到夜深王老入西岑投子青四顧巍峩瑣碧陰松風和雨響於琴居山不用逃聲色百鳥歸來何處尋成枯木僧家畢竟歸山好丫角女子白頭早行穿月色嶺頭松迹到白雲巖下草寂寂峯前古寺基家家門首長安道相將八月鴈南來莫教孤負太平老佛鑑勤雲居因僧問六戶不明時如何師曰不涉緣曰向上事如何師曰慎者不護頌曰春到石人視遠山鶯啼花木碧波間須知雲外巖松瑞千古迎風任嵗寒投子青雲居臨終時問侍者曰今日是幾者曰今日初三師曰三十年後但道只這是乃端然告寂頌曰瞎漢臨危不識羞問人出氣借咽喉可憐便説初三日活陷爛泥堆裏頭寶葉源雲居因僧問全無學處如何立身師曰無立身處曰佛事何勞師曰不同興化頌曰苔殿煙收紫氣旋拱班宸幄退堯年鳳樓不宿桃源客豈並金光矚漢天投子青雲居因荊南莭度使成汭遣大將入山送供問曰世尊有密語迦葉不覆藏如何是世尊密語師召曰尚書其人應諾師曰會麼曰不會師曰汝若不會世尊有密語汝若會迦葉不覆藏頌曰迦葉不覆藏橫身獨自當語意分明在今古露堂堂佛眼遠世尊密語難覆藏迦葉兒孫見如土千古萬古黑漫漫焦尾大蟲元是虎撫州曹山本寂禪師嗣洞山僧清鋭問清鋭孤貧乞師拯濟師曰鋭闍𥠖近前來鋭近前師曰泉州白家酒三盞猶道未霑唇玄覺云什麼處是與他酒喫頌曰清鋭孤貧心太曹山携手步亨途白家三盞沾唇酒醉後添杯一似無佛印元清源白家酒三盞未霑唇七十二棒且輕恕一百五十難放君地藏恩滿屋黃金不肯親吁嗟甘怨自孤貧無端更飲三杯酒醉後郎當笑殺人南華昺販海波斯入大唐先將寶暗埋藏却來伸手從人覔爭奈難謾有當行肯堂充清貧三盞便輕酬萬里曹門出鄭州盡情斫却月中桂惱亂春風卒未休天童淨張甕李甕各有病痛各有病痛赤眼撞著火柴頭焦磚打著連底凍朴翁銛曹山慣用白家酒掇向人前盡底傾醉倒十洲雲水客闍𥟖猶自不惺惺皖山凝干木逢場探淺深辨龍蛇眼決踈親兩箇駝子相逢著世上思量無直人退谷雲銅公塘鐵奉化得人憎得人怕不是明州人定説蘇州話無凖範曹山因鏡清問清虛之理畢竟無身時如何師曰理即如此事作麼生曰如理如事師曰謾曹山一人即得爭奈諸聖眼何曰若無諸聖眼爭鑒得箇不恁麼師曰官不容針私通車馬頌曰不與麼太無端曹山甘被鏡清謾如如理事誰相悉畢竟無身也大難也大難大家諸聖眼前看方庵顯鴻濛未判絶踈親畢竟難將事理分夜半正明還不露金剛腦後鐵崑崙雪巖欽曹山因僧問學人通身是病請師醫師曰不醫曰為甚麼不醫師曰教你求生不得生求死不得死頌曰生死既不可求根塵萬病俱休從此俱空獨露蟾輪一片清秋雪竇宗曹山因僧問學人抱璞投師請師雕琢師曰不雕琢曰為甚麼不雕琢師曰須知曹山好手頌曰抱璞投師來意濃一條狹路忽相逢誰知妙手不雕琢分破華山千萬重笑翁堪曹山因紙衣道者來參師曰莫是紙衣道者否曰不敢師曰如何是紙衣下事曰一裘才挂體萬事悉皆如師曰如何是紙衣下用者近前應諾便立脫師拊其背曰汝秪解恁麼去何不解恁麼來者忽開眼問曰一靈真性不假胞胎時如何師曰未是妙曰如何是妙師曰不徣借者重便化師示頌曰覺性圓眀無相身莫將知見妄踈親念異便於玄體昧心差不與道為鄰情分萬法沉前境識鑒多端喪本真如是句中全曉會了然無事昔時人頌曰麻纏紙褁若嬰孩優羅華火裏開一點靈光千古在月輪孤處借胞胎南堂興三勞形苦骨不知春得意忘言便出塵不假胞胎不徣借金烏出海月離雲紙衣下事不假胞胎懸崖撒手襁褓嬰孩涅槃會上道場開單傳直指狀元來曹山因僧問朗月當空時如何師曰猶是階下漢曰請師接上階師曰月落後來相見頌曰朗月當空未入關落花流水不相干明眀一句超凡聖光境俱忘誰解看皓月光中立問端上他階級轉顢頇會須月落來相見別有靈光照膽寒在菴賢曹山因鏡清問心徑苔生時如何師曰難得道者曰未審此人向什麼處去師曰只知心徑苔生不知向什麼處去頌曰心徑苔生何處去謝家人不在漁船蘆花萬頃水天濶白鳥深沉任轉於自得暉心徑苔生去莫知口如鼻孔眼如眉迢迢劫外封強闊眀月蘆花類不齊掩室開曹山因僧問雪覆千山為甚麼孤峯不白師曰須知有異中異曰如何是異中異師曰不墮衆山色頌曰雪覆千山沒路岐孤峯不白峭巍巍五陵公子雖增氣野老相逢不展眉朴翁銛混不得類不齊六爻宛轉見重離夜深下視千山白不是其中人不知石溪月言中彼此帶幽玄盡向言中辨正偏孤負一條官驛路茫茫沉在月眀前絶岸湘曹山問金峯志曰作甚麼來曰蓋屋來師曰了也未曰這邊則了師曰那邊事作麼生志曰候下工日白和尚師曰如是如是頌曰運斤成風匠石之奇喬松聳壑梁棟之姿宗中辨的量外知機這邊那邊兮著著無虧走盤不定兮落落明珠雲耕靜曹山因僧問端坐團圓時如何師曰望不見身曰還假用也無師曰才説坐時便是用也不可移山塞海説禪説道方為用也頌曰團圓莫謂清虛理若謂清虛總喪身却是眉毛曾問眼烏晴那自見瞳人本覺一曹山辝洞山山云子歸鄉莫打飛鳶嶺過麼師曰是山云來時莫打飛鳶嶺來麼師曰是山云有一人不打飛鳶嶺過便到此間子還知麼師曰渠無彼往山云子見甚道理便道渠無彼往師曰若不到這田地爭解恁麼道頌曰不打飛鳶便到來大圓鏡裏絶塵埃東君節令分明也挑李年年二月開自得暉曹山因僧問世間甚麼物最貴師曰死貓兒最貴曰為甚麼死貓兒却貴師曰無人著價頌曰腥臊紅爛不堪親觸動輕輕血污身何事杳無人著價為伊非是世間丹霞淳曹山辝洞山山問曰子向甚麼處去師曰不變異處去山曰不變異處豈有去邪師曰去亦不變異頌曰家家門掩蟾蜍月處處鶯啼楊柳風若謂縱橫無變異猶如擲劒擬虛空丹霞淳齋時一鉢飯飯後一覺睡睡起去放尿洗手成變異闡提照曹山聞鍾聲乃曰阿㖿阿㖿僧問和尚作甚麼師曰打著我心僧無對五祖戒代云作賊人心虛頌曰聞鍾告衆打吾心遊子間言醉更深楞嚴會上圓通者正法明王觀世音般若柔聞鍾便道打吾心語淺分明理事深上流默默點頭笑可謂真鍮不金汾陽昭曹山因僧問家貧遭劫時如何師曰不能盡底去曰為什麼不能盡底去師曰賊是家親頌曰六門曉夜任開張家賊難防事可傷識得家親恩愛斷更無一物獻尊堂卍菴顏曹山問僧作甚麼曰掃地師曰佛前掃佛後掃曰前後一時掃師曰與曹山過靸鞋來頌曰引問當機看起倒僧對師云一時掃曹山索把袈裟來智深功德禪和妙般若柔器量方圓識得伊問君掃地示慈悲前後一時俱掃却也是拈他第二機汾陽昭曹山因僧問靈衣不挂時如何師曰曹山孝滿曰孝滿後如何師曰曹山好顛酒頌曰清白門四絶鄰長年開掃不容塵光明轉處傾殘月爻象分時却建寅新孝滿便逢春醉步狂歌任墮申散髮夷猶誰管你太平無事酒顛人天童覺曹山顛酒有誰諳醉語狂言不自慚夜半日頭當午照騎牛背面著靴衫東谷光曹山問強上座曰佛真法身猶若虛空應物現形如水中月作麼生説箇應底道理曰如驢覷井師曰道則太煞道秖道淂八成曰和尚又如何師曰如井覷驢頌曰出路從來無十成有言須是脫凡情江邊玉女呵呵笑嶺上石人側耳聽成枯木應物現形如水月當時應物不留情如驢覷井終難喻如井覷驢何十成本覺一驢覷井井覷驢智容無外靜𣷉有餘肘後誰分印家中不蓄書機𮈔不挂梭頭上文彩縱橫意自殊天童覺驢覷井井覷驢五臺何處不文殊黃面老人任多口未知道得八成無張無盡驢覷井井覷驢冬瓜葉上長葫蘆會不得莫踟蹰定盤星上絶錙銖無菴全曹山因僧問五位對賔時如何師曰汝即今問那箇位曰某甲從偏位中來請師向正位中接師曰不接曰為甚麼不接師曰恐落偏位中去師却問僧秖如不接是對賔是不對賔曰早是對賔了也師曰如是如是頌曰月中玉兔夜懷胎日裏金烏朝抱卵黑漆崑崙踏雪行轉身打破琉璃碗丹霞淳故國安居象帝先夜明簾外信無傳金雞啼破玉人夢曉色依依錦帳前曹山因僧問子歸就父為甚麼父全不顧師曰理合如是曰父子之恩何在師曰始成父子之恩曰如何是父子之恩師曰刀斧斫不開頌曰翡翠簾垂𮈔綸未濟紫羅帳合視聽難通犯動毛頭月升夜戶密移一步鶴出銀籠脫身一色無遺影不坐同風落大功天童覺刀斧斫不開靈機絶點埃清風掃殘雪和氣帶春回退谷雲曹山因僧問國內按劒者誰頌曰嵯峨萬仞是曹山氣岸雄雄坐祖關橫按鏌鎁全正令太平寰宇斬癡頓佛性泰湖南龍牙山居遁禪師嗣洞山初參洞山一日問如何是祖師西來意山曰待洞水逆流即向汝道師始悟厥旨頌曰龍牙未息狂心地遍問諸師不肯休先達愍他親志切直言洞水逆須流汾陽昭古源無水月何生滿岸西流一𣲖分蔥嶺罷詢熊耳夢雪休話少林春投子青洞水無緣會逆流見他苦切故相酬西來祖意實無意妄想狂心歇便休橫川珙龍牙在翠微時問如何是祖師意徵曰與我將禪板來師遂過禪板微接淂便打師曰打即任和尚打且無祖師意又問臨濟如何是祖師意濟曰與我將蒲團來師乃過蒲團濟接淂便打師曰打即任和尚打且無祖師意後有僧問和尚行腳時問二尊宿祖師意未審二尊宿道眼明也未師曰明即明已要且無祖師意頌曰龍牙山裏龍無眼死水何曾振古風禪板蒲團不能用只應分付與盧公盧公付了亦何憑坐倚休將繼祖燈堪對暮雲歸未合遠山無限碧層層雪竇顯子卿不下單于拜始末常遵漢帝儀雪後乃知松柏操事難方見丈夫兒佛性泰西來祖意問重重禪板蒲團用處同休把虛空增粉飾他家肯重似盲聾成枯木駕與青龍不解騎人人盡道阿師癡爛泥中有傷人刺三度曾施陷虎機瞞菴成蒲團禪板對龍牙何事當機不作家來意成褫明目下恐將流落在天涯虛空那挂劒星漢却浮槎不萌草解藏香象無底藍能貯活蛇今日江湖何障礙通方津渡有船車天童覺龍牙因僧問二鼠侵藤時如何師曰須有隱身處始得曰如何是隱身處師曰還見儂家麼頌曰寒月依依上遠峯平湖萬頃練光封漁歌驚起沙洲鷺飛入蘆花不見蹤丹霞淳堂堂成現密密難見二鼠雖黠莫逢其便藤枝透出未生前正眼當陽巧回換龍牙老機如電遇賤即貴貴即賤圓悟勤龍牙因韶國師問天不能蓋地不能載時如何師曰道者合如是纍經十七次問師曰若為你説恐尓後罵我去在韶後住通玄峯因澡浴次忽省前話具威儀望龍牙禮拜曰當時若與我説破我今日定罵他頌曰赤骨力寸𮈔不挂淨倮倮兮赤灑灑浴出低頭滿面慚為我説時定相罵卍菴顏大海中心泛鐵船隨波逐浪浪滔天順風到岸無人識江北從來使鐵錢東谷光龍牙因僧問如何是祖師西來意師曰待石烏龜解語即向汝道曰石烏龜語也師曰向汝道什麼頌曰石龜無語是知音無耳髑髏深夜聽天曉便藏無影樹太陽遍照不能尋投子青烏龜誰道不能言妙語浪浪只自宣説盡西來祖師意知音弗遇也空然本覺一龍牙因僧問十二時中如何用力師曰如無手人行拳頌曰如人無手欲行拳誰敢當頭輒向前二六時中常若此不須更問祖師禪本覺一龍牙因僧問古人淂箇什麼便休去師曰如賊入空室頌曰枯松野鶴呌𢖍門雪滿寒林入夜聞只箇生涯無所有不妨巖下有溪雲成枯木買帽相頭量丈補職明眼衲僧面前不識真淨文緑林強士正心狂心中妄意室中藏不覺投虛入空屋懡㦬徒然笑一場本覺一龍牙因僧問師子返擲時如何師曰返擲且止你道還怕文殊麼曰非但文殊佛亦不怕師曰爭奈被文殊騎何曰文殊騎者不是師子師曰返擲事作麼生曰應用無虧師曰正是文殊騎者返擲事作麼生僧無語頌曰衆獸之中師子兒善能哮吼震全威縱橫妙用能返擲爭奈文殊坐著伊于闐國王牽不住善財童子却生疑將謂世界無過者也被六塵吞著時智門寬撫州踈山匡仁禪師嗣洞山聞福州大溈安和尚示衆曰有句無句如藤倚樹師特入嶺到彼值溈泥壁便問承聞和尚道有句無句如藤倚樹是否曰是師曰忽然樹倒藤枯句歸何處溈放下泥盤呵呵大笑歸方丈師曰某甲三千里賣却布單特為此事而來何淂相弄溈喚侍者取二百錢與這上座去遂囑曰向後有獨眼龍為子點破在後聞婺州明招謙和尚出世徑往禮拜招問甚處來師曰閩中來招曰曾到大溈否師曰到曰有何言句師舉前話招曰溈山可謂頭正尾正秪是不遇知音師亦不省復問樹倒藤枯句歸何處招曰却使溈山笑轉新師於言下大悟乃曰溈山元來笑裏有刀遙禮悔過頌曰樹倒藤枯伸一問呵呵大笑有來由羚羊挂角無尋處直至如今笑未休海印信樹倒藤枯呵呵大笑不許夜行投明須到遊子貪程去不歸及至歸來親已老親已老不須嗟猶勝當日未還家佛慧泉江邊間把直鈎垂也有金鱗上釣時三跳若能乘羽化免教漁父皺雙眉成枯木藤枯樹倒意如何一著分明舉示他笑裏有刀須錯解正頭正尾却仙陀道場如冷刃吹毛笑裏來爍迦羅眼不容裁一目金龍曾舉瓜髑髏覺痛頂門開大洪預若將此語定經宗孤負明招獨眼龍笑裏忽分泥水路方知千里共同風徑山杲有句無句藤倚樹白飯元來用米作高樓吹笛柳如煙滿地春風落飛絮鼓山圭樹倒藤枯意若何溈山開口笑呵呵可憐三尺龍泉劒喚作陶家壁上梭佛性泰索却布單錢了行行意氣轉高不得明招點破焉知笑裏有刀樹倒藤枯問大溈呵呵大笑顯全機布單賣却盤纏了秋夜寒來怨阿誰文殊道却使溈山笑轉新笑中有刃暗傷人曹溪路上奔馳者由更區區苦問津樹倒藤枯笑未休箇中誰解辨宗由堂堂蹉路溈山老空去空來一肚愁椘安方添淂溈山笑轉新當時覿面已呈君明招漏泄溈山句無限風光付與人有句無句明來暗去活捉生擒捷書露布如藤倚樹物以類聚海外人參蜀中附子樹倒藤枯切忌名模句歸何所蘇嚧蘇嚧呵呵大笑破鏡不照大地茫茫一任𨁝跳護國欽呵呵大笑不尋常須淂眉間也放光不是明招重注腳叢林洎合錯商量梁山遠呵呵大笑意難論樹倒藤枯問有因縱向明招言下悟眼開只是舊時人真淨文仰之彌高鑽之彌固昭昭明明如藤倚樹大笑呵呵跨白牛碧雲繚繞無尋處龍牙言有句無句如藤倚樹玄沙斫牌禾山打鼓君不見雪竇有語兮要與人天為師靣前端的是虎尼無著捴笑裏憑誰眼豁開龜毛須向火中栽腳跟有路雲泥隔千里區區謾往來湛堂深叵耐溈山老鬼精垂鈎便要釣鯤鯨幾多頭角為龍去蝦蟹依前努眼睛中菴空掀翻海嶽求知已雪刃橫身立太平野老不知堯舜力𭽸𭽸打鼓祭江神木菴永有句無句如藤倚樹回避無門毒蛇當路樹倒藤枯句歸何處明眼衲僧一場罔措天目禮琅琊覺云有句無句如藤倚樹樹倒藤枯好一堆爛柴頌曰布單酬價見明招滴水如今未合消不是普通年後事住山爭得有柴燒張無盡轉得眼來十萬里千江匝匝寒波起若能借便使風帆無明海裏尋知己中菴空領得溈山笑裏刀方知不枉到明招元來樹倒藤枯後了得三年五載燒石林鞏踈山因僧問如何是諸佛師師曰何不問踈山老漢頌曰養子方知在上慈親言無味外人疑欲窮滄海深深處𥊸取漁家傲莫迷投子青踈山因主事僧為師造壽塔畢白師師曰將多少錢與匠人曰一切在和尚師曰為將三文錢與匠人為將兩文錢與匠人為將一錢與匠人若道得與吾親造塔來僧無語後僧舉似大嶺庵間和尚即羅山嶺曰還有人道得麼曰未有人道得嶺曰汝歸與踈山道若將三錢與匠人和尚此生決定不得塔若將兩錢與匠人和尚與匠人共出一隻手若將一錢與匠人纍他匠人眉鬚墮落僧回如教而説師具威儀望大嶺作禮嘆曰將謂無人大嶺有古佛放光射到此間雖然如是也是臘月蓮花大嶺後聞此語曰我恁麼道早是龜毛長三尺頌曰一文兩文與三文踈山大嶺謾區分須知無縫元無價獨露乾坤聳白雲雲巖因接得風流傳粉郎一朝三度巧梳粧改頭換靣無人識元是東村李二娘佛鑑勤鑿壞十方常住地三錢使𥁞露尸骸羅山古佛雖靈驗未免將身一處埋徑山杲袖頭打領無添減腋下剜襟有短長大𢈔嶺頭一尊佛踈山兩度放毫光鼓山圭窣堵波成賞匠人工錢一二與三文可憐眼裏無筋者當面定將數目分佛性泰清風吹動釣魚船鼓起澄波浪拍天堪笑錦鱗爭戲水到頭俱被釣𮈔牽丹霞淳三文與匠人每愛佳人笑目青音容常隔一沙汀黃河誰道如今輥波浪無風不挂情崇覺空三兩文與匠人惱惱牛欄昨夜開嶺頭人喚不歸來煩君道與西山月莫照孤燈冷處灰一文與匠人行因感果事須分寶塔凌空直一文要會踈山端的意吾家宗祖在并汾冬瓜蘸雪未為淡匠者三文淡最幽天共白雲曉水和眀月流本寂觀鑿開蒼徑造浮圖往復商量價不孤無限落花隨水去夕陽春色滿江湖應菴華臘月蓮花菡蓞香三回賞手不尋常直饒會得鬚眉落早是龜毛數丈長密菴傑墮落眉鬚不淂塔三文使盡見分踈無端大嶺重饒舌數丈龜毛舉世無月林觀踈山造塔行令今古藂林揀正三錢酬酢相應驀地傳聞大嶺看看臘月蓮華龜毛三尺相慶是則古佛放光非則尋聲弄影方菴顯踈山冬至夜上堂有僧問如何是冬來意師曰京中出大黃今就作京師頌曰京師出大黃熟處最難忘道吾常作舞元是謝三郎霞淳京師出大黃不許謾商量貴買還賤賣才喫便承當懶菴需京中大黃答冬來意杲日麗天盲人摸地肯堂充有問冬來事京師出大黃貪他一粒粟失却半年糧密菴傑京師出大黃見賊便見贓竹杖化龍去癡人戽夜塘松源嶽京師出大黃直截為君舉冬至到寒食恰是一百五無際𣲖有問冬來事京師出大黃漢家勳業在樊噲與張良破菴先踈山上堂曰病僧咸通年前會得法身邊事咸通年後會得法身向上事雲門出問如何是法身邊事師曰枯樁曰如何是法身向上事師曰非枯樁曰還許某甲説道理也無師曰許曰枯樁豈不是眀法身邊事師曰是曰非枯樁豈不是明法身向上事師曰是曰秪如法身還該一切也無師曰法身周遍豈得不該門指淨瓶曰秪如淨瓶還該法身麼師曰闍𥟖莫向淨瓶邊覔門便禮拜頌曰法身向上法身事我見枯樁眼中刺多年多嵗易成精一切處該該不是相逢打鼓弄琵琶知音相見合如此大溈智眼觀東南意在西北撥轉天開掀翻地軸法身向上法身邊間氣英靈五百年膠漆相投箭相拄南山起雲北山雨圓悟勤青青掩映松蘿窟修竹超然物外物莫將修竹比喬松不及喬松老風骨佛鑑勤法身向上法身邊會得咸通無後先一箇矬來一箇跛擔為一簷更無偏石溪月踈山手握木蛇有僧問手中是什麼師提起曰曹家女頌曰別面不如花有笑離情難似竹無心因人説著曹家女引得相思病轉深慈受深我愛曹家女姿質嗔心猛熾火長然紫羅帳裏深深夜説悟當年四八禪崇覺空踈山問僧甚處來僧曰雪峯來師曰我已前到時是事不足如今足也未曰如今足也師曰粥足飯足僧無對頌曰一條官路坦然平無限遊人取次行莫謂地平無險處須知平地有深坑慈受深踈山到夾山山上堂師問承師有言目前無法意在目前如何是非目前法山曰夜月流輝澄潭無影師作掀禪床勢山曰闍𥟖作麼生師曰目前無法了不可得山曰大衆看取這一員戰將頌曰八花毬上繡紅旗百戰場中赤手提一自凱歌歸去國英雄贏得作清時無量壽踈山因韶國師問百匝千重是何人境界師曰左搓芒繩縛鬼子頌曰百匝千重欲問周踈山脫體解相酬當時一衆知誰會直得江西水逆流投子舒踈山因靈泉問枯木生花始與他合是這邊是那邊句師曰亦是這邊句曰如何是那邊句師曰石牛吐出三春露靈雀不栖無影林頌曰滄海無風波浪平煙收水色虛含月寒光一帶望何窮誰辨箇中龍退骨霞淳越州乾峯和尚嗣洞山上堂曰舉一不得舉二放過一著落在苐二雲門出衆曰昨日有人從天台來却往徑山去師曰典座來日不得普請便下座雪竇云雲門秪能一手擡不能一手搦頌曰乾峯舉一不舉二雲門擡手添意氣花開花落任風吹自有馨香滿天地晦堂心聲前一句口如眉佛祖從來捴不知昨夜崑崙間説夢白頭生得黑頭兒霞淳黑白分眀滿局棊曾無一著有相虧可憐無限傍觀者斧爛柯消捴不知白雲端貌出形儀已不真二三分數像當人傍邊有箇無端者苐一難謾是眼親保寧勇天台南嶽去無蹤更有何人覿面逢東嶺雲生西嶺白前山花發後山紅普融平煮海成鹽終有味敲空作響本無聲崑崙撞著波斯子把手相將海底行慈受深高樓美女一雙雙各向瓊窗坐玉床繡出鴛鴦呈似了金針深插錦香囊佛性泰波斯捧出海南香白眼崑崙與論量賈客不諳彈舌語只看兩箇鼻頭長佛智裕東嶺西巖路暗通有誰曾見老乾峯雲門把手雖同步白雲飛蓋月含空楚安方莫向乾峯頂上參無言童子却相諳放開一線通消息走遍天台與嶺南成枯木春蘭與秋菊一一各當時底處無回互怨誰分髓皮風來烏已覺露重鶴先知為問何能爾渠儂初不知圓悟勤乾峯撒手懸崖韶陽天然標格謂言只有猴白那知更有猴黑佛心才相見不須嗔君窮我亦貧謂言侵早起更有夜行人萬年間明頭暗合緩放急𭣣腳手忽露針線還偷舉一不舉二天台過徑山嚼他桃李核終是牙關月堂昌乾峯上堂法身有三種病二種光須是一一透得始解歸家穩坐須知更有向上一竅在雲門出問庵內人為甚麼不知菴外事師呵呵大笑門曰猶是學人疑處師曰子是甚麼心行門曰也要和尚相委師曰直須與麼始解穩坐門應喏喏頌曰鋪主將鍮試買人謂言難似此金真買人拂袖先行去滿靣慚惶不敢嗔白雲端垂鈎四海釣獰龍格外玄談知己從相見披衫帶席帽不妨把手上高峯佛性泰三種病兮二種光法身於此露堂堂時人不會箇中意猶把法身謾度量楚安方動絃別曲問一知十手搦手掩以膠投漆庵內不見菴外無孔鐵鎚不會人生相識貴知音水入水兮金金圓悟勤庵內不知庵外事鐵額銅頭不相似定花板上打鞦韆猛虎舌頭書卍字瞎堂遠乾峯因僧問十方薄伽梵一路涅槃門未審路頭在甚麼處師以拄杖劃云在這裏僧後請益雲門門拈起扇子云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒兩似傾盆會麼頌曰入乎還將死馬醫返魂香欲起君危一期拶出通身汗方信儂家不惜眉天童覺樓閣重重擊不開乾峯劃破露崔嵬十方佛剎全彰處一一門中見善財佛心才須彌頭倒卓大海起清風東弗已搖落西瞿花正紅長靈卓扯破雲門一柄扇拗折乾峯一條杖二三千處管絃樓四五百條花柳巷徑山杲乾峯不用指陳雲門休打骨董自然東海鯉魚築著帝釋鼻孔鼓山圭烏龜三眼紅如火一角麒麟𢗲似錐土宿夜遊南贍部泥牛腳下火星飛雪竇宗一人向陸地行船一人向針鋒走馬同時同日到長安其中一箇最尖耍佛鑑勤當面非暗投應機皆直説乾峯與雲門兩口同一舌若是續貂人弄巧便成拙雪菴瑾乾峯因雲門到云請和尚答話師曰到老僧也未門曰恁麼那恁麼那師曰將謂猴白更有猴黑頌曰乾峯舉一不舉二雲門握手添意氣為言只有猴白那知更有猴黑晦堂心弦筈相𠾑網珠相對發百中而箭箭不虛攝衆景而光光無礙淂言句之總持住遊戲之三昧妙其間也宛轉遍圓必如是也縱橫自在天童覺澧州欽山文邃禪師嗣洞山巨良禪客參禮拜了便問一鏃破三關時如何師曰放出關中主看曰恁麼則知過必改師曰更待何時曰好隻箭放不著所在便出去師曰且來闍𥠖良回首師下禪床擒住曰一鏃破三關即且置試為欽山發箭看良擬議師打七棒曰且聽箇亂統漢疑三十年有僧舉似同安察安曰良公雖解發箭要且未中的僧便問未審如何淂中的去安曰關中主是甚麼人僧回舉似師師曰良公若解恁麼也免淂欽山口然雖如此同安不是好心亦須看始淂頌曰一鏃破三關爭知中的難放出關中主移疆還就土雲凍鴈聲孤愁人皆閔戶甜瓜自古甜苦瓠從來苦呆堂定欽山因巖頭問如何是真言師曰南無佛陀耶頌曰隨機有問隨機答不是禪兮不是玄後代無端翻譯出却將梵語作唐言退耕寧欽山與巖頭雪峯同到德山一日問德山曰天皇也恁麼道龍潭也恁麼道未審和尚作麼生道山曰汝試舉天皇龍潭道底看師擬進語山便打師被打歸延壽堂曰是則是打我太煞巖頭曰汝恁麼道他後不淂道見德山來法眼別云是則是錯打我頌曰老倒忘機太作家古今皆貴絶纖瑕天皇一脈龍潭現湧出靈源萬路差差切屬欽山猶定動淂無言説至今誇汾陽昭老將交羅事一期於中淂失少人知欽山若棒無言説若更非言更是非延壽慧高安白水本仁禪師嗣洞山上堂老僧尋常不欲向聲前色後鼓弄人家男女何故且聲不是聲色不是色僧問如何是聲不是聲師曰喚作色淂麼曰如何是色不是色師曰喚作聲淂麼僧作禮師曰且道為汝説答汝話若向這裏會淂有箇入處頌曰色自色兮聲自聲新鶯啼處柳𤇆輕門門有路通京國三島斜橫海月明丹霞淳聲出虛色生無聲前色後轉塗糊間不容髮安可名模堂堂圓應沒錙銖巧張爐鞴費分踈爭如棒下無生忍聞見馨香滿道途圓悟勤明州天童咸啓禪師嗣洞山簡大德問學人卓卓上來請師的的師曰我這裏一屙便了有甚麼卓卓的的曰和尚恁麼答話更買草鞋行腳好師曰近前來簡近前師曰秪如老僧恁麼答過在甚處簡無對師便打頌曰卓卓的的一屙便息老鼠舞三臺貓兒吹觱築烏龜舉首唱巴歌一二三四五六七雪竇宗天童啓因僧問如何是應用無虧底眼師曰恰如瞎一般頌曰盲聾瘖啞迥天真眼似眉毛道始鄰昨夜東君潛布令黃鶯啼處緑楊春丹霞淳京兆府蜆子和尚嗣洞山混俗閩川不蓄道具不循律儀冬夏一衲逐日沿江岸採掇蝦蜆充腹暮即宿東山白馬廟紙錢中居民目為蜆子和尚華嚴靜禪師聞之欲決真假先潛入紙錢中深夜師歸嚴把住曰如何是祖師西來意師遽答曰神前酒臺盤嚴放手曰不虛與我同根生頌曰神前酒臺盤鐵彈大如拳一擊便擊碎不直半分錢圓悟勤神前撥紙問西來直截當機指酒臺赤膊袒肩頭面禮禍從天降不成災瞎堂遠摝蜆撈蝦昧己靈那堪古廟著渾身擡頭那畔空狼藉討甚多年鬼眼睛東野敷紙錢堆裏可憐生臭口才開便葛藤蕩盡鬼家窮活計至今古廟絶人行東山源瑞州九峯普滿禪師嗣洞山問僧近離甚處曰閩中師曰遠涉不易曰不難動步便到師曰有不動步者麼曰有師曰爭得到此間僧無對師以拄杖趂下頌曰雲重重又水重重步不曾移到九峯遠涉若還言不易主人却在半途中雪巖欽台州幽棲道幽禪師嗣洞山一日斂鍾上堂大衆才集師乃問甚麼人打鍾僧曰維那師曰近前來僧近前師遂打一掌却歸方丈臥投子青云然自急須逃古今皆有行窮絶處試問傍人不識下情果然獲有既從相問急索端由不顧危亡得他假難雖獲小利也是暗地傷人不為好手這僧雖然失利蓋為自不守分致禍臨身未為分外然雖如是終是平人橫遭羅網自有傍人證據在且道證據箇甚事乃云東家不了西舍受殃復頌曰驀路相逢借問由寸心莫便與他酬雖然重簷教人代終是慚顏暗地羞汝州南院慧顒禪師上堂諸方只具啐啄同時眼不具啐啄同時用時有僧便問如何是啐啄同時用師曰作家相見不啐啄啐啄同時失僧曰此猶是某甲問處師曰汝問處又作麼生僧曰失師乃打之其僧不肯後於雲門會下聞別僧舉此話方悟旨却回參省師已圓寂遂禮風和尚問曰汝當時問先師啐啄話後來還有省處也無曰已見箇道理也曰作麼生曰某甲當時在燈影裏行照顧不著冗曰汝會也頌曰不將佛法當人情驗盡諸方鬼眼睛縱使作家不啐啄依然錯認定盤星笑翁堪同時啐啄不同時石火電光猶較遲燈影裏行今已會蹉跎非是落便冝雪巖欽雲居悟云且作麼生是啐啄同時眼若得眼明其用自備又道作家不啐啄啐啄同時失何故不啐啄所以道子若哮吼其母即喪諸人還明得麼乃頌曰子若哮吼其母即喪全歸其子十方通暢大用現前理自然何必起心作模樣更若不會雲居拄杖南院上堂赤肉團上壁立千仞僧問赤肉團上壁立千仞豈不是和尚道師曰是僧便掀倒禪床師曰這瞎驢亂作僧擬議師便打頌曰掌中擎日月舌上覆金錢壁立爭千仞毫光徹梵天鼓山圭赤肉團邊用得親主賔有理各難伸兩箇駝子相逢著世上如今無直人徑山杲電光影裏緇素區分纖毫不犯總教滅門木菴永日月無光殺氣浮揭天鼉鼓戰貔貅捷呼獲下真番將那箇兒郎不舉頭虛堂愚南院問僧名什麼僧曰普參師曰忽遇屎撅時如何曰不審師便打頌曰兩箇屎撅合作一團熏天𬉹地誰能千古藂林作話端西山亮南院因僧問古殿重興時如何師曰明堂瓦插簷曰與麼則莊嚴畢備也師曰斬草蛇頭落頌曰縱奪之機安可測隨言生解實堪悲曉來一陳春風起吹落花三四枝海印信重興古殿辨來風瓦插重簷氣象雄怪淂人前多意氣他家無法在胸中西禪寂南院因僧問寒暑到來時如何師曰紫羅抹額繡腰裙曰上上之機今已曉向下之機事若何師曰炭庫裏藏身頌曰紫羅抹額繡腰裙傾國風流宛勝秦玉笛插藏人不見夜深吹起鳳樓春雪堂行鎮州寶壽苐二世禪師嗣寶壽沼開堂乃先寶壽遺囑三聖為作請主開堂日師方升座聖便推出一僧師便打聖曰你恁麼為人非但瞎却這僧眼瞎却鎮州一城人眼去在師擲下拄杖便下座歸方丈頌曰三聖擔他寶壽鏘推僧出衆擬商量塞外將軍行正令直淂盲人滿大唐汾陽昭寶華王座始登時三聖推僧決衆疑棒下分明無老少天下盲人幾箇知黃龍南金槌擲下如星疾好手接來不費力當時擲向洪波中千古萬古無消息白雲端黑白未分著著奇任他間漢畔頭窺不知除却神仙手更有何人敵淂伊保寧勇探馬飛來棒下寧瞎人翻滿鎮州城太平本是將軍建不許將軍見太平真淨文臨濟家風兩獻酬推僧棒瞎見宗猷若非寶壽全機眼更有誰明此話頭佛國白法眼傳來付與誰三聖推僧決衆疑將軍令舉群夫駭直淂盲聾徹四夷真如哲寶壽開堂座始登當時三聖便推僧要知打瞎人人眼好向曹溪問老能智海清當鋒更不借全機勍敵須還作者知鐵馬放間沙塞靜瞎驢千古少人騎上方益豐城收寶劒宇宙識人稀不入張華手焉能別是非佛心才驀刃開時飛鐵騎電光閃處擲金槌一城瞎却渾間事直至而今成是非佛性泰寰中天子勑塞外將軍令萬里掃𤇆塵威雄難比並曲中直細中瞎却人眼真作略掀倒禪床捋虎鬚人平不語水平不流劒去久矣徒勞刻舟權柄在手專殺活大丈夫兮淂自由南華昺矢在弦上不淂不發擬議蹉過箭鋒一劄京兆府天寧璉寶壽開堂推出僧棒頭有眼要分明滿城人瞎誰能曉今古清風匝地生踈山如提起須彌第一鎚電光石火太遲遲象王行處狐蹤絶獅子咆哮百獸危徑山杲棒頭瞎却一城人三聖撩他寶壽瞋正令只堪提一半一盲引淂衆盲行鼓山圭養淂男兒要賭錢渾身無有寸𮈔纏是非窟裏和身入生滅門中滿口宣正堂辨塞北千人帳江南萬斛船菩提窩裏坐總謂是虗傳石菴玿寶壽苐二世在先寶壽為供養主壽問父母未生前還我本來靣目來師立至夜深下語不契翌日辭去壽曰汝何往師曰南方學佛法壽曰汝且在此作街坊若是佛法紅塵浩浩談説一日在市中見二人相打一人近前打一拳云你是什麼面目師覩之忽大悟歸告寶壽壽深可之頌曰閙市相逢兩知識面目無來太廢力粉骨碎身未足酬一句了然超百億海印信南北東西是處遊更深歸去月如鈎春風一陳花狼籍不覺思量暗點頭成枯木甚妙也甚妙於此知性命劈鼻與一奉當時便打正五祖演十字街中六不收本來面目絶蹤由縱饒悟得分眀去已落儂家苐二頭禾山方一拳拳倒黃鶴樓一躍躍翻鸚鵡洲幸有傍人為著力自家端坐看楊州佛性泰一拳打就無靣目碧眼胡僧覷不足秋來黃葉落紛紛六六反成三十六南華昺寶壽作街坊閙市中薦淂父母未生前恁麼無靣目最奇特大用現前無軌則圓悟勤春色依依柳色萋桃花猶夾杏花枝欲識本來無靣目塵中方見丈夫兒佛鑑勤借路經過無靣目因邪打正有拳頭衲僧門下無干涉徒用精金換淂鍮南岩勝汝州西院思眀禪師嗣寶壽沼僧問如何是伽藍師曰荊𣗥叢林曰如何是伽藍中人師曰貛兒貉子頌曰毫髮不留縱橫自由閫外乾坤廓落大方無外優遊明明祖師意明明百草頭裭破狐疑網截斷愛河流縱有回天力爭如直下休四衢道中淨裸裸放出溈山水牯牛圓悟勤西院明在許州聞汝州南院出世元與同參遂特去相訪才入寺了曰啓和尚某甲無可人事自從許州來收得江西剃刀一柄上和尚院曰汝從許州來收得江西剃刀師於院手上掐一掐院曰侍者收師以袖拂一拂便行院曰阿剌剌阿剌剌頌曰南院門前信莫窺登臨無不喪全威許州收得江西信針芥相投只自知海印信池州魯祖山教禪師嗣灌溪因僧問如何是雙林樹師曰有相身中無相身曰如何是無相身師曰金香爐下鐵崑崙頌曰有相身中無相身金香爐下鐵崑崙雙林別後無消息滿路風塵來往人方菴顯吉州資福如寶禪師嗣西塔穆因陳操尚書來師畫一圓相操曰弟子與麼來早是不著便更畫圓相師於中著一點操曰將謂是南番舶主師便歸方丈閉却門頌曰團團珠繞玉馬載驢馱上鐵船分付海山無事客釣鼇時下一棬攣復云天下衲僧跳不出雪竇顯布漫天網鯨鼇不上水底反身波前躍浪在彼在此千里萬里不著便處却能回閉了方丈依前來雙收雙放半合半開主賔全體用石女老黃梅月堂昌李公要勸張公酒却被張公罰一杯珠繞團團休錯會還家拍手笑咍咍別峯印郢州芭蕉山慧清禪師嗣南塔湧上堂拈拄杖曰你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子靠拄杖下座頌曰有無今古兩重關正眼禪人過者難欲通大道長安路莫𥊸崑崙説往還投子青芭蕉示衆世無鄰與奪縱橫不易親雨散雲收何處去空令遊子淚沾巾正覺逸你有面前拈取去如無背後奪將來可憐黑漆光生底擊著千門萬戶開保寧勇縱奪臨機得自由相逢切忌更擡眸轉身必合知時莭擬議山藤便到頭成枯木芭蕉拄杖與奪直要當風眼活剎那才昧隔生鼻孔遭他牽撮佛智裕有無與奪太譊訛拄杖當途不奈何好把斜橫禪椅畔免令就上長枝柯文殊道十字街道見成行貨擬欲商量漆桶蹉過徑山杲舒無蹤卷無迹日午晴空轟霹靂衲子驚迷失路頭神號鬼哭知何極雪竇宗趂水泛船隨泥作佛船行佛成水泥不物有拄杖兮與拄杖船中輕蕩槳無拄杖兮奪拄杖佛靣巧出相好手芭蕉眼不開塞壑填溝何處來月堂昌赫日光中風雷雨雹海水逆流須彌倒卓走獸飛禽懸崖撲落塞外將軍生擒活捉捋猛虎鬚折蒼龍角南堂興相罵饒汝接觜相唾饒汝潑水等間摸著蛇頭拍手囉囉哩哩卍庵顏芭蕉舉起拄杖驚動森羅萬象蝦蟆飛過梵天眉毛元在眼上尼無著總蠱毒之鄉水不可嘗沾他一滴渾家喪亡肯堂充你有更須當靣與渠無背手奪將來驀然夜半化龍去黑雨烏風裂地雷虛堂愚鼓山圭云五祖以拄杖子話請益白雲雲曰要會麼多處添些子少處減些子何故神仙祕訣父子不傳白雲和尚大似一錢為本萬錢為利殊不知如人善日勝日貧老禪道多處添些子少處減些子自然到處恰好者箇算法極省工夫你諸人要會麼乃頌曰多添減少休那兊支移拆變加三倍平生有子不須教一回落賺自然會芭蕉清因僧問如何是透法身句師曰一不淂問二不淂休曰學人不會師曰第三度來與汝相見頌曰休問維摩臥病城羅山空自掩光陰流沙欲渡全無難莫𥊸鶯啼在那林投子青一不問兮二不休直須識取那鈎頭再三回首來相見急水波心輥繡毬懶菴需
