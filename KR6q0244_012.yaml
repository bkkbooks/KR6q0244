body:
  text: 僧錄司右闡教兼靈谷禪寺住持淨戒重校祖師機緣六祖下苐五世德山鑒十四則洞山价廿六則神山密三則石霜諸六則漸源興一則夹山會十則清平遵二則投子同十九則鼎州德山宣鑒禪師嗣龍潭簡州周氏子在蜀常講金剛般若經時謂之周金剛遂將青龍䟽鈔出蜀至澧陽路徑造龍潭到法堂曰久嚮龍潭及乎到來潭又不見龍又不現潭曰子親到龍潭師無語遂栖止焉頌曰浩渺深坑納眾流謾持香餌擲金鈎風雲匼匝雷霆動應訝龍王不出頭保寧勇親到龍潭不見龍龍潭龍不在潭中青天白日與雲雨千古人同咲葉翁佛國白親到龍潭不見龍玅符先覺證玄宗苑庵盤結孤峰上靜對寒蟾挂碧空羅漢南潭不見龍不現親到龍潭遭一玷瞥然歸去牙如劍棒頭撒出光燄燄長靈卓血盆似口劍如牙竭世樞機未足誇親到龍潭龍不現者回失却眼中芲心聞賁潭不見龍不現親到龍潭湏活薦莫學承虛接響人守株待兔亡機變知機變𧣴子擈落地楪子成七片遯庵演潭不見龍不現全身已在空王殿夢回忽𦗟曉鶯啼春風落盡桃芲片皖山凝德山一日侍龍潭抵夜潭曰更深何不下去師重便出却回曰外面黑潭點紙燈度與師擬接潭復吹滅師於此大悟便禮拜潭曰子見箇甚麼師曰今向去更不疑天下老和尚舌頭也至來日潭陞座謂眾曰可中有箇漢牙如劍𣗳口似𮕜盆一棒打不回頭他時向孤峰頂上立吾道去在師將䟽鈔堆法堂前舉火炬曰窮諸玄辯若一毫置於太虛竭世樞機似一滴投於巨壑遂焚之於是禮辭而去頌曰明暗相陵不足云𮈔毫有觧未為親紙燈忽滅眼睛出打破大唐無一人白雲端一時瀑布岩前落半夜金烏掌上明大開口來張意氣與誰天下共橫行保寧勇明暗相形事渺茫誰知腦後迸神光都來劃断千差路南北東西達本鄉大洪邃明暗分時光定動火光滅處見來由龍潭截斷辭源後佛祖孤峰罵未休照覺捴一陣旋風霧靄開千峰突出碧崔嵬驚猿怨鶴拋來久半夜山前喚得回上方益吹滅龍潭火一星當時心眼太精明微塵佛祖絕踪跡跛鼈奔騰作麼生旻古佛黃金為骨玉為稜莫把他家此日尋多少來悟心匠盡將底事継威音龍門遠德嘺龍潭啐啄機芥針投合契玄微孤峰盤結幪頭坐不頋青山雲自歸京兆府天寧璉龍潭霧起老龍吟嚇殺南山白額蟲不觸波瀾拿鼈鼻嶄然頭角氣如虹南堂興親到龍潭不見龍紙燈吹滅眼頭空一條白棒掀天地滅却西來達磨宗佛照光百結襴衫破㡤頭年年落苐出神州却因一隻穿楊箭臨老來封馬上侯蘿月瑩開口不見齒伸手不見掌夜半忽相逢葛藤長萬丈雪庵瑾南來本欲破邪說紙燈滅處難分雪着銔鎚硬佀鐵錯認烏龜喚作鼈玉泉窮谷璉親到龍潭已暗投夜深誰共䘖街遊紙燈吹滅狼𤇆息坐断中原四百州天目禮驀劄相逢不再三纔開臭口見鄉談紙燈滅處饒端的不許蒼龍臥碧潭朴翁銛德山禮辭龍潭直抵溈山挾複子上法堂西過東東過西顧視方丈曰有麼有麼山坐次殊不顧師曰無無便出至門首乃曰雖然如此也不得草草遂具威儀再入相見纔跨門提起坐具曰和尚山擬取拂子師便喝拂袖而出山至晚問首座今日新到在否座曰當時背却法堂着草鞋出去也山曰此子已後向孤峰頂上盤結草庵呵佛罵祖去在雪竇拈兩處云勘破了乃頌曰一勘破二勘破雪上加霜曾嶮墮飛騎將軍入虜再得完全能幾箇急走過莫放過孤峰頂上草裡坐虎穴深林人不到到者還湏是獵人老虎睡驚纔舉目瞥然跳出獲全身海印信偷營斫寨入中軍應是機謀已十分袖裡金搥猶未動山前飛騎去紛紛上方益德山老能法戰一喝聲光吼雷電騎虎頭兮𠬧虎尾捋𧆞兮真可羨急走下山三十里又被溈山追一箭佛鑑懃大用不拘今古規模倒拈蝎尾平捋𧆞若非深辨端倪何以坐覩成敗俊處頴脫囊錐高來卷舒方外孤峰頂上浪滔天正令當行百雜碎咄圓悟勤騎虎頭把虎尾霹靂一聲驚萬里坐觀成敗老將軍腦後一槌誰敢擬擬不擬箇箇無棍長者子懶庵需韜畧雙全膽氣豪當頭不怕陣雲高排關自謂褰旗手未免孤峰沒草窠頑石空七事隨身一毫不用再展鎗旗𠃵坤震動孤峰頂上休更說夢退菴奇德山凡見僧入門便棒頌曰德山棒劃断聖凡魔瞻喪善能方便捋虎忿怒那吒亦摧蕩海印信一棒一條痕辛酸不可論丈夫多意氣幾箇是知恩大洪恩突出雙頭卒辨難曾將一擊碎潼関自天下太平後流落人間號德山白雲端驟雨迅雷擊雲興電影隨將軍雖有令何佀帝堯時大洪邃兩手托開無縫塔一脚踢倒湏彌山青天霹靂無遮護阿師猶自覓禪関成枯木一條白棒劈頭來血濺星飛痛可哀祖佛更無回避處妙高峰頂也崩摧佛國白德嶠分明顯大奇棒頭揮出絕離微令行佛祖無空過一似輪王握萬機雲蓋昌一條楖𣗖倚青天別向三乘教外傳未眨眼時遭八百擬開口處着三千張無盡當機截断聖凡膝上寒光照雪茫茫宇宙無窮皮下何人有𮕜普融平坐断生死要津不問凡聖迷悟一棒打破面門自然𠃵坤獨露佛心才入門棒棒沒商量拶出紅流便廝當不是奴奴情淡薄無錢難作好兒郎佛燈珣棒下真鍮不愽金德山徹底老婆心後人只見波濤湧不見龍王宮殿深鼓山珪入門便棒郎當不少依而行之胡麻廝繳徑山杲曾透龍潭向上機便將一棒力橫揮當頭突出何人辨只許樷林作者知椘安方一條白棒胡揮乱揎撞着聱頭魂飛膽顫典牛游殺活並行醍醐毒藥是賞是罰一任卜度尼無著捴皎潔晴天吼怒雷銕山萬疊盡驚開囙思塊雨條風日安得全提有此來寶葉源德山小𠫭示眾曰今夜不荅話問話者三十棒時有僧出禮拜師便打曰某甲話也未問和尚囙甚麼打某甲師曰汝是甚麼處人曰新羅人師曰未跨舩舷好與三十棒頌曰德山自得任公手一線分明下兩鈎透網金鱗纔弄水岸邊還把釣𮈔𭣣佛印元誅龍之劍未可揮蛇大獵之家豈藉狐兔君不見諸葛亮作軍師或施擒縱少人知百萬雄兵如指掌小醜擒來又縱之兵歎訝馬頻嘶無限兒郎唱大奇如是四方英勇將聞名早已竪降旗海印信祖令全提孰敢論纖毫纔動陷関津這僧不辨箇時莭為法忘身有幾人成枯木𤇆塵掃蕩將軍令正勑流行宣德音公子只知歌既醉夜深還被活生擒寶峯照橫按鏌鋣居閫外當鋒誰敢犯重圍堪羨新羅箇衲子全機破敵也光輝旻古佛高提祖印踞寰中孰肎當機定吉㐫不是新羅這衲子爭教千古振清風大溈喆大冶烹金忽雷驚春草木秀發光輝日新不費纖毫力擒下天麒麟全威殺活得自在千古照耀同冰輪話作兩橛句中眼活龍頭蛇尾以指喻指撞着露柱瞎衲僧塞斷𠰸喉無出氣擬議尋思隔萬山咭嘹舌頭三千里圓悟勤德山老人寂寂惺惺法眼圓明精精靈靈六韜三略武緯文經新羅衲子有丙無丁南堂興德山囙廓侍者問上諸聖向什麼處去師曰作麼作麼曰勑點飛龍馬跛鼈出頭來師休去明日師浴出廓過茶與師師撫廓背曰昨日公案作麼生曰這老漢今日方始瞥地師又休去頌曰跛鼈飛龍騎形殊理不殊欲明二大士棒下識真軀汾陽昭正士忠臣氣㝡英一言佐國死猶輕不同諂曲偷安者寵貪榮過一生佛印元袖裡藏鋒逈莫儔任他高作運機籌若看舉鼎山力未到烏江不肎休海印信雲鵬展翅天無光井底蝦䗫剛咄咄大陽忽轉跳出來千峰萬峰空突兀白雲端熟睡高聲呌不聞夢中讇語自紛紛明朝一下方眠覺懊惱昏沉不可論保寧勇覿靣來時作者知可中石火電光遟輸機謀主有深意欺敵兵家無遠思發必中更謾誰腦後見腮𠔃人難觸犯眉底有眼𠔃渠得便冝天童覺不問文班與武班御街侵曉競朝天傍觀莫咲金吾老駿馬驕多不着鞭上方益商嶺東西路不分兩間茅屋一溪雲師言耳聵知師意人是人非不欲聞佛𪫬泰臨機一味放憨癡其毒尤深棒喝時堪咲人來誇敏手得便冝是落便冝別峯印頑皮老虎臥林丘一任傍人放滴油滿肚只因曾飽肉縱加呼喚懶擡頭無凖範只一箇休去伎倆自然消諸聖在甚處脚下路迢迢橫川珙昨日罵詈一番了老倒踈慵不觧𦗟今日又來由你罵饒人些子當看經閑極雲德山一日飯遲托鉢下堂時雪峰作飯頭見便云這老漢鍾未鳴鼓未響托鉢向什麼處去師便歸方丈峰舉佀岩頭頭曰大小德山未會末後句師聞今侍者喚來問汝不肎老僧那頭密啟其意師乃休去至明日陞堂果與尋常不同頭至僧堂前撫掌大咲曰且喜老漢會末後句雖然如是只得三年師果三年而沒頌曰鍾鼓猶未鳴托鉢何處去一拶便回頭會得末後句寶峯照末後句會也無德山父子太含糊座中亦有江南客莫向樽前唱鷓鴣天童覺𪷤𪷤霜風戞地寒漁翁擲釣五湖寬錦鱗觸散波心月𠬧取𮈔綸上古灘寶峯祥鼓寂鍾沉托鉢回岩頭一拶語如雷果然只得三年活莫是遭他授記來張無盡德山托鉢㝡為奇好語令人特地疑虎豹出林誇爪距樷林千古立雄基南堂興一撾塗毒聞皆喪身在其中総不知八十翁翁入塲屋真誠不是小兒嬉徑山杲鍾未鳴鼓未響依前托鉢歸方丈德山不會末後句岩頭密意誰相亮只得三年也大奇留與諸方作榜樣鼓山珪千尺𮈔輪直下垂一波纔動萬波隨兒童不慣風濤𢙣走入蘆芲不敢窺真淨文鍾鼓未鳴先托鉢雪峰平地成饒舌當時一徑入僧堂且看岩頭有何說照堂一雪峰公然喚回岩頭密啟有力果然只得三年賊口元來是勑典牛游𪷤𪷤吹毛照膽寒不容擬議豈容傳擡眸已是身三此是吾家紅鐵團明大禪斫却月中桂清光轉更多狐狸俱屏迹師子奮金毛密庵傑德山托鉢話低頭得人怕三家村裡人醉後胡廝罵率庵琮德山因僧問如何是佛師曰佛是西天老比丘頌曰佛是西天老比丘星移斗轉水東流茫茫宇宙人無戶貫依前百草頭或菴躰德山囙臨濟侍次師曰今日困濟曰這老賊寐語作甚麼師擬拈棒濟掀到禪床頌曰臥龍纔奮迅猛虎便咆哮時人只見波濤湧不知新月出林梢中庵空德山示眾曰道得也三十棒道不得也三十棒臨濟聞得謂洛浦曰汝去問他道得為甚麼也三十棒待伊打汝接住棒送一送看他作麼生浦如教而問師便打浦接住送一送師便歸方丈浦回舉似臨濟濟曰我來疑著這漢雖然如是你還識德山麼浦擬議濟便打頌曰單于自負藝過人小將教詔去佀真到彼果然贏小捷回來未免陷全身海印信譬若金籠鸚鵡兒觜如紅玉一青衣雖然學得人言語問着元來総不知佛鑑懃德山因僧來叅便乃閉却門僧打門師曰誰曰師子師開門僧纔入禮拜師驀頭騎曰者畜生許多時向甚麼處去來頌曰見兔放鷹囙邪打正脚未跨門直湏猛省木庵永德山上堂大眾及盡知也直得三世諸佛口挂壁上猶有一人呵呵大咲若識此人𠫭學事畢或作圓明密語投子青云然雖如是德山大佀藏盡椘天月猶存漢地星乃頌曰雙盲入暗路崎嶇日落棲蘆暫得甦爭佀石人眠半夜免教舜讓守林居湏知芲綻非干木無脚行時早觸途昨朝風起長安道元是崑崙進國圖𠬧把断襟喉風磨雲拭水冷天秋錦鱗莫謂無滋味釣盡滄浪月一鈎天童覺筠州洞山良价悟本禪師嗣雲岩囙辞雲岩臨行問百年後忽有人問還邈得師真否如何祗對岩良久曰秪這是師沉吟岩曰价闍𥠖承當個事大湏審細師猶涉疑頌曰躰量非功不墮令星移斗換豈同輪多年曆日雖無用犯着應湏総滅門正堂辯洞山因過水睹影大悟前旨有偈曰切忌他覓迢迢與我踈我今獨自徃處處得逢渠渠今正是我我今不是渠應湏恁麼會方得契如如頌曰動靜來每與俱回頭驀地始逢渠直饒與麼猶堪咲喚作如如又却迂本覺一水中影子囙身有若寔無身影亦無百尺竿頭纔