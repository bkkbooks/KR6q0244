body:
  text: 僧録司右闡教兼靈谷禪寺住持淨戒重校祖師機緣六祖下苐三世盤山積七則水潦二則麻谷徹四則東寺會二則西堂藏一則大珠海三則百丈政二則泐潭會一則杉山堅一則石鞏藏一則中邑二則泐潭興一則無業二則鵝湖一則三角印三則魯祖雲二則紫玉通二則鄧隱峯二則馬頭峯一則華林覺一則烏臼二則石臼二則本奚二則亮座主一則金牛一則嵩山二則則川三則打地一則椑𣗳二則石林一則秀溪一則浮杯一則龍山一則龐居士龐婆附共十四則幽州槃山寶積禪師嗣馬祖初參馬祖作街坊一日出門見人舁喪歌郎振鈴云紅輪决定沈西去未委魂靈往那方幕下孝子哭云哀哀師覩之忽然省悟舉似馬祖祖印可之頌曰歌聲繚繞哭聲悲笑殺槃山老古錐歷劫無明昏暗處一時頓覺發光輝文殊道紅輪决定沈西去未委魂靈往那方得故鄉田地穩本來面目露堂堂人只在不曾亡率陀天上非人世須知別有好商量佛燈珣哀哀相應便承當畢竟魂靈往那方踊躍自然全體露始知遍界不曾藏海印信未審魂靈往那方無棲泊處露堂堂水向石邊流出冷風從花裏過來香月林觀紅輪决定沈西去未委魂靈往那方孝子盡情宣說了槃山無處可遮藏藏不得堪與人天為軌則遁菴演忽聞幕下哭哀哀䪺使天台對五臺風月一天今古在通身是口也難開誰菴演薤歌聲咽些聲長聽得哀哀忽斷腸依舊紅輪西畔沒大千無地著凄凉天目禮薤露凄凉亦可憐白楊丹旐去翩翩哀哀聲裏無消息打著南邊動此邊北澗簡紅輪决定沈西去未審魂靈往那方哭慟一聲無處避擡頭親見本爺娘無凖範槃山又一日於街市見人在肉肆買肉云精底割一斤來屠兒放下刀義手云長史那個不是精底師聞之忽然大悟歸以所悟告馬祖祖印可之頌曰個事分明不覆藏頭頭物物自相當千言萬語無人會又逐流鶯過短墻南華昺江邊送客上扁舟相對漁翁暗擲鈎一掣錦鱗隨手上遠山疊疊水悠悠妙峯善槃山示衆曰三界無法何處求心四大本空佛依何住璿璣不動寂爾無言覿面相呈更無餘事珍重頌曰三界無法何處求心白雲為蓋流水作琴一曲兩曲無人會雨過夜塘秋水深雪竇顯青青入座當軒竹黯黯遮門對面山更有一般堪羡處夜深流水響潺潺佛鑑勤三界無法何處求心山容雨過松韻風吟橫眠倒臥無餘事一任莓苔滿地侵佛性泰三界無法何處求心月明夜暗山高水深三界本因心所現無心三界自平沈本覺一三界無法何處求心山花似錦緑葉成陰杜宇一聲歸去也呆郎猶自守園林塗毒䇿三界無法何處求心驚蛇入草飛鳥出林雨過山堂秋夜靜市聲終不到孤岑善權智春眠不覺曉處處聞啼鳥夜來風雨聲花落知多少或菴骵山舍無塵分外清石榴花發透簾明槐陰滿地日卓午夢覺流鶯時一聲掩室開依依楊柳欲藏鴉社後東風捲落花理䇿邀朋何處好山南山北看桑麻愚谷困槃山示衆曰心月孤圓光吞萬象光非照境境亦非存光境俱忘復是何物洞山曰光境未忘復是何物頌曰光非照境境非存光境俱忘復是痕百鳥不來春已老落花流水繞江村月堂昌光非照境境非存光境俱忘復是痕滿地落花風掃𥁞依前流水繞孤村肯堂充描不成兮畫不成臥龍長怖碧潭清擬心湊泊終難會達者應須暗裏驚松源嶽槃山示衆曰禪德可中學道似地擎山不知山之孤峻如石含玉不知玉之無瑕若如此者是名出家頌曰山既孤峻遊人罕至玉既無瑕莫辨真僞死心新地厚山高孰使然中藏巨璞不知年若人念念常如是堪作人間火裏蓮本覺一山忘孤峻玉忘瑕到處仙源是我家堪笑葛洪曾未悟遠從勾漏問丹砂天目禮槃山曰向上一路千聖不傳慈明曰向上一路千聖不然楊岐云口上著頌曰盤山向上路何言罕見行人耳有穿口上著來無咬處方知千聖不能傳白雲端不傳不然海口難宣須頂上駕起鐵船徑山杲千聖不傳到今日口上著來無等匹洞山腳太湖心行人路上空啾唧松源嶽槃山將順世告衆曰有人𨗿得吾真否衆將所寫真呈皆不契師意普化出曰某甲𨗿得師曰何不呈似老僧化乃打筋斗而出師曰這漢向後掣風狂去在頌曰師真醜拙不堪呈用𥁞身心笑殺人彼中莫覓𮈔頭意白鼻崑崙賀新正龍門遠徹底冰壺無影像倒翻筋斗摸難成千峯雨歇黃梅後桂𩲸還從海上生雪菴瑾清奇古怪娘生面妙筆丹青作麼施者廝十分傳得似依然畫虎只成狸寶葉源水潦和尚嗣馬祖來參馬祖禮拜起欲伸問次祖一倒師忽然大悟起來呵呵大笑曰也大奇也大奇百千三昧無量妙義只向一毫頭上識得根源去頌曰馬駒一驢兒倒地大笑起來羊鳴犬吠野軒遵一倒時堪大笑從前伎倆𥁞徒勞蛇頭却要重揩癢萬萬千千出一毫白雲端水潦承機徹祖意馬駒一曉根源虛空撲落無間地却向滄溟駕鐵船照覺捴海上追奔天馬駒偶來騰露全軀百千妙義毫端現拊掌呵呵笑識渠旻古佛筠管釀來應已熟不辭醉裏帽欹斜酴醾浪有幽香在是酒元來不是花懶菴樞無量妙皆周匝旋乾轉坤為一合當陽橫按笑中刀猶缺頂門上一南岩勝說道春來好狂風太放顛吹花隨水去翻却釣魚船雪菴瑾水潦因僧到乃畫圓相放師肩上師撥三下却畫圓相指其僧僧禮拜師打曰這掠虛漢保寧勇別僧拜處但唾之而去復頌曰躍去拳來乃是常如何得不見參商依公定奪無偏黨短自短長自長蒲州麻谷寶徹禪師嗣馬祖持錫到章敬繞禪床三匝振錫一下卓然而立敬曰是是又持錫到南泉亦如是泉曰不是不是師曰章敬道是和尚為甚道不是曰章敬是是汝不是此是風力所轉終成敗壞雪竇拈兩處云錯又頌曰此錯彼錯切忌拈却四海浪平百川潮落古䇿風高十二門門門有路空蕭索非蕭索作者好求無病藥章敬南泉路不殊明明道理話親踈多人不用磨金鏡漠自漢兮胡自胡指月迷津迷自指示君持錫却如無汾陽昭顏色規模却似真人前拈弄越光新及乎入火重烹試到了終歸是假銀保寧勇如是不是去却藥忌擬犯封疆全軍失利杖頭突出古菱花舉世風流出當家圓悟勤昨日出都門忽逢二商旅一指我南行一指我北去南行有官船過渡北去有車馬大路雖然南北不通途都在中華一國土佛鑒勤振錫通風似章敬章敬無私驀頭釘其僧尋討到南泉深深一杓更酩酊般若柔是與不是全彰妙義章敬南泉一場失利草堂清是兩頭語未出泥水非兩頭語依前自死振錫卓然白日青天風力還他敗壞時漫天大網生光輝月堂昌章敬道是南泉非逆水之波透者誰可憐個漠皮無血駕與青龍不解騎南堂興是是放下南山真鱉鼻不是不是勒回千里追風驥終成敗壞可憐生塞斷咽喉無出氣無出氣有巴鼻趙州東壁掛葫盧堪笑維摩談不二窮谷璉妙轉之機掣電飛目前生殺𥁞交馳明珠自有明珠價休向籬邊彈雀兒木菴永麻谷問臨濟大悲千年眼那個是正眼濟曰大悲千手眼那個是正眼速道速道師近前拽臨濟下禪床却坐濟近前曰不審師擬議濟便喝拽下禪床却坐師便出去頌曰大悲正眼問來端互換之機仔細看會得不得亦瞞頇也似鮎魚上竹竿海印信正眼英雄逢正眼勝劣短長徒用揀那吒現出本來身且非父母能生産覺海元多年塞上只聞名今日陳前親見面匹馬單槍戰數場好是見機開一箭保寧勇相逢狹路轉身難一陳交鋒瞬息間旗鼓縱橫渾莫辨試問何人得勝還普融平胡赤赤胡珠走盤兮盤走珠狹路相逢誇好手兩邊雪刃血糢糊石田薰賊隊相逢午夜時旗奪鼓討便宜驀然天曉重相見滿面羞慚各自歸別山智麻谷因良遂座主來參師見來閉却門將鋤頭去削草遂又來扣門師曰誰曰某甲師曰鈍根阿師下去凡數四如是遂忽然有省再去扣門曰和尚莫謾良遂良遂若不來禮拜洎被十二本經賺過一生師乃開門令通悟由印可之遂返都城講肆散席告諸徒曰諸人知處良遂總知良遂知處諸人不知頌曰逆順之機不易當大根良遂解思量若非久積同風事爭肯回頭見法王汾陽昭禪林深邃乍遊盤鋤草關門豈易看莫謂老師渾不是得相謾處且相謾正覺逸閉戶携鋤理最幽豁然大悟話元由從來學業空勞力始信黃河輥底流海印信閉戶携鋤已太更來當面受糊塗光中自覺遭謾久方信無人共出家白雲端韶石汾陽肯諾他便知回首逆風波不登麻谷玄關路十二本經休得麼照覺捴平生心膽向人傾到此門中有幾人別後都城舊知己暖烟斜日又黃昏龍門遠閉戶敲門向誰道遂公言下便知歸從前活計都拋下爭奈時人會者稀椘安方尋言逐句謾多端只為從前被眼謾撒手便能歸故國暗思岐路幾多般丹霞淳親到桃源景物幽一壺明月湛如秋反思洞口春殘日無數紅英逐水流成枯木麻谷高聲問阿誰一言駟馬卒難追遂公打破精靈窟現出金毛師子兒真淨文閉門入圃已周遮一喚回頭便到家良遂知時人不委海山空映夕陽斜懶庵需為人為徹咬著生鐵逆水之波虛空釘橛松源嶽諸人知處良遂知良遂知處人不知王維已死無人畫留得青山對落暉破菴先閉戶復携鋤雲深路更迂須知形影外肝膽向人輸虛堂愚携鋤不顧便好回去誰人敢道你是座主月坡明麻谷一日在紙帳內坐以手巾蓋却頭披雲和尚入見便作哭聲良久出去法堂繞禪床一匝却入撥開帳見師去却手巾而坐乃曰死中得活萬中無一師便下床就位作抽坐具勢雲近前把住曰前死後活你還甘麼師曰甘即甘師堪作什麼雲推開曰知道你前言不副後語頌曰五十笑他先百步何如騎馬勝騎牛不須重較多和少歸到家山即便休虛堂愚湖南東寺如會禪師嗣馬祖嘗患門徒以即心即佛之談誦憶不已且謂佛於何住而曰即心心如畫師而曰即佛遂示衆曰心不是佛智不是道劒去久矣汝方刻舟頌曰心不是佛智不是道舉得十分未敢相保携條柱杖間行切忌回頭轉腦照堂一心不是佛智不是道青山白雲落花芳草若是伶俐阿師終不回頭轉腦鼓山圭雨散雲收後崔魂數十峯倚欄頻顧望回首與誰同徑山杲太平時莭嵗豐登旅不賫糧戶不扄官路無人夜無月唱歌歸去恰三更開善謙青山不青白雲不白針鋒太寬宇宙太窄寥寥獨坐有誰知流水㳙㳙花片飛浩浩風光人不會滿園春色鷓鴣啼妙峯善昨日因過竹院西鄰家稚子隔溪啼山寒水肅半黃落無數歸鴉卜𣗳棲虛堂愚天晴日頭出雨下地上濕𥁞情都說了只恐信不及無門開心不是佛智不是道飛鳥出林驚蛇入草無縫𦉑難尋討笑倒嵩山破竈墮南叟茙東寺問仰山甚處人山曰廣南人師曰我聞廣南有鎮海明珠是否曰是師曰此珠如何曰白月即隱黑月即現師曰將得來否曰將得來師曰何不呈似老僧曰某甲昨到溈山被索此珠直得無言可對無理可伸師曰真師子兒善能哮吼頌曰鎮海明珠到處晶從來一顆自圓明仰山東寺曾遭索義手還將取次呈本覺一善撫太阿鋏决無傷手厄慣編猛虎必有全身䇿鎮海珠巧呈似離色離聲離名字旃檀林裏旃檀師子窟中吼師子圓悟勤師子窟中師子兒逸羣遊玩海珠璣溈山呼索渾無竅有理難伸穿得奇南岩勝無言可對口才開已是和光吐出來東寺不知何意志深深一丈掘坑埋雲衲慶處州西堂智藏禪師嗣馬祖僧問有問有答即且置無問無答時如何師曰怕爛却那百丈曰從來疑著老兄僧問丈曰請和尚道丈曰一合相不可得後有僧問長慶慶云相逢𥁞道休官去林下何曾見一人頌曰終日論文不記年禪心淡泊契幽玄白雲繚繞青山在一法無私萬古傳大溈智越山大珠慧海禪師嗣馬祖因僧問如何是佛師曰清淡對面非佛而誰衆皆茫然法眼曰是即沒交涉頌曰偃蹇蒼髯十萬本參差翠玉數千竿風敲月戶三秋冷雨打茅堂六月寒石溪月大珠示衆曰身口意清淨是名佛出世身口意不淨是名佛滅度頌曰一翻四大海一摑摑倒須山撒手到家人不識鵲噪鴉鳴柏𣗳間黃龍南大珠問座主蘊何經論曰講金剛經師曰若言如來有所說則為謗佛若言不是佛說又是謗經除此之外試與老僧說看主無對頌曰百非四句都拈了敢問云何會此經却是虛空能講得熾然常說有誰𦗟本覺一洪州百丈山惟政禪師嗣馬祖師問南泉諸方善知識還有不說似人底法也無曰有師曰作麼生曰不是心不是佛不是物師曰恁麼則說似人了也曰某甲即恁麼和尚作麼生師曰我又不是善知識爭知有說不說底法曰某甲不會請和尚說師曰我太煞與汝說了也頌曰祖佛從來不為人衲僧今古競頭走明鏡當臺列象殊一一面南看北斗斗柄垂無處討拈得鼻孔失却口雪竇顯涅槃老子順風吹囉哩哩囉爭得知隔嶺幾多人錯𦗟一時喚作鷓鴣詞白雲端不會誰不會相逢且喫茶不尋雲水路爭得到僧家長靈卓誰謂宗師有妙旨切切為人須到底手按瑤琴徹曉彈其來不入聾人耳佛鑑勤倒腹傾腸說向君不知何故尚沈吟而今便好猛提取付與世間無事人徑山杲百丈南泉論古今龍生龍子老婆心若人要識二禪老繡出鴛鴦須是針慈受深鸞膠續斷弦猊血化驢乳從來不為人今古參佛祖箭既離絃無返回將欲奪之必固與語時默默時語人從陳州來却往許州去圓悟勤百丈政示衆曰汝等為我開田我為汝說大普請開田了衆請和尚說大義師展兩手示之頌曰常憐百丈解開田令古行人手裏傳誰道舌頭曾不動五音六律太周旋白雲端大由來不可陳休於言下覓踈親而令欲識大雄老金毛生得玉麒麟佛迹昱開口說大後人莫容易百丈總持門淡而還有味龍門遠百丈開田說大義理事圓融無不𬾨梵音清徹十方聞草𣗳鋤鍬皆聳起末後雙拳再展開拖泥帶水為癡呆船流到岸五千里刻舟求劒徒悠哉佛𪫬泰展開兩手當時說大義流通滿世間莫謂入荒田不揀而今到處草漫漫牧菴忠大開田創祖基分明書契示傳持兒孫不肯遺先業乞食年年役路歧懶菴需普請開田力已齊紛紛帶水又拖泥展開兩手人休問昨夜三更月落西此菴淨百丈說大義全然沒巴鼻通身是水泥溺死在平地無際𣲖洪州泐潭法會禪師嗣馬祖問馬祖如何是西來祖師意祖曰低聲近前來師近前祖打一摑曰六耳不同謀來日來師至來日猶入法堂曰請和尚道祖曰且去待老漢上堂時出來與汝證明師乃悟曰謝大衆證明繞法堂一匝便去頌曰雞聲茅店月華明客夢沈迷尚未醒開得眼來天大曉髼頭垢面便奔程絶象鑒十八佳人嫁未酬每憑媒妁善搜求一從嫁却潘郎後便解人前不識羞竹屋簡池州杉山智堅禪師嗣馬祖與歸宗南泉路次逢虎各從邊過了泉問歸宗適來見虎似個甚麼宗曰似個猫兒復問師師曰似個狗子師却問泉泉曰似個大蟲大溈智曰三個老漢聚頭𥧌語若要徹一時參取這大蟲始得復頌曰一虎三人見不同高低各自立宗風為伊途路不得力空過浮生一夢中一物兩名也大奇三人那個可為師頂門未具金剛眼透出縱橫孰辨伊開先瑛五五二十五大蟲元是虎狗子與猫兒豈可同時語夜閉門早開戶須信利牙爪可怖家家門首透長安𥁞是舉子朝天路佛鑒勤撫州石鞏山慧藏禪師嗣馬祖初為獵人射鹿因遇馬祖令自射無下手處省悟投出家既得法住山後常張弓架箭凡見僧來便曰看箭一日三平到師曰看箭平乃披襟當之曰此是殺人箭活人箭又作麼生師彈弓絃三下平乃禮拜師曰三十年張弓架箭只射得半個聖人遂拗折弓箭平後到大顛處舉前話顛曰既是活人箭為什麼向弓絃上辨平無對遂再參既悟為顛之嗣頌曰張弓架箭喚君回不省宗師特意來個個𥁞隨迷醉走句中認影影難開三平猶未全提得霹靂雷聲遍九垓汾陽昭三十年來事一弓一弓弓擬定寰中寧知半聖雖投欵納𤩹牽羊信不通正覺逸架箭張弓用得深平生猶喜中紅心後來半個人雖得猛火方成百鍊金佛印元張弓架箭豈徒然中的雖多命不全半聖投機無別意功高何必畫凌烟佛慧泉張弓架箭三十年射得三平半不全爭似萬人齊指處斜陽一鴈落秋天佛國白三十年來握箭弓三平才到擘開胸半個聖人今日得大顛絃外幾時逢崇勝珙古有石鞏師架弓箭而坐如斯三十年知音無一個三平中的去父子相投和子細返思量元伊是箭垜法燈欽解擘當胸箭因何只半人為從途路曉所以不全身灌州靈岩安認得斑斑急上弦吼風一鏃去驚天近前子細來觀覷誰把藍田石射穿心聞賁張弓架箭幾何年接得三平機不全若使當時能羿射免教落莭向弓弦水菴一朗州中邑和尚嗣馬祖每見僧拍手鼓唇曰嗚㖿嗚㖿仰山到參從東過西立師曰子甚處學得此三昧山曰從曹溪脫印學來師曰如是如是山却問和尚甚處得此三昧師曰吾從章敬處得來頌曰鼓唇拍手口嗚㖿直引來人辨正邪千萬往來都不薦仰山才見便同家汾陽昭曹溪脫印傳來錯章敬師承受處粗將謂胡天下赤元來更有赤胡正覺逸仰山善問中邑善應覆去翻來拍拍是令慈受深中邑因仰山問如何得見性去師曰譬如一室有六窗內有一獼猴外有獼猴從東邊喚狌狌獼猴即應如是六窗俱喚俱應山作禮曰適來蒙和尚譬喻無不了知更有一事只如內獼猴瞌睡外獼猴欲相見時如何師下繩床捉山手作舞曰往往我與汝相見了也頌曰六窗一一喚獼猴睡者如何解應酬只與加鞭令省悟當時中邑謾悠悠本覺一凍眠雪屋夜摧頽窈窕籬門夜不開寒槁園林看變態春風吹起律筒灰天童覺人人有個老獼猴暮四朝三卒未休喚著便能知落處八花磚上輥金毬慈受深一室虛涵對六窗獼猴留在更無雙忘懷絶慮獼猴死一國安寧六國降南堂興一室蕭然六窗廓尓中邑仰山自作自起拈弄一個猢猻作出千般舉止浣盆浣盆栽識得你皖山凝洪州泐潭常與禪師嗣馬祖因南泉來見師面壁而坐泉撫師背師曰阿誰曰普願師曰如何曰也尋常師曰汝何多事頌曰面壁堆危引客過問誰那更問如何道尋常已成多事檢點儂家事更多西岩惠汾州大達無業國師嗣馬祖僧問如何是佛師曰莫妄想頌曰王令威嚴誰敢擬纖毫才動鐵輪隨時人只見錐頭利幾人能見利頭錐懶菴需信州鵝湖大禪師嗣馬祖因唐憲宗詔入內論議法師問如何是禪師以手點空法師無對帝曰法師講無窮經論秪這一點尚不奈何師却舉順宗問尸利禪師大地衆生如何得見性成佛利曰佛性如水中月可見不可取師謂帝曰佛性非見必見水中月如何攫取帝乃問如何是佛性師曰不離陛下所問帝默契頌曰因地而倒因地起離地求起無是理不離所問語雖親認著依前還不是枯禪鏡說理談真面紫宸鵝湖大枉勞神由來佛性難名邈爭似君王默契親天目禮空中一點是個什麼直饒講無限經論其奈不識者行貨雖然價重須彌也被君王識破尼間林英潭州三角山總印禪師嗣馬祖示衆曰若論此事眨上眉毛早已蹉過也麻谷便問眨上眉毛即不問如何是此事師曰蹉過也谷乃掀倒禪床師便打長慶代云悄然頌曰正令威嚴斷不容星移斗轉覓無蹤將軍勒起當頭馬殺氣紛紛袞黑風呆堂定三角示衆曰凡說法須用應時應莭時有僧問四黃四赤時如何師曰三月杖頭挑曰為什麼滿肚皮貯氣師曰爭奈一條繩何曰如何得出氣去師曰直待皮穿頌曰平地安身未肯休花陰柳𨒬逐時流放教滿肚無閒氣始信渠儂得自由慈受深三角因僧問如何是三寶師曰未豆粟曰意旨如何師曰大衆歡喜奉行頌曰三角對酬禾豆粟龍宮海藏難收録空門曾問踈山僧便道如今粥飯足大洪遂池州魯祖山寶雲禪師嗣馬祖師尋常見僧來便面壁南泉聞曰我尋常向師僧道向佛未出世時會取尚不得一個半個他恁麼驢年去頌曰人來面壁坐顒顒不話多端說異同親切不教心外覓免將明暗呼盲聾秋霜博地生寒暑魯祖垂慈不用功汾陽昭老倒禪門傳魯祖見僧面壁親垂顧個中若是丈夫兒剔起眉毛便回去佛印元魯祖三昧最省力才見僧來便面壁若是同心達道者不在揚眉便相悉梁山冀祖師面壁播諸方無限禪人謾度量無事晚來江上立數株寒柏倚斜陽琅琊覺坐斷千山與萬山勸人除却是非難池陽近日無消息果中當年不自觀翠岩真面壁咸言上上機衲僧到此擬何之直饒截斷千江水也落宗門第二槌海印信魯祖孤風振四維僧來面壁少人知南泉提起驢年事且道如今是甚時白雲端魯祖當年不用功逢僧面壁顯家風若遇上乘同道者請續此一句黃龍新堪笑池陽老古錐僧來靣壁擬何為大都端正人男女清淨不勞紅粉施草堂清雖然不是作家好惡他家自識喫拳還似打人面赤不如語直黃龍震魯祖山前古路通熙微一徑沒西東杜䳌聲裏春光老零落桃花藉地紅普融平無絃不彈有曲誰聽匏土革木宮商自正寥寥千古少林人也道九年傳此令佛心才池陽何處得捫摸後代商量涉異途古人剛地成多事試問如今會也無龍門遠虎徑龍泉繞行岩鳳棲霜倚鶴和杉誰人會得宗師意紐轉乾坤好不參剋符道者魯祖見僧面壁此理何妨徑直時人更莫斟量秪者不勞心力中間或聞一類強言正是相為非唯謗他古人亦乃困於上智會得祖師現前不會也難逃避永明壽南泉黑豆未生時喃喃終至泄天機休向未生前曉悟日出東方月落西藥山昱池陽面壁許誰知萬古孤峯對落暉才見攢眉便回去早知不是丈夫兒懶菴需魯祖逢人面壁老大慵懶追隨後之參徒罔測一向打瓦鑽龜水菴一葉落江頭一望長幾莖喬木倚斜陽曾經巴峽猿啼處鐵作心肝也斷腸簡堂機背前靣後揚家醜揭地洪音師子吼分付仙陀知不知法身午夜藏北斗足菴鑒家財喪盡沒絲毫秪個一身猶恨多却向池陽最深處殺人空手不持刀石菴玿無目仙人揣骨頭暗中摸索認王侯價高畢竟無人買冷却構欄懡㦬休雪菴瑾日暖佳人刺繡遲紫荊枝上囀黃鸝欲知無限傷春意盡在停針不語時南叟茂人來面壁成何事爭淂心開見本源空劫已前諸佛子話頭不舉自然圓橫川珙魯祖因僧問如何是不言言師曰汝口在甚麼處曰某甲無口師曰將甚麼喫飯僧無語頌曰得因失有是在非邊根源未斷枝𣲖相連不言言口何在轉得身來難下載一帆風過洞湖對靣須知已違背月堂昌唐州紫玉山道通禪師嗣馬祖因于頔相公問佛法至理乞師一言師曰若問須去情謂公曰便請師曰但問將來曰如何是佛師召于頔公應諾師曰更莫別求頌曰如何是佛更莫別求相隨來也四大部洲月林觀紫玉因于公一日問如何是黑風吹其船舫漂墮羅剎鬼國師曰于頔客作漢問恁麼事作麼于失色師指曰這個便是黑風漂墮羅剎鬼國于作禮而謝頌曰就身打劫壯吾曹喚得賢侯智眼高忿色不知何處去珠回玉轉透雲袍南岩勝五臺山隱峯禪師嗣馬祖一日辝祖祖曰甚處去師曰石頭去曰石頭路滑師曰竿木隨身逢場作戲便去才到石頭遂繞禪床一匝振錫一下問是何宗旨頭曰蒼天蒼天師無語回舉以馬祖祖曰汝更去見他道蒼天蒼天便噓兩聲師又去一依前問頭乃噓兩聲師又無語歸舉似馬祖祖曰向汝道石頭路滑頌曰石頭路險人難到到者方知滑似苔兩度三回雖踏倒滿身泥水又歸來虛堂愚唱徹黃金縷重吹紫玉簫倚樓人不見風過𣗳頭搖隱峯因南泉把淨瓶與師曰淨瓶是境你不得動著境與我將水來師將淨瓶傾水於泉面前休去頌曰南泉特地指瓶隱峯便