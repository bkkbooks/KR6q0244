body:
  text: 僧録司右闡教兼靈谷禪寺住持淨戒重校六祖下第五世仰山寂二十二則香嚴間五則米胡二則王常侍三則三角菴主一則六祖下第六世興化獎八則寶壽沼六則三聖然三則大覺二則灌溪間二則崔禪一則歷村一則虎溪一則桐峰一則米倉一則雲山一則陳操尚書二則大禪佛二則南塔湧二則無著喜三則袁州仰山慧寂通智禪師嗣溈山有梵僧從空而至師曰近離甚處曰西天師曰幾時離彼曰今早師曰何太遲生曰遊山玩水師曰神通遊戲則不無闍𥠖佛法須還老僧始得曰特來東土禮文殊𨚫遇小釋迦遂出梵書貝多葉與師作禮乘空而去自此號小釋迦頌曰遠離西竺路迢迢親向支那弄海潮若要清風生閫外拽來更與四藤條南華昺小釋迦大文殊聞名號任稱呼藤條在握不能用被他碧眼謾塗糊踈山如瞬目西天此土揚眉此土西天出息千重百匝入息一念萬年禪禪閻浮樹在海南邊南堂興應真來訪仰山翁須信聲聞未盡空問著不知關棙子元來只是有神通本覺一仰山住東平時溈山送書并鏡與師師上堂提起示衆曰且道是溈山鏡東平鏡若道是東平鏡又是溈山送來若道是溈山鏡又在東平手裏道得則留取道不得則撲破去也衆無語師遂撲破頌曰仰山接得溈山鏡告衆拈來行正令懞懂禪流眼不開仰山直下驀頭釘汾陽昭提起分明照正邪衆人皆不啓唇牙譬如賣物無人買最後須歸本主家洞山聰古鏡封來辨者難示徒行令衆當觀會中若有仙陀客留得如今照影寒海印信師鏡拈來呈衆了癡人往往爭妍醜當時撲破不可尋免教壞却兒孫手白雲端溈山古鏡仰山提日上東方月落西撲落不知誰拾得秋風索索草萋萋保寧勇師資相照見非輕將示禪徒衆失驚此鏡分明分不得到頭分作兩分明佛國白全放全𭣣意亦優溈山送至仰山頭可憐一片如秋水三問無人撲破休智海清父子相傳鏡絶塵須知秋夕不同輪可憐無限迷頭者錯認空華鏡裏春佛心才八十婆婆學畫眉風流意比少年時若無明鏡分妍醜盡道不勞紅粉施上方益比謂拈來伸一問如何舉衆盡茫然不因一撲百雜碎定作人間醜婦冤西禪淨仰山隨溈山遊山到磐陀石上坐師侍立次忽鴉𠾑一紅柿落在面前師取柿拭過呈似溈溈云子甚處得來師曰此是和尚道德所感溈云汝也不得無分即分半與師頌曰鴉𠾑柿子落師前致問何來事皎然各分一半甜如蜜如今不會更何年汾陽昭溈仰分明亘古今父子相見意輒深果熟馨香鴉𠾑至捏來擘去似交襟要會二人端的處中秋月落映潭心洞山聰仰山因溈山問大地衆生業識茫茫無本可據子作麼生知他有之與無師曰慧寂有驗處時有一僧從面前過師召曰闍𥠖僧回首師曰和尚這箇便是業識茫茫無本可據溈曰此是師子一滴乳迸散六斛驢乳頌曰父子有時揚密意神通變化不相知喚回業識茫茫者笑倒溈山老古錐真淨文一喚回頭識我不依俙蘿月又成鈎千金之子才流落漠漠窮途有許愁天童覺有本無本學益學搬運不時提起却穩師子一滴迸六斛驢乳散入別人屋業識茫茫辨出時烏雞不在蘆花宿月堂昌仰山問溈山大用現前請師辨白溈下座歸方丈師遂入溈問子適來問甚麼話師再舉溈曰還記得吾答語否師曰記得溈曰你試舉看師重出去溈曰錯師回首曰間師弟若來莫道某甲無語頌曰是即全是非即全非大用現前携手同歸不知猶自涉離微松源嶽問處分明答處親縱橫有路慣反身相如奪得連城璧秦主安然致太平木菴永仰山臥次夢入勒內院衆堂中諸位皆足惟苐二位空師遂就座一尊者白槌曰令當苐二座説法師起白槌曰摩訶衍法離四句絶百非諦𥊸諦𥊸衆皆散去及覺舉似溈溈曰子已入聖位師便禮拜頌曰夢中擁衲參𦒿舊列聖森森坐其右當仁不讓犍稚鳴説法無畏師子吼心安如海膽量如斗鮫目淚流蚌腸珠剖譫語誰知泄我機厖眉應笑揚家醜離四句絶百非馬師父子病休醫天童覺夢裏談空也大奇百非四句若為離當時能舉摩竭令何必堂中下一槌本覺一白日青天夢中説夢捏怪捏怪誑呼一衆無門開仰山因龐居士問久嚮仰山到來為什麼却覆師竪起拂子士曰恰是師曰是仰是覆士乃打露柱曰雖然無人也要露柱證明師擲拂子曰若到諸方一任舉似頌曰兩個八文為十六從頭數過猶不足拏來亂撒向階前滿地團團苔蘚緣白雲端賊偷賊物太希奇好手還他火伴知今日併贓齊捉獲得便冝是落便冝保寧勇仰山後參岩頭頭舉起拂子師展坐具頭拈拂子置背後師將坐具搭肩上而出頭曰我不肯汝放秪肯汝𭣣頌曰一竪一展一放一𭣣仰山弄險過似岩頭賴是隨風回櫓棹幾乎反却釣魚舟斷橋倫仰山一日在法堂上坐見一僧來問訊了向東邊義手立以目視師師垂左足僧過西邊義手立師垂右足僧向中間義手立師𭣣雙足僧禮拜師曰老僧自住此未曾打著一人拈拄杖便打僧騰空而去頌曰草舍蕭蕭寄白雲故人訪遠意殷勤寒暄禮莭皆通罷難免杯茶供養君南叟茂仰山在洪川石亭粥後坐次有僧問和尚還識字否師曰隨分僧乃右旋一匝云是甚麼字師於地上書個十字僧又左旋一匝云是甚字師改十字作卍字僧畫一圓相兩手托如修羅擎日月勢云是甚麼字師乃畫圓相圍却卍字僧乃作樓至勢師云如是如是此是諸佛之所護念汝亦如是吾亦如是善自護持其僧禮拜騰空而去頌曰道環之虛未盈空印之手未形妙運天輪地軸密羅武緯文經放開捏聚獨立同行機發玄樞兮青天激電眼合紫光兮白日見星天童覺仰山因僧思𨜶問禪宗頓悟畢竟入門的意如何師曰此意極難若是祖宗門下上根上智一聞千悟得大捴持其有根微智劣若不安禪靜慮到這裏總須茫然曰除此一路還更有入處否師曰有曰如何即是師曰汝是甚處人曰幽州人師曰汝還思彼處否曰常思師曰能思者是心所思者是境彼處樓臺林苑人馬駢闐汝返思底還有許多般也無曰某甲到這裏總不見有師曰汝解猶在心信位即得人位未在曰除却這個別更有意也無師曰別有別無即不堪也曰到這裏作麼生即是師曰據汝所解秪得一玄得坐披衣向後自看𨜶禮謝頌曰得坐應須更自看涅槃城裏未為安披毛戴角重相見歷盡艱難幾許般大洪恩無外而容無礙而沖門墻岸岸關鎖重重酒常酣而臥客飯雖飽而頽農突出虛空兮鳳搏妙翅踏翻滄海兮雷送遊龍天童覺幽州桑梓問來端歷歷山川在肺肝思底返思都叵得披衣向後更須看本覺一凡聖總無別路岐返思思底幾人知春風不到桃源洞葉落花開自有時慈受深仰山問僧近離甚處曰廬山師曰曾到五老峯麼曰不曾到師曰闍𥠖不曾遊山雲門云此語皆為慈悲之故有落草之談出草入草隨解尋討白雲重重紅日杲杲左顧無瑕右盻已老君不見寒山子行太早十年歸不得忘却來時道雪竇顯出草何如入草時全身入草為慈悲仰山垂手隨他去直至如今在路岐本覺一欲識廬山五老峯個中何地不相逢舌頭無骨隨人轉尉斗煎茶銚不同慈受深仰山問三聖汝名什麼聖云慧寂師曰慧寂是我聖曰我名慧然師呵呵大笑頌曰神通遊戲不為難互換機鋒始可觀雙放雙收底時莭呵呵大笑幾何般本覺一慧寂剛言是我名幸逢禪者更饒人若將利器比君子大笑欣然滿座春圓悟勤仰山向火次有僧參師曰一言説盡山河大地僧問如何是一言師以火筯插向爐中又移向舊處頌曰一句提萬象分肯同摩竭掩重門夕陽影裏風濤急不覺移舟下渡昏投子青仰山見雪師子乃指曰還有過得此色者麼衆無對雲門云當時好便與推倒雪竇云雲門只解推倒不解扶起頌曰一倒一起雪𨓍師子慎於犯而懷仁勇於為而見義清光照眼似迷家明白轉身還墮位衲僧家了無寄同死同生何此何彼暖信破梅兮春到寒枝涼颷脫葉兮秋澄潦水天童覺推倒扶起覿面千里唯小釋迦風前按指直饒海印發光也是雪峯道底遍界是文殊遍界是慈氏樓閣門開竟日間誰識善財童子最菴印仰山因陸郎中問不斷煩惱而入涅槃師竪起拂子曰只如者個作麼生入曰入之一字也不用得師曰入之一字不為郎中頌曰生死涅槃翻手覆手正眼豁開二俱非有獨步大方塵塵正受片片亂飄岩上梅條條縱舞溪邊柳石門聰仰山一日見香嚴乃問近日師兄見處如何曰據某甲見處無一法可當情師曰你解猶在境曰某甲只如是師兄又作麼生師曰你豈無能知道無一法可當情者溈山聞舉曰寂子已後疑煞天下人去在頌曰寂子香嚴論見處直教聞者轉疑深相逢未肯三分語那得全拋一片心本覺一仰山臥次僧問法身還解説法也無師曰我説不得別有一人説得曰説得底人在甚麼處師推出枕子溈山聞曰寂子用劒刃上事頌曰法身説法肉眼看物大智如愚大辨如訥拈起簸箕別處舂推出枕子露眠床劒刃上事放毫光月堂昌田中插鍬床上推枕千手千眼不審不審龍牙言仰山因梵僧來𠫭師於地上畫半月相僧近前添作一圓相以腳抹却師展兩手僧拂袖便去頌曰寂子偶逢穿耳客曾將半月示伊家僧添半月反然去却道親逢小釋迦本覺一仰山夏末問訊溈山溈曰子一夏不見上來在下面作何所務師曰慧寂在下面鋤得一片畬下得一籮種溈山曰子今夏不虛過師却問未審和尚一夏之中作何所務溈曰日中一食夜後一寢師曰和尚今夏亦不虗過道了乃吐舌溈曰寂子何得自傷己命頌曰開一片田密密綿綿兩頓粥飯其道自辦一夏興諸人相見自是諸人不薦若也薦成一片是什麼一片看取當門箭龍門遠寂子不虗過钁頭邊有功秪將一籮粟千載顯家風咦菴鑒翁翁年德兩俱尊家有詩書富可論飽飯憨眠無個事却來敲枕弄兒孫別山智開得一片田種得一籮粟卞和三獻椘王王設若不遇別實人至今猶在荊門哭午間一齊早晨一粥斷絃須是鸞膠續陽春白雪有知音山自青兮水自緑辛菴儔仰山同陸侍御入僧堂公乃問如許多師僧為復是喫粥喫飯僧為復是𠫵禪僧師曰亦不是喫粥飯僧亦不是𠫵禪僧公曰在此作什麼師曰侍御自問取他頌曰來問威風頗不臧幾多龍象在雲堂旃檀林裏曾無雜造次風流豈易量本覺一仰山因劉侍御問了心之旨可得聞乎師曰若欲了心無心可了無了之心是名真了頌曰口朝鼻孔無空過眼蓋鬍鬚有古風信采骨頭花十八等間擲出滿盆紅或菴體鄧州香嚴智間禪師嗣溈山因百丈遷化遂參溈山溈問我聞汝在百丈處問一答十問十答百此是汝聰明伶俐意解識想生死根本父母未生時試道一句看師茫然歸寮將平日看過底文字尋一句酬對竟不得乃嘆曰畫餅不可充飢屢乞溈説破溈曰我若説似汝汝已後罵我去我説底終不干汝事師遂焚平昔所看文字曰此生不學佛法也且作個長行粥飯僧免役心神泣辝溈山抵南陽忠國師遺迹憩止一日芟除草木偶拋尾礫擊竹作聲忽然省悟遽歸沐浴焚香遙禮溈山讚曰和尚大慈恩踰父母當時若為我説破何有今日之事述頌曰一擊忘所知更不假修持動容揚古路不墮悄然機處處無蹤迹聲色外威儀諸方達道者咸言上上機溈山聞得謂仰山曰此子徹也仰曰此是心機意識著述得成待慧寂親自勘過頌曰粥飯隨緣養病軀本無迷悟可關渠無端擊著菴前竹直至如今在半途雪竇宗放下身心如弊帚拈來瓦礫是黃金驀然一下打得著大地山河一法沉九峯升香嚴因仰山見曰和尚讚歎師弟發明大事你試説看師舉前頌仰曰此是夙習記持而成若有正悟別更説看師又頌曰去年貧未是貧今年貧始是貧去年貧猶有卓錐之地今年貧錐也無頌曰無地無錐未是貧知無尚有守無身儂家近日貧來甚不見當初貧底人鴈山元年去年來貧復貧祖師擡腳重千斤愁人莫向愁人説説向愁人愁殺人松源嶽當機覿面提覿面當機疾開眼放癡頑鞭逼人上壁香嚴初開堂溈山令僧送書并拄杖至師接淂便哭蒼天蒼天僧曰和尚為甚麼如此師曰秪為春行秋令頌曰拄杖將來便徹心淚流不覺思沉吟春行秋令人驚怪絶後光前絶古今汾陽昭接得杖哭蒼天不言絶後與光前春行秋令人難會破草鞋底穿正覺逸尊人寄物哭蒼天春令冬行也倒顛若有會中真衲子禪床好與即時掀本覺一家世拄杖佛祖付囑溈山寄來香嚴發哭父子投機陽春雪曲不是知音大難相續踈山如香嚴示衆曰若論此事如人上樹口𠾑樹枝不枝手不攀枝樹下忽有人問如何是祖師西來意不對他又違他所問若對他又喪身失命當恁麼時作麼生即得時有虎頭招上座出衆云樹上即不問未上樹時請和尚道師乃呵呵大笑頌曰香嚴𠾑樹示多人要引同袍達本真擬議即從言下取喪身失命數如塵汾陽為你開迷路雲散長天日月新汾陽昭呵呵大笑沒針錐上樹何如未上時任使香嚴多伎倆傍觀不免為攢眉佛慧泉曲設多方老古錐那堪枝上更生枝好如良馬窺鞭影逐塊且非師子兒保寧勇古聖悲心利後人口𠾑枝上露全身直饒玄路無消息未免家中喪二親石門易香嚴垂語真堪賞口𠾑樹枝懸樹上此時不問祖師機且道渠儂底模樣地藏恩狹路轉身難東西盡是山行人不到處風定落花間上方益高高山頂立深深海底行新松趂嶺種芳草繞池生手不攀枝不樹口裏𠾑得當頭蹉路問著西來對不對罰錢依舊有人悔月堂昌故園春色在枝頭惱亂春風卒未休無事晚來江上望三三兩兩釣魚舟應庵華香嚴上樹口𠾑枝手不攀枝腳纍垂才開口咦不答也又相違未上樹時道將來金剛寶劒頂門揮卍菴顏香嚴上樹住住住住擬問如何葛藤露布月林觀香嚴真杜撰𢙣毒無盡限啞卻衲僧口通身是鬼眼無門開無地無錐始是貧卻來樹上強懸身雖然相識滿天下畢竟知心能幾人無禪才香嚴因僧問如何是道師曰枯木裏龍吟僧云如何師曰髑髏裏眼睛後問石霜如何是枯木裏龍吟霜云猶帶喜在又問如何是髑髏裏眼睛霜云猶帶識在頌曰枯木龍吟真是道髑髏無識眼初明喜識盡時消不盡當人那辨濁中清曹山寂京兆府米和尚嗣溈山問僧近離甚處僧曰藥山師曰藥山老子近日如何曰大似一片頑石師曰得漝麼鄭重曰也無你提掇處師曰非但藥山米胡也漝麼僧近前顧視而立師曰看看頑石動也其僧便出頌曰米胡好片頑石多少遊人不識及乎衲僧一見不免將南作北大溈哲米胡令僧去問仰山曰今時人還假悟也無仰曰悟即不無爭奈落在苐二頭師深肯之頌曰碧岫峯頭借問人指山窮處未安身雖然免淂重行令爭似靈苗不犯春投子青苐二頭邊破悟迷快須撥手捨筌成兮未盡成駢拇智者難知覺噬嚌兔老冰盤秋露泣烏寒玉樹晚風凄特來大仰辨真假痕玷渾無貴玉圭天童覺悟人千箇道無憂肯信遭他苐二頭寂寞山花寒食後夕陽西去水東流龍門遠襄州王敬初常侍見溈山視事次米和尚至公乃舉筆示之米曰還判得虗空否公擲筆入宅更不復出米致疑明日憑鼓山供養主入探其意米亦隨至潛在屏蔽間偵伺供養主才坐問曰昨日米和尚有甚麼言句便不相見公曰師子咬人韓獹逐磈米聞此語即省前謬遽出朗笑曰我會也我會也公曰會即不無你試道看米曰請常侍舉公竪起隻筋米曰這野狐精公曰這漢徹也頌曰賔主機先有路通筆端不是判虛空筯頭再運回天力千聖齊教立下風癡絶沖常侍舉筆萬事皆吉直下承當急急如律米胡參官忘前失後且告貴人為我相救癡禪妙機輪活脫走珠盤妙處都盧在筆端竪起依然還放下靈鋒寶劒倚天寒偃溪聞王常侍與臨齊至僧堂乃問這一堂僧還看經也無濟云不看經公曰還習禪也無濟云不習禪公曰經又不看禪又不習究竟作什麼濟云總教成佛作祖去公曰金屑雖貴落眼成翳又作麼生濟曰我將謂你是箇俗漢心頌曰世出世間希有事顯露須憑過量人只將補袞調羹手撥轉如來正法輪徑山杲一著高一著一步闊一步明眼人前猶涉露布鳳棲不在梧桐樹松源嶽事到無心不苟欺烏玄鵠曰尚懷疑自非親見黃頭老爭敢逢人泄漏機虛堂愚王常侍參睦州一日師問何故入院遲公曰看馬打毬所以來遲州云人打毬馬打毬公曰人打毬州云人困麼公曰困曰馬困麼公曰困曰露柱困麼公茫然無對歸至私第中夜忽有省明日見州曰某會淂昨日事也州云露柱困麼公曰困州遂肯之頌曰人困馬困未是困露柱之困始是困好於言下證無常莫向言中尋尺寸百丈若無雙耳聾臨濟爭解領三䪺盡將業識作流傳此道今人棄如糞龍門遠看人騎馬打毬子不覺今朝入院遲官路雪殘春正好江梅著意要題詩懶菴樞靳州三角山法遇菴主嗣溈山因荒亂魁師八山執刃而問和尚有甚財寶師曰僧家之寶非君所冝魁曰是何寶師振威一喝魁不悟以刃加之頌曰師將真寶濟凶人豈謂行恩反害身真寶與伊元不識而今更是好訴貧洞山聰深山深處隨時荒無價之珍不隱藏才遇凶人便分付凶人少鑒返加傷正覺逸菴僧真實濟凶人一喝分明出差莫道賊魁非別者當頭雪刃用來親天目禮魏府興化存獎禪師嗣臨濟師在三聖會裏為首座常曰我向南方行一遭拄杖頭上不曾撥著一箇會佛法底人後大覺聞舉遂曰作麼生得風吹到大覺門裏來師後到大覺為院主一日覺喚院主我聞你道向南方行一遭拄杖頭不曾撥著一箇會佛法底你憑箇甚麼道理與麼道師便喝覺便打師又喝覺又打師來日從法堂過覺云我直下疑你昨日這兩喝師又喝覺又打師再喝覺又打師曰存獎於三聖師兄處學得箇賔主句總被師兄折倒了也願與存獎箇安樂法門覺曰這瞎漢來這裏納敗缺脫下納衣痛打一䪺師於言下薦得臨濟於黃糪處喫棒底道理師後開堂日拈香曰此一炷香本為三聖師兄三聖於我太孤本為大覺師兄大覺於我太賖不如供養臨濟先師頌曰太孤太日杲杲璞玉渾金𢙣種草無負平生雪此冤不如一陳香風掃南岩勝劒為不平離寶匣藥因救病出金南方自古清如鏡何必無端用甲兵雪巖欽興化因後唐莊宗聿河北回魏府行宮詔師問曰朕取中原獲淂一寶未曾有人酬價師曰請陛下寶看帝以兩手舒幞頭腳師曰君王之寶誰敢酬價頌曰君王之寶實難酬興化形言下一籌兩手展開幞頭勑書挂在鳳凰樓北塔祚北蕃王子彎弓射南國將軍仰面看沙上空餘斜影在翩翩直自入雲端白雲端君王之寶誰解尋討不許夜行投明須到莊宗所淂未為真精鑑還他興化老地藏恩君王底事語知音天下傾誠葵藿心拈出中原無價寶不同趙壁與燕金天童覺中原之寶呈興化一𫨻光明難定價帝業堪為萬世師金輪景御四天下展手相呈老比丘至尊之寶敢輕酬滿和氣龍顏恱爭奈胡僧笑點頭上方益中原收至寶合國不能藏一入相如手佳聲滿大唐佛心才中原一寶有來由拶得君王引幞頭到此若無青白眼當機誰敢謾輕酬笑翁堪幞頭舒起君王寶司空見慣興化老千古君臣際會時落花滿地無人掃北海心𭣣得中原無價幞頭拈起露全身勞他興化重酬價八兩元來是半斤尼間林英君王寶自難酬價興化何曾敢借看天地既無私蓋載至今留得鎮中原間極雲興化示衆云今日不用如何若何便請單刀直入興化與你證據時旻德長老出禮拜起便喝師亦喝德又喝師亦喝德禮拜師曰若是別人三十棒一棒也較不得何故為他旻德會一喝不作一喝用便下座頌曰龍虎相交是底時未容擬議已參差分明二喝不作用𨚫使禪人特地疑海印信獰龍出水虎離山四起同旋萬頃煙若具阿那律正眼橫身三界背摩天雲溪恭單刀直入不須論擬議之間賔主分不得放他旻德過須知興化棒頭親鼓山圭暗中携手上高山及至天明各自行無限途中未歸客明明開眼墮深坑徑山杲旻德一喝如雷響興化一喝響如雷錦袍玉帶真瀟灑記得當年老萬回懶菴樞握七星刀尋作者倒司農印對冤讎當陽一句分賔主九曲黃河水逆流南岩勝一喝兩喝全機出沒賔主歷然未免俱瞎半夜摸烏龜明月照積雪雪菴瑾同時照用不同時權實雙行作者知有得雖然亦有失還他龍虎自交馳雪巖欽興化因僧問四方八面來時如何師曰打中間底僧便禮拜師曰昨日赴箇村齋中途遇一陳卒風暴雨𨚫向古廟裏軃避得過頌曰此問非常觸忤人如禽空啄噪荊榛須知興化奔馳疾值雨何曾濕著身洞山聰𭶹浪拏雲勢莫猜漁翁倚棹傍巖隈江邊依舊空歸去帝里同風不到來海印信一不是二不成落花芳草裏啼鶯間雨歇夜初靜片月還從海上生晦堂心一陳狂風暴雨來卻於古廟且間隈雖然打入鬼窟裏吞炭藏身又一回鼓山圭古廟裏頭回避得紙錢堆裏暗嗟吁間神野鬼皆驚怕只為渠儂識梵書徑山杲天生白額南山虎牙爪曾當八面風月落三更穿市過癡人投曉覔行蹤雪堂行剜心剖腹繼傳燈鬼面神頭打葛藤傑出諸方無等匹也知只是赴齋僧南岩勝四方八靣沒邊疆暴雨狂風無處藏古廟裏頭休軃避移舟別有好商量天目禮塞北煙塵終載靜江南花木四時榮不須特地分疆界萬里山河似掌平虛堂愚興化謂克賔維那曰汝不久為唱導之師曰不入這保社師曰會了不入不會了不入曰總不與麼師便打曰克賔維那法戰不勝罰錢五貫設饡飯一堂次日師自白捶曰克賔維那法戰不勝不得喫飯即便出院頌曰二虎爭戰俱用勢力一陷穽中不能返擲若返擲天下獵人無處覔海印信克賔法戰挫英雄興化嚴行振祖風棒下直明無生忍莫教知解入塵籠照覺總丈夫當斷不解斷興化為人徹底漢已後從教眼自開棒了罰錢趂出院真淨文主中主問賔中賔賔主分明到底親有理罰錢無説處太行山下淚霑巾佛國白得失是非都莫問縱橫𭣣放在當人失錢遭罪尋常事休把條章説故新圓通仙克賔興化令雙行白髮通身透頂生穿過衲僧青白眼儘教天下競頭爭佛心才山生鸑鷟師子産狻猊棒下摩醯眼徒誇第一機徑山杲法戰從來許克賔掣旗奪鼓兩分明直須盡法方知愧老漢當年要話行鼓山圭罰錢出院衆人皆見有理難伸風流滿面直饒興化全提未免令行一半這一半明眼衲僧點檢看冶父川漢高拜將務決勝非韓誰敢當茲任赤幡高竪化城降皇在盤兮不在稱南巖勝赫日轟迅雷六月飄霜雪興化老古錐不妨太孤絶金毛哮吼亂峯前百獸聞之皆腦裂懶菴需罰錢出院揚家醜興化聱頭遇克賔父子不傳真妙訣棒頭敲出玉麒麟佛照光興化打克賔一棒一條痕古人雖已往留得典刑存三十年後幾箇知恩尼無著總興化棒頭轟霹靂克賔下走塵煙若無塞外將軍令那得嘉名四海傳誰菴演主賔會合風雲異醉後添杯禮義全棒打自家親骨肉叢林扛鼓返成冤或菴體興化逐克賔觀音戴鬼面靴裏動指頭未免傍人見湛堂深棒頭有路透玄津徹底何曾打克賔雪後始知松柏操夜深方見把針人肯堂充興化打克賔猛虎驀腰騎養子不及父家門一世衰破菴先家法森嚴特異常親生父子沒商量罰錢打了趂出院橄欖點茶滋味長野雲南法戰場開驗克賔解施武略對將軍如何有罪全無當待展奇謀自䇿勛天目禮興化打克賔言親語不親棒頭如雨點敲出玉麒麟瞎驢見雪竇云克賔要承嗣興化罰錢出院且致却須索取這頓棒始得且問諸人棒既喫了作麼生索得雪竇要斷不平之事今夜與克賔雪屈以拄杖一時趕散頌曰克賔維那法戰不勝曾因國難披金甲後來出世法嗣興化不為家貧賣寶刀興化臂健尚嫌弓力軟雪竇眼明猶識陳雲高瞎堂遠興化示衆曰我聞長廊下也喝後架裏也喝諸子汝莫肓喝亂喝直饒喝得興化向虗空裏却撲下來一點氣也無待我蘇息起來向汝道未在何故我未曾向紫羅帳裏撒真珠與汝諸人去在胡喝亂喝作麼頌曰紫羅帳裏撒真珠密意師永會也無摸象衆盲徒亂説當臺古鏡見差殊海印信興化老也大差三十三天上撲下紫羅帳裏撒真珠古也今也誰酬價得一牛還一馬休説人間光照夜不見錦繡銀香囊直至如今成話上方益對衆全提摩竭令豈是間開兩片皮喝下瞎驢成隊走夢中推倒五須彌徑山杲紫羅帳裏撒真珠禪客相逢總掠虛拍手呵呵開口笑釋迦彌勒是他奴鼓山圭興化見同參來才上法堂便喝僧亦喝師又喝僧亦喝師近前拈棒僧又喝師曰你看這瞎漢猶作主在僧擬議師直打下法堂侍者請問適來那僧有甚觸忤和尚師曰他適來也有權也有實也有照也有用及乎我將手向伊面前橫兩橫到這裏却去不得似這般瞎漢不打更待何時侍者禮拜頌曰霹靂驚天地那容掩耳聽須知興化老一半是人情鼓山圭鏌鎁在握天魔膽落明眼衲僧休更卜度徑山杲恰如劊子氣雄豪便向咽喉下一刀五臟肝心皆剖出方知王法不相饒退菴休長松不改四時青縱奪當機幾箇明陳敗不禁苕帚掃眼中曈子面前人劒門分瀲瀲灔灔水光浮不見孤帆不見舟斜陽欲落未落處盡是離人今古愁伊菴權須彌倒卓海水逆流同參相訪作盡冤讎休休明日黃花蝶也愁雪菴瑾驅耕夫牛照即用奪𩚑人食用即照不得同參把手行安知袖裏有穿竅南岩勝興化因僧問軍期急速時如何師曰日料半斤食頌曰離城別閣暗愁時月落星分信馬蹄風掃曉窗林木逈夜深汀岸火光微投子青鎮州寶壽第一世沼禪師嗣臨濟因僧問萬境來侵時如何師曰莫管他頌曰老大梢工慣經歷看風使帆果端的任他海獸作波濤直過如飛沒蹤迹海印信萬境來侵莫管伊干戈元是太平基當時著來時路月下騰騰信歸掩室開寶壽因趙州來師在禪床背面而坐州展坐具禮拜師起身入方丈州𭣣坐具而出頌曰動絃別曲落葉知秋人平不語水平不流只因底無羈絆去住縱橫得自由遁菴演寶壽因僧問訊師曰萬千諸聖盡不出此方丈內曰秪如古人道大千沙界海中漚未審此方丈向甚麼處著師曰千聖見在曰阿誰證明師擲下拂子僧從西過東立師便打僧曰若不久參焉知端的師曰三十年後此話大行頌曰捲則渾崙無縫舒則八面生光百千諸佛同處一方轉機輪於掌握奮大用於當場非獨三十年後面前薝蔔馨香佛燈珣寶壽因胡釘鉸參師問汝莫是胡釘鉸麼曰不敢師曰還釘得虛空麼曰請和尚打破師便打曰和尚莫錯打某甲師曰向後有多口阿師與你點破在胡後到趙州舉前話州曰汝因甚麼被他打曰不知過在甚麼處州曰秪這一縫尚無奈何胡於此有省州曰且釘這一縫頌曰現出虗空眼便花更教打破事如麻直饒指出當堂縫分明鷂子過新羅冶父川直饒釘得這一縫檢點將來非好手可憐兩箇老禪翁𨚫向俗人呈家醜月菴果一縫分明在當頭下手難饒君鉸釘得終是不完全鼓山圭寶壽問僧甚處來曰西山來師曰見獼猴麼曰見師曰作甚麼伎倆曰見某甲一箇伎倆也作不得師便打頌曰舊人相見話衷心借問西山路徑深對衆直言呈伎倆紅爐鍛鍊要真金汾陽昭西山路上有獼猴嘯雨哀風動客愁忽遇此林師子子萬般伎倆一時休中際能寶壽問僧甚處來曰崔禪處來師曰將得崔禪喝來麼曰不曾將得來師曰與麼則不從崔禪來僧便喝師拈棒僧擬議師便打頌曰五湖禪客扣禪關恰似初行學上山騰身欲出青雲外力到峯頭一步難佛鑑勤鎮州三聖院慧然禪師嗣臨濟住後上堂曰我逢人則出出則不為人便下座興化云我逢人則不出出則便為人頌曰騎驢戴笠迎南去躍馬搖鞭向北行兩箇大商俱突曉日高猶聽打三更保寧勇反是羅兮覆是繡弟兄同氣復連枝為人不為成歌曲祖父田園要及時圓通仙城南措大騎驢子市北郎君跨馬兒各各四蹄俱地三春同到金明池佛鑑勤出沒由誰卷舒在我搖舌鼓唇分明話墮京兆府天寧璉陽焰何曾止得渴畫餅幾時充得飢勸君不用栽荊𣗥後代兒孫惹著衣徑山杲湖光瀲灔晴偏好山色溟濛雨亦奇若把西湖比西子淡粧濃抹總相冝佛燈珣人貧多智短馬瘦自毛長獨宿雙峯寺同焚一炷香鼓山圭兩箇孩兒抱花鼓左邊打了右邊舞一曲兩曲無人會歷歷清風動千古懶菴需乍雨乍晴山裏寺或來或去洞中雲滿天星月明如晝此境此時誰欲分德山涓南山鼻蛇觸著兩頭動毒氣要傷人還他貧子弄雪菴瑾黃昏打槳奔城快日午回入港遲夜半相逢兩相喝不知蹉過已多時在菴賢二水分流共一源誰知正語却成偏斷腸不是因芳草破壞家門落一邊戴無為三聖因僧問如何是祖師西來意師曰臭肉來蠅興化云破驢脊上足蒼蠅頌曰水母有骨靈龜無殼瞎驢臭肉來於蠅佛意祖意如山嶽正覺逸二靈龜有殼水母無骨破驢脊上足蒼蠅曹溪古路行人絶破脊驢多臭肉蠅誰知興化不徒行慣從五鳳樓前過手握金鞭賀太平白雲端匝地風光無間違因何不信却生疑老婆為君重指出臭肉團上青蠅飛黃檗勝青青掩映蒼龍窟修竹超然物外物若將修竹比喬松未及喬松老風骨佛鑑勤一團臭肉有商量皮下流芳若麝囊忽若禪人親咬破看來滿口是清香龍門遠三聖到德山才展坐具山曰莫展炊巾這裏無殘羹餿飯師曰縱有也無著處山便打師接住棒推向禪床上山大笑師哭蒼天便下參堂堂中首座號踢天泰問行高士須得本道公驗作麼生是本道公驗師曰道甚麼座再問師打一坐具曰這漆桶前後觸忤多少賢良座擬人事師便過第二座人事頌曰呼為雲吸為雨襲襲清風動寰宇笑哭不是等間聲路見不平應有主要斬不平人不與平人語而今何處見蹤由剔起眉毛看鷂子長靈卓殘羹餿飯無處安著換手捶胸劈頭蓋却兩箇無孔鐵槌一樣無繩自縛佛燈珣南北山相對東西有路分不經場陳裏爭見李將軍木菴永魏府大覺和尚嗣臨濟因僧問如何是本來身師曰頭枕𢖍山腳北嶽頌曰臨濟宗乘會者稀唯有大覺顯大機人問本來身有語頭枕𢖍山北嶽隨洞山聰主山之後案山前下是地兮上是天身手太長衫袴短醉狂贏得樂豐年保寧勇灌溪志間禪師嗣臨濟因僧問久嚮灌溪到來秪見漚麻池師曰汝秪見漚麻池且不見灌溪曰如何是灌溪師曰劈箭急頌曰一𣲖曹溪與灌溪龍行風雨動雲霓峻機箭筈波瀾急撼得毗盧海嶽低涿州克苻道者灌溪參臨濟濟搊住師師曰領領濟拓開頌曰雨散雲𭣣後崔嵬數十峯倚闌頻顧望回首與誰同秀巖瑞定州善崔禪師亦曰崔禪川臨濟州將王令公於衙著張座請師説法師升座拈拄杖曰出來也打不出來也打僧出曰崔禪聻師擲下拄杖曰久立令公伏惟重頌曰鏌鎁橫按寶光寒俠客嘍囉敢正看飛過青霄聲震吼乾坤直得黑漫漫保寧勇大展家風示衆人垂鈎入海釣金鱗遊魚弄水騰波浪船棹俱拋出大津延壽慧十三慣繡羅衣裳自憐紅袖聞馨香人言此是嫁時服含羞刺出雙鴛鴦空叟印襄州歷村和尚嗣臨濟師煎茶次僧問如何是祖師西來意師舉起茶匙僧曰莫秪這便當否師擲匙向火中頌曰煎茶未了人來問拈起茶匙呈似他當初若遇𭣣燕手性命難存爭奈何投子青虎溪菴主嗣臨濟因僧問菴主在這裏多少年也師曰秪見冬凋夏長年代總不記得曰大好不記得師曰汝道我在這裏得多少年也曰冬凋夏長聻師曰閙市裏虎頌曰閙市中心虎能歌不能舞命值木星君不遇羅睺主琅琊覺虎溪老住菴年深都不記閙市心中虎四邊如鼎沸草堂清桐峯菴主嗣臨濟因僧問和尚這裏忽遇大蟲作麼生師便作大蟲吼僧作怕勢師大笑僧曰這老賊師曰爭奈老僧何頌曰見之不取思之千里好箇斑斑爪牙未𬾨君不見大雄山下忽相逢落落聲光皆振地大丈夫見也無𭣣虎尾捋虎鬚雪竇顯滄州米倉禪師嗣臨濟問僧近離甚處曰冀州太湖師曰闍𥠖來時太湖向你道甚麼曰知道米倉路峻師曰到這裏又作麼生曰不異發足時道路師曰闍𥠖已孤太湖去在曰某甲亦不肯和尚恁麼道師曰來時路峻如今路平曰不妨和尚此路師曰漆桶裏漢有甚麼限頌曰發足超方地頭親到遇著嶮峻道途殺活杖子變豹米倉大路平如砥未免漆桶裏著到不搽紅粉也風流大抵還他肌骨好佛燈珣雲山和尚嗣臨濟問僧甚處來曰西京來師曰將得西京主人書來麼曰不敢通消息師曰作家師僧天然有在曰殘羹餿飯誰人肯喫師曰獨有闍𥠖不肯喫僧便作吐勢師喚侍者扶出這病僧頌曰這僧掩耳偷鈴雲山將錯就錯若是碧眼胡兒別有反身一著木菴永睦州刺史陳操尚書見睦州一日與僚屬登樓次見數僧行來一官人曰來者揔是行腳僧公曰不是曰焉知不是公曰待來勘過須僧至樓前公驀喚上座僧皆舉首公謂諸官曰不信道頌曰一語離窠窟千生出蓋纏夜來風雪𢙣木折在巖前雪堂行奪鼓旗驗衲僧便將黑豆換雙睛昔年曾被雪霜苦看見楊花落也驚尼無著總拈得須第一槌銅頭鐵額豈容伊鹽梅楫并霖雨不是斯人更是誰復菴封季咸曾相臺丘子隨變難分亟自逃輸與高樓凝望者炯然明可察秋毫虛堂愚陳尚書問睦州看甚麼經州云金剛般若經公曰六朝翻譯師看底是苐幾朝州拈起云一切有為法如夢幻泡影頌曰六朝翻譯傳來妙到頭未悟當時竅須信枝頭老鳳凰春來翻作黃鶯呌正堂辨晉州霍山景通禪師嗣仰山初參仰山山閉目坐師翹起右足曰如是如是西天二十八祖亦如是中華六祖亦如是和尚亦如是景通亦如是山起來打四藤條師因此自稱集雲峯下四藤條天下大禪佛頌曰集雲峰下四藤條幾險當時打折腰堪笑後來稱猛將只知空説霍嫖姚野軒遵竺國支那咸印定更無毫髮可參差眼橫鼻直喧天下一頓殘羹永不飢保寧勇當場翹足有來由四下藤條未足酬又向霍山門下去見機雖足未風流地藏恩集雲峯下四藤蒿打破潼關路一條似鶴似雲天地外如龍如鳳在煙霄圓通仙二藤條喫了任間遊未到牢關未肯休打鼓打鍾俱是令知機識變有誰儔子陵灘水急如絃摸得黃魚縮項鯿提向市中頻索價他家不直半文錢佛心才強盜遭逢𢙣抵家賊贓才敗別無他山藤徹骨令甘伏反與渠儂貼面花或菴體千年萬嵗老枯椿鐵杵銅槌任擊撞且在爛泥堆裏立咄寶葉源霍山因行者問如何是佛法大意師乃禮拜者曰和尚為甚麼禮俗人師曰汝不見道尊重弟子頌曰黃金打作鍮石筯白玉碾出象牙梳黑漆崑崙多伎倆海中拾得夜明珠慈受深袁州仰山南塔光湧禪師嗣仰山因僧問曹溪意旨如何師曰一鎖入寒空頌曰重峯層仞插寒空塔鎖深雲勢莫窮千古松聲來有韻萬年溪水去無蹤投子青南塔湧向火次有僧來參師曰一言説盡山河僧便問如何是一言師以火筯插向爐邊却𭣣舊處頌曰一句稱提萬象分摩竭空自掩重門當初衲子微開眼插筯爐邊當火焚投子青杭州無著文喜禪師嗣仰山住五臺華嚴寺至金剛窟禮謁遇老翁牽牛行邀師入寺翁曰近自何來師曰南方曰南方佛法如何住持師曰末法比丘少奉戒律曰多少衆師曰或三百或五百師却問此間佛法如何住持曰龍蛇混雜凡聖同居師曰多少衆曰前三三後三三日晚遂問翁擬投一宿得否曰汝有執心在不得宿師曰文喜無執心曰汝曾受戒否師曰受戒久矣曰汝若無執心何用受戒師辭退翁令童子相送師問童子前三三後三三是多少童召大德師應諾童曰是多少師復問此為何處曰此金剛窟般若寺也師悽然悟彼翁者是文殊也不可再見即稽首童子願乞一言為別童説偈曰面上無瞋供養具口裏無瞋吐妙香心裏無瞋是寶無垢無染是真常言訖均提童子與寺俱隱頌曰廓周沙界聖伽藍滿目文殊接話談言下不知開佛眼回頭只見翠山巖明招謙顧問南方住若何對云三五衆非多吉祥自述龍蛇混三三之説告和和無著未明重話會均提為指不仙陀金剛背後看名字滿目荒山不奈何汾陽昭千峯盤屈色如藍誰謂文殊是對談堪笑清涼多少衆前三三與後三三雪竇顯堪笑前三與後三當初相對語喃喃却因無著分明見從此清涼沒可參佛印元二樓臺雖有額全無試問頑童起創初忽指金剛看背後年衰多被鬼揶前後三三問若干應機召發轉顢頇如今大有如斯者負鉢腰囊到處摶正覺逸三積翠千峯倚半空龍蛇凡聖混其中其中凡聖知多少前後三三數莫窮寺額突然耀指端大悲千眼莫能觀自從一覷金剛肯直至如今作野盤前後三三是多少大事光輝明皎皎回頭不見解空人滿目白雲臥荒草道吾真聖者由來不可陪相逢相問豈安排三三前後輝今古一句無私振九垓照覺總前三三與後三三算數籌量卒未諳芳草萋萋煙景裏鷓鴣啼處是江南地藏恩文殊前後答三三獨泛輕舟過海南洪浪波心看水勢一輪明月印寒潭雲溪恭青山門外白雲飛緑水溪邊引客歸莫怪坐來頻勸酒自從別後見君龍門遠三三之旨極幽深老漢當牙下一針為報禪徒應諦𥊸船乃隨流石乃沉般若柔前後三三不失宗逈超千聖數難窮金剛腦後全軒露疊疊青山鎖翠空丹霞淳無著文殊不易逢相逢各自問家風清涼海衆知多少前後三三數莫窮本覺一腰金上太行賊眼盡驚慞不因遭毒手誰肯夜燒香月堂昌二寬鞋著瘦腳短袖入長臂竿木既隨身逢場還作戲前三三後三三一時堆在簷頭擔到得家中重點檢目前包褁露毿毿前後三三謝師指南龍蛇躍躍虎視耽耽擬數看數欲談何談均提謾有垂鞭意象王蹴亦奚堪投子舒陌路相逢眼裏塵低頭禮拜昧天真起來不見文殊現打破大唐無一人秀岩瑞前三三與後三三不可承當不可參更問清涼多少衆月移影落寒潭月林觀佛法初無北與南何須對面立玄談文殊固是能機變前後分踈落二三雲衲慶無著因老翁邀師入寺命坐對談翁呼童子致茶并進酥酪師納其味心意豁然翁拈起玻璃盞問曰南方還有這箇否師曰無曰尋常將甚麼喫茶師無對頌曰文殊大士托玻𬎙遂問南方有箇奇無著忽言無這箇誤他多少老闍𥠖至今猶未知端的擡手拈茶不用疑汾陽昭自別南方涉路岐喫茶處處用玻如何恰到清涼寺問著元來總不知正覺逸南方不可離須無著因何却道無寄語後來禪子道喫茶拈起莫生踈佛印元玻𬎙寶盞對君檠茶味雖濃夢不醒更問三三多少衆爭教人不辨輸贏象田卿五臺凝坐思遲遲白日青天被鬼迷最苦一般難理會玻𬎙盞子喫茶時象潭泳無著因參仰山頓了心契令充典座文殊嘗現於粥鑊上師以攪粥篦便打曰文殊自文殊文喜自文喜文殊乃説偈曰若瓠連根苦甜瓜徹蒂甜修行三大劫却被老僧嫌頌曰爍迦羅眼頂門開悟了不須師更來打落粥鍋休説偈修行須信禍為胎象田卿
