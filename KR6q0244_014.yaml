body:
  text: 僧録司右闡教兼靈谷禪寺住持淨戒重校祖師機緣六祖下六世大光誨一則九峯十則鳳翔石柱一則湧泉欣二則雲蓋元一則覆船荐一則張拙一則洛浦安十二則韶山普五則天蓋幽一則大原海湖一則岩頭奯十三則雪峯存三十一則高亭簡一則潭州大光山居誨禪師嗣石霜因僧問秪如達磨是祖否師曰不是祖曰既不是祖又來作甚麼師曰秪為汝不薦曰薦後如何師曰方知不是祖頌曰少林續𦦨事堪奇臘夜梅開雪後枝黃蘗昔年曾有語大唐國裏沒禪師霞淳覿面全提少室令當機不薦過新羅清風樓上逢知己撥動烟塵不奈何足庵鑒瑞州九峯道禪師嗣石霜因僧問祖祖相傳復傳何事師曰釋迦慳迦葉富曰如何是釋迦慳師曰無物與人曰如何是迦葉富師曰國內孟嘗君曰畢竟傳底事作麼生師曰百嵗老人分夜燈頌曰寂光影裏現全身貴異天然逈出倫家富兒奴偏得力夜分燈火照西鄰霞淳九峯因僧問如何是學人自己師曰更問阿誰曰便恁麼承當時如何師曰須彌還更戴須彌頌曰自家冷暖自家知祖意西來更問誰全體承當全體是須彌頂上戴須彌石溪月九峯因僧問西天坐夏以蠟人為驗多有得道果者未審此間如何師曰頭戴午夜月腳黃金地曰此人還轉也無師曰爭得不轉曰如何轉師曰今世已聞龍退骨頌曰午夜山房月色深十分明白墮功勛撥開向上通天竅煙嶂重重不見人自得暉九峯因僧問十二時中如何合道師曰無心合道曰畢竟如何師曰土上覔泥猶自可波中求水實堪悲頌曰牽驢飲江水鼻吹波浪起岸上蹄蹄水中觜連觜方庵顯九峯因僧問如何是不壞身師曰正是曰學人不會請師直指師曰適來曲多少頌曰不壞身正是正是不壞身適來曲多少扭得鼻頭辛石溪月九峯因石霜遷化衆請首座住持師時為侍者白衆問首座曰先師道休去歇去冷啾啾去一條白練去古廟香爐去一念萬年去明什麼邊事會得即住持會不得不可首座對曰明一色邊事師曰與麼則不會先師意在座曰但裝香來香煙斷處若去得即會先師意若去不得即不會師遂焚香香炷未斷座遂脫去師拊首座背曰坐脫立亡即不無先師意未夢見在頌曰張家養得數箇兒大者效爺治家業中有一男藝最精氣宇如王威德別別別翻滄海兮不顧驪龍喝散白雲兮不羡明月海印信石霜繼嗣擇高才上座貪程去不回只愛寒灰無焰起豈知枯木放花開侍者實堪哀先師大意雖明得未免長拖破草鞋佛慧泉世間何事最堪悲無孔由來是鐵鎚爐冶不能烹得破任教千古與風吹保寧勇坐亡立脫數如麻幾箇於茲路不差翻憶石霜曾有語不光華處盡光華智海清一片虛空亘古今麟龍頭角競踈親坐亡立脫知多少鐵樹花開別是春開福寧帶角披毛異類身寒灰枯木眼中塵雖然未會先師意爭奈臨行一著親霞淳枯木堂中第一人坐觀成敗枉精神可憐明一色邊事直至而今沒眼筋寶峯照雖然一箭定天山百戰場中出手難莫道古祠香火斷神前自有酒臺盤上方益座元脫去有生機侍者因何不肯伊若謂石霜明一色似將掃帚畫蛾眉地藏恩香煙淡淡風飄處首座凝凝坐脫時不是久參侍者石霜巴鼻有誰知張無盡本分漁人一釣舟千波萬浪裏遨遊兒孫不慣風濤惡走入蘆花不轉頭慈受深脫去還如臂屈伸先師旨趣得來親貪他一粒多年粟失却家中萬斛義重天倫侍者平生肝膽若為論芳草渡頭輕舉步等間身在杏花村佛燈珣石霜一宗親傳九峯香消脫去正脉難通月巢鶴作千年夢雪屋人迷一色功坐斷十方猶點額密移一步看飛龍天童覺涅槃城裏未為親帶角披毛始是真相逢盡道休官去林下何曾見一人大洪遂一片虛凝絶謂情白雲消散彩霞橫行人莫怪貪程速坐守寒巖異草青雲岩因石人不怕獅子吼須彌頂上反筋斗滄溟竭盡正三更生鐵崑崙雲外走雪竇宗死中得活人無數活中得死古來稀只知枯木回春早蹉過寒灰再焰時侍者也是癡雖然會得先師意未免全身陷虎機圓悟勤萬丈寒潭徹底清霜天午夜欲生冰釣魚要擲金鱗餌撥轉蘆篷向月明正堂辨九峯因僧問人人盡道請益未審師還拯濟也無師曰汝道巨嶽還曾乏寸土麼曰四海參尋當為何事師曰演若迷頭心自狂曰還有不狂者麼師曰有曰如何是不狂者師曰突曉途中眼不開頌曰寒谷生洪律全超極濟功園林變花柳何必待春風方菴顯巨嶽何曾之寸土演若迷頭狂未回參尋喜有得力句突曉途中眼未開且居門外石溪月九峯因僧問如何是把定乾坤眼師曰乾坤在裏許曰乾坤眼何在師曰正是乾坤眼曰適來為什麼道乾坤在裏許師曰若不恁麼髑髏前見鬼無數五燈會元稍異頌曰識問不亂答識答不亂問問答有來由直下明知見果然明得破不被髑髏換奉勸參學人子細參詳看大圓智一拳拳倒黃鶴樓一躍躍反鸚鵡洲有意氣時添意氣不風流處也風流虛堂愚九峯因僧問古人道因真立妄從妄顯真是否師曰是曰如何是真心師曰不雜食是曰如何是妄心師曰攀緣起倒是曰離此二途如何是本體師曰本體不離曰為甚麼不離師曰不敬功德天誰嫌黑暗女頌曰是真是妄披金擇沙同門出入宿世冤家方菴顯九峯示衆曰常住法身不生不滅僧問既是不生不滅為什麼六道輪回師曰為有心故曰以何方便當證法身師曰以虛空心合虛空理曰證後如何師曰任從三界轉徒聽四生奔復曰會麼曰不會師曰禮拜著頌曰精金須百鍊百鍊色不回學道貴無心無心道即更深秋夜月古廟香爐灰法身無一物山嶽空崔嵬南堂興鳳翔府石柱禪師嗣石霜師遊方時到洞山時和尚垂語曰有四種人一人說過佛祖一步行不得一人行過佛祖一句說不得一人說得行得一人說不得行不得阿那箇是其人師出衆曰一人說過佛祖行不得者秪是無舌不許行一人行過佛祖一句說不得者秖是無足不許說一人說得行得者秖是函蓋相稱一人說不得行不得者如斷命求活此是石女兒擔枷帶鎖山曰闍𥠖分上作麼生師曰該通分上卓卓寧彰山曰秖如海上明公秀又作麼生師曰幻人相逢拊掌呵呵頌曰海底泥牛耕白月雲中木馬驟清風胡僧懶棒西乾鉢半夜乘舟過海東丹霞淳台州湧泉景欣禪師嗣石霜因僧問如何是相傳底事師曰龍吐長生水魚吞無盡漚曰請師挑硩師曰擂鼓轉船頭棹穿波底月頌曰依依半月沉寒水耿耿三星落碧巑昔日雲巖曾漏泄金輪王子寶花冠丹霞淳湧泉欣因唐武宗廢教在院看牛時有彊德二禪客到於路次見師騎牛不識乃云蹄角甚分明爭奈騎者不識師驟牛而去二禪客相次憩於樹下煎茶師回下牛近前問訊與坐喫茶師乃問二禪客近離甚處云那邊師曰那邊事作麼生禪客提起茶盞師曰此猶是這邊那邊事作麼生二人無對師曰莫道騎牛者不識好頌曰芳草漫漫豈變秋牧童白牯恣優游異中有路人難見却謂騎牛不識牛丹霞淳潭州雲蓋山志元禪師嗣石霜因僧問石霜萬戶俱閉即不問萬戶俱開時如何霜曰堂中事作麼生僧無對經半年方始下一轉語曰無人接得渠霜曰道即大殺道秖道得八成曰和尚又且如何霜曰無人識得渠師聞知乃禮拜乞為舉霜不肯師乃抱霜上方丈曰和尚若不道打和尚去在霜曰得在師頻禮拜霜曰無人識得渠師於言下頓省頌曰古殿巖開月鎖松霜凝雪露韻無窮星前人臥千峯室佛祖無因識得儂投子青無人接得渠遺逼馬相如果來橋上也記得柱頭書無人識得渠棊局醉樵夫回頭斧柯爛大海亦成枯天童覺二接得與識得誰復較錙銖若問堂中事堂中事轉踈只如雲蓋悟去又作麼蘇嚕蘇嚕最菴印福州覆船山洪荐禪師嗣石霜因僧問抱璞投師師還接否師以手拍香臺僧禮拜師曰禮拜則不無其中事作麼生僧却拍香臺師曰舌頭不出口頌曰舌頭不出口三三成九九算到香臺邊彼此落人後月堂昌張拙秀才見石霜因禪月大師指參石霜霜問何姓曰姓張名拙霜曰覔巧了不可得拙自何來公忽有省呈偈曰光明寂照遍河沙凡聖含靈共我家一念不生全體現六根才動被雲遮斷除煩惱重增病趣向真如亦是邪隨順世緣無𦊱礙涅槃生死等空華頌曰老倒石霜無忌諱當頭一句曾提起只因當日老婆心千古寥寥掛唇齒佛鑑勤臚傳不羡擅嘉聲錯認山河作眼睛巧拙一時俱裂破斷除煩惱病重增笑翁堪進前峭壁三千丈退後懸崖幾萬重重大唐張拙老鐵鎚無孔舞春風寶葉源澧州洛浦山元安禪師嗣夾山久為臨濟侍者一日辝去濟升堂曰臨濟門下有箇赤梢鯉魚搖頭擺尾向南方去不知向誰家虀甕裏淹殺師游歷罷直往夾山卓菴經年不訪夾山山修書令僧馳往師接得便坐却再展手索僧無對師便打曰歸去舉似和尚僧回舉似山曰這僧若開書三日內必來若不開書斯人救不得也師果三日後至見山不禮拜乃當面叉手而立山曰雞捿鳳巢非其同類出去師曰自遠趨風請師一接山曰目前無闍𥠖此間無老僧師便喝山曰住住且莫草草匆匆雲月是同溪山各異截斷天下人舌頭即不無闍𥠖爭教無舌人解語師佇思山便打因茲服膺興化代云但知作佛莫愁衆生頌曰無伴石人夜入山雪籠紅頂緑衣寒喝開劫肇三峯頂捧出金襴對日看投子青喝下承當草已深却來蘭浦訪知音溪山雲月何嘗異今古誰人鑑此心成枯木執侍巾瓶二十年搖頭擺尾出林泉悠悠直往南方去虀甕淹來得穩眠雲居祐搖頭擺尾赤梢鱗徹底無依解轉身截斷舌頭饒有術拽回鼻孔妙通神夜明簾外兮風月如晝枯木巖前兮花木長春無舌人無舌人正令全提一句新獨步寰中明了了任從天下樂欣欣天童覺洛浦因僧問供養百千諸佛不如供養一箇無心道人未審百千諸佛有何過無心道人有何德師曰一片白雲橫谷口幾多歸鳥盡迷巢頌曰拾得踈慵非覺曉寒山懶墮不知歸聲前一句圓音美物外三山片月輝霞淳是佛由來尚涉功明心方與道相同花開花落緣何事盡屬無私造化中成枯木百千諸佛眉彎曲無證無修眼搭癡著未消連底凍一時認作碧琉璃佛智裕故山岌岌鎖寒烟未肯將心輕授傳玉女夜尋無字印石人遙指月明前自得暉洛浦因僧問學人擬歸鄉時如何師曰家破人亡子歸何處曰恁麼則不歸去也師曰前殘雪日輪消室內游塵遣誰掃乃有偈曰决志歸鄉去乘船渡五湖舉篙星月隱停棹日輪孤解纜離邪岸張帆出正途到來家蕩盡免作屋中愚頌曰太平鄉國路空賖歸興悠悠思莫涯撒手到家何所有琉璃寶殿鎖空華丹霞淳洛浦因僧問如何是一大藏教𭣣不得者師曰雨滋三草秀片玉本來輝頌曰畢鉢巖前曉帶春香風時結鷲峯層須知玉像瓶中塔別有輝天照地燈投子青洛浦因僧問一毫吞盡巨海於中更復何言師曰家有白澤之圖必無如是妖怪保福別云家無白澤之圖亦無如是妖怪頌曰巖前雖有雲千頃戶內殊無半夜燈極目危巒今古宿暮天斜照碧層層丹霞淳洛浦因僧問如何是祖師西來意師曰青嵐覆處出就藏鋒白月輝時碧潭無影頌曰群花未發梅先拆萬木凋零柏轉奇雲淡不彰篩月影烟輕那露引風枝丹霞淳洛浦因龐居士禮拜起曰仲夏毒熱孟冬薄寒師曰莫錯曰龐公年老師曰何不寒時道寒熱時道熱曰患聾作麼師曰放你三十棒曰啞却我口塞却你眼頌曰直下啞却我口分明塞却你眼由來洛浦龐公未出睦州擔板覿面全提照古今冬寒夏熱憑誰揀靈源清洛浦因僧問祖意教意是同是別師曰日月並輪輝誰家別有路曰恁麼則顯晦殊途事非一槩師曰但自不亡羊何須泣岐路頌曰月篩松影高低樹日照池心上下天赫赫炎空非卓午團團秋夜不知圓丹霞淳洛浦因僧問如何是佛法大意師曰雲覆孤峯峯不白雨滋石筍筍初生頌曰海底龍吟雲雨潤林中虎嘯谷風清莫言滿路生荊𣗥况是貧家少送迎丹霞淳洛浦因蛤溪道者相訪師問自從犂溪相別今得幾年曰和尚猶記得昔時事師曰見說道者總忘却年月也曰和尚住持事繁且容子細看師曰打即打會禪漢曰某甲消得師曰道者住山事繁頌曰這般消息不尋常蟾桂枝枝有遠香昨夜姮娥呈巧妙眼睛直上繡鴛鴦丹霞淳洛浦因僧問衆手淘金誰是得者師曰拳中舊寶不揀披沙曰恁麼則展手不逢也師曰莫將鶴唳擬作鶯啼頌曰淘金豈假披沙得石觸波瀾猶費力露柱三更忽放光此時未審何人識霞淳洛浦示疾十二月一日告衆曰吾非明即後也今有一事問汝等若道這箇是即頭上安頭若道不是即斬頭求活第一座對曰青山不舉足日下不挑燈師曰是甚麼時節作這箇語話時有彥從上座對曰離此二途請和尚不問師曰未在更道曰彥從道不盡師曰我不管汝盡不盡曰彥從無侍者祗對和尚師便休至夜令侍者喚從問曰闍𥠖今日祗對甚有道理汝合體得先師意先師道目前無法意在目前不是目前法非耳目之所到且道那句是賔那句是主若擇得出分付鉢袋子曰彥從不會師曰汝合會曰彥從實不會師喝出乃曰苦苦玄覺云且道從上座實不會是怕見鉢袋子粘著伊頌曰餌雲鈎月釣清津年老心孤未得鱗一曲離騷歸去後汨羅江上獨醒人天童覺紙衣下事不假胞胎懸崖撒手襁褓嬰孩涅槃會上道場開單傳直指狀元來南堂興洛京韶山寰普禪師嗣夾山因僧問如何是韶山境師曰古今猿鳥呌翠色薄烟籠曰如何是境中人師曰退後看頌曰最好韶山境烟籠翠色輕欲描描未就猿鳥一聲聲石溪月韶山因遵布衲訪師在山下相見遵問韶山路向甚麼處去師以手指曰鳴那青青黯黯處去遵近前把住曰久嚮韶山莫便是否師曰是即是闍𥠖有甚麼事遵曰擬伸一問師還答否師曰看君不是金牙作爭解彎弓射蔚遲曰鳳凰直入烟霄去誰怕林間野雀兒師曰當軒畫鼓從君擊試展家風似老僧曰一句逈超十聖外松蘿不與月輪齊師曰饒君直出威音外猶較韶山半月程曰過在甚處師曰倜倘之辭時人知有曰恁麼則真玉泥中異不撥萬機塵師曰曾般門下徒施巧曰學人則恁麼未審師意如何師曰玉女夜拋梭織錦於西舍曰莫便是和尚家風也無師曰耕夫製玉漏不是行家作曰此猶是文言如何是和尚家風師曰橫身當宇宙誰是出頭人遵無語師遂同歸山才人事了師召近前曰闍𥠖有衝天之氣老僧有入地之謀闍𥟖橫吞巨海老僧背負須彌闍𥟖按劒上來老僧掗鎗相待向上一路速道速道曰明鏡當臺請師一鑒師曰不鑒曰為甚不鑒師曰水淺無魚徒勞下釣遵無語師便打頌曰趨時適變隨物窮通鴻鵠之志誰辨雌雄韓侯未遇布衲家風三秦席卷非無計忠義何勞憶蒯通方庵顯韶山因僧問是非不到處還有句也無師曰有曰是甚麼句師曰一片白雲不露醜頌曰一片孤雲不露醜白雲兒倚青山父鶴巢露滴夢初回新月半鈎升萬戶自得暉獨向滄溟截衆流等閒舞掉擲金鈎白雲不露烟波闊橫笛一聲天地秋木庵永韶山因僧問如何是和尚家風師曰絶頂無根草無風葉自搖頌曰妙峯孤頂偏肥膩天産靈苗不觸地翠葉無風常自搖清香那逐春光媚丹霞淳韶山因僧到參禮拜起立師曰大才藏拙戶僧過一邊立師曰喪却棟梁材頌曰叉手須知已隔津更重進步轉漂淪頑銅若作黃金貨秪可瞞他無眼人丹霞淳鳳翔府天蓋山幽禪師嗣夾山有一院名無垢淨光造浴室有人問既是無垢淨光為甚麼却造浴室僧無語後請師代師曰三秋明月夜不是騁團圓頌曰雖然答盡深深意爭奈投機句未親欲會本來無垢的更須入水見長人丹霞淳太原海湖禪師嗣夾山因有人請灌頂三藏供養敷座訖師乃就彼位坐時有雲涉座主問曰和尚甚麼年行道師曰座主近前來涉近前師曰秪如憍陳如是甚麼年行道涉茫然師喝曰這尿床鬼頌曰多是從人學得來一生空把口胡開欲窮此岸虛明地七佛前前總不該丹霞淳鄂州巖頭全奯禪師嗣德山一日參德山方跨門便問是凡是聖山便喝師禮拜有人舉似洞山山曰若不是奯公大難承當師曰洞山老人不識好惡錯下名言我當時一手擡一手搦頌曰巖頭老漢凡聖孰辨半僧半俗可貴可賤三文取箇黑撈波江邊相喚摝蝦蜆法雲秀平川走兔放蒼鷹一搦便啖雙眼睛毒手奪來人買去奈何斤兩未分明保寧勇一喝驚天動地雷海翻太華洞然開巖頭膽喪魂飛也謾道當時手搦擡踈山如好手呈機不露鋒慣將雙劒定雌雄忽雷迸出驚天地華嶽三峯倒卓空湛堂深大鵬風蒼龍出海手擡手搦日上月下霜雪嚴凝識嵗寒雙陸盆邊須喝采最菴印前箭猶輕後箭深無限平人被陸沉箇裏豁開天地眼吹毛拈起任橫行木菴永巖頭初參德山展坐具禮拜次山以拄杖挑却坐具於階下師下階拾起搭向皆上便去參堂山曰不肯子放只肯子𭣣頌曰動絃別曲葉落知秋不肯子放只肯子𭣣來年更有新條在惱亂春風卒未休遁菴演巖頭示衆曰吾教意如塗毒鼓擊一聲遠近聞者悉皆喪身失命時有小嚴上座出問云如何是塗毒鼓師兩手按膝亞身云韓信臨朝底頌曰佛法無情報爾曹忽生忽殺在吹毛若教韓信得妙訣自是深明防漢高南岩勝巖頭因僧問古帆不掛時如何師曰後園驢喫草頌曰槌打不碎火燒不著天上人間何處安泊阿呵呵是什麼莫咬破須爛嚼海印信古帆不掛是巖頭月冷風高下直鈎誰見後園驢喫草脫籠卸䭾飽齁齁大洪遂後園驢喫草一老一不老驀地撞出來鬪湊得恰好徑山杲後園驢喫草莫隨言語討跳上驀腰騎來往長安道鼓山圭風信不來春色老却憶後園驢喫草滿天明月贈行人野客溪邊歸路早楚方安後園驢喫草可憐無限虛生老半夜盲人問故鄉不知身在長安道雪竇宗後園驢喫草蘆花輥雪飛霜前雙白鴈孤影落天池塗毒䇿古帆未掛時後園驢喫草日短苦夜長行人須及早雪菴瑾巖頭因僧問古帆掛後如何師曰小魚吞大魚頌曰古帆掛後更何疑學問依前又是迷大小二魚俱一海爭奈鈎頭餌不齊汾陽昭小魚吞大魚直路太縈紆古帆休更問處處得逢渠徑山杲小魚吞大魚門上釘桃符邪魔俱不入佛法也消除鼓山圭的的古帆已掛後小魚吞却大頭魚雖然李廣運神箭自古張顛解草書照堂一不動蒲帆問一言大魚却被小魚吞直從意外超唇吻始信巖頭無腦門天目禮巖頭因僧問塵中如何辨主師曰銅砂鑼裏盛油頌曰塵中辨主最難明千人萬人少一惺銅砂鑼油今古淨與君却眼中釘汾陽昭塵中辨主眼分明特地尋方更點睛堪笑𦒿婆雖瞑眩至今南北絶人行佛印元礎潤天將雨雲開月正明漁翁間引釣牽動一潭星海印信銅砂鑼裏滿盛油正是毗盧印後收更有塵中辨得主太平將將盡封侯雲溪恭銅砂鑼裏油清淨照見塵中舊主人寄語禪人猛參取莫教孤負此生身草堂清終日廛中走廛中渾大有堪笑五湖人衲衣貧抖擻大溈智銅砂鑼裏滿盛油生菜還他蘿蔔頭但看來年正月半家家門首掛燈毬佛鑑勤頂起砂鑼時身心都不見西風一陳來落葉兩三片塗毒䇿村飲夜歸來健倒三四五摩挲青莓苔莫瞋驚著汝息菴觀銅砂鑼裏滿盛油潦倒巖頭不識羞却向蟭螟眼睫上樓頭浪宕逞風流空叟印百萬雄兵入漢關威如猛虎陳如山單刀直取顏良首不是關公也大難無境徹塵中辨主問巖頭心識如何會得休鼻孔眼睛都要見銅砂鑼裏滿盛油橫川珙巖頭問欽山如何是真言欽曰南無佛陀耶頌曰隨機有問隨機答不是禪兮不是玄後代無端翻譯出却將梵語作唐言退耕寧巖頭凡有所問只噓一聲頌曰龍臥碧潭靜雲收皓月圓七星光燦爛誰薦未生前大洪遂巖頭因僧問路逢猛虎時如何師曰拶頌曰巖頭一拶虛空迸裂父子不傳神仙妙訣破菴先巖頭示衆云大凡唱教須從無欲中流出三句只是理論咬去咬住欲去不去欲住不住或時一向不去或時一向不住頌曰三文買箇撈波子摝蜆摝蝦經幾年逆順短長休要說誰家屋裏竈無烟虛堂愚巖頭值沙汏於鄂渚湖邊作渡子兩岸各掛一板有人過渡打板一下師曰阿誰或曰要過那邊去師乃舞棹迎之一日因一婆抱一孩兒來乃曰呈橈舞棹即不問且道婆手中兒甚處淂來師便打婆曰婆生七子六箇不遇知音秪這一箇也不消淂便拋向水中頌曰買賣交關直須當價若少分文定遭行罵休行罵遠近聞之成話欛海印信時展家風與衆殊探身虎穴有功夫拈橈擊處留無計夜靜同誰泛五湖三祖宗親兒弃了更無親撒手歸家罷問津呈橈舞棹波中客休向江頭覔渡人真如哲二老來無纍亦無因獨寢高堂只此身除却江中混波客復誰還是不羈人咄箇老婆親兒不奈何富嫌千口少貧恨一身多楮衲秀舞棹呈橈意自殊相逢江上話程途親兒擲了獨歸去春水溶溶碧滿湖智海普融平舞棹呈橈古渡頭婆婆相見問來由何人𢬵得親生子拋向江心更不𭣣上方益鄂陽江口擲釣絲摝蜆撈蝦不計時驀被老婆相借問藂林千古振雄規如今過在邪師客擺手相逢論棄兒意在目前如會淂莫信傍人說是非佛燈珣借路經過常式事誰知祖禰纍兒孫婆婆耐恨江頭棄留得佳聲四海聞月菴果親兒棄了復何言月在波心印碧天獨有一身無繫纍困眠醒坐任隨緣踈山如鄂陽江上垂鈎線時節相逢錦鱗現拈來信手任縱橫逐浪隨波無顧戀大溈智一子親生步步隨呈橈舉棹指人歸老婆遭打機先露海嶽掀翻動四維簡堂機一葉扁舟泛渺茫呈橈舞棹別宮商山雲海月俱拋棄贏得莊周蝶夢長尼無著揔相逢把手上高峰四顧寥寥天宇空一曲漁歌人不會蘆花飛起渡頭風無菴全舞棹呈穘逢賊扣舷三下親擒捉只這一枚都𩗺却棹歌歸去風濤落朴翁銛從來六箇不知音一箇全拋惡浪深義斷情忘無處覔三千剎海冷沉沉天目禮鄂渚渡頭窮鬼子全機錯在扣舷時何如別下一轉語救取婆婆苐七兒南叟茂舞棹呈橈鄂渚邊驗人何苦結生冤自從賺了婆拋子誰敢𢬵身上渡船梓巖玉巖頭在鄂渚湖三文買箇黑撈波每日撈蝦摝蜆且恁麼過時僧舉似雪峯峰云窮鬼子道他快活也不徹頌曰且於湖伴撈蝦蜆不向滄溟釣巨鼇一葉扁舟一簑笠間眠間坐任風濤海印信野水舟橫芳草渡人來舞棹或呈橈撈蝦摝蜆隨時過却向何時得六鼇水菴一巖頭因沙汰在甘贄家過夏補衣次贄行過師以針作札勢贄遂慗衣欲謝妻問云作什麼贄云說不得妻云也要大家知贄舉前話妻云此去三十年後須知一回飲水一回噎女子聞云誰知盡大地人性命被奯上座劄將去也頌曰針頭札去幾人知婦兒女子莫猜疑聖凡命脉果何在以拂子聲禪序角云向此須明上上機長靈卓無孔笛子兩頭吹韻出青霄徹九維可憐一對冤家種人人鼻孔大頭垂佛燈珣不點自行不撥自轉伎倆天然機輪如箭如今分付當行家百嵗光陰已不多若能直下猛提取天上人間爭奈何巳菴深夜半三更來討火我罵你兮你罵我相喚相呼歸未歸也有無衣草裏坐虛堂愚福州雪峰義存禪師嗣德山初參德山問從上宗乘學人還有分也無山打一棒曰道甚麼師曰不會至明日請益山曰我宗無語句實無一法與人頌曰此疾懷來沒量時尋醫求卜過多師濃煎一服通神散血汗滂流徹四肢保寧勇是法平等無高下伊余有分必相亞雖無一法輕與人棒下龍蛇從變化雲巖因雪峰與巖頭欽山至澧州鼇山鎮阻雪頭每日打睡師一向坐禪一日喚頭曰師兄師兄且起來頭曰作甚麼師曰今生不著便共文邃箇漢行腳到處被他纍今日到此又只打睡頭喝曰噇眠去每日床上坐恰似七村裏土地他時後日魔魅人家男女去在師點胸曰我這裏未穩在不敢自謾頭曰我將謂你他日向孤峰頂上盤結草庵播揚大教猶作這箇語話師曰我實未穩在頭曰若實如此據你見處一一通來是處與你證明不是處與你剗却師曰初到鹽官見上堂舉色空義得箇入處頭曰此去三十年切忌舉著又見洞山過水偈曰切忌從他覔迢迢與我踈渠今正是我我今不是渠頭曰若與麼自救也未徹在師又曰後問德山從上宗乘中事學人還有分也無山打一棒曰道甚麼我當時如桶底脫相似頭喝曰你不聞道從門入者不是家師曰他後如何即是頭曰他後若欲播楊大教一一從自己胸襟流出將來與我蓋天蓋地去師於言下大悟便作禮起連聲呌曰師兄今日始是鼇山成道頌曰說盡平生去住因到頭難遇赤心人忽然自肯成家業瓦礫拈來也是成枯木鼇山成道足人傳莫是從前話未圓賴有玄沙知始末遍身紅爛在漁船龍門遠丈夫淩勵志英雄向外馳求枉用功到得鼇山開眼覷方知屋裏用無窮佛燈珣孤村陋店雪紛紛平地無風起浪痕醜拙只因藏不得胸襟流出蓋乾坤鐵山仁二三回九度太顢頇到底須尋舊路還待得鼇山消積雪至今平地起波瀾困有眠床飢有飯連聲何事呌師兄明朝雪霽鼇山路依舊一程還一程象外超雪峯住菴時有兩僧來師以手拓菴門放身出曰是甚麼僧亦曰是甚麼師低頭歸菴僧辝去師問甚麼處去曰湖南師曰我有箇同行住巖頭附汝一書去書曰某書上師兄某一自鼇山成道後迄至于今飽不飢同參某書上僧到巖頭頭問甚處來曰雪峯來有書達和尚頭接了乃問別有何言句僧遂舉前話頭曰他道甚麼曰他無語低頭歸菴頭曰噫我當初悔不向伊道末後句若向伊道天下人不奈雪老何僧至夏末請益前話頭曰何不早問曰未敢容易頭曰雪峯雖與我同條生不與我同條死要識末後句秪這是頌曰末後句為君說明暗雙雙底時莭同條生也共相知不同條死還殊絶還殊絶黃頭碧眼須甄別南北東西歸去來夜深同看千巖雪雪竇顯末後句兮無問處萬仞鐵山橫在路當日巖頭不奈何至今雪老難伸吐倒捋虎鬚方識虎未解行人休離母透過牢關舉似君把定𠰸喉淚如雨佛印元雪老却入菴中後路上無人見得伊賴有故人千里在同條生死不同時白雲端雪老別鼇山卓菴閩中坐一日見僧來探頭道什麼末後句少人和却得巖頭重注破同條生同條死末後句莫錯舉照覺捴切瑳琢磨變態譊訛葛陂化龍之杖陶家居蟄之梭同條生兮有數同條死兮無多末後句秖這是風舟載月浮秋水天童覺雪老大開方便路低頭却入菴中去者僧有眼恰如盲却被巖頭行一步者僧好休不肯休依然依路去悠悠元來不會雪峯意却被巖頭甕頭天童覺龍吟枯木菴中出天上人間無等匹虎嘯巖頭石上來晴空忽迸一聲雷堪笑春池猶拾礫空山空到又空回佛心才露面出來猶不識頭歸去更難知那堪末後一句子直到于今四海疑保寧勇雙眀復雙暗獨立絶殊方乘機覿面提其鋒安可當同條生兩鏡相照無能名不同條死鐵樹花開亘今古末後句始到牢關拈却門前大案山圓悟勤末後句為君說踏著稱鎚硬似鐵寒則普天寒熱則普天熱若是達磨兒孫各各自知時莭知時莭為君說九尾烏龜莫當鼇山石鱉佛鑑勤雪峰費盡平生力懵懂禪和意轉疑可憐末後一句子巖頭土上更加泥龍門遠同條生兮不同死弟既耳聾兄目瞽家門蕩盡徹骨窮却把黃金如糞土末後句休莾鹵甜者甜兮苦者苦北海心雪峯一日升座衆集定師輥出木毬玄沙遂捉來安舊處頌曰雪峯輥毬孰辨機一千五百幾人知眨起眉毛千萬里須是吾門師子兒北塔祚天兮寬地兮𤄃雪峯輥毬幾忉怛一輥直上須彌山無量人天眼開豁眼開豁脫却多年臭皮襪步行走馬到新羅報道花須連夜發天衣懷雪老平生好輥毬輥來輥去輥無休一千五百人同戲誰解輸機賽一籌佛國白收來輥去事方圓獨許漁郎上釣船眀月蘆花同一色落霞孤鶩共遙天夢菴信象骨木毬一輥出三世如來能事畢可憐天下遍參尋只道黃連不是蜜石眀輥向人前事未休再安舊處有來由一聲斷鳴雲漢兩岸蕭蕭蘆荻秋戴無為一作雪峯因玄沙來三箇一時輥出沙便作偃倒勢師曰尋常用幾箇曰三即一一即三頌曰團團輥出沒來由不立名模見便休三一一三重注腳螺江依舊向東流圓覺演山寺裏頭無可作輥出木毬兩三箇不獨玄沙遭一攧雪峯老人亦話墮懶菴樞雪峯上堂南山有一條鱉鼻蛇汝等諸人切須好看長慶出曰今日堂中大有人喪身失命雲門以拄杖攛向師前作怕勢有僧舉似玄沙沙曰須是稜兄始得然雖如是我即不然曰和尚作麼生沙曰用南山作麼頌曰象骨巖高人不到到者須是弄蛇手稜兄備師不奈何喪身失命知多少韶陽知重撥草南北東西無處討忽然突出拄杖頭拋對雪峯大張口大張口同閃電剔起眉毛還不見如今藏在乳峯前來者一一看方便師高聲喝云看腳下雪竇顯臨濟喝兮德山棒子胡狗兮誰敢向未若南山鱉鼻蛇一千五百衲子喪韶陽本色弄蛇手自古及今曾未有忽然放出若星流象骨禪翁遭一口正覺逸象骨鱉蛇當大路稜師可惜便亡身雲門弄得雖然活爭似南山不用親白雲端打鼓弄琵琶相逢一會家雲門能合調長慶解隨邪古曲非音律南山鱉鼻蛇何人知妙訣的子是玄沙真淨文玄沙太剛長慶少勇南山鱉鼻死無用風雲際會頭角生果見韶陽下手弄下手弄激電光中看變動在我也能遣能呼於彼也有擒有縱底事而今付阿誰冷口傷人不知痛天童覺象骨老人示徒擬議遭他一口韶陽突出驚人未免傷鋒犯手尼無著㧾雪峯示衆曰飯籮邊坐餓死人臨河渴死漢玄沙云飯籮裏坐餓死人水裏沒頭浸渴死漢雲門云通身是飯通身是水頌曰通身是飯通身水饒舌沙彌下口難悟得頓除饑渴念迷時往往更求餐本覺一雪峯示衆曰大地撮來如粟米粒大拋向面前漆桶不會打鼓普請看長慶問雲門曰雪峯與麼道還有出頭不得處麼門曰有曰作麼生門曰不可揔作野狐精見解又曰狼籍不少頌曰牛頭沒馬頭回曹溪鏡裏絶塵埃打鼓看來君不見百花春至為誰開雪竇顯眉毛𦉑裏遊南嶽大海波心泛釣舟薄藝隨身終不說從他打鼓看無休白雲端疾焰過風奔流度刃唱拍相隨拳踢相應驀然轟起震天雷百草頭顛春色回圓悟勤打鼓普請看直得眉毛寒拾得寒山舞笑倒老豐干楚安方撥動乾坤步轉移南觀北斗有誰知金烏暮向西山急曉逐扶乘半夜飛石門易天不能蓋地不能載簉破面門漆桶不會鐵船同駕入滄溟持得驪珠如斗大佛心才雪峯一日登座召衆曰看看東邊底又曰看看西邊底汝若要會拈拄杖擲下曰向這裏會取頌曰東邊覷了復西觀拄杖重重話嵗寒帶雨一枝花落盡不煩公子倚闌干冶父川雪峯與玄沙行次師指面前地曰這一片田地好造一箇無縫塔沙曰高多少師上下顧視沙曰人天福報即不無和尚靈山受記未夢見在師曰你作麼生沙曰七尺八尺頌曰父子同行相將入草起無縫塔功高䇿巧帶水拖泥漏逗不少雖然落七落八爭奈有道理好佛燈珣指出長生地不迷造成無縫塔巍巍大家從此無餘事渴飲飢餐且度時野菴璇雪峯示衆曰三世諸佛向火𦦨上轉大法輪玄沙云近日官令稍嚴師曰作麼生沙云不許人行奪市師不覺吐舌雲門云火焰為三世諸佛說法三世諸佛立地聽頌曰火焰騰輝說最親無邊諸佛近前聞誰知更有傍觀者鼻孔撩天不喜君白雲端一堆猛焰亘天紅三世如來在此中轉大法輪今已了眉毛眨上起清風保寧勇紅焰光中也大奇明明演說白毫輝可憐雪老并韶石燒卻眉毛總不知普融平阿誰著雪峯蹤三世諸佛火焰中賴有雲門相暖熱火星吹得滿堂紅慈受深將謂猴白更有猴黑互換投機神出鬼沒烈𦦨亘天佛說法亘天烈焰法說佛風前剪斷葛藤窠一言勘破維摩詰圓悟勤三世諸佛轉法輪一大藏教說不盡象骨當機正令行玄沙見機行正令或說或聽聞不聞電捲星飛誰與論撥轉那邊關捩子眉毛留得兩莖存瞎堂遠有是父兮有是子同條生也同條死三世如來烈焰堆互換說法元如此莫顛言休倒語截斷葛藤須薦耴石菴玿雪峯普請往寺莊路逢獼猴師曰這畜生一人背一面古鏡摘山僧稻禾僧曰曠劫無名為什麼彰為古鏡師曰瑕生也曰有什麼死急話端也不識師曰老僧罪過頌曰人人有面古鏡何法門而不罄參玄上士迷頭緝線老婆頓證興教壽堪笑山翁不識羞為他頭上更安頭巖前跳躑無尋處一片殘霞曉未𭣣保寧勇大地為爐冶何年鼓鑄功圓同諸佛面高鑑十方空祖印明鑒覺未萌全體現才分鑑照便成瑕要知瑩徹圓明處長短青黃總不差白楊順雪峯在洞山作飯頭淘米次山問淘沙去米淘米去沙師曰沙米一時去山曰大衆喫箇甚麼師遂覆却米盆頌曰滿鉢盛來一物無豈同香積變蘇日月並輪長不照木人舞袖向紅爐投子青乖龍作雨非意測猛虎挾物不露迹洞山雪老共相酬寥寥千古無人識伊菴權雪峯因僧問我眼本正因師故邪時如何師曰迷逢達磨曰我眼何在師曰得不從師頌曰達磨迷時在少林今人不曉為傳心堪羡迷人逢達磨三冬過後又新春天衣懷裂破古今沒窠臼當機大闡血盆口腳尖躍出佛如麻李四張三無路走或菴體雪峯因僧問寂寂無依時如何師曰猶是病曰轉後如何師曰船子下楊州頌曰寂寂無依病正深雪老當年痛處針一喚喚回春夢破千山渾作木龍吟自得暉雪峯示衆云此事不從唇吻淂不從黃卷上得不從諸方老宿得合從甚麼處得也須子細頌曰一滴真珠紅潑醅殷勤相勸兩三回到頭欲盡東君意吞卻臨行上馬杯皖山凝雪峯因僧問古澗寒泉時如何師曰瞪目不見底曰飲者如何師曰不從口入僧後到趙州舉此話州曰不從口入不可從鼻裏入僧却問古澗寒泉時如何州曰苦曰飲者如何州曰死師聞得乃曰趙州古佛遙望作禮自此不答話頌曰古澗寒泉浩渺瀰分明枝𣲖暗流時不從口入無滋味苦死令渠話不知雲蓋昌黯黯雲攢覆雪峯青青趙老一雙瞳從前汗馬無人識只要重論蓋代功寶峯照縱奪還他老作家奔流度刃數如麻深深澗裏無人到飲者重添眼裏沙佛心才鮑老當年笑郭郎人前舞袖太郎當及乎鮑老出來舞依舊郎當勝郭郎真淨文趙州象骨巖舉世無倫擬共撫沒絃琴千載清人耳古澗寒泉瞪目疑然不從口入飲者忘筌重出語苦又死不答話同彼此相逢兩會家打鼓弄琵琶箇中誰是的白鳥入蘆花圓悟勤雪峯古澗泉深趙州石橋水苦若知異水同源飲者不妨疑悟不從鼻孔入白浪高三級從此不答話豈免酬高價金剛圈子栗𣗥蓬解透橫行四天下佛性泰雪峯曰世界闊一尺古鏡闊一尺世界闊一丈古鏡闊一丈玄沙指火爐曰闊多少師曰如古鏡闊沙曰老和尚腳根未點地在頌曰世界能將古鏡齊言中辨的卻成迷白雲起處青山秀天曉依前月落西象田卿十方世界一面鏡鏡裏看形未足真摸著鼻頭渠是我那時方見本來人懶菴樞雪峯聞一僧在山下卓菴多年不剃頭畜一長柄杓溪邊舀水時有僧問如何是祖師西來意主曰溪深杓柄長師聞得乃曰也甚奇怪一日將剃刀同侍者去訪才相見便舉前話問是菴主語否曰是師曰若道得即不剃你頭主便洗頭跪師前師即與剃頭頌曰當言不避截舌當爐不避猛火趂手作得家生到老自能穩坐水深杓柄長舀水洗頭剃雪峯刀上眼忽開琉璃殿裏無關閉月堂昌雪老垂慈肯訪他一毫頭上辨龍蛇須知不涉言詮外脫體風流出當家東山源雪峯因閩帥施銀交床僧問曰和尚受大王如此供養將何報答師以手托地曰少打我頌曰大王信重送交床傍問禪徒太著忙下手低聲言少打劣中全勝阿誰詳洞山聰因問如何報主恩舉畢全𭣣坐要津船頭若有風浪動滿目流沙不見人汾陽昭得人一牛還人一馬投之報之風流儒雅如今大有受恩人不知誰是報恩者正覺逸不知將底報君恩風起江湖水皺痕一片古帆乘興去與誰相逐過天門保寧勇此旨流行七十年多人言論少人甄托地便令輕打我認著依前又更顛般若柔受施兩邊皆是幻臨機何不惜眉鬚也知此外無長伎咄這黔州老瞎驢寶葉源雪峯因閩王封柑橘各一顆遣使送至東問既是一般顏色為甚麼名字不同師遂依舊封回王復馳問玄沙沙將一張紙蓋卻頌曰柑橘閩王親手封將來直問擊宗風長人入水分明在更問玄沙又不通汾陽為汝開天路寶坊金界碧霄空汾陽昭閩主兩般馳獻上雪峯一等倒封回人情上下俱周美免把完全更擘開保寧勇柑橘將來不用疑鐵牛蚊子咬應癡閩王猶未識師旨更請玄沙下一錐延壽慧分明柑橘勿譊訛獻花借水辨龍蛇白紙一張都蓋了免教天下動干戈冶父川一般顏色兩般名紙蓋難謾衆眼睛雪嶺當時便封轉閩王猶未息疑情橫川珙雪峯示衆曰盡大地是箇解脫門把手機伊不肯入時有一僧出曰和尚怪某甲不得又一僧曰用入作甚麼師便打頌曰大地是箇解脫門三世諸佛一口吞將為雪峯有奇特却來謾我好兒孫懶菴樞雪峯因僧問緊要處乞師指示師曰是甚麼僧於言下大悟雲門云雪峯向你道什麼頌曰雪峯騎駿馬雲門跨驢兒一踢一踏相奔馳長安有路非無路夜半行時人不知圓悟勤無量劫來是箇甚麼覿面全提幾乎蹉過不蹉過土苴堆頭且高臥雪峯一日在僧堂內燒火閉卻前後門乃呌曰救火救火玄沙將一片柴從窗櫺中拋入師便開門頌曰巨嶽塵飛蟭螟生兒兒落塵裏如錐錐泥燒火救火閉門開門拋柴家醜外頭見萬象森羅一口吞月堂昌高燒榾柮暖通身快活難禁一屋春不是謝郎來合火誰知門外有寒人石林鞏雪峯問僧甚麼處來僧曰漸中來師曰船來陸來曰二途俱不涉師曰爭得到這裏曰有什麼隔礙師打趂出僧過十年後再來師又問甚處來曰湖南師曰湖南與這裏相去多少曰不隔師竪起拂子曰還隔這箇麼曰若嗝即不到也師又打趂出此僧住後凡見人便罵師一日有同行聞特去訪問兄到雪峯有何言句便如是罵他遂舉前話被同行㖃叱與他說破這僧當時悲泣嘗向中夜焚香遙禮頌曰帶角擎頭去復來雪兩見戰旗開軍前不誤將軍令空有英雄出九垓九垓雖出有牢關未透牢關未足觀棒頭有眼明如日要識真金火裏看佛燈珣見說閩山多蠱毒千方百計避無由殤中既有催魂鬼一命還他方始休虛堂愚雪峯普請次自負一束藤路逢一僧便拋下僧擬取師一倒㱕舉似長生曰我適來得者僧甚快長生曰和尚須替者僧下涅盤堂始得雪竇云長生大似東家人死西家人助哀也好與一頌曰暗拋香餌在江湄果是金鱗釣得㱕不是𮈔綸𭣣得疾幾乎輸與鷺鷥兒上方益偉雪老法中英肩上藤薪覿面呈目前不薦當頭著和身一倒囊傾會知擔重因柴束自然便重不便輕何山奉報諸禪侶孩兒須是的親生佛燈珣雪老擔藤憩歇時一僧才見便慈悲近前擬取攔胸舉似長生更一椎石門聰雪峯者僧不殺長生扶者僧不起可憐一束爛枯藤狼藉至今愁滿地西巖惠雪峯與玄沙夾籬次沙曰夾籬處還有佛法也無師曰有曰如何是夾籬處佛法師撼籬一下沙曰某甲不與麼師曰子又作麼生曰穿取頭過來頌曰父子相携入故園頭時過短籬邊爛泥有刺無人見著方知腳底穿懶菴樞雪峯因三聖問透網金鱗以何為食師曰待汝出網來向汝道聖曰一千五百人善知識話頭也不識師曰老僧住持事繁頌曰透網之魚不識鈎貪游浪水認浮頭高灘坐釣垂慈者回棹𭣣綸却上舟汾陽昭透網金鱗休云滯水搖蕩乾坤振鬣擺尾千尺鯨奔洪浪飛一聲雷震清飈起清飈起天上人間知幾幾雪竇顯張三賣物高擡價李回還依市價酬交易不成猶作閙李公店鋪一時休海印信老倒漁翁坐釣臺金鱗赫赫鼓波來海門空闊才施繩霹靂一轟天地開真淨文二放去𭣣來得自由不堪憂處亦堪憂可憐滯句承言者爭是爭非空白頭透網金鱗掣電機休云滯水與拖泥雷霆一擊青霄裏傾湫何處不滂瀰真如哲出網分明向道休風雲會處有來由雷霆昨夜聲相應依舊為霖遍九州圓通仙擭浪拏雲勢可驚平空驟雨似盆傾不因放却淮河閘九曲潮頭卒未平上方益洞裏無雲別有天桃花似錦柳如綿仙家不會論冬夏石爛松枯是一年五祖演鯤鯨已插摩霄翼海客猶懸釣月鈎不顧翻空洪浪𢙣一帆風信出鼇頭佛心才全死中全活全活中全死一箇訝郎當一箇福建子徑山杲金鱗透網欲吞舟一向衝波逆水流却被漁翁閒引釣隨波逐浪謾悠悠鼓山圭俊鶻冲天寒雞曉眠脫略窠窟遲速不偏截斷命根急處放當頭手緩時樣滴水冰生不認渠坐籌幃幄江海量君不見透網金鱗活計新住持事繁笑殺人月堂昌百草頭出沒三界外遨遊徒布漫天網虗下釣鼇鈎搖鱗振鬣撼乾坤兀目昂頭洪浪噴棒雨點喝雲奔肯將爭戰定功勛圓悟勤張猴白李猴黑硬如綿軟如鐵驀路相逢兩會家臨濟未是白拈賊遁菴演新羅拄杖遂寧鉢衲子家風那箇無一等看來如墨黑誰能重與較錙銖虛堂愚雪峯問僧近離甚處曰覆船師曰生死海未渡為甚麼覆却船僧無語乃回舉似覆船船曰何不道渠無生死僧再至進此語師曰此不是汝語曰是覆船恁麼道師曰我有二十棒寄與覆船二十棒老僧自喫不千闍𥠖事頌曰未渡生死海不應覆却船渠本無生死超然離二邊長如杲日麗中天舒光照到雪峯前圓悟勤生死海中猶未渡傳言送語幾千程一棒打翻東海鯉迷人直下便狂惺尼無著捴雪峯上堂舉拂子曰遮箇為中下僧問上上人來如何師舉拂子僧曰遮箇為中下師打之雲門曰我不似雪峯打葛藤驀拈拄杖云我這箇只為中下機人有僧問忽遇上上人來時如何門便打頌曰迅雷不及掩耳下樁要在急水水深樁腳若長耳畔雷聲四起拈起拄杖為他中下上上人來放過不打秦人一入桃花源子孫千世為神仙月堂昌大機圓應大用直截雪峯雲門只得一橛畢竟如何不說不說松源嶽雪峯因閩王問擬欲蓋一所佛殿去時如何師曰大王何不蓋取一所空王殿曰請師樣子師展兩手雲門云一舉四十九頌曰空王殿樣子雪峯展兩手添得老韶陽一舉四十九總是面南看北斗即菴覺雪峯送南際長老出乃作女人拜際斂手應諾諾師以手斫額便㱕頌曰送客隨家豐儉施盡情為餞免生疑却蒙惠重過相贈斂手遙知向暮㱕投子青襄州高亭簡禪師嗣德山初隔江見德山遙合掌呼曰不審德山以手中扇子再招之師忽開悟乃橫趨而去更不回顧後於襄州開法嗣德山頌曰江上相逢問逗留師資針芥便相投定光金地遙招手智者江陵暗點頭大洪遂德山棺木裏瞪眼高亭死水裏藏身賺他多少英靈漢錯認山河作眼睛少室睦
