body:
  text: 僧録司右闡教兼靈谷禪寺住持淨戒重校祖師機緣六祖下第十四世至二十一世靳州五祖山法演禪師嗣白雲端初謁浮山遠和尚遠一日語師曰吾老矣恐虛度子光陰可往依白雲此老雖後生吾未識面但見其頌臨濟三頓棒話有過人處必能了子大事師潛然禮辭至白雲遂舉僧問南泉摩尼珠話請問雲叱之師領悟獻投機偈曰山前一片間田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風雲特印可頌曰山前田地賣還買松竹清風痛自憐堪笑夢中誇富貴覺來那直半分錢遁菴演忍死叮嚀見白雲一杯鴆酒十分斟若教不飲空歸去田地無由被陸沉竹屋簡二卒風暴雨忽迷蹤撞入浮山網子中縱得白雲提得出依然只是賣柴翁五祖演云老僧遊方十餘年參數十人善知識將謂了當及到浮山圓鑑會下更開口不得末後又到白雲因咬破一箇鐵餕餡直是百味具足且道餡子一句作麼生道花發雞冠媚早秋何人能染紫𮈔頭有時風動頻相倚似向階前鬪不休頌曰白雲鐵餕餡衲僧難下口忽然咬得破大作師子吼月菴果五祖演在白雲端會中作磨頭一日端下來曰磨頭你還知一件事麼師曰不知曰近有數禪客自廬山來問他皆有悟入處教伊說亦說得有來由舉因緣向伊亦眀得教下語亦下得端良久謂師曰磨頭只是未在你道如何師聞之心下不安得七日七夜不成腸肚正中心下乃自思惟曰既悟了說亦說得眀亦明得如何却未在忽然中夜方會得從前寶惜一時放下遂白端端起來手舞足蹈佛眼遠云某甲侍先師舉此因緣謂某甲云參學須是一時放下方得安樂大衆還見得不乃頌曰放得下好脫灑放不下牛拽杷堪笑諸方老古錐打鼓說禪無尾欛無尾欛不驚怕可嚒訝解毗盧頂上行不言亦自傳天下好大哥五祖演因僧問一大藏教是箇切腳未審切箇什麼字師曰鉢囉娘頌曰唇上必并班豹剝舌頭當的帝都丁且道是什麼字自古上賢猶不識造次凡流豈可眀石菴玿一大藏教是切腳東山切得鉢囉娘胸中憤氣盤不得忽作虹霓萬丈長即菴覺倒腹傾腸與麼來華言梵語幾曾該言前句後知端的陸地蓮花朵朵開別山智大藏教父為切腳鉢囉娘義最深幽孔門弟子無人識碧眼胡僧暗點頭遁菴演五祖演因僧問如何是佛師曰口是禍門頌曰的的當陽句明明箭後路著靴人喫肉赤腳人趂兔徑山杲口是禍門電掣雷奔娑竭出海震動乾坤鼓山圭如何是佛口是禍門一錢不直賣與買人雪堂行兵行詭道賊是家親無功受祿有理難伸或菴體坑坑坎坎嶮嶮巇巇一言易出駟馬難追虛堂愚五祖演因僧問如何是佛師曰肥從口入又曰露胸跣足頌曰老去眉似雪霜元來習氣尚難忘少年無限傷心事一度思量一斷腸佛鑑勤牙根爛嚼真彌勒腹裏橫吞老釋迦大地虛空皆得飽這回不到負檀家心聞賁五祖演因僧問如何是臨濟下事師曰五逆聞雷頌曰從前五逆怕聞雷不似大蟲看水磨孤峯頂上要同行十字街頭還共坐鼓山圭五逆聞雷曾參顏回一粒豆子爆出冷灰徑山杲者僧苦下打爺拳霹靂聲中宇宙昏驚起無眀金翅鳥擘開滄海取龍吞東山空五逆聞雷露出尸骸人間天上無處堪埋朴翁銛五逆聞雷慊慊然尋常爭敢與人宣自從六十輕酬後濟北驢名不浪傳虛堂愚五祖演示衆曰釋迦彌勒猶是他奴且道他是阿誰頌曰老年輕節臘樂事甚悠悠不及兒童日都來不解愁南堂興他弓莫挽他馬莫騎他非莫管他事莫知無門開釋迦彌勒是他奴今古禪流知也無酒好不須懸望子醋酸何必掛葫蘆野牛平五祖演問僧曰倩女離魂那箇是真底有云王宙欲娶倩娘為妻倩父母不許倩遂臥病在家王宙將欲遠行月下見倩來同舟而去三年後遂生一子倩遂歸父母家才到門家中有一倩娘出來相見兩人遂合成一身頌曰二女合為一媳婦機輪截斷難回互從來往返絶蹤由行人莫問來時路普融藏主只是舊時行履處等閒舉著便譊訛夜來一陳狂風起吹落桃花知幾多慈受深兩女合為一媳婦古寺基前幢子竪倣佛上有陀羅尼多少行人𥁞驚怖正堂辨縱使百千劫所作業不忘因緣會遇時果報還自受或菴體凉宵愛月上危樓幾處笙歌幾處愁歌管未闌愁未歇忽然天曉一時休且菴仁憶惜春風上苑行爛窺紅紫厭平生如今再到曾行處寂寂無人草自生萬菴柔南枝向暖北枝寒何事春風作兩般憑仗高樓莫吹笛大家留取倚闌看雪菴瑾雲月是同溪山各異萬福萬福是一是二無門開行弔先桃茢喪章後紙錢老胡門下客寧可入黃泉虛堂愚五祖演垂語曰路逢達道人不將語默對且道將甚麼對頌曰來說是非者便是是非人誠哉是言也弄物不知名月林觀路逢達道人不將語默對攔腮劈面拳直下會便會無門開五祖演一日持錫繞廊臼莫有屬牛人問命麼衆皆無語自曰孫𬛜今日開鋪更無一人垂顧可憐三尺龍鬚喚作尋常破布頌曰無端平地起干戈爭似屬牛人更多滿目慚惶無著處低頭依舊入烟蘿高峰妙五祖演曰譬如水牯牛過窗櫺頭角四蹄都過了因甚麼尾巴過不得頌曰牛過窗櫺錯為安名大唐國裏不見一人月林觀龜本真靈物都緣不自知一朝親脫殼直透九天飛如菴用等閒放出這牛兒頭角分眀舉似誰若向尾巴尖上會新羅鷂子過多時高峯妙五祖演謝監𭣣上堂曰人之性命事苐一須是欲得成此先須防於若是真人頌曰一二三四五六圈心肝粉碎髑髏寒若將方木投圓竅醜婦爭教得少年高峯妙五祖演舉昔日有秀才著無鬼論一日鬼現身云你道無我聻秀才無語師曰當時只舉手作鵓鳩觜云谷孤故頌曰說有道無徒費力現身無語強分踈只消一箇鵓鳩觜百怪千妖𥁞掃除此山應五祖鵓鳩啼當機直下提隔山尋蟻跡能有幾人知石田薰五祖演因僧問如何是為人一句師曰門前石塔子頌曰門前石塔子八白與九紫方道既分眀免被巡官使雪堂行五祖演每遇僧來請益秖曰無這間工夫頌曰彼此且無相負纍行人無不失鈎錐雖然不瞎衆生眼也好拳頭劈口槌龍門遠開口便見膽工夫傲東魯昔於豆子山也解打瓦鼓南岩勝五祖演凡見僧來便曰屈屈僧曰屈作甚麼師曰如今不屈更待何時頌曰𥁞力不奈何按牛頭喫草若無錦繡文難以論嘉藻龍門遠鐵饀價難窮誰知屈味濃法幢光祖域正董在胸中南岩勝五祖演問僧離却四大五蘊那箇是你清淨法身頌曰堂堂白日上刀梯任是崑崙眼亦迷多謝門前按山子春來秋去泄天機雪堂行五祖演展手問僧曰因何喚作手頌曰何故喚作手衲僧難開口擬議自瞞頇可憐太蒙斗佛眼遠先祖滔滔無固必後人悱悱有雌雄巨靈擡手無多子分破華山千萬重南岩勝隆興府兜率從恱禪師嗣真淨文室中設三語以驗學者一曰撥草瞻風秖圖見性即今上人性在甚麼處二曰識得自性方脫生死眼光落地時作麼生脫三曰脫得生死便知去處四大分離向甚麼處去頌曰陰森夏木杜䳌鳴日破浮空宇宙清莫對曾參問曾晳從教孝子諱爺名張無𥁞三人間鬼使符來取天上花冠色正萎好箇轉身時莭子莫教閻老等閒知鼓合東村李大妻西風曠野淚沾衣碧蘆紅蓼江南岸却作張三坐釣磯驢放三千馬放八百透過重關未為英傑月林觀一念普觀無量劫無量劫事即如今如今覷破這一念覷破如今覷底人無門開東京法雲佛照杲禪師嗣真淨文師以力參深到語不入時每示衆常舉老僧寧八年文帳在鳳翔府供申當年崩了華山四十里壓倒八十村人家汝輩後生茄子瓠子幾時知得或問曰寶華王座上因甚麼一向世諦師曰癡人佛性豈有二種邪頌曰隔水何人歌竹枝動人情思極幽微夜深轉入單于調月朗風高𦗟者稀虛堂愚六祖下第十五世臨濟宗成都府昭覺寺克勤圓悟佛果禪師嗣五祖演先住東京天寧師凡垂問學者擬議則一拳頌曰𥁞力當胸一拳幾箇眉墮落更欲如何若何普化空中木鐸瞎堂遠圓悟因僧問西天以蠟人為驗此土以何為驗師曰生鐵鑄就崑崙兒頌曰生鐵鑄就崑崙兒頭輕腳重肚皮大明眼衲僧薩普吒九十日中看不破看不破笑倒嵩山破竈墮晦叟光舒州太平慧勤佛鑑禪師嗣五祖演僧問如何是佛師曰喫飯咬著砂頌曰喫飯咬著沙隱落第三牙春風才過後拄杖亦開花慈受深舒州龍門清遠佛眼禪師嗣五祖演嘗請益五祖凡有所問演即曰我不如你你自會得好或曰我不會我不如你師愈疑遂咨决於元禮首座禮以手引師耳繞圍爐數匝行且語曰你自會得好師曰有冀開發乃爾相戲耶禮曰你他後悟去方知今日曲折耳頌曰我不會兮不如你達磨當門兩齒滿堂無限白蘋風眀眀不自秋江起雪堂行二我不會兮不如你堪笑千花生碓觜善財謾到百城游何曾著自家底我不會兮不如你旃檀林裏香風起漁歌一曲過瀟湘攪動滄溟聲未已呆堂定龍門示衆曰千說萬說不若親見一靣縱不說亦自分眀王子寶刀喻衆盲摸象喻禪學中隔江招手事望州亭相見事深山巖崖處事此皆親靣而見之不在說也頌曰寧辨人間是與非生來淈𣸩眼如眉不因說著當年事萬古千秋那得知虛堂愚金陵俞道婆市油餈為業參琅琊起和尚起以臨濟無位真人話示之一日聞丐者唱蓮花樂云不因柳毅傳書信何緣得到洞湖忽大悟以餈盤投地夫曰你顛邪婆掌曰非汝境界往見琅琊琊望之知其造詣問那箇是無位真人婆應聲曰有一無位人六臂三頭努力瞋一擘華山分兩路萬年流水不知春琊印可之凡有僧至則曰兒兒僧擬議即掩門佛燈珣和尚往勘之婆如前所問珣曰爺在甚處婆轉身拜露柱珣即倒曰將謂有多少奇特便出婆蹶起曰兒兒來惜你則箇珣竟不顧安首座至婆問甚處來曰德山婆曰德山泰乃老婆兒子曰婆是甚人兒子婆曰被上座一問直得立地放尿頌曰柳毅傳書只自知得便冝是落便冝親夫愛子都拋却痛惜深憐乞養兒笑翁堪驀劄相逢鐵面皮渾家喪盡喚孩兒翻身獅子施牙爪猶落渠儂苐二機咦且道渠是阿誰塗毒䇿臨安府徑山宗杲大慧普覺禪師嗣圓悟師至天寧一日聞悟升堂舉僧問雲門如何是諸佛出身處門曰東山水上行若是天寧即不然忽有人問如何是諸佛出身處只向他道薰風自南來殿閣生微涼師於言下忽然前後際斷頌曰萬德不自有十身何處藏薰風生殿閣化日正舒長石林鞏諸佛東山水上行閒中無事日偏長薰風拂拂來無已無意涼人人自涼葛廬覃大慧因僧問心佛俱忘時如何師曰賣扇老婆手遮日頌曰賣扇老婆手遮日一種風流出當家說與途中未歸客何須向外喫波楂月坡眀大慧後來留古雲門菴學者雲集久之入閩結茅於長樂洋嶼室中舉竹篦子問學者喚作竹篦則觸不喚作竹篦則背不得下語不得無語從之得法者十有三人頌曰雲門舉起竹篦凡聖潛蹤匿跡金剛門外生嗔木馬廄中面赤尼無著揔二雲門舉起竹篦才涉思惟蹉過只這背觸商量老人已是話墮徑山有箇竹篦直下別無道理佛殿厨屋三間穿過衲僧眼耳福州清涼坦三尺筠蛇口帶腥曾吞英特十三人塵蒙四壁籠燈黑老尾焦黃眼正瞋竹屋簡平江𧆞丘紹隆禪師嗣圓悟初參死心心問你是甚麼僧師曰行腳僧心曰你是何處村僧行甚驢腳馬腳師曰廣南蠻道甚麼何不高聲道心曰却有些衲僧氣息遂留過夏頌曰客裏謾牢落天涯多故人好懷無處寫舊話得重論殘雪未消石梅英先破春徘徊殊有約來此續芳塵虛堂愚解后何期語笑新秋風松館客邊身憑闌不話平生事到老相逢是別人寶葉源安吉州道場眀辨正堂禪師嗣龍門遠室中問學者蚯蚓為甚麼化為百合頌曰客舍并州已十霜歸心日夜憶咸陽無端更渡桑乾水却憶并州是故鄉圓極岑潭州大溈善果月菴禪師嗣開福寧上堂奚仲造車一百輻拈却兩頭除却軸以拄杖打圓相曰且莫錯認定盤星卓一下下座頌曰海神知貴不知價留與人間光照夜碧眼胡僧笑點頭誰知用處無縫𦉑月林觀機輪轉處達者猶迷四維上下南北東西無門開眀州天童曇華應菴禪師嗣𧆞立隆示衆曰𥁞力道不得底句不在天台定在南嶽頌曰相罵饒汝接觜相唾饒汝潑水驀然摸著蛇頭拍手囉囉哩哩肯堂充𦒿婆去後無消息病者憧憧日扣門百草自知無識者叢叢垂泣在籬根虛堂愚應菴示衆曰如世良馬見鞭影而行時佛照光和尚出衆云見鞭影者非良馬師休去頌曰疾𦦨過風第二頭不堪惆悵只堪愁一聲振鬣長鳴後萬馬皆瘖一戰𠬧北澗簡眀州育王德光佛照禪師號拙菴嗣大慧宋孝宗召對師舉靈雲頌直至千今更不疑奏曰那裏是他不疑處帝曰空手牽鐵牛頌曰万機之暇探禪宗中路寧堪憩六龍空手牽牛過天𨷂紫宸深在妙高峰圭堂居士佛照因孝宗宣問釋迦佛入山六年所成何事師對曰將謂陛下𭜎却頌曰六年勤苦竟何如為問君王記得無直下雖知難抵諱到頭終不受塗糊北澗簡二借婆衫子拜婆年監本起挑不上禪抉起玉龍轟霹靂眀星猶在九重天問處天左旋答處地右轉太平無象眼頭寬雪山高映黃金殿覺圓明大根大器大熏修瞥轉機輪向上頭万億斯年惟一佛雪山元不隔龍樓石巖璉臨安府淨慈北澗蕳禪師嗣佛照師示衆目前機摩竭令無法商量一印印定頌曰當陽印定發光輝一對鴛鴦各自飛無法商量曾不昧令行摩竭目前機物初觀行摩竭令顯全機無法商量未是奇方象森羅都印定此中能有幾人知仲方倫北澗因四僧來參師云一人宗通病在內一人說通病在外一人宗說俱通病在見聞一人觸事不會東倒西擂且道誰是不會底頌曰午窗危坐絶逢𨒦杵臼徐開隔竹聲一碗釅茶魔辟易䇿勛不戰屈人兵物初觀剛道宗通與說通俱通還昧古靈蹤誰知東倒又西擂却解當堂作主翁仲方倫賔中全主主全賔四相同朝舊主人切忌自家分彼此使他容易別踈親淨覺曇臨安府淨慈水菴師一禪師嗣佛智裕室中問僧曰西天鬍子因甚無鬚頌曰癡人面前不可說夢鬍子無惺惺懵懂無門開牧童失却破簑衣流落年深見者稀拈來搭在籬頭上引得烏鴉繞𣗳飛呆堂定臨安府淨慈彥充肯堂禪師嗣卍菴顏示衆曰觀方知彼去去者不至方草鞋跟忽斷全身在帝鄉頌曰孰謂觀方不在方才開臭口便乖張行人要覔長安路不覺全身在帝鄉掩室開慶元府天童密菴咸傑禪師嗣應菴應菴問如何是正法眼師遽答曰破沙盆庵頷之頌曰五陵公子少年時得意春風躍馬蹄不惜黃金為彈子海棠花下打黃鸝雙杉元法眼拈來早自謾無端錯對破沙盆而今遍界難遮掩殃害藂林纍子孫掩室開直甚破沙盆掀翻海嶽昏頂門真箇瞎千古纍兒孫虛堂愚白玉琢成泥彈子黃金鑄就鐵崑崙千年滯貨無人買未免如今纍子孫大歇謙常州華藏伊菴有權禪師嗣無菴全嘗夜坐達旦行粥者至忌展鉢鄰僧以手觸之師感悟為偈曰黑漆昆崘把釣竿古帆高掛下驚湍蘆花影裏弄明月引得盲龜上釣船頌曰雲深江絶引帆孤可惜鄰僧拽轉渠方信圓眀彈指事元來此語不傳虛圭堂居士鎮江府焦山普濟禪寺或庵師體禪師嗣此菴元因信齊葛知府問曰夫妻二人相打通兒子作證且道證父即是證母即是師曰小出大遇乃頌曰八臂那吒三隻眼雙槌擂鼓轉船頭巨鼇一吸滄溟竭宇宙風清四百州生死自憐同室因何中路隔關山一朝忽得親兒證躍方知蓋覆難雪堂行臨安府靈隱松源崇嶽禪師嗣密菴垂語曰大力量人因甚擡腳不起頌曰沒量大人擡腳不起眼瞎耳聾撒溺撒屎求生不生求死不死苦哉佛陀耶韓信臨朝底朴翁銛擡腳翻香水海低頭俯視四禪天一箇渾身無處著請續一句無門開力難擡起為君宣神駿何勞更著鞭一躍洞天三十六到時凡骨便成仙虛堂愚松源垂語曰開口不在舌頭上頌曰開口不在舌頭上咬斷牙關供死狀莫教吞了大還丹命根難斷空惆悵朴翁銛含糊一世無分曉開口何嘗在舌頭萬古業風吹不𥁞又隨月色過羅浮虛堂愚松源垂語曰眀眼衲僧因甚腳跟下紅𮈔線不斷頌曰大丈夫漢紅線不斷直饒親見松源敢保錯來批判朴翁銛腳跟不斷紅𮈔線棹臂乾坤自在行塞壑填溝無處著歸來依舊兩眉橫虛堂愚松源示衆曰眀眼衲僧因甚打失鼻孔有賊無贓頌曰殺人一萬三千獨弄單提機不全萬頃滄波眀月夜一聲短笛釣魚船諾菴肇慶元路育王物初觀禪師嗣北澗師示衆云過去如是如是見在如是如是未來如是如是幸自可憐生無端黃面老漢拈花金色頭陀微笑漏泄真機一人傳虛萬人傳實雖然古人得親用親說到行到豈是末流刻楮畫花雕蚶鏤蛤瞎學者眼竪起拂子云無二無二分無別無斷故舉頭鷂子過新羅頌曰兜羅綿手舉花枝金色頭陀展笑眉末法師僧能委息只今那得異當時仲方倫拈花付法慶人天西竺真紹的傳綿密到今無間斷一枝深秀鄮峰顛淨覺曇慶元府天童天目文禮禪師嗣松源因虎維那參次師問汝名什麼曰智虎師退身作怕勢虎擬議師便歸方丈頌曰白浪堆中下一鈎錦鱗紅尾尚悠悠漁翁不計竿頭事笑入蘆花万頃秋石林鞏臨安府徑山佛智晦機熙禪師嗣物初師在仰山示衆云雲門道箇普字盡大地人不奈他何殊不知他已四稜塌地當時若與震威一喝待渠𢙣發徐徐打箇問訊道莫怪觸忤好非圖救取此老亦能振起雲門綱宗頌曰山河大地非同別蟻子蛾蛘沒等差不用干戈更相待本來成現絶安排仲方倫正法眼問韶石普字酬最親切三乘五教文毫端上該攝驪龍打失夜明珠金剛腦後抽生鐵商隱餘僧來請問正法眼韶石單提普字酬不露毫芒威凜凜掃清寰宇絶戈矛淨覺曇臨安府靈隱荊叟玨禪師嗣癡鈍癡鈍室中舉如何是佛師曰爛冬瓜仍頌曰如何是佛爛冬瓜咬著冰霜透齒牙根蒂雖然無窖子一年一度一開花如何是佛爛冬瓜鐵額銅頭沒奈何万里鴻溝歸漢後八千人恨一聲歌獨木林金陵集慶龍翔廣智笑隱欣禪師嗣晦機師在中天竺室中云著頂𩕳上一著十方世界瓦解冰消汝諸人向甚處與山僧相見頌曰佛祖頂𩕳上一著不屬僧祇大劫修卷却娘生三寸舌片帆高掛海門秋仲方倫廣智滿室示衆云身心一如身外無餘大海水在你鼻孔裏須彌山在你額角上一如底心在甚麼處頌曰心不知心方合道色前不物始歸宗屋頭日照茶烟碧山脊風高𣗳葉紅仲方倫蒲室廣智因僧參次師曰鍾鳴鼓響為汝發機露柱燈籠為汝作證因甚來這裏𦗟人處分僧無語師云老僧罪過頌曰鼓響鍾鳴為發機燈籠露柱笑掀眉若無舉鼎山力千里烏騅不易騎仲方倫壺中別有天莫認洞中仙本來成現事鵠白與烏玄淨覺曇蒲室廣智室中舉百丈野狐話對者多不契自云百丈野狐野狐百丈埋向一坑伏惟尚享頌曰浩浩叢林話野狐落他昧處便偏枯禹門一躍成龍去誰復當機問有無仲方倫百丈當時少見機兒孫多是亂針錐一坑埋却渾間事蓋代功高更是誰淨覺曇臨安府徑山石溪心月佛海禪師嗣掩室開僧問如何是佛師曰矮子看戲頌曰巍巍文六紫金容百戲場中有變通矮子看來眉卓竪鐵鎚無孔舞春風葛廬覃演梵善世利國崇教大禪師淨覺曇和尚嗣廣智師在天界示衆舉長慶云總似今日老胡有望保福云總似今日老胡絶望師云老胡有望亦須吐却老胡絶望也且罷休畢竟今日事作麼生良久云有暇却與諸人拈出頌曰平展機籌不用誇抑揚元屬當行家曹溪波浪如相似安得兒孫若稻麻中峰戒徑山虛堂智愚禪師嗣運菴岩垂語曰己眼未眀底因甚麼將虛空作布袴著畫地為牢因甚透者箇不過入海算沙底因甚向針鋒頭上翹足頌曰縫却虛空算盡沙針頭畫地是生涯改頭換面無人見幾度春風吹落花間極雲解把虛空作袴單地牢畫出透還難針鋒頭上翹雙足猶對春風話嵗寒葛廬覃未詳承嗣一十一人機緣一十八則樓子和尚因從街市過經酒樓下偶整襪帶少住聞樓上人唱曲云你既無心我便休聊聞忽然大悟從此號樓子出長慶巘禪師注楞嚴經說文頌曰唱歌樓上語風流你既無心我也休打著奴奴心裏事平生恩愛冷啾啾慈受深偶聞清唱發高樓你若無心我也休直下狂心能頓歇從茲演若不迷頭本覺一你既無心我也休此身無喜亦無憂飢來喫飯困來睡花落從教逐水流寶峯明你若無心我也休鴛鴦帳裏懶擡頭家童為問深深意笑指紗窗月正秋寶華鑑因過花街賣酒樓忽聞語唱惹離愁利刀剪斷紅𮈔線你若無心我也休堂仁杜順和尚法身頌懷州牛喫禾益州馬腹脹天下覔醫人灸猪左膊上頌曰古德法身頌𥧌語熱𡱰沸若學唱巴歌須是自伶俐大溈智一雨一陰風未和春從不快裏消磨桃花暗已隨流水空使劉郎惆悵多心聞賁也好笑也堪悲耳朵元來兩片皮松源嶽月氏國王聞罽賔國祇夜多尊者有大名稱與羣臣往彼國禮見問法王至彼修敬已畢乃請開演者曰大王來時好道今去亦如來時王乃歎伏頌曰至簡至易最尊最貴往還千聖頂𩕳頭世出世間不思議彈指圓成八万門一超直入如來地圓悟勤西天有一外道索馬鳴祖師論義集國王大臣并及四衆俱會論場馬鳴云汝義以何為宗外道云凡有言說我皆能破馬鳴乃指國王云當今國土康寧大王長壽請汝破之外道屈伏頌曰六師不正起干戈自謂無能奈我何九十六宗令結舌不消一曲太平歌本覺一昔有老宿一夏並不為師僧說話有僧自歎曰我只與麼空過一夏不敢望和尚說佛法得聞正因兩字也得老宿聊聞曰闍𥟖莫𧬊速若論正因一字也無道了乃扣齒曰適來無端與麼道鄰壁有老宿聞得乃曰好一釜菱被兩顆鼠糞污却頌曰一夏調和一釜羮傳巖猶未許爭衡莫言污了無人見鄰壁禪翁隻眼明正覺逸長夏無別趣調和羹一釜滋味頗馨香剛地成點污口是禍之門舌是斬身斧陪却三斤鐵只因看錮鏴慈受深泠泠寒溜潓秋壑才會滄溟便泛舟見說許由曾洗耳可憐巢父更鞭牛虛堂愚潭州茶陵郁山主不曾行腳因廬山有化士至論及宗門中事教令看僧問法燈百尺竿頭如何進步法燈曰噁凡三年一日乘驢度橋一橋板而墮忽然大悟遂有頌曰我有神珠一顆久被諸塵封鎖今朝塵盡光生照見山河萬朵因此更不遊方頌曰百尺竿頭曾進步溪橋一沒山河從茲不出茶川上吟嘯無非邏哩囉白雲端進步竿頭斷橋太虛凸處水天凹古今喫𨈀知多少不似闍𥠖這一交北澗簡失腳溪橋兩眼枯錯將魚目作眀珠直饒塵𥁞光生也照破山河夢見無無凖範拾得眀珠笑口開謂言塵𥁞轉塵埃若無直下承當分孤負驢兒一攧來介石朋百尺竿頭話最親一交橋斷絶纖塵死中得活珠離蚌甘作驢前馬後人無門開溪橋驢子失腳處百尺竿頭進步時頂踵一時都換了依然只是郁闍𥠖石溪月一攧成狼藉茶川路轉迂却將泥彈子認作夜明珠葛廬覃昔二庵主旬日後相見上庵主曰許多時在什麼處下庵主曰在庵裏造箇無縫塔上庵主曰某甲也要造一箇就兄借樣子得麼下庵主曰何不早道恰被借去了頌曰無縫塔子樣兩手擡不起被人借將去至今尋未已尋未已天上人間知幾幾月菴果恰好被人借去了莫言鄰舍不通容團圝無縫難安茟只抹烟雲一兩重石林鞏昔有古德一日不赴堂侍者請赴堂德曰我今日在莊上喫油糍飽者曰和尚不曾出入德曰汝去問莊主者方出門忽見莊主歸謝和尚到莊喫油糍或作鵝湖孚和尚或作南泉頌曰近在口皮邊遠過河沙國世間多少人不得油糍喫鼓山圭和尚不赴堂莊主謝臨屈一字入公門九牛車不出徑山杲江南江北勿同倫疑了還疑笑殺人誰信一盤油煠底古今塞斷是非門雪堂行熱糍蕩口成痕跡糍冷令人便動脾何似且拈安一處家常茶飯但隨時照堂一背衆喫油糍對人誇好手潦倒不識羞抵死揚家醜應菴華喫了油糍不赴齊莊師特特謝師來千山萬水俱尋遍破芒鞋眼未開𡰱無著總古德何曾動口皮喫油糍飽幾人知而今冷地思量著暗寫愁腸寄與誰肯堂充古德因僧問年窮嵗𥁞時如何德曰東村王老夜燒錢頌曰目前無異路信手斫方圓眉毛橫眼上鼻孔大頭懸空叟印年窮王老夜燒錢斷送難逢下水船懵底不知身到岸隨他寒暑謾推遷遁庵演問來答去有來源一句全該遍大千歲𥁞年窮窮底事東村王老夜燒錢蕳翁敬春風陌上郎得錢隨手使貨物忽相當撞著恰却子雪巖欽古德因僧問生死以何為舟航德曰年𥁞不燒錢頌曰年𥁞不燒錢鼠被蛇穿直饒玄會得對面隔西天曹源生古德因僧問年窮嵗𥁞時如何德曰家家盡看野狐兒頌曰家家盡看野狐兒鐵笛橫拈撩亂吹吹罷不知何處去夕陽已掛柳梢西松源嶽家家盡看野狐兒見者雖多識者稀百怪千妖俱掃跡春風已到萬年枝晦叟光古德問僧曰何不看經曰不識字德曰何不問人僧展手曰是什麼字德無對頌曰袖中寶劒磨星斗肘後靈符照八方撥轉目前關捩子從教天下竟茫茫誰菴演鶴立蛇行勢不你五天梵字鬼神愁孔門弟子無人識碧眼胡僧笑點頭殺六岩輝宋太宗皇帝因夢神人勸發菩提心次日問臣菩提心作麼生發羣臣無對雪竇代云實為古今罕聞別峰印代答云王言如𮈔其出如綸頌曰菩提妙心作麼發曰應万機元不差回首瞥然輕覷著大千沙界是皇家松源嶽萬里謳歌聖化成條風磈雨樂樵耕不因嵩嶽三呼後無象誰知真太平雙杉元菩提心發不為難只在君王一念閒聖聖相傳皆一揆綿綿國祚泰山安辛菴儔太宗問僧近離甚處曰臥雲菴帝曰臥雲深處不朝天因甚到此僧無對雪竇代云難逃至化頌曰試問臥雲深處客不知何以答升平蕩然至化難逃避萬里堯天一點雲北澗蕳太宗因僧朝見奏云陛下還記得麼帝曰甚處相見曰靈山一別直至如今帝曰以何為驗僧無語雪竇代云貧道得得而來頌曰靈山一別二千年聖世重逢豈偶然細掬清泉揩老眼撥開雲霧見青天石溪月太宗一日擎起鉢問丞相王隨曰既是大𢈔嶺頭提不起為甚麼却在寡人手裏隨無對慈眀圓代云陛下有力頌曰大地𠬧歸掌握間鉢盂擎起有何難箇中消息憑誰委秋水秋雲秋夜寒雲衲慶錢塘鎮使在界上為鎮將凡見僧便問若相契即留止宿一日因二僧至遂問近離甚處曰江西馬大師處使曰馬大師有什麼方便曰道即心是佛便被揖出又有二僧到亦如前問僧曰非心非佛又被揖出頌曰是是非非俱請出巍巍萬仞如壁立平生心膽向人傾相識還如不相識無際派碧油幢下立功勛韜略雙全獨見君一自赤心來報國邊頭刁斗不曾聞虛堂愚昔有一婆供養一菴主經二十餘年嘗令一二八女子送飯給侍一日令女子抱定云正當與麼時如何庵主曰枯木倚寒巖三春無暖氣女歸舉似婆婆曰我二十年只供養得箇俗漢遂趂出放火燒却菴頌曰不見人斑見虎斑算來莫願見人斑虎斑見後通回避唯見人斑避最難或菴體鐵壁迸開雲片片黑山輥出月團團就中眀暗相陵處天外出頭誰解看虛堂愚貧人常妬富富者不欺貧莫信直中直須防人不仁間極雲二十年來不具眼茆菴燒却是徒為三春暖氣無多子真安之言亦可師橫川珙青蓮瞬視金色笑微師承肇茲密著少林華敷神光印受世係由是彰雖枝派之有殊分然機用之無二致或縱𡙸而破古人之幽鍵或捭闔而發後學之靈樞大用現前纖塵不立四句獨超於言外万法俱泯於聲先玉振禪宗珠聯祖城流通雖遠選擇未純識者尚譏况於後乎錢塘魯庵會公孤標俗積行熏心遐扣祖機深染法味采機緣而補前綴頌古而入新刊通集後先洞照今古用心亦閎矣謹遣清侶躬索後題慚窺管而見微聊濡毫而塞請延祐戊午季夏徑山希陵題宗門中有一千七伯則公案名之今古又曰長物言之則污人唇齒置之則回避無門句句王轉珠回字字冰銷瓦解歷代宗匠頌之未免畫蛇添足寶鑑師編緝於前魯菴公增𠬧於後贓證分眀不勞再勘中間一處誵訛具眼衲僧必能辨白靈隱淳朋拜書永樂二年甲申夏五月命工補刊謹識
