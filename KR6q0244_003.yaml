body:
  text: 僧錄司右闡教兼靈谷禪寺住持淨戒重校祖師機緣西天初祖二則第九祖一則第十祖一則第十四祖一則二十四祖一則二十七祖一則東土初祖六則二祖一則三祖一則四祖一則五祖一則六祖五則西天初祖摩訶迦葉尊者見世尊在靈山會上拈起一枝花以青蓮目普示大眾百萬聖賢悉皆罔措惟迦葉破顏微咲世尊乃曰吾有正法眼藏涅槃妙心實相無相微妙觧脫法門付囑於汝汝當護持流通無令断絕頌曰仙子持來別是春還將分付與仙人可怜壞衲曾微咲有理傍觀不觧伸佛印元霜風刮地埽枯荄誰覺東君令已回唯有嶺梅先漏泄一枝獨向雪中開佛慧泉盡說拈花微咲是不知將底辯宗風若言心眼同時證未免朦朧在夢中白雲端拈花我佛在靈山迦葉頭陀忽破顏金口密言親付囑不唯天上與人間保寧勇教外全提號別傳飲光閉目咲無言可怜十萬靈山眾不薦當頭一着玄照覺捴靈山旱地紅蓮發白眉老翁咲不歇轟轟洪韻震東西八萬迷徒猶未瞥黃蘗勝世尊舉花迦葉微咲殃及兒孫上祖不了楊無為飲光誰謂悟拈花微咲依前隔海涯黃面只圖傳大事赤眉終不打貧家祖印明正眼由來付飲光靈山七眾盡㱕降枝繁葉茂宗門盛自淂兒孫滿大唐草堂清世尊拈花迦葉微咲不落宮商是何曲調古洞風清寒潭月皎長靈卓世尊迦葉不相知䧟虎機關各自施正眼妙心真實相靈山會上付他誰張無盡舉花示眾誰相委迦葉頭陀獨破顏無限白雲藏不淂又隨流水落人間南華昺聞琴作舞見華破顏一彩兩賽天上人間旻古佛百萬人天普請看頭陀末上獨開顏堪咲衣穿瘦骨露一肩授手搭金襴佛燈珣飲光當日咲無言家醜從來不外傳不撥韶絃成一曲至今清韻出人天雪峯預拈花已落微咲後咲出精神拈處先一片銀蟾無晝夜十分光影向人圓佛心才教外單傳事最奇兜羅綿手舉花時會中不得鷄峯老無限清香付與誰正覺逸兜羅綿手舉花時風𮞏幽香幾箇知除却雞峯迦葉後誰人眼內有瞳兒慈受深百萬人天望舉揚拈花微咲太乖張幾多業識茫茫者問着勞生沸似湯龍門遠海水飜空袞流魚龍鰕蠏信沉浮可怜金色頭陀子直至如今咲未休皷山珪一華拈起便承當正眼傳來不覆藏今古流通無間断枝枝葉葉盡芬芳踈山如拈起一枝花風流出當家若言付心法天下事如麻徑山杲靈山用處許誰知迦葉偷顏咲展眉動便最初先漏泄兒孫扶取上玄機楚安方瞿曇拈起花枝迦葉微開咲面要知造物無私更聽黃鶯一囀石明拈花親付老頭陀平地俄興一丈波後代釘搖櫓者竹篙量水轉譊訛寶華鑑古塚露枯骨窮源逢断槗一番新雨過翠色滿林梢白楊順項上鐵枷三百斤分明有理不容伸默然雞足峯前坐猶把金襴誑後人尼無着捴末後無端重漏泄焦齒翁翁嚼生鐵玉鞭擊碎月眀珠累及兒孫揚醜拙湛堂深世尊拈花迦葉微笑天際二輪更相互照若能截断老瞿曇閉目黃河只一跳惠通旦雪壓怪松露風高野渡橫將謂眾生苦更有苦眾生万年閑金色頭陁忽破顏看來也是管窺斑當時若得回頭早免見兒孫墯黑山應菴華世尊拈花迦葉微笑一對鐵錐渾無孔竅佛照光釋尊拈起枝花分明勾賊破家致令千古之下兒孫逐惡隨邪蒙菴聡世尊不曾拈花迦葉不曾微笑大地捴是兒孫誰明向上一竅肯堂充白日青天開眼放尿黃面瞿曇一塲漏逗木菴永拈起花來尾巴已露迦葉破顏人天罔措無門開迦葉因阿難問世尊傳金襴外別傳何物迦葉召阿難難應諾迦葉曰倒却門前𠛴竿著頌曰影略門前倒剎竿箇中消息授傳難玲瓏侍者能相委盤走明珠珠走盤天童覺金襴付外有何傳倒却門前舊剎竿不取一時為上瑞百千年後與人看草堂清金襴付外別何傳呼應雖勤意未圓迦葉更能施善巧剎竿倒却貴安然覺海元花葉聮芳信有期飲光抗召劃芬披而今莫問當時事路上行人口是碑正覺逸金襴之外復何傳弟應兄呼豈有偏倒却門前剎竿子免教依舊倚墻邊白雲端象王行處絕狐蹤象子雄雄継此風休說二千年後事縱塵沙劫又何窮保寧勇金襴傳外更瞞頇漏泄天機倒剎竿東震西乾扶不起至今𣧎禍及兒孫照覺捴提起金襴惹倒剎竿步步蹋著綠水青山旻古佛慶喜門前倒剎竿金襴傳外有何傳天然外道無師證爭奈威音佛已前張無𥁞金襴傳外更何傳背角泥牛痛下鞭哮吼一聲魔膽裂飜身踏破碧潭煙南華昺難兄難弟問來端百衲金襴𮞏代傳弟應兄呼成底事免認剎竿頭指天佛燈珣心心相照始相知金色頭陁別是非五里牌從郭外看當人不肯怨它誰道塲如琉璃殿上付金襴棣蕚聮芳得二難門外剎竿從放倒免教南北問風旛上方益弟兄相應鶺鴒原相喚相呼豈等閑金襴之外傳何物向道門前倒剎竿文殊道頭陁飲光多聞慶喜合掌擎拳難兄難弟一朝狹路兩相逢裂轉雙晴無處避便向門前倒𠛴竿丈夫自有衝天志慈受深草衣木食道人高傳得金襴意氣豪此外已知無別法剎竿倒處累兒曹踈山如金襴傳外復何傳報道門前倒剎竿好笑踏青人爛醉滿川桃李自無言石明怛薩阿竭二千年密付親承盡浪傳直至如今成露布剎竿依舊倚門前大洪恩鳳毛麟角一般奇弟應兄呼豈不知堪笑靈源春雨後落花流水自相冝開先瑛多子塔前衣付後更傳何物示於人驪珠迸出剎竿倒直得寒光徹四鄰佛性泰等閑饒舌話金襴便與當頭倒剎竿從此天倫轉無義冷光猶自逼人寒瞎堂遠弟應兄呼𦘕不成誰人肯向裏頭行自從家破人亡後直至如今事轉生月林觀弟應兄呼有禮有義𧆞咬大蟲蛇吞鱉鼻倒却門前剎竿着唵蘇嚕蘇嚕悉唎悉唎退菴奇翡翠羽毛麒麟頭角弟應兄呼振動海嶽路遠夜長休把火倒却門前𠛴竿着高原泉家家門口透長安不見纖毫眼界寬無法無人誰付囑難兄難第自相謾雪菴瑾倒却門前剎竿全提那涉玄端飜身不坐空王殿月照千峯夜色寒足菴鑒面面相看眼眼廝覷衣外別傳有甚憑據倒却門前𠛴竿着鳳棲不在梧桐樹無凖範寵弟常常在侍邊傳金襴外問何傳自家兄弟無多事只道門前倒剎竿閑極雲煮豆燃豆萁豆在釜中泣本是同根生相煎何太急雲衲慶九祖伏䭾密多尊者問八祖佛䭾難提父母非我親誰是最親者諸佛非我道誰是最道者八祖以偈荅汝言與心親父母非可比汝行與道合諸佛心即是外求有相佛與汝不相似欲識汝本心非合亦非離頌曰閒却年光半百春可怜嫌富不嫌貧祖佛非道求何道父母不親誰更親七步豈勞蓮捧足無言須信鑑生塵禪門自古牢關鑰漏泄家風是此人佛慧泉見處孤危立處高急如石火利如刀到家問路家何在掀倒棊盤脫布袍瞎堂遠半生足不履地軒知蹋遍天涯得個冬𤓰印子至今目瞪口呿松源岳父母分明非我親祖師肝膽向人傾直下若能親薦得優曇華發火中春高原泉父母非親親是誰雙眸烱烱帶雙眉含元殿上不相識正是岷峨相見時石溪月十祖脇尊者本名難生處胎六十年神珠夢應誕生之日滿室光明出家得道至一林中有富那夜奢合掌前立祖問汝從何來奢曰我心非徃祖曰汝何處住曰我心非止祖曰汝不定邪曰諸佛亦然祖曰汝非諸佛曰諸佛亦非祖知是法器即與剃度付法說偈曰真體自然真因真說有理領得真真法無行亦無止頌曰打鼓弄琵琶相逢兩會家清風拂白月地角接天涯碎玉凝朝露殘陽送晚霞寒山逢拾得拊掌咲嗄嗄南堂興二諸佛亦非窮子腹肥纔一䪺飽忘百日飢二十拄杖十分槌免教辜負兩莖眉電捲星飛珠回玉轉打破面皮赤心片片瞎堂遠十四祖龍樹大士見十五祖迦那提婆來先令侍者將一椀水致面前提婆見乃取一針投之祖由是大喜頌曰龍猛盂中水提婆毳上針人人爭得失箇箇話踈親不覩雲中鴈焉知沙塞深農人移片磉磉下獲黃金琅琊覺漏傳長樂未央靜月瀉甘泉太液秋夜半樂聲回步輦喚回三十六宮愁心聞賁二十四祖師子尊者因罽賔國王秉劒於前曰師得蘊空不祖曰已得蘊空曰離生死不祖曰已離生死曰既離生死可施我頭祖曰身非我有何恡於頭王即揮刃断尊者首涌白乳高數尺王之右臂𢭀亦墯地玄沙云大小師子尊者頭也不解作得主頌曰尊者理非玄沙語甚奇首隨鋒刃落彼此沒毫厘永明壽揚子江頭楊柳春楊花愁殺渡頭人一聲羗笛離亭晚君向瀟湘我向秦龍門遠作家手叚天然別不辞臂墯除妖孽万里歌謠賀太平夜夜清光輝雪月大溈智得人一牛還人一馬有往有來可知禮也佛性泰船子下楊州浮萍逐水流一聲河滿子千古動悲愁鼓山珪殺人湏是殺人漢當下一刀成兩叚頭臂雖虧劒刃鋒何似秦時𨍏轢鑽徑山杲君王寶劒不虗施尊者遭逢也大奇從此清風徧寰宇太平消息幾人知或菴體吹毛劒首乾坤黑臂墯山河掩日光趯起須弥頭倒卓方知兩兩不成雙湛堂深尊者何曾得蘊空罽賔徒自斬春風桃花雨後亂零落染得一溪流水紅咦菴鑑口念木𤓰醫脚氣紙𥁞鍾馗驅鬼祟一生若解和羅槌日日喫酒日日醉懶菴樞佛法王法更無兩樣宜下一刀未為諦當月林觀師子頭落罽賔臂折各人眼底有西施誰家甕裏無明月朴翁銛遇着山中人便說山中話六月賣松風人間恐無價孤峯深覿面當機掣電飛當機覿面誰能用一劒分身定死生君王萬古聲名重木菴永劒下十分真難藏獨露身江流石不轉獨有蘊空名北磵蕳夢中要渡深溪水伎倆多般進不能驀地覺來伎倆盡床頭山月已三更石菴玿蘊空誰見法中王覿體何曾礙劒光古廟藤蘿穿戶牖斷碑風雨碎文章雪菴瑾夜闌天際墯金盆膝上焦桐調轉新易水悲風輕按指鸞難續断膓人虛堂愚二十七祖般若多羅東印土國王請師齋次王問諸人盡轉經唯師為甚不轉師云貧道出息不涉世緣入息不居蘊界常轉如是經百千万億卷非但一卷兩卷汾陽昭云却勞尊者心力大溈智云諸仁者還見二十七祖看經麼行時脚跟不著地坐時心識似風飄乃頌云秋高月色連雲白淡薄禪心滋味長歷歷分眀今古意何須特地更商量靈犀玩月璨含輝木馬遊春駿不覊眉底一雙寒碧眼看經那得透牛皮明白心超曠劫英雄力破重圍妙圓樞口轉靈機寒山忘却來時路拾得相將携手歸天童覺入息未甞居蘊界出息何曾涉万緣一聲漁笛離南浦依舊蘆華深處眠懶菴需東土初祖菩提達磨大師即西土二十八祖初至金陵見梁武帝帝問曰如何是聖諦第一義師曰廓然無聖曰對朕者誰師曰不識帝不領悟師遂折蘆渡江至魏後帝舉問誌公公曰陛下識此人不曰不識誌曰此是觀音大士傳佛心印曰當遣使詔之誌曰莫道陛下詔盍國人去它亦不回頌曰聖諦廓然何當辨的對朕者誰還云不識因茲暗渡江豈免生荊𣗥盍國人追不再來千古万古空相憶休相憶清風匝地有何極師頋視左右云這裏還有祖師麼喚來與老僧洗脚雪竇顯客從方外來一人也弗識無心得可傳九年空面壁冷坐寥寥不自安手携隻履歸西國法雲秀凡聖縈纏情未忘廓然無聖便驚狂梁王殿下無謀畧剛被胡人亂一塲泉大道廓然一鏃遼天不識重下錐刺梁帝不知何處去千古万古無消息正覺逸廓然絕聖猶方便不識天顏今對面對面不契渡長江北去少林方眷戀覺海元一箭尋常落一鵰更加一箭已相饒直歸少室峯前坐梁主休云更去招白雲端煉得通紅打一鎚周遭無數火星飛十成好箇金剛鑽攤向門前賣與誰保寧勇廓然無聖不須微句後通機是眼睛莫怪相逢不下馬奈緣各自有前桯雲溪恭弟一義廓𠔃零𠔃超象帝不把多年曆日看爭辨春分并夏至遼東白鶴去無蹤三山半落青天外上方益聖諦第一義門廓然無聖誰尊堪笑江南二月裏鷓鴣啼在百花村太平古閒將一叚秦川錦裁作人間巧婦衣幾度者來呈伎倆暗中曲調少人知成枯木遠泛鯨濤入大梁廓然無聖對君王可憐寸徑無人鑑却與相如依舊藏佛心才不解作客勞煩主人面無慚色少喜多嗔長靈卓始鳴阿閣一聲鍾日暖蒼龍睡正濃再擊鳳凰臺上鼓半夜祥鸞未飛舞帝基永固如盤石胡僧虗費平生力回指少林歸去來春風一陣花狼藉佛鑑懃展陣開旗便要贏誰知䘖駕不親征把定鏘旗𭣣陣脚直向熊峯不出兵佛燈珣當時卞璧親持献未遇徒然更再三折韋渡江江上水滔滔今古色如藍夢菴信西天屠子氣雄豪欺負神州罪莫逃梁帝當頭輕一拶果然提起活人刀雪堂行廓然無聖露全身覿面相呈已隔津莫問梁邦并魏苑一花五葉自然春雲巖因胡僧對漢主廓然無聖語復云不識渠神驥捉老鼠捉不着千里清光渾失却石明黃金鑿白玉椎鑒開混沌竅透出玄元機正堂辯老胡元不渡長江孰謂曾將一葦航堪咲普通年遠事兒孫多是錯商量肯堂充踏翻地軸地不動推倒天關天更高穩泛鐵舡歸少室至今天下起風濤雪菴瑾強將不識鼓唇牙胡語如何亂得華若使老蕭皮有血定應趕逐過流沙天目禮一言既出駟難追賴遇梁王放過伊楊子江頭航折葦浪頭何似問頭危朴翁銛五葉芬敷自一花無人圖𦽦剪根芽不教着脚金陵地猶恨蕭梁未作家北磵簡金烏飛上玉闌干黑漆崑崙對面看畢竟這些傳不得落花流水太無端天童淨提起湏第一槌玉門金鎻擊難開重施背踏空勞力應悔迢迢万里來癡鈍頴玉簫吹徹鳳凰臺古殿深沉曉未開滿地落花春已過綠陰空鎻舊苺苔虛堂愚万浪千波一葦橫翩翩隻影可憐生老蕭若會截流句楊子江頭放你行石溪月一葦截流深心叵測梁土太平魏邦著賊雪屋珂遠到支那十万餘清波無路一莖蘆而今面越之燕者對朕還曾識也無德巖祐廓然無聖真實語對朕者誰心未息本光燦爛照十方無量劫來到今日橫川珙西來十万路迢迢智鑑當軒影莫逃四海浪平龍睡穩九霄雲淨鶴飛高雪巖欽達磨大師西來直指人心見性成佛頌曰急水波心下直鈎魚龍鰕蠏一時𭣣祖師活計無多子惱亂春風卒未𠇲松源岳達磨大師自梁涉魏至洛陽少林面壁而坐經於九年方得二祖傳法頌曰先被梁王勘破却向少林孤坐謾言教外別傳爭奈不識這箇白雲端十万途窮得到梁梁王言語不相當少林不假東君力五葉花開動地香佛國白精進翻成怠墯莫守癡禪元坐少林面壁九年已被梁王勘破祖印明六宗調伏向東來五葉芬披震旦開冷坐九年人不識手携隻履又空回草堂清泛舶來梁自普通一槌擊碎有為功謾言面壁無言說爭奈當門齒露風佛性泰航海梯山緣底事游梁歷魏意何傳九年面壁垂慈切剛被時人喚作禪太平古九年熊耳空留隻履一花五葉春風四起旻古佛達磨西來未足誇少林捏目強生花得皮得髓徒分別妙𪫬圓眀本不差踈山如少室山前風過耳九年人事隨流水若還不是弄潮人切須莫入洪波裏鼓山珪金鰲一掣滄溟竭徒自悠悠泛小舟今日烟波無可釣不湏新月更為鈎徑山杲祖師面壁九年餘此是西來末上機直至如今天下客強將言句為施為南山省堂主千鄉万里尋知己一語臨機不契梁面壁九年居少室覔心千古累神光天童覺一片虛凝地丹青畫不成聖賢難啟口佛祖強安名正堂辨祖師遠遠來東土面壁少林坐九年二祖傳心親得髓筭來早是已輸先高菴悟喪盡家財無本可據赤手殺人彌天罪過木菴永渡江一葦風濤急少室九年空面壁錯把安心露一機至今滿地花狼籍皖山凝不契梁王暗渡江一身無地避慚惶九年面壁成何事賺却平人入鑊湯湖隱濟九年面壁轉身無䇿冷地有人奮一臂力月坡明達磨大師將返西天謂門人曰時將至矣盍各言所淂乎時門人道副曰如我所見不執文字不離文字而為道用祖曰汝淂吾皮尼緫持曰我今所解如慶喜見阿閦佛國一見更不再見祖曰汝得吾肉道育曰四大本空五陰非有而我見處無一法可得祖曰汝得吾骨最後慧可出禮三拜依位而立祖曰汝得吾髓乃傳法付衣頌曰神光三拜退後立瀑布嵓前水長急楞嚴會上逞圓通却使老盧雙淚泣天衣懷少林真嗣擇全才諸子紛紛點額回衣法莫言容易淂曾憑三拜作良媒正覺逸門前諸子列成行各逞英雄越覇王如何獨有無言者坐断毗盧不可當保寧勇四維上下絕遮攔湧出冰壺印碧天無孔笛中藏六律一聲驚起釣魚船成枯木神光三拜依位立觧會都忘未端的皮毛脫盡孰親踈誰言淂髓能情息圓通秀當門齒真堪笑面壁無言坐九年皮髓些些分俵了依前懡㦬返西天地藏恩誰透少林關三拜仍依位立雪要心安忘形甘斷臂祖印明齒胡僧到大唐却將皮髓強分張九年懡㦬空歸去添淂華人笑幾場佛國白弟昆各自逞功能獨有家兄徹骨貧三拜起來無一語鼻孔纍垂盖口唇雪竇宗一從三拜後千古錯流通永日無人到蕭蕭檜栢風龍門遠社舞村歌笑殺人騎牛挑鴨走成羣三盃酒罷歸家去㽞得猪頭碍塞人正堂辨鏡凹照人瘦鏡凸照人肥不如打破鏡還我舊面皮懶菴樞捏目生花立問端淂它皮髓被它瞞這般瞎漢能多事六月無霜也道寒簡菴清死欵都來一口供情窮理極卒難容若將皮髓論高下爭見花開五葉紅高峯妙達磨大師曰吾法於三千年後未曾移易一𮈔毫許頌曰東西縱目乾坤闊玉露澄秋氣宇高山是山𠔃水是水何曾移易一𮈔毫葛廬覃達磨大師既葬熊耳山後三歲魏宋雲使西域回遇祖於䓗嶺手携隻履翩翩獨逝雲問師何往祖曰西天去又謂雲曰汝主已厭世雲聞之茫然別祖東邁暨復命即明帝已登遐矣迨啟壙惟空棺一隻革履存焉舉朝為之驚歎奉詔取遺履於少林寺供養頌曰熊耳宗師葬洛陽龍城天子泣千行迴擔隻履䓗山上驚殺梁王與魏王尅符道者師眼兮深師鼻兮大師耳兮穿師舌𠔃快師身𠔃墨師心𠔃戴手携隻履返流沙熊耳石塔今猶在琅琊覺祖師遺下一隻履千古萬古播人耳空自肩擔跣足行何曾踏着自家底五祖演梁魏山河本太平無端容此老狐精九年皮髓分張盡隻履空棺更誑人東山空闔國人難挽西携隻履歸只應熊耳月千古冷光輝虎丘隆梯山航海自西來誰謂梁王眼未開一句等閑輕勘破九年端坐冷如灰來時打落當門齒去後空留左子計切脚鞋到底徃還無箇事依前隻履又空回開善祖航海東來黠兒落莭為法求人自作深孽頼遇梁王是作家有理直教無處雪及乎隻履復西歸䓗嶺無端重漏泄分明弄巧反成拙尼無着捴𩗺下一隻履明明不覆藏兒孫纔着脚徧地是刀鎗妙峯善九年冷坐已敗𨵗隻履西歸更脫空後代兒孫空妄想鷓鴣啼不為春風雪菴瑾死也不伏埋𣩵偷携隻履西歸不被宋雲捉敗官司何處尋屍孤峯深禾山方曰死心先師每舉隻履西歸話以問衲子而實難明諸方或謂之隱顯或謂不可有兩箇或謂唯此一事實若也恁麼未識祖師意旨諸人要見麼乃頌曰濁中清清中濁勿謂麒麟生隻角西行東向路不差大用頭頭如啐啄莫莫玄要靈機休卜度二祖慧可大師初至少林叅承達磨立雪斷臂悲淚求法磨知是法噐乃曰諸佛㝡初求道為法忘形汝今斷臂求亦可在祖曰諸佛法印可得聞乎磨曰諸佛法印不從人得祖曰我心未寧乞師安心磨曰將心來與汝安祖曰覔心了不可得曰與汝安心竟祖於此悟入頌曰九年面壁待當機立雪齊腰未展眉恭敬願安心地法覔心無得始無疑汾陽昭断臂難於立雪難覔心無處始心安誰知萬頃蘆花境一二漁翁把釣竿正覺逸終始覔心無可得寥寥不見少林人滿舊雪重知冷鼻孔依前搭上唇白雲端覔心不可得處處逢知識無用一雙眉同渠超百億雲居祐立雪齊腰成底事以刀斷臂亦奚為從門入者非家寶休殢西來老古錐地藏恩思量何用覔安心求得心安却苦身三尺雪深曾立處不知誰是雪中人佛國白少林面壁太多言接得門人一臂全京洛至今三尺雪天寒何止普通年楊無為覔心不得已安心屠肆坊嗣少林爭奈子孫嫌直截諸方五味苦叅尋張無盡斷臂覔心心不得覔心無得始安心心安後夜雪庭際滿目瑤花無處尋草堂清覔心不有三拜聊施靈熖益熾肯首自知回觀法印全彰處江月松風盡入微佛心才父財子用父用子財覔心無處心眼自開長靈卓若有𮈔毫付與人可師何得更全身人間天上迷逢處八兩元來是半斤龍門遠三拜劬勤雪到腰覔心無處強相饒神光本地思量着始覺春來雪自消佛燈珣二祖當年立少林滿積雪到腰深义手當胸無一事不求不覔不安心鼓山珪覔心無處更何安嚼碎通紅鐵一團縱使眼開張意氣爭如不受老胡謾徑山杲不待七處徵當下便不見猢孫水上打鞦韆新羅王子放一箭高着眼分明穿破波斯靣石明立雪齊腰寶刀斷臂不動神情十方遊戲白楊順二祖無端向少林前立雪到腰深直饒覔得心無有未免全身被陸沉誰菴演屈莭從長也大𢬵雪堆斷臂仰高寒鐵牛鞭起熊峯下一吸黃河徹底乾或菴體達磨九年面壁坐深雪之中得一箇得一箇森羅萬象平分破尼無着総拈刀截臂露全真忘却求安心底人若是當時知痛痒老胡何處著渾身無際𣲖長安深夜雪澷澷欲覔心安轉不安縱使言前開活眼那知已被老胡謾息菴觀平地無端起骨堆將身活向雪中埋假鐃覔淂安心法還我娘生一臂來隱山璨自有覔不得無端面發紅翻身喫一𨈀兩手摸虛空雪菴瑾深雪堆中斷一肢老胡抑下十分威當時便好掀翻去未到教他死馬醫石室輝二祖當年不丈夫分皮分髓被塗糊可憐要乞安心法直至而今一臂無毒菴常覔心無處覔當下便心安早知冰是水兩臂定完全石田薰三祖僧璨大師不知何許人不言名氏為居士謁二祖曰弟子身纏風恙請和尚懺罪祖曰將罪來與汝懺居士良久曰覔罪不可淂祖曰我與汝懺罪竟冝依佛法僧住曰今見和尚已知是僧未審何名佛法祖曰是心是佛是心是法法佛無二僧寶亦然曰今日始知罪性不在內不在外不在中間如其心然佛法無二也祖深器之即為剃𩬊曰是吾寶也冝名僧璨執侍二載乃付達磨信衣正法眼藏說偈密囑護持無令斷絕後居舒州潛皖山谷或司空山頌曰潛溪水急天柱峯高洞然明白不隔𮈔毫從來生計平如掌後世兒孫弄海潮楊無為罪已無根性已空正生風處不生風至今山谷山前水一𣲖清流入海中佛國白說罪師前請懺除罪忘心滅兩如如誰知璨是僧中寶來往司空山下居草堂清半醒半醉臥街衢忽悟通身業本無三昧若從人處淂効顰何異更塗糊成枯木無孔笛子氊拍板五音六律皆普徧時人不識黃番綽笑道儂家登寶殿五祖演風恙纏身覔罪不得九萬里程展摩霄翼旻古佛三祖以罪懺罪二祖將錯就錯一陣清風劈面來罪花業果俱凋落靈丹一粒有神功瘥病不假驢駞藥佛鑒懃渾身燥痒倩人搔入骨搔來身已勞一下被伊搔著了平生痒處一時消水菴一二祖安心三祖懺罪逐惡隨邪成群作隊只許老胡知不許老胡會退菴竒彌天罪過無門懺紅爛通身世莫醫已是四稜俱蹋地儘教後代亂針錐無門開平生罪性覔無踪直得乾坤大地空天地依然高突兀潛溪一𣲖自朝宗癡絕冲風恙纏身世莫醫家貧遭刼更堪悲誰知覔罪了無處正是賊歸空屋時大歇謙罪過彌天乞懺除看時似有覔渾無直饒言下滅胡族冷地尋思不丈夫石室輝四祖道信大師初為沙彌年始十四禮三祖曰願和尚慈悲乞與解脫法門祖曰誰縛汝曰無人縛祖曰何更求解脫乎師於言下大悟服勞九載乃付衣法住蘄州破頭山學侶雲臻攝心不𥧌脇不至席一日告眾曰吾武德中遊廬山登絕頂望破頭山見紫雲如盖下有白氣橫分六道汝等會不眾默然弘忍曰莫是和尚它後橫出一枝佛法不師曰善唐太宗響師道三詔不赴就賜紫服頌曰慈雲之塔大醫之師瞻之仰之雙峯魏魏懶融不淂西天鉢直付黃梅路上兒揚無為島外逢師解縛歸雙峯山下獨幽奇卻將衣鉢為人事乞與黃梅箇小兒佛國白道出乾坤動至尊飛雲三詔不離雲求人的嗣周家子遙望牛頭紫氣分草堂清絕知名迹能妨道正恐師承亦累人問法沙彌莫饒舌百年逆旅要同塵覺範洪無縛無釋脇不至席分開一貫兩箇五百旻古佛牛頭未生梅子熟也翫步人間池成月下鳳書三到懶開眸白蓮峰頂光相射雲嵓因堅辭鳳闕紫泥詔玷辱宗風箇古錐坐断雙峯無寸草愛松留得礙人枝無門開掀翻解脫脫巢窠從此縵天布網羅落賺小兒猶自可一枝橫出轉譊訛癡絕冲誰縛無人縛何更求解脫未必右軍鵝便是支郎鶴石田薰破頭峯頂紫雲飛三却天書老翠微滯貨雖然無用處不應分付小孩兒少室睦五祖弘忍大師前身在蘄州西山栽松遇四祖告曰吾欲傳法與汝汝已年邁汝若再來吾尚遲汝師諾遂往周氏家女托生因拋濁港中神物護持至七歲為童子四祖一日往黃梅縣逢一小兒骨相奇秀乃問曰子何姓曰姓即有非常姓祖曰是何姓曰是佛性祖曰汝無性耶曰性空故祖默識其法器即俾侍者後令出家後付衣法居黃梅東山頌曰栽松何老傳衣何少前身後身一夢兩覺白藕花開峯頂頭明月千年冷相照楊無為二日出而作栽松為樂昔栽幾何今滿嵓壑白頭人去小兒歸笑殺林稍千歲鶴在聖權方世莫評双峯密付豈虛稱前身已老難傳鉢託陰重來始継燈昔日栽松名尚振千靈報母願何增如今海內宗風徧只為舂中擇得能白雲端垂垂白𩬊下青山七載歸來換舊顏人却少年松已老是非從此落人間佛國白誰是前身孰後身謾將名字較新陳隣家莫問去來事吾是昔人非昔人祖印明無父無兄絕是非江心誰辨逆流時西山淂法東山隱此事只教能者知草堂清濁港滔滔歧路絕翻身釘出空中橛白蓮花向半天開從此天機渾漏泄旻古佛黃梅果熟白藕花開問唯佛性體異凡胎衣傳南嶺人將去松老西山我再來兩借皮囊成底事一壺風月湛無埃天童覺老大不堪用約去了還來伸脚縮脚裏貪程速快哉有娘生面無爺姓趂得曇華玉葉開佛燈珣香火綿綿五百年孤猿野鶴老松巔人傳妙道回南嶺我禮浮屠向半天前後真身無覔處古今靈迹尚依然若人問我東山事峯頂池中有白蓮白楊順東山法門眾盈七百真能者師為世作則濁港滔滔清有餘黃梅路上人南北雲嵓因一去一來一老一少兩鏡對懸光影俱照直饒用盡神通未明向上一竅尼無著緫約去栽松箇老人還來傳法喜童真有娘生靣無爺姓劫外靈苗不犯春水菴一元是黃梅舊日僧事師年老氣彌增翻身𩗺下栽松钁轉步來分照世燈皮袋假於溪畔女衣盂付與嶺南能佳聲籍籍能長久雨過淮山碧萬層湖隱濟滿頭白老嵓隈萬本青松懶更栽皮袋累他周氏女難尋蹤跡去還來天目禮好箇栽松道者臨老無端打野不識從本爺娘負累周家小姐濁港浸他不殺養大便成姦猾皷弄黃梅七百僧成群逐隊爭衣鉢朴翁銛青松未種鼻遼天種了青松失半邊玷辱周家猶自可再來不直半文錢笑翁堪栽徧滿山松暗地翻身轉雖然淂信衣何曾識爺靣石田薰幾年活計钁頭邊萬本青松𤨏翠炬夢破曹溪天地闊再來不直半分錢少室睦栽松幸自可憐生剛要隨人入火坑換淂皮囊急回首依前鼻孔不多爭石室輝六祖慧能大師本姓盧家貧賣薪養母因往五祖求法祖曰汝自何來曰嶺南祖曰欲湏何事曰唯求作佛祖曰嶺南人無佛性若為淂佛曰人即有南北佛性豈然祖知是異人乃訶曰著槽廠去遂禮足而退便入碓坊服勞於杵臼之間因五祖示眾索偈欲付衣法堂中上座神秀大師呈偈曰身是菩提樹心如明鏡臺時時勤拂拭莫遣有塵埃師和偈曰菩提本無樹心鏡亦非臺本來無一物何假拂塵埃祖默而識之夜呼入室密示心宗法眼傳付衣鉢令渡江過大𢈔嶺南歸曹溪開東山法門頌曰今古曹溪一𣲖寒師來因為起波瀾携囊𢈔嶺人空遂負石黃梅眾識難佛慧泉石墜腰間舂碓鳴老盧便重不便輕黃梅衣鉢雖傳淂猶去曹溪數十程楊無為七百高僧夢裏時三更月下獨南歸賣柴舂米儂家事底事親傳六代衣佛國白一偈投機一眾降㗸花百鳥去雙雙家山記淂來時路半夜傳衣過九江祖印明六祖當年不丈夫倩人書壁自塗糊明明有偈言無物却受他家一鉢盂死心新七百僧中選一人本來無物便相親夜傳衣鉢曹溪去鐵𣗳花開二月春草堂清擔柴賣火村裏漢舌本瀾翻不柰何自道來時元沒口卻能平地起風波徑山杲黃梅席上數如麻句裏呈機事可嗟直是本來無一物青天白日被雲遮西塔壁間書偈言無物腰石當知力有餘莫道懶翁無伎倆糠中舂出走盤珠水菴一菩提無樹鏡非臺臭口分明鬼擘開幸是賣無事獠剛然惹淂一身災無門開𩗺下採樵斧直入碓坊舂一脚踏到底黃梅信息通佛照光應無所住以生心大地山河一發沉從此別開窮世界新州柴把貴如金破菴先四句伽陀不解書三更傳得本來無曹溪路上生荊𣗥直至如今在半途妙峯善箇樣村夫舉世無鬻薪終日奔窮途黃梅有路何曾到誰謂衣盂親付渠少室睦黃梅分付太倉忙半夜凄凄暗渡江將謂無人知下落賊身已露更和贓辛庵儔不作樵夫作碓夫只將脚力驗精麄知他踏着踏不着和米和糠到鉢盂西嵓惠癡意貪他破鉢盂閑言長語倩人書只知半夜潛身去祖意還曾夢見無石室輝師資緣會有來由明鏡非臺語暗投壞却少林竆活計櫓聲搖月過滄洲葛廬覃六祖受法辤五祖令隱於懷集四會之間届南海遇印宗法師於法性寺暮夜風𩗺剎幡聞二僧對論一云幡動一云風動往復酬荅曾未契理祖曰可容俗流輙預高論否直以風幡非動動自心耳印宗聞語竦然異之遂問其由祖實告之印宗於是集眾請開東山法門祖遂落𩬊披衣受戒即廣州天寧寺也頌曰非風幡動唯心動自古相傳直至今今後水雲徒欲曉祖師直是好知音瑞鹿先不是風𠔃不是旛黑花猫子靣門斑夜行人只貪明月不覺和衣渡水寒法昌遇不是風𠔃不是旛斯言形已播人間要會老盧端的意天台南岳萬重山天衣懷蕩蕩一條官驛路晨昬曾不禁人行渾家不是不進步無柰當門荊𣗥生保寧勇不是風𠔃不是旛於斯明得悟心難胡言漢語休尋覔剎竿頭上等閑看圓通秀東西南北無空處上下四維隨分舉眷属都來止一身行盡天涯無伴侶三祖宗不是風兮不是旛白雲依舊覆青山年來老大渾無力偷淂忙中些子閑雪峯圓不是風𠔃不是旛清霄何事撼琅玕明時不用論公道自有閒人正眼看圓通僊不是風旛不是心迢迢一路絕追尋白雲本自無踪跡飛落斷崖深更深草堂清昔時盧老泄天機直指風旛說向伊是風是旛便是你左之右之不曾離黃蘗勝風旛非動乞兒淂夢金銀寶快活受用旻古佛滄溟直下取驪珠覿面相呈見也無到此不開真正眼膏肓之病卒難蘇道場如不是風旛是汝心人傳此語徧藂林若還踏著鄉關路瓦礫無妨喚作金祖印明不是風𠔃不是旛寥寥千古競頭看徹見始知無處所祖誰共夜堂寒通照逢指出風旛俱不是直言心動亦還非夜來一片寒溪月照破儂家舊翠微佛心才不是風旛不是心幾人求劒刻舟尋分明寄語諸禪侶自古真鍮不愽金佛鑑懃不是風𠔃不是旛認為心者亦顢頇風吹碧落浮雲盡月上青山玉一團踈山常相爭但見風旛動不肯回頭識動心從此老盧露消息松風江月盡知音夢菴信夢遊華頂過丹丘躡盡寒雲倚石樓貪看瀑泉瀉崖壁不知身在碧江頭長靈卓不是風旛不是心曹溪深也未為深那吒忿怒掀騰去析徧微塵不可尋黃龍震不是風𠔃不是旛幾人北斗靣南看祖師直下無窠臼眼綻皮穿較不難佛燈珣不是風𠔃不是旛一重山後一重山青春雨過無餘事獨倚危樓望剎竿佛性泰不是風旛不是心從來只為少知音舉頭萬里長空外唯見白雲流水深楚安方不是風𠔃不是旛多口闍𥠖莫可詮若將巧語求玄會特地千山隔萬山琅瑘覺非風旛動唯心動龍生龍𠔃鳳生鳳老盧直下示全機底事今人見如夢石明不是風旛是心動似倩麻姑痒處搔天外孤鸞誰淂髓何人解合續絃膠崇覺空不是風旛不是心祖師正眼只如今如今不識山河礙識淂如今海岳沉雪竇宗風旛不動人心動直指分明休矇𥋾若將知見巧商量大似夢中加說夢大溈智非風旛動唯心動猶涉廉纖強指陳大地未曾添寸土不知誰是點頭人開福寧直指單傳自祖宗非風旛動出盧公玄徒若具金剛眼剎剎塵塵緫是空南堂興是風是旛君莫疑百草叢中信步歸王道太平無忌諱戲蝶流鶯遶樹飛自得暉二不是風旛不是心衲僧徒自強錐針巖房雨過昏烟靜臥聽凉風生竹林浪靜風恬正好看秋江澄徹碧天寬漁人競把𮈔綸擲不見冰輪蘸水寒常菴崇不是風旛動亦非仁者心自從胡亂後淈𣸩到如今瞎堂遠風動旛動心動死蛇要人活弄嘶風木馬當途無角鐵牛入洞白楊順非風旛話露全機千古叢林起是非咄這新州賣柴漢得便冝是落便冝佛照光不是風旛不是心休將此語播叢林從來一𣲖天河水透石穿崖古到今塗毒䇿大海波濤湧千江水逆流龍王宮殿裏不見一人遊應菴華不是風旛動天生李老君出胎頭上𩬊寸寸白如銀雪堂行不是風𠔃不是旛碧天雲靜月團團幾多乞巧癡男女猶向床頭瓮裏看水菴一二不是旛兮不是風軒轅寶鑑出懷中森羅萬象難逃影戀窟狐狸失却蹤張騫推倒崑崙後幾人窮到孟津源堪笑不知天地者至今剛道有乾坤肯堂充非風旛動唯心動雪貧兒徹骨寒在聖在凡誰改變蝍蟟嚼碎鐵圍山劒門分不是風𠔃不是旛入泥入水與人看莫把是非來辨我浮生穿鑿下相干月林觀不是風𠔃不是旛白雲盡處見青山可憐無限英靈漢開眼堂堂入死關淳菴淨不是風𠔃不是旛分明裂破萬重關誰知用盡腕頭力惹淂閒名落世間松源岳不是風𠔃不是旛將軍騎馬出潼關安南塞北都歸了時復挑燈把劒看天目禮不是風旛也可疑却言心動甚言詞天生不受形容者舉世何人見得伊朴翁銛長安一片月萬戶擣衣聲西風吹不断緫是玉關情孤峯深風旛心動一狀領過只知開口不覺話墮無門開地神歸地天神歸天慇懃奉送寶馬金錢無凖範育王崇舉巴陵和尚道不是風動不是旛動不是風旛又向甚麼處着有人為祖師出氣出未與巴陵相見雪竇和尚道風動旛動既是風旛又向甚麼處着有人為巴陵出氣出來與雪竇相見師乃頌曰非風非旛無處着是風是旛無着處遼天俊鶻悉迷蹤踞地金毛還失措阿呵呵悟不悟令人轉憶謝三郎一𮈔獨釣寒江雨六祖因僧問黃梅衣鉢是何人得祖云會佛法者得僧曰和尚還得不祖曰不得僧曰因甚不得祖曰我不會佛法頌曰信手拈來見自殊箇中消息沒工夫黃梅未許傳斯旨半夜曾將付老盧大洪恩斬釘截鐵大巧若拙一句單提不會佛法儘他葉落花開不問春寒秋熱別別萬古寒潭空界月圓悟勤我不會佛法不得黃梅旨本體自圓成畢竟只者是道已契平生脚已實地無一法當情靈山親授記佛鑑懃不會黃梅佛法夢中合眼惺惺此地無金二兩俗人酟酒三升雪菴瑾蕉芭蕉芭有葉無丫忽然一陣狂風起恰似東京大相國寺裏三十六院東廊下北角頭王和尚破袈裟徑山杲六祖示眾曰吾有一物非青黃赤白男女等相還有人識得麼時有沙神會出曰某甲識得祖曰你喚作什麼曰是諸佛之本源神會之佛性祖便打曰我喚作一物尚自不中更喚作本源佛性頌曰呼為一物早不中那堪指作本源佛應現縱橫緫不虧動用施為𭣣不得活潑潑黑焠焠借問諸人知不知直待當來見勒海印信畫師五彩𥁞虗空落筆須知失本蹤更有唐朝吳道子平生紙上枉施功慈受深一翳在眼空花亂墜神會沙失錢遭罪只見鑿頭方不見錐頭利大丈夫小釋迦鐵鞭一擊珊瑚碎圓悟勤六祖謂門人曰吾欲歸新州汝等速治舟楫門人曰師從此去早晚却回祖曰葉落歸根來時無口法雲秀云非但來時無口去時亦無鼻孔頌曰葉落歸根來時無口水長船高烏飛兔走若非林間師子兒三嵗便能大哮吼海印信五蘊山頭一叚空來時無口去無踪要明葉落歸根旨末後方能達此宗本覺一祖師底物待客只是家常茶飯如今後代兒孫須要羞異饌圓悟勤葉落歸根後曹溪一滴深山居人少到真實好知音龍門遠二歸根得旨復何論洞口秦人半掩門花落只隨流水遠空留野雲屯落葉歸根銕牛當路來時無口索塩得醋金槌不動落羣機列聖叢中第六祖雪堂行雲開空自闊葉落即歸根回首烟波裏漁歌過遠村松源岳興在天南天盡頭末行先已到新州來時無口去無伴那更蕭蕭黃葉秋虛堂愚
