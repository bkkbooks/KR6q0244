body:
  text: 僧録司右闡教兼靈谷禪寺住持淨戒重校東土初祖旁出波羅提尊者一則四祖旁出牛頭融一則鶴林素一則國一二則鳥窠二則五祖旁出蒙山明一則破竈墮二則六祖旁出智隍一則忠國師十一則永嘉覺一則六祖下一世南嶽讓四則清源思六則六祖下二世馬祖一九則石頭遷三則終南政一則波羅提尊者西天無相宗首因異見王問何者是佛者曰見性是佛王曰師見性否曰我見佛性王曰性在何處曰性在作用王曰是何作用我今不見曰今見作用王自不見王曰於我有否曰王若作用無有不是王若不用體亦難見王曰若當用時幾處出現曰若出現時當有其八王曰其八出現當為我說者即說偈曰在胎為身處世名人在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔遍現俱該沙界𭣣攝在一微塵識者知是佛性不識喚作精魂頌曰古有異見王執迷生異見波羅提尊者為君通一線佛性等虛空八門常出現榮華有盛𮕱大道無更變變不變清涼須是犀牛扇南堂興在胎為身隨緣托質示天真分明見得當時事晝夜舒光轉法輪劉興朝居士八處世名人我今知是釋迦身堪悲擾擾昏昏者箇箇埋藏無價珍在眼曰見昨夜三更光掣電照破塵根一物無始知身坐空王殿在耳曰聞如何昏聵滿乾坤那知鼓響鐘鳴夜一一齊開衆妙門在鼻辨香旃檀林裏親聞得徹地薰天只自知相逢覿面難相識在舌談論方便須開大施門若是知音兩相見何勞一默與多言在手執捉放開捏聚總由伊笑他龐老當年道運水搬柴未是奇在足運奔草鞋踏破無消息吾今了了報君知自是不歸歸便得金陵牛頭山第一世法融禪師幽栖石室有百鳥銜花之異唐貞觀中四祖遙觀氣象知有奇人躬自尋訪見師端坐祖問曰在此作什麼師曰觀心祖曰觀是何人心是何物師無對作禮問曰大德高棲何所祖曰貧道不决所止師曰還識道信禪師不曰何以問他師曰嚮德滋久冀一禮謁祖曰即貧道是也師曰因何降此祖曰特來相訪莫更有宴息處否師引至菴所唯見虎狼之類祖舉兩手作怖勢師曰猶有這箇在祖曰適來見什麼師無語祖於師坐石書一佛字師覩之竦然祖曰猶有這箇在師未曉乃請說法祖曰百千法門同歸方寸河沙妙德總在心源師領悟祖曰吾受三祖𭎸教法門今付於汝汝受吾言只住此山後有五人紹汝玄化百鳥不復㗸花號懶融僧問南泉牛頭未見四祖為什百鳥𠾑花獻泉曰為渠步步踏佛階梯曰見後為什不來泉曰直饒不來猶較王老師一線道又趙州因僧問牛頭未見四祖時如何州曰飽柴飽水見後如何曰飽柴飽水頌曰古人抱志坐牛頭信師說話示無休飽柴飽水安心靜真正無私是趙州汾陽昭牛頭峯頂鎖重雲獨坐寥寥寄此身百鳥不來春又盡不知誰是到菴人雪竇顯紫氣氳氳透白雲因逢宗匠指迷津𠾑花百鳥空惆悵不見菴中舊主人楊無為喧寂同為不二門莫來無佛處稱尊寄言牛首菴中老百鳥𠾑花禍有根祖印明二一榻蕭然傍翠陰畫扄松戶冷沈沈懶融得到平常地百鳥𠾑花無處尋花鳥不來空過春牛頭山上懶融人自心淨故原無作放下許多間苦辛天童覺花落花開百鳥悲菴前物是主人非桃源咫尺無尋處一棹漁蓑寂寞歸張無盡寥寥風月臥烟霞百鳥從茲不獻花人義盡從貧處斷世情偏向有錢家夢菴信六葉牛頭𡬾別栽五天熊耳縱雲雷須知四祖乘機接百鳥𠾑花去不來剋符道者水因有月方知靜天為無雲始覺高獨坐孤峯休更問此時難著一𮈔毫別峯印雨前不見華間葉雨後渾無葉底華蝴蝶紛紛過墻去不知春色落誰家孤峯深著鞭騎馬去空手步行歸寂寞菴前路𠾑花鳥不飛鐵山仁學者疑心尚未休飽柴飽水坐牛頭子期不用黃金鑄末世知音有趙州橫川珙潤州鶴林玄素禪師嗣牛頭威有僧敲門師云誰僧云是僧師云莫道是僧佛來也不著僧云為甚麼不著師云無棲泊處頌曰十月清霜重臨風徹骨寒苦無棲泊處擺手出長安松源嶽道箇佛來也不著骨頭莭莭是黃金不消三拜勘破了鶴唳空山竹滿林自默恭杭州徑山國一道欽禪師嗣鶴林素因馬祖遣人送書到書中作一圓相師發緘見遂於圓相中著一畫却封回忠國師聞得乃曰欽師猶被馬師惑頌曰馬祖當時見徑山同風微露密機關無端却被南陽老平地坑人似等間佛印元被惑之言事有由神交千里芥針投誰知解使雲通信我不然兮石點頭照覺總自南自北自西自東溪山雖異雲月還同何事南陽老倒令人擾擾匆匆地藏恩馬師仲冬嚴寒欽師孟夏漸熱雖然寒熱不同彼此不失時莭徑山杲國一因唐代宗詔至闕下親加禮敬一日師在大內見帝來乃起立帝云師何以起師云檀越何得向四威儀中見貧道頌曰法地安然不動移振身而立亦相冝勿於起坐經行外別討大唐天子師石溪月立在威儀外全身在裏頭重重賜龍袖難掩面門羞西岩惠萬乘君王一國師尋常不離四威儀山長水遠空相憶黃葉吹風人未歸間極雲杭州鳥窠道林禪師嗣國一初詣長安西明寺學華嚴唐代宗詔國一禪師至闕乃謁之得法歸於西湖秦望山有長松枝葉繁茂盤屈如蓋遂棲止其上故以為名有侍者會通乃唐德宗六宮使棄官從師落髮伏勤數年未蒙印授一日告辭師曰往甚處通曰往諸方學佛法去師曰若是佛法老僧亦有少許曰如何是和尚佛法師拈起布毛吹一吹通於言下大悟更不復他遊乃居左右後開法為的嗣或號布毛侍者頌曰侍者初心學勝緣辭師擬欲去參禪鳥窠知是根機熟吹毛當下得心安汾陽昭鳥窠拈起布毛吹一道寒光對落暉雖是老婆心意切悟來由在半途歸石門易無風匝匝起波痕碧髻羅紋正眼觀恰值黃河三凍鎖那羅延窟見龍蟠雲居祐鳥窠吹布毛紅日午方高趙王因好劒合國人帶刀真淨文顧視顰眉落二三那堪重把布毛拈承當直下便休去眼裏無筋舉世嫌成枯木老倒志機是鳥窠西湖湖上控烟蘿布毛吹起無多子鐵眼銅睛不奈何寶峯乾鳥窠拈起布毛吹鷲嶺祇園頓息疑須信化工多少力枯槎生出向東枝張無盡老師曾把布毛吹舉處分明苐一機欲識箇中端的意嶺頭遙指白雲飛真覺添直下無私是鳥窠布毛吹起絶譊訛會通忽綻頂門眼照破山河佛與魔旻古佛眼中難著透金塵悟了今人即古人大地撮來如粟米一毛頭上現全身佛鑑勤欲求佛法往南方老大宗師為舉揚山花滿地都狼藉一陳風來一陳香龍門遠布毛一吹當下知歸冷光遍地獨露針錐楚安方白鳳烟霞控鳥窠驪龍珠耀祖山河當初捻起布毛意體用毗盧些子多剋符道者游騎紛紛驟曉風將軍施令在城東拈來金鏃些兒妙射破花心一點紅塗毒䇿兩指爪開權撮起一毛頭上為吹開這回不在身邊立休說清風遍九垓心聞賁用處天然別更不落思惟山河并大地全露法王機月林觀鳥窠拈起布毛吹萬仞孤峯對落暉未舉已前先瞥地早知不是丈夫兒秀岩瑞鳥窠佛法無多子只在襤襂一布毛一氣吹來何處去至今天下有譊訛懶菴需八十翁翁要力行布毛吹起禍重生殺人流血三千里枯𡬾枝頭一老僧北山隆佛法有些少言中沒網羅布毛吹起處依舊不離窠無凖範鳥窠因白居易侍郎問如何是佛法大意師曰諸惡莫作衆善奉行白曰三嵗孩兒也解恁麼道師曰三嵗孩兒雖道得八十老人行不得頌曰惡無相貌善無形皆自心田長養成不動鋒鋩輕剔破菩提煩惱等空平無量壽袁州蒙山道明禪師嗣五祖因趂盧行者至大𢈔嶺者見師至即擲衣鉢於石上曰此衣表信可力爭耶任將去師遂舉之如山不動踟蹰悚栗乃曰我來求法非為衣耶願行者開示曰不思善不思惡正與麼時阿那箇是明上座本來面目師當下大悟遍體汁流泣禮問曰上來密語密意外還更別有意旨不曰今與汝說者即非密也汝若返照自己面目密却在汝邊師云某甲雖在黃梅隨衆實未省自己面目今蒙指授入處如人飲水冷暖自知今行者即是某甲師也曰汝若如是則吾與汝同師黃梅善自護持頌曰正當恁麼時麼劫不曾迷步步趍三略㷌家鎮絶疑龍門遠堂堂妙相絶錙銖善惡都忘見也無萬里雲𭣣天界淨海心無浪月輪孤佛性泰平欺佛祖氣如王直趂盧能到嶺傍不得衣盂遭惡水分明雪上更加霜笑翁堪不思善不思惡千手大悲難摸索難摸索處盡掀翻方知普化搖鈴鐸殺六岩輝描不成兮畫不就贊不及兮休生受本來面目無處藏世界壞時渠不杇無門開夜深傳付老盧衣恨殺黃梅老古錐向道趕人休趕上果然落莭一番歸雪溪戒嵩嶽破竈墮和尚嗣嵩嶽安國師因嵩山塢有廟甚靈殿中唯安一竈遠近不輟祭祀烹殺物命甚多師以杖敲竈三下云咄此竈只是泥瓦合成聖從何來靈從何起恁麼烹宰物命又打三下竈乃傾破墮落須有青衣峩冠設拜曰我本此廟竈神久受業報今蒙師說無生法得脫此處生天特來致謝師曰是汝本有之性非吾強言神再拜而沒後僧問師某甲久侍左右未蒙方便竈神得何宗旨便乃生天師曰我只向伊道是泥瓦合成別也無道理為伊僧佇思師曰會麼曰不會師曰本有之性為什麼不會僧作禮師曰墮也墮也破也破也後有僧舉白安國師國師嘆曰此子會盡物我一如頌曰古廟神竈禪師法要杖子敲來業身勃跳楊無為竈破土落不在圖度呼茶喚飯量水煎藥黃蘗勝禍福威嚴不在靈殘杯冷𬉹笑何人一從去後無消息野老猶敲祭鼓聲龍門遠二春寒料峭凍殺年少切忌參商別無奇妙低頭侍奉歡喜問訊佛法商量傷子性命倚竈為靈自不靈靈蹤斷處一堆塵野老不來敲祭鼓打正因邪別是春佛燈珣聖不聖兮靈不靈磚瓦為堆土合成杖頭擊著無消息多年妖怪不成精而今仔細思量著為他間事長無明大溈智摩天鴆鳥九頭毒護世那吒八臂長水自竹邊流出冷風從花裏過來香南岩勝破竈墮因僧問如何是大修行底人師曰擔枷帶鎖如何是大作業底人師曰修禪入定頌曰帶鎖擔枷招罪犯安禪入定墮深坑兩頭踢脫無依倚一箇閒人天地間別山智河北智隍禪師嗣六祖始參五祖循乎漸行後結菴長坐二十餘載不見惰容及遇六祖門人䇿禪師激心勤求法要往參六祖祖愍其遠來便垂開示師於言下豁然契悟前二十年所得心都無影響頌曰禪非出入非行坐坐立經行總是禪若是守他山鬼窟迢迢特地隔西天本覺一當年睥睨此山阿欲著紅樓貯綺羅今日重來無一事却騎羸馬下坡陀西京光宅寺慧忠國師嗣六祖居南陽白崖山黨子谷四十載不下山唐肅宗詔赴京待以師禮問師得何法或曰師在曹溪得何法師曰陛下還見空中一片雲麼曰見師曰釘釘著懸掛著頌曰無開口處却開口有意歸時即便歸趙州不在明白裏未是𦏪羊掛角時慈受深忠國師因肅宗問如何是十身調御師乃起立曰還會麼曰不會師曰與老僧過淨瓶來頌曰𪂶𪂶鳥宿空池魚從腳下過𪂶𪂶總不知若也知碧潭深萬丈直下取魚歸寶峯淳帶雪含霜半倚籬橫斜影裏露仙姿前村昨夜春來了竹屋老僧猶未知心聞賁國師因肅宗又問曰如何是無諍三昧今訛作如何是十身調御師曰檀越踏毗盧頂上行曰此意如何師曰莫認自己清淨法身又問師師都不視之曰朕是大唐天子師何以殊不顧視師曰還見虗空麼曰見師曰他還眨眼視陛下否頌曰一國之師亦強名南陽獨許振佳聲大唐扶得真天子曾毗盧頂上行雪竇顯二鐵槌打碎黃金骨天地之間更何物三千剎海夜澄澄不知誰入蒼龍窟作者清規世莫儔金篦曾握上龍樓良撥破毗盧頂直得文殊笑點頭溈山秀二寶月含虗列數峯高低誰辨淡烟中須弥擊碎鹽官鼓降得毗盧在下風步步著毗盧頂亦非自己清淨身妙入空門得空相祖師肝膽佛精神佛鑑勤國師因代宗命試驗西天大耳三藏師問曰汝得他心通邪曰不敢師曰汝道老僧即今在什麼處曰和尚是一國之師何得却去西川看競渡良久再問汝道老僧即今在什麼處曰和尚是一國之師何得却在天津橋上看弄猢孫師良久復問汝道老僧只今在甚麼處藏罔測師叱曰這野狐精他心通在什麼處藏無對頌曰他心三藏太顢頇猢孫觀了看划船對面國師尋不見秪為從來被眼謾冶父川日應群機必有方未知何處覔南陽自從失却猢孫後橋上多時不作場懶菴樞藏鋒避箭路千差萬古相饒老作家好是鷺鷥無覔處夜深和月宿蘆花鐵山仁國師一日喚侍者者應諾如是三召皆應諾師曰將謂吾孤負汝却是汝孤負吾頌曰師資會遇意非輕無事相將草裏行負汝負吾人莫問任從天下競頭爭雪竇顯國師喚侍者重言不當吃他耳又不聾自又無處雪投子青龍吟虎嘯與誰同天際雲生洞下風從此太平田舍老兒孫携手賀年豐佛印元國師三喚侍者打草只要蛇驚誰知澗底青松下有千年茯苓黃龍南二國師有語不虗施侍者三應絶消息平生心膽向人傾相識不如不相識侍者何曾喚不回國師乾地起風雷當時若也相逢著九轉還丹化作灰翠岩真老倒南陽太古錐等間垂釣泛江湄夜靜水寒魚不食滿船空載月明歸海印信國師三度喚侍者三回應家富小兒嬌病多諳藥性吾負汝隴西鸚鵡能言語汝負吾笑殺西來碧眼胡欲會南陽端的意大都年老覺心孤佛慧泉國師三喚侍者侍者三度應諾茫茫亂下針錐誰知可知禮也白雲端國師三喚古今明何事勞生不自能信是與人無舊分非干人與我無情照覺揔三喚三回應已休却云孤負強生讎大唐國裏揚家醜試問南陽羞不羞佛國白國師三喚侍者三應兩箇無孔鐵槌傍觀也須氣悶彼此無便冝今古誰相信圓通秀國師三喚侍者侍者三度應諾若言負汝負吾真箇可知禮也智海清國師三喚侍者侍者三應無餘只知身強力壯不覺年老心孤寶峯祥南陽三喚侍者三酬依稀魯國倣佛楊州回首寒江空漾碧夕陽西去水東流上方益國師年老太多圖截鶴由來要續鳬彼此無瘡安樂甚何勞傷好皮膚祖印明雄鎮南陽傳祖令清風凜凜動寰區老來偏愛晚生子把手時時教順朱佛心才喚處分明應處親不知誰是負恩人東家漏泄西家事却使傍人笑轉新長靈卓三喚三應意已深南陽曲盡老婆心傍人莫謂揚家醜到底真鍮不金慈受深國師侍者共悠悠無事堂前互唱酬鑽天鷂子穿雲去空使行人指路頭佛鑑勤寶劒連飛急透頂便通神有時輕按處驚動五湖賔高庵悟世路風波不見君一回見靣一傷神水流花落知何處洞口桃花別是春鼓山圭啞子得夢向誰說起來相對眼麻迷已向人前輸肺腑從教他自覔便冝徑山杲三呼三應諾彼此不相辜斷南陽路馨香滿道途五祖演三喚三應更饒貼稱月逗寒窗水歸巨浸負汝負吾全鋒敵勝瞎堂遠喚應尋常誰不曉及乎按劒總茫然分明好箇神仙訣父子從來不許傳訥堂思南陽三喚無風起浪侍者應諾為蛇安腳明眼衲僧知不知萬古清風自廖廓尼無著總三喚須知意不輕平生肝膽一時傾負吾負汝還知否縱有丹青畫不成水庵一一假風光畫不成洞房深處暢豫情頻呼小玉元無事只要檀郎認得聲靈岩安全提正令高低普應三應三呼諦聽諦聽月林觀一日君家把酒杯幾年波浪與塵埃不知烏石嶺頭路老去相尋能幾回頑石空一箭射雙鵰雙鵰隨手落波動嶽陽城月滿滕王閣雪菴瑾鐵枷無孔要人檐纍及兒孫不等間欲得撑門并拄戶更須赤腳上刀山無門開一擲神杯定吉凶再占重卜轉靈通分明見了今年事卻說明年事不同無凖範三喚聲聲出痛腸國師何事錯商量欲分恩怨無分處吳楚茫茫共一江覺菴真國師因僧問如何是佛法大意師曰文殊堂裏萬菩薩曰不會師曰大悲千手眼頌曰時年𬞞菜賤滿地蘿蔔頭一文買一箇得者飽齁齁佛鑑勤尋真悟入蓬萊島香風不斷松花老採芝何處未歸來白雲滿地無人掃𣗥田心國師因耽源問百年後有人問極則事作麼生師曰幸自可憐生剛要箇護身符子作麼頌曰護身符子最通靈國師起坐捴將行耽源得用南方去為說令人睡眼醒汾陽昭不重己靈猶自可護身苻子更那堪為君旨外通消息秋月無風落碧潭海印信真正道流行腳去護身苻子不須擔國師實為耽源切不是臨歧作對談橫川珙國師化緣將畢乃辝唐代宗帝曰師滅度後弟子將何所記師曰告檀越造取一所無縫塔曰就師請取塔樣師良久曰會麼曰不會師曰貧道去後有侍者應真却知此事師遷化已後帝詔應真問此意如何真述偈湘之南潭之北中有黃金充一國無影𡬾下合同船琉璃殿上無知識應真後住耽源山頌曰無縫塔見還難澄潭不許蒼龍蟠層落落影團團千古萬古與人看雪竇顯無縫塔從誰手造雖然有樣不堪傳如何強寫無層級永向琉璃殿上懸白雲端窣堵無縫立還危寶鐸玲瓏八面垂千手大悲捫不著百重關鎖下金槌羅漢南前面是珠琉璃後面是瑪瑙珊瑚左邊是觀音勢至右邊是普賢文殊中間有箇幡子被風吹著道胡盧胡盧五祖演欲建南陽無縫塔般輸下手實應難本來成現何須作到處巍然著眼看本覺一八面自玲瓏盤空勢岌崿表裏鎮巍然若為分六鑿執名匿相認影迷形臥龍長怖碧潭清合同船子開心碗日用如何不現成圓悟勤無縫塔兮不見影廓然一片真如境爍迦羅眼電光流杳杳冥冥不見頂佛鑒勤窣堵古形儀未舉已先知巍然存海底影落𡬾頭輝潛菴光無縫塔兮誰敢知國師也是落便宜信知師子行踪絶何必尋常問是非問是非百草頭頭雨露垂戴無為湘南潭北影團團面面簷楹風雨寒突出虗空無縫𦉑從教千古與人看無門開國師塔樣最尖新覿面拈來不露文却被耽源添一線至今描邈亂紛紛高峯妙國師曰語漸也返常合道論頓也不留朕迹頌曰上無衝天之計下無入地之謀蔡州千箇萬箇打破只在須雪竇顯二六時中合返常經行坐臥好參詳相逢不審人人會問著依前未廝當本覺一忠國師因丹霞來才展坐具師曰不用不用霞退後三步師曰如是如是霞進前三步師曰不是不是霞繞禪床一匝而出師曰去聖時遙人多懈怠三十年後討箇師僧也難得頌曰不用不用千聖不共如是如是蝮蝎蛇虺不是不是徹骨徹髓進前退後繞禪床掣電之機落二三印空叟國師問紫璘供奉甚處來曰城南來師曰城南草作何色曰作黃色師乃問童子城南草作何色童曰作黃色師曰秪這童子亦可簾前賜紫對御談玄頌曰慣使渡頭船如今不記年愛他風浪惡方是趂粗錢月堂昌欲把枯腸盡底傾出門不覺又叮嚀勸君及早回頭去莫待春風柳眼青虗堂愚永嘉真覺玄覺禪師嗣六祖精天台止觀圓妙法門四威儀中常冥禪觀後因左溪朗激勵與東陽䇿同詣曹溪初到振錫携瓶繞祖三匝祖曰夫沙門者具三千威儀八萬細行大德自何方而來生大我慢師曰生死事大無常迅速祖曰何不體取無生了無速乎師曰體即無生了本無速祖曰如是如是時大衆無不愕然師方具威儀參禮須告辭祖曰返太速乎師曰本自非動豈有速耶祖曰誰知非動師曰仁者自生分別祖曰汝甚得無生之意師曰無生豈有意耶祖曰無意誰當分別師曰分別亦非意祖歎曰善善留一宿時謂一宿覺頌曰圓悟真心作本心無人證據自沈吟崛多激發緣當熟一見能師便得金汾陽昭永嘉萬里到曹溪三拜云何略不施却繞禪牀三匝後卓然振錫底威儀本覺一掀翻海嶽求知己撥動乾坤見太平二老不知何處去宗風千古播家聲正法灝振錫曹溪生大我慢一宿少留咄哉齪漢永嘉城裏闡宗風江月松風無畔岸無禪才南嶽懷讓禪師嗣六祖初往曹溪參六祖祖問什處來師曰嵩山來曰什麼物恁麼來師曰說似一物即不中曰還可修證否師曰修證即不無污染即不得曰只此不污染諸佛之所護念汝既如是吾亦如是頌曰因師顧問自何來報道嵩山意不回修證不無不染污撥雲見日便心開汾陽昭玉在池中蓮出水污染不能絶方比大家如是若承當洞一夜秋風起佛印元戴角擎頭與麼來鐵圍山嶽盡衝開閻浮殺人無數驀鼻深雲拽不回保寧勇嵩頂來來恁麼來不中一物早塵埃便歸南嶽磨甎片照得追風馬子回佛國白是什麼物恁麼來此中何假拂塵埃瞪目看時還不見謾將明鏡掛高臺大洪恩說似一物即不中風從虎兮雲從龍此事由來非草草休言無法是真宗什麼堂堂與麼來當機覿面不迂回經行坐臥非他物自是時人眼不開本覺一當堂古路白雲漫碧眼黃頭尚未諳無孔笛兒氊拍板輕輕吹破御街寒正堂辨說似一物即不中八年方契賣柴翁大都模樣無多子歷劫如何用得窮朴翁銛直言發足自嵩山蕩蕩乾坤任往還一物尚無寧有似倚天長劒逼人寒無際𣲖讓和尚居南嶽時馬祖住傳法院常日坐禪師知是法器往問曰大德坐禪圖什麼曰圖作佛師一日乃取一甎於彼菴前磨曰磨此何為師曰磨作鏡曰磨甎豈得成鏡師曰坐禪豈得成佛曰如何即是師曰如人駕車車若不行打車即是打牛即是於是悟旨於言下遂印心傳法符西祖讖馬駒殺天下人之語南宗闡於江西頌曰磨甎作鏡慕同音來問分明示本心才喚木人回面指犁牛耕出古黃金汾陽昭磨甎作鏡不為難忽地生光照大千堪笑坐禪求佛者至今牛上更加鞭佛印元死馬醫來無用處車牛腦後更加鞭皮穿骨綻還知否任重應知角力全保寧勇磨甎作鏡相席打令一切魚龍知水為命旻古佛坐禪成佛心中病作鏡磨甎眼裏花一掣牢關金鎖斷等間信步便歸家馬駒子實堪誇自從胡亂後著處是生涯佛燈珣打車即是打牛是鼻孔遼天也被穿已向人前輪肺腑可憐今古妄加鞭懶菴需車牛腦後痛加鞭棄却黃金抱碌磚逐惡隨邪至今日即非心佛錯流傳笑翁堪平生心膽向人傾過犯天已不輕帶纍馬師胡亂後至今錯認定盤星松源嶽坐禪成佛生妄見磨甎成鏡妄尤多打車打牛俱是妄攪得心腸沒奈何橫川珙萬法俱忘百念灰等間驀鼻拽將回鏡光一點明如日直得木人心眼開雪岩欽讓和尚因僧問如鏡鑄像像成後鏡明向什麼處去師曰如大德為童子時相貌何在曰只如像成後為什麼不鑒照師曰雖然不鑒照謾他一點不得頌曰髑髏裏眼見猶在枯木中龍聲更狂打破虗空光境盡箇中別有好商量慈受深問處鈎深答更幽就身打劫最風流要知一點難謾處江上數峯青欲浮掩室開讓和尚因馬大師闡化江西師問衆曰道一為衆說法否衆曰已為衆說法師曰總未見人持箇消息來衆無對因遣一僧去云待伊上堂時但問作麼生伊道底言語記將來僧去一如師旨回謂師曰馬師云自從胡亂後三十年不曾鹽醬喫師然之頌曰胡亂三十年不曾少鹽醬江西馬大師南嶽讓和尚鼓山圭見得分明識得親舉來猶自涉途程直饒不犯毫芒者也是拈鎚䑛指人徑山杲家貧連子屈事急不由人開口露拴索郎當纍近鄰或菴體做得些兒活計成人前賣弄逞才能直饒殺人無數也是西川老鬼精中菴空自從胡亂後更不少鹽醬開口便見膽豈在語言上月林觀石火光中驗正邪等間拈却眼中沙自從不曾少鹽醬敢保渠儂未到家木菴永昔年高甲巳登科讀盡人間萬卷書今日一身天地窄思量好事不如無雪菴瑾老婆心切日忡忡恐墮他家虀甕中消息得來胡亂後江西宗𣲖好流通虛堂愚吉州清源行思禪師嗣六祖初參六祖問當何所務即不落階級祖曰汝曾作什麼來師曰聖諦亦不為祖曰落何階級師曰聖諦尚不為何階級之有祖深器之頌曰無見頂露雲攢急劫外靈枝不帶春那邊不坐空王殿爭肯耘田向日輪投子青卓爾難將正眼窺逈超今古類難齊苔封古殿無人侍月鎖蒼梧鳳不棲霞淳無階無級見何求奪得曹溪苐一籌却向廬陵言米價百行千市競相酬佛國白劫外相逢那畔行靈苗叢裏鐵牛耕東風吹散千岩雪空界無雲孤月明成枯木一掬澄潭鏡樣磨無風何必自生波轉身縱不離初際子細看來較幾何雪岩欽清源既得法往吉州清源山靜居寺六祖將示滅有沙希遷即南嶽石頭和尚問曰和尚百年後希遷未審當依附何人祖曰尋思去及祖順世遷每於靜處端坐寂若忘生第一座問曰汝師已逝空座奚為遷曰我稟遺誡故尋恩爾座曰汝有師兄行恩和尚今住吉州汝因緣在彼師言甚直汝自迷耳遷聞語便辝祖龕直詣靜居頌曰尋思去此地清涼離煩暑暮雨朝雲樂太平青山緑水人難覩不難覩深林有箇白額蟲元來却是玄沙虎高菴悟清源因石頭問和尚出嶺多少時師曰我却不知汝早晚離曹溪曰希遷不從曹溪來師曰我亦知汝去處也曰和尚幸是大人莫造次頌曰木人來問青霄路石女年尊似不聞携手相將歸故國暮山岌岌鎖重雲丹霞淳清源問石頭汝什麼處來曰曹溪師乃舉拂子曰曹溪還有這箇麼曰非但曹溪西天亦無師曰子莫曾到西天否曰若到即有也師曰未在更道曰和尚也須道取一半莫全靠學人師曰不辝向汝道恐已後無人承當頌曰白雲藏玉鳳紅日照無遼隱隱星攢處無私鎮九霄投子青相見錦江頭相携上酒樓月闌歌笑罷回首上扁舟遁菴演清源令石頭持書與南嶽護和尚曰汝達書了速回吾有鈯斧子與汝住山頭至彼未呈書便問不慕諸聖不重己靈時如何嶽曰子問太高生何不向下問曰寧可永劫沉淪不慕諸聖解脫嶽便休頭回至靜居師問曰子去未久送書達否曰信亦不通書亦不達師曰作麼生頭舉前話了却曰發時蒙和尚許斧子便請取師垂一足頭禮拜尋辝往南嶽頌曰諸聖不求己靈不重一問太高天驚地動拂袖而回音書肯開從茲盤石上更不過山來佛印元從來祖上作君王子子孫孫代代昌文武百僚都不識只應金殿有尊堂保寧勇千里迢迢信不通歸來何事太匆匆白雲鎖斷岩前石掛角𦏪羊不見蹤成枯木鈯斧持來便住山斫開南嶽好峯巒兒孫失利將何用又被㗅嚧笑魯般佛國白順水使船猶自可逆風把拖世間稀雖然好箇擔板漢到頭未免落便冝海印信千里親傳事不同須憑鈯斧賞優功相如奪璧來還趙可擬當時一信通投子舒清源因僧間如何是佛法大意師曰廬陵米作麼價頌曰出家學道未心開請問宗師大意來却問廬陵米幾價當時心境一時灰汾陽昭烏龜三眼赤祥麟一角尖騰雲生暮雨溪月夜明簾法昌遇巨宋山河四百州交關物物有來由廬陵米價依然在天下衲僧語路綢正覺逸廬陵米價逐年新道𦗟虗傳未必真大意不須歧路問高低冝見本來人黃龍南廬陵米價越尖新那箇商量不掛唇無限清風生閫外休將升斗計踈親白雲端廬陵米價知不知合下相酬兩莫虧君信入𮠔空返者到頭只是愛便冝三祖宗太平治業無象野老家風至淳只管村歌社飲那知舜德堯仁天童覺豐儉時年各不同豈教浮俗妄爭功廬陵米價誰增减貴賤宜當見祖翁草堂清廬陵米價播諸方高唱輕酬力未當覿面不干升斗事悠悠南北謾猜量長靈卓廬陵不價若為酬入市知行趣自由借問年來何所直大宋山河四百州佛燈珣老清源沒縫𦉑問佛法酬米價衲僧一粒若沾唇拄杖橫擔繞天下高菴悟廬陵米價少知音佛法商量古到今繡出鴛鴦任人看無端却要覓金釘鼓山圭老清源沒縫𦉑問佛法酬米價差毫厘成話霸無面目得人怕徑山杲廬陵米價走禪徒五老嵳峩矗太虗堪笑華山圖籍上又添潘閬到騎驢海印信自古廬陵是吉州至今米價沒人酬青山緑水依前在黃葉西風又一秋佛陀遜清源佛法意如何米價酬來太老婆眨上眉毛行大道莫於平地起風波照堂一廬陵米價報君知浩浩塵中識者稀回首不知何處去白雲流水共依依妙峯善衝開碧落松千尺截斷紅塵水一溪飽食高眠人不到日從東出又沉西無準範一𣲖清源出少林信衣到此只傳心尋常示衆無人會盡向廬陵米價尋張無盡江西道一禪師時號馬祖嗣南嶽讓示衆曰汝等諸人各信自心是佛此心即是佛心達磨南天竺國來至中華傳上乘一心之法令汝等開悟有僧問云和尚為什麼說即心即佛祖曰為止小兒啼僧曰啼止後如何祖曰非心非佛僧曰除此一種人來如何指示祖曰向伊道不是物曰忽遇其中人來時如何祖曰且教伊體會大道頌曰百萬雄兵出將軍獵渭城不間弓矢力斜漢月初生翠嵓真心心即佛佛心心佛佛心心即佛心心佛悟來無一物將軍止渴望梅林佛國白兔角不用有牛角不用無有無不是處馨香滿道途草堂清風徑葉頻落山高日易沉坐中人不見窗外白雲深長靈卓素琴張午月流水落花深寂𦗟希聲徹泠泠太古音佛心才韶光三月景和融錦繡山川處處同碧瓦曉煙寒食雨朱簾晴卷杏花風慈受深敲之即響𦗟則無聲嚴冬汗濕酷熱冰清試問道途來往客長安去此幾多程黃龍震江西馬祖據通津隻漿孤帆度世人不是大梅看得破也應虛度嶺頭春張無盡無鬚鎖子八靣玲瓏不撥自轉南北西東海神知貴不知價留與人間光照夜圓悟勤美如西子離金閣嬌似楊妃倚玉樓猶把琵琶半遮靣不令人見轉風流佛鑑勤即心是佛一家風馬祖聲傳四海中靈利衲僧才一顧娘生賦性出天聰佛燈珣即心即佛莫妄求非心非佛休別討紅爐𦦨上雪花飛一點清涼除熱惱徑山杲鐵牛耕破洞中天桃花片片出深源秦人一去無消息千古峯巒色轉鮮雪竇宗即心即佛眉拖地非心非佛雙眼橫蝴蝶夢中家萬里子規枝上月三更瞎堂遠即心是佛外忘求心佛圓明不假修雲淨遠山千點翠水和明月一天秋足菴鑑馬祖非心非佛直下更無窠窟今年樹上胡桃勝似去年柑橘正堂辨一簇人𤇆島外村落花流水月黃昏百川到海應須住畢竟何曾別有源鐵山仁金毛師子生鐵稱槌渾侖無縫切忌針錐無凖範馬祖一日升堂百丈收却靣前席祖便下座頌曰百丈當時侍馬師對師卷席更無私人天不測為奇特恰是攢鴉捉鳳兒上士瞥然全體現太陽出照嶽峰低汾陽昭升堂馬祖卷席百丈淂人半斤還他八兩直饒縫𦉑全無未免傍觀拊掌泉大道百萬雄師陳相覩何人却會回戈鼓將頭不猛誤三軍可憐正令無行處佛印元升堂卷席逈難儔杲日騰輝處處周堪笑忽雷驚宇宙井中之物不擡頭海印信高登猊座已圓成大智仙陀卷便行師子嚬呻猶似可象王回首更堪驚淨照臻野鴨飛鼻頭裂卷席更來呈醜拙直饒獨坐大雄峯也是天邊苐二月楊無為昨日東風偶然惡桃花亂落如紅雨昨夜東風又發狂滿地不知何處去白雲端誰將秦鏡掛高臺妍醜分明皆顯露石女溪邊努目嗔相逢對靣難回互成枯木夜深認淂歸時路不待天明便出關三尺鏌鎁橫在手至今坐斷大雄山上方益潮來潮子上潮頭手把紅旗逆水流忽被猛風吹退浪此時伎倆一時休佛鑑勤掛淂帆來遇便風須千里到家鄉臨門上岸逢妻子歡喜情懷不可當龍門遠卷起堂堂露眼睛拈來覿靣更相呈鼻頭脫盡誰能覷把手歸來相並行楚安方馬祖升堂百丈卷席正令不從拗曲作直雪竇顯馬駒千里行卷席相隨逐秋風一夜生處處開黃菊石明風定五湖寬收帆恣意觀波光隨水靜練色逼人寒舉棹逗雲塢移舟上碧灣聲華光祖域千載與人看龍門遠馬祖才升堂雄峯便卷席春風一陳來滿地花狼籍高菴悟浩浩長江碧際空片帆高掛便乘風快哉不費纖毫力萬里家山咫尺通開善謙捲席因緣也大奇諸方聞舉盡攢眉臺盤躍倒人星散直漢從來不受欺張無垢百丈捲席馬祖升堂作麼作麼驗盡當行月林觀一柄無情雪刃刀當鋒誰敢犯秋毫馬師父子親提掇血噴千山風怒號無凖範馬祖因僧問如何是佛祖云即心即佛頌曰即心是佛鐵牛無骨戲海獰龍摩天俊鶻西江吸盡未為奇火裏生蓮香拂拂南堂興即心即佛龍入蛇窟出將入相安邦定國石頭回誰家飯掛空梁指與小兒令看解開即是灰囊當下命根便斷開善謙美如西子離金𨷂嬌似楊妃下玉樓終日與君花下醉更嫌何處不風流肯堂充即心是佛顢頇淈𣸩菽麥不分光陰飄忽三杯兩碗背爺娘百怪千妖同一窟咄或菴體大海波濤闊千峯氣象雄古今無間斷南北路頭通密菴傑即心便是佛姮娥不畫眉才將脂粉污妍好𨚫成𡟎天目禮即心是佛砒霜狼毒起死回生不消一服環溪一馬祖因僧問如何是佛祖云非心非佛頌曰碧海珠荊山璧耀乾坤誰別識利力剪却無根樹萬疊峯巒斂𤇆霧圓悟勤賣盡田園徹骨貧不知何處可容身樓頭浪蕩無拘檢鐵笛橫吹過洞開善謙二月風光景氣浮少年公子御街遊銀床踞坐傾杯樂三箇孩童打馬毬牧菴忠非佛非心絶謂情玄途鳥道急回程爍迦羅眼存機變莫守寒岩異草青南岩勝分明與麼無無無釋迦彌勒是他奴茫茫宇宙人無數幾箇男兒是丈夫月林觀路逢劒客須呈不遇詩人莫獻逢人且說三分未可全拋一片無門開馬祖與百丈西堂南泉玩月次祖曰正與麼時如何丈曰正好修行堂曰正好供養泉拂袖便行祖曰經入藏禪歸海唯有普願獨超物外頌曰三獸渡河深淺別不勞精辨逈然分爭如巨浸張帆者不顧波濤過海門海印信經入藏禪歸海唯有普願獨超物外咄只有照璧月且無吹葉風照覺總經入藏禪歸海稽首皈依合掌頂戴王老師超物外二十年前恁麼來而今去盡間光彩天童覺馬師曾玩月三子左右侍吹箇無孔笛清音聒天地真如皎皎凝虛碧沉沉發皓彩秋色共澄清永夜臨寰海修行供養逗圓機聊聞便行超方外馬駒兒端的別萬古定乾坤一言全殺活圓悟勤經入藏禪歸海未是衲僧親道底拂袖前行歸去來擊砵重關門大啓開福寧國清才子貴家富小兒嬌大家出隻手彼此不相饒徑山杲張公養淂三箇兒長大不知誰立志呼來月下問蹤由眼睛箇箇皆相似佛性泰大機大用銀山鐵壁供養修行眼橫鼻直拂袖便行萬象絶跡敢問諸人誰是端的楮衲秀一箇翁翁三箇兒威音路上偶相携風前唱起玄中曲千古同聲和莫齊彼一時此一時指鹿為馬證鱉成龜雖然弄巧翻成拙免教間却兩片皮雪竇宗古渡無風下直鈎𮈔綸意在得鯨鰲馬師言下揚家醜千古兒孫草裏遊湛堂深諸子營家各自肥就中一箇最堪悲滿籃盛墨無人買半夜持歸染皂衣大歇謙諸子生涯各有成從來孝順兩邊生貪歡一夜渾家樂失曉連忙打五更無凖範馬祖不安院主問和尚近日尊位如何祖曰日靣佛月靣佛頌曰日靣佛月靣佛五帝三皇是何物二十年來曾苦辛為君直下蒼龍窟屈堪述明眼衲僧莫輕忽雪竇顯日靣月靣左旋右轉大唐擊鼓新羅發箭流水前溪後溪落花三片五片聾人不𦗟忽雷聲空向雲中看閃電佛慧泉少年公子忽猖狂半夜穿雲入洞房二八仙娥百般巧眼睛之上繡鴛鴦野軒遵日靣佛月靣佛夜夜朝朝好風物馬駒殺天下人軒轅照破精靈窟楊無為大地山河俱是寶不識之人入荒草日靣月靣佛現前閃爍珊瑚光杲杲白雲端蒲團上端坐針眼裏穿線西風一陳來落葉兩三片保寧勇日靣月靣佛無私誰薦驪龍頷下珠滿握光明耀牛斗何須按劒立階除照覺捴日靣月靣胡來漢現一點靈光萬化千變真淨文日靣月靣星流電卷鏡對像而無私珠在盤而自轉君不見鉗槌前百鍊之金刀尺下一𮈔之天童覺日面東兮月面西誰言任運落前溪山桃落盡春歸去猶有子規枝上啼上方益什邡駒子氣生獰蹴毗盧頂上行正患脾疼却頭痛病來猶有巧心情張無盡日面佛月面佛大海波翻須彌突兀磕破腦門額頭汗出明眼衲僧未辨明擡頭好看冲天鶻長靈卓丫鬟女子畫娥眉鸞鏡臺前語似癡自說玉顏難比並却來架上著羅衣五祖演東街柳色拖烟翠西巷桃花相映紅左顧右盻看不足一時分付與春風佛鑑勤近日尊位復如何日面月面哩來囉自從舞得三臺後拍拍元來總是歌佛燈珣日面月面空中閃電顧杼停機垜成招箭南華昺日面月面靈光洞現大地山河南州北縣雖是老婆心切那知疑殺監院踈山如日面月面頭頭出現捏聚放開成團成片楚安方金烏才唱日方中王道平平觸處通爭奈馬駒生太早依前殺太虛空正覺逸日面月面星移斗轉失曉波斯討頭不見翠岩真日面月面突出難辨繡出巧鴛鴦雙雙誰不羡戴月宿蘆花隨波戲水面瞥然飛起碧霄空舉首銀河橫素練雪竇宗日面月面虛空閃電雖然截斷天下衲僧舌頭分明也只道得一半金陵俞道婆打殺黃鶯兒莫教枝上啼幾回驚妾夢不得到遼西典牛游尊位如何澄潭影裏探秋波日面月面鐵眼銅晴安可辨君不見一聲霹靂兮霧長空千眼䪺開兮雲收嶽面瞎堂遠朱砂鏡裏開顏笑白玉盤中展腳眠大抵人生難淂共得團圓處且團圓佛性泰兩輪舉處𤇆塵起電急星馳擬何止目前不礙往來機正令全施無表裏丈夫意氣自衝天我是我兮你是你信相修古殿無人到者稀蒲團端坐有誰知不因院主通消息爭得寒光萬里輝中際能尊位如何問最親攢簇不得病源深等間提起軒轅鏡扁鵲盧醫無處尋退菴奇漢州生得馬駒兒病在膏肓不可醫院主無端問安好引他賣弄口唇皮鐵山仁日面佛月面佛西岩樹色含𤇆東谷花光映日仰視莫窮俯看已老一時分付主林神明眼衲僧無處討天目禮日面月面突出難辨擬欲擡眸空中兩片無凖範馬祖因僧問離四句絶百非請師直指西來意祖曰我今日勞倦不能為汝說得問取智藏去僧去問藏藏云我今日頭疼不能為汝說淂問取海兄僧去問海海云我到這裏却不會僧回舉似馬祖祖曰藏頭白海頭黑頌曰藏頭白海頭黑明眼衲僧會不得馬駒殺天下人臨濟未是白拈賊離四句絶百非天上人間唯我知雪竇顯不知何所問人覔將寶示渠渠不識持來持去問商人不別東西徒費力依舊回自惆悵破草鞋多少䩫海印信百非四句絶何言黑白分明定正偏師子窟中無異獸驪龍行處浪滔天照覺總湘靈二女神仙格笑倚朱門香陌陌一抹胭脂透臉紅更加十分天真色佛鑑勤四句百非皆杜絶陽春白雪唱彌高風清月皎無雲夜誰把吹毛換寶刀南華昺百非四句絶踈親馬駒殺天下人藏頭白兮海頭黑門外金剛笑又嗔圓覺演却似暗地箭半夜飛來人不見又似藏鋒筆白日堂堂明不出藏頭白海頭黑琉琉殿上加金碧反思達磨見梁王對面者誰還不識佛鑑勤短帽輕衫宮樣窄舞遍胡笳十八拍曲罷酒闌猶未歸歸來月色和雲白瞎堂遠百非路絶透離微四句情忘發上機竹密不妨流水過山高豈礙白雲飛足庵鑒離四句絶百非西來祖意太離披藏頭白海頭黑叵耐馬師這老賊千古萬古黑漫漫埴溝塞壑無人識無禪才父為子隱子為父隱一火白拈誰敢侵近藏頭白海頭黑不動刀鎗斷人性命退菴奇離四句兮絶百非𮞏相推過幾曾知這僧擔一檐懵懂換得兩頭𣸩淈歸月坡明馬祖示衆云凡有言句是提婆宗以此箇為主頌曰玉轉珠回著眼看有相干處沒相干只將此箇以為主喝一喝云一劒倚天星斗寒石溪月馬祖一日封三甕醬令僧馳書寄與百丈百丈集衆上堂開書了拈拄杖指甕曰道得即不打破道不得即打破衆無語丈打破歸方丈頌曰送醬三瓶通遠信當時打破衆還驚父慈子孝誰相委莫道禪家太不情本覺一石頭希遷大師嗣清源思因清源曰有人道嶺南有消息師曰有人不云云曰若恁麼大藏小藏從何而來師曰盡從這裏去終不少他事源甚然之頌曰有消息太沉屈無消息轉埋沒大藏小藏從茲出撒沙撒土無終極甜如蜜苦如檗明如日黑如漆擊碎千年野狐窟填溝塞壑無人識圓悟勤石頭因僧問如何是解脫師曰誰縛汝頌曰未息狐疑問上流如何解脫得心休承君解脫從誰起直得無生是石頭汾陽昭曾把疑情問解脫擬意投師示一訣興慈旨意應機酬是汝當觀第二月般若柔石頭因僧問如何是祖師西來意師曰問取露柱曰某甲不會師曰我更不會頌曰覿面相呈便相罵兩箇中有一人嗔要識是非須看取鐵牛耕出玉麒麟靈源清終南山惟政禪師因唐文宗大和中嗜蛤蜊一日御饌中有擘不張者帝以為異焚香禱之俄變為菩薩形梵相具足即貯以金粟檀香合覆以美錦賜興善寺令衆僧瞻禮因問群臣斯何祥也或言太一山有惟政禪師深明佛法聞強識帝即令召至問其事師曰臣聞物無虛應此乃啓陛下信心耳契經曰應以此身淂度者即現此身而為說法帝曰菩薩身已現且未聞說法師曰陛下覩此為常耶非常耶為信耶非信耶帝曰希奇之事朕深信焉師曰陛下已聞說法竟皇情大恱詔天下寺院各立觀音像以答殊休頌曰螺螄蚌蛤類大唐天子心嗜好即深信南無觀世音西岩惠合水和泥底事忙被渠點破太乖張雖然默契君王意已是全身陷鑊湯北海心一點悲心擘不開鑊湯袞處笑盈腮希奇之事朕深信見與君王說法來石溪月蚌蛤之中有應身更言說法亦非真補陀大士唐天子橫眼人無隔宿恩間極雲
