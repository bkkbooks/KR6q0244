body:
  text: 僧録司右闡教兼靈谷禪寺住持淨戒重校大乘經偈經題字一則楞嚴經十六則圓覺經九則法華經八則維摩經四則文殊般若經一則金剛經十一則華嚴經六則楞伽經一則經首題字昔有僧問地藏琛和尚以字不成八字不是未審是甚麼字地藏曰看取下注腳又有問披雲霖師答以頌曰以字不是八不成森羅萬象此中明直饒巧説千般妙不是漚和不是經頌曰以八不成只目前經中未識注中看垂慈不為多知解切要參玄達本源汾陽昭以字不成八不是拈起經題皆擬議下頭注任君看却是入門先問諱佛印元以字不是八不成龍門風浪若雷霆多少遊魚迷去路依前和雨落滄溟佛慧泉我佛金言義海深開遮唯要悟真心首標妙在當頭劄蜜使泥牛曉夜吟雲居祐拈起題摸不著却看下頭注腳了知字義炳然大藏潛通廣略地藏恩以字不成八字不是法身睡著無遮閉衲僧對面不知名百萬人前呼不起覺範洪以字不成八字不是十方諸佛同參三世如來共軌慶喜多聞罔措鶖子神通莫擬若非金色頭陀焉能蜜傳斯旨旻古佛以字不是八字非滿琅函載絶毫𨤲看經到此須開眼玉軸分眀兩畔題羅漢南經題滿目孰知元點畫分明句義全佐國欲知功力大蕭何元是漢朝賢踈山常以字不是八不成無言童子笑欣欣優曇華現人間世鼻孔通天嗅不聞開福寧以字不成八字非爍迦羅眼不能窺一毛頭上重拈出忿怒那吒失却威徑山杲龍宮海藏不曾收梵語唐言亦謾求剛被祖師輕漏泄當門齒乃因由靈巖因鳥迹半露蒼苔科斗並遊春水若不信受奉行未免即從座起石明不向經題識本真紙堆討甚法王身未開梵夾承當去免作循行數墨人絶岸湘問你地藏知不知下頭注腳萬千千算沙入海徒疲倦不若教他了目前橫川珙楞嚴經佛告阿難吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝頌曰全象全牛意不殊從來作者共名模如今要見瞿曇老剎剎塵塵在半途雪竇顯堂堂露柱久懷胎長下孩兒頗俊哉未解語言先作賦一撡直取狀元來白雲端老胡徹底老婆心為阿難陀意轉深韓幹馬嘶芳草渡戴嵩牛臥緑楊陰湛堂凖雲收空闊天如水月載姮娥四海流慚愧牛郎癡愛叟一心猶在鵲橋頭佛心才説離百非存軌則言無一法尚筌毗耶默默曾緘口摩竭寥寥鎮掩扉佛鑑勤初學賣華日嬌羞掩齒牙及至容顏老脫然無可遮却笑白雲他自散不知明月落誰家崇覺空隔林倣佛聞機杼知有人家在翠微及至入門親見了元來只是小兒嬉簡堂機見時不見非見見非見不見捴非非織女機梭撩亂擲牧童鞭索恣胡揮幽鳥一聲驚宇宙碧灣溪畔緑楊垂呆堂定石潤非玉水麗非金大禹決而西泝卞和泣而陸沉美兮渺兮錯古礱今虛堂愚楞嚴經佛謂阿難若能轉物即同如來頌曰若能轉物即如來春暖山花處處開自有一雙窮相手不曾容易舞三臺白雲端若能轉物即如來處處門開見善財花柳巷中呈舞戲九衢乘醉臥樓臺真如哲毛吞巨海芥納須彌乾坤大地直下同歸一氣不言含有象萬靈何處謝無私佛心才若能轉物即同如來咄哉瞿曇誑呼癡呆徑山杲雨色和煙匝四維眼皮未綻若為窺等間覷破金剛際坦蕩無因役路岐或菴體他人住處我不住他人行處我不行不是與人難共處大都緇素要分明此山應楞嚴經佛謂阿難見見之時見非是見見猶離見見不能及頌曰見不及處江山滿目不覩纖毫花紅柳緑白雲出沒本無心江海滔滔豈盈縮海印信拄杖頭邊無孔竅大千沙界猶嫌小毗婆尸佛早留心直至而今不得妙鼓山圭春至自開花秋來還落葉黃靣老瞿曇休搖三寸舌徑山杲色空明暗本無因見見由來亦誤人見不及時猶未瞥那知殃祟是家親遁菴演沒絃琴上無私曲一曲彈來轉轆轆斷崖流水少知音六六不成三十六妙峯善瘦藤拄到風煙上乞與遊人眼界寬不知眼界寬多少白鳥去𥁞青天還朴翁銛雨洗淡紅桃蕚嫩風搖淺碧柳𮈔輕白雲影裏怪石露緑水光中古木清潛菴光隔墻見角便騎牛騎入紅塵閙市遊遊遍歸來欄裏臥三更半夜失蹤由雪菴瑾楞嚴經七處徵心頌曰七處徵心心不遂懵懂阿難不瞥地直饒徵得見無心也是泥中洗土塊西余端七處徵心欵便成推窮尋逐桉分明都緣家賊難防備撥亂乾坤見太平卍菴顏吹粳著米翻成特地不因一事不長一智北澗蕳七處徵他天外天毫光直射阿難肩瞿曇忒殺憐兒切逼得鮎魚上竹竿絶岸湘楞嚴經八還辨見頌曰八還之教垂來久自古宗師各分剖直饒還得不還時也是蝦跳不出斗西余端明暗色空不可還不可還者絶躋攀夾截虛空成畔岸一重水隔一重山卍菴顏色空明暗各不相知行到水窮處坐看雲起時北澗簡還還還後更還還一箇間人天地間昨夜大蟲遭虎咬皮毛落𥁞體元班絶岸湘楞嚴經阿難大衆獲本妙心頌曰東西南北捉虛空海角天涯信不通力𥁞神疲無處覔萬年松在祝融峯卍菴顏適我昔所願今者已滿足是玉也大奇只恐不是玉北澗簡楞嚴經觀世音菩薩成三十二應身獲十四無畏法頌曰良哉觀世音旋聞與聲脫犬吠驢嗚休未休世出世間活鱍鱍瞎堂遠三十二應不思議十四無畏如流水男子身中入定時女子身中從定起卍菴顏趂隊選圓通無端立下風當時供死欵錯説在聞中北澗簡楞嚴經妙性圓明離諸名相頌曰一錢為本萬錢利富不足而貧有餘換骨奪胎些子藥輸他潘閬倒騎驢卍菴顏金盤不可動轆轆轉難住停待良久間圓明湛如露北澗簡楞嚴經諸可還者自然非汝不汝還者非汝而誰頌曰日暖風和景更奇華華草草露全機荼一陳香風起引得遊蜂到處飛心聞賁千山鳥飛滅萬里人迹絶扁舟蓑笠翁獨釣寒江雪肯堂充不汝還兮復是誰殘紅流在釣魚磯日斜風動無人掃燕子𭊷將水際飛天目禮楞嚴經六解一頌曰根塵縛脫本同源一處休復六用捐手把一條紅斷貫娘生鼻孔一時穿卍菴顏六用無功信不通一時分付與春風篆𤇆一縷間清晝百鳥不來花自紅北澗簡二結解非殊存曰無據試問本來宗當初誰縛汝楞嚴經阿難大衆復白佛言若此妙明真淨妙心本來遍圓如是乃至大地草木蠕動含靈本元真如即是如來成佛真體佛體真實云何復有地獄餓鬼畜生頌曰雙劒峯前古寺基天尊元是一牟尼時難只得同香火莫聽間人説是非卍菴顏三蛇九鼠一畝之地竿木隨身逢場作戲北澗簡楞嚴經佛言阿難此等衆生不識本心受此輪回經無量劫不得真淨皆由隨順殺盜故反此三種又則出生無殺盜淫有名鬼倫無名天趣有無相傾起輪回性頌曰七處精研一妄心更隨三業殺盜淫身心不是間家具前箭猶輕後箭深卍菴顏客舍并州已十霜歸心日夜憶咸陽無端又渡桑乾水𨚫望并州是故鄉北澗簡楞嚴經佛告阿難無令心魔自起深孽頌曰瞿曇徹底老婆心見明色發理難任入鄉隨俗那伽定佛魔到此盡平沉卍菴顏挽弓須挽強用鏘須用長射人先射馬擒賊先擒王北澗簡楞嚴經佛言富樓那如汝所言清淨本然云何忽生山河大地汝常不聞如來宣説性覺妙明本覺明妙詳在本經頌曰清淨本然遍法界山河大地即皆現性覺必明認影明眼耳便隨聲色轉卍菴顏滿清淨中不容他山河大地萬象森羅北澗簡楞嚴經若能推者即是汝心則是認賊為子頌曰如今推也是子是賊買帽相頭食魚去骨天童覺楞嚴經跋陀婆羅入浴忽悟水因頌曰了事衲僧消一箇長連床上展腳臥夢中曾説悟圓通香水洗來驀面唾雪竇顯超諸現量即悟水因體明無垢孰云洗塵得無所有了無相身成佛子住妙觸常存大溈智洗塵觸體兩空寂妙證密圓超見思白壁無瑕空受玷圓通會裏受塗糊塗毒䇿楞嚴經當知虛空生汝心內猶如片雲點太清裏况諸世界在虛空耶汝等一人發真歸元此十方空皆悉消殞頌曰一人發真歸元十方虛空消殞試問楊岐栗蓬何似雲門胡餅𡰱無著捴瞌睡茫茫困思來喫碗濃茶眼便開四海五湖王化裏更無一物是塵埃朴翁銛圓覺經如是我聞一時婆伽婆入於神通大光明藏三昧正受一切如來光嚴住持是諸衆生清淨覺地身心寂滅平等本際圓滿十方不二隨順頌曰東西南北水茫茫無角鐵牛入海藏千眼大悲尋不見倒騎佛殿入僧堂冶父川圓覺經於不二境現諸淨土與大菩薩摩訶薩十万人俱頌曰明鏡當臺照不差短長好醜盡歸家山河大地渾如故不妨隨處玩𤇆霞冶父川圓覺經非幻不滅頌曰不屬內外與中間才落思惟入魔境大丈夫兒不自欺翻身坐斷毗盧頂月林觀圓覺經修多羅教如標月指頌曰方便門指頭月譊訛因多甄別冷光靄靄登清途匝地茫茫尋舊冗指看畫處眼中屑到此何須更饒舌育王達圓覺經一切障礙即究竟覺頌曰枯樹雲充葉凋梅雪作花擊桐成木響蘸雪喫冬瓜長天秋水孤鶩落霞雪堂行早朝心悶三杯酒午後頭昏一碗茶入夜脫衣伸睡五更走起眼瞇麻或菴體圓覺經有我愛者亦愛涅槃伏我愛根為涅槃相頌曰黑山鬼窟至幽陰認得頑空盡力尋何似天窗饒一撥䪺令大地作黃金圓覺經棄愛樂捨還滋愛本便現有為增上善果皆輪回故不成聖道頌曰傀儡牽𮈔舞柘枝百般俏俊百般宜自從舞罷青𮈔斷堪笑渠儂撒手歸圓覺經居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實頌曰黃花爛爛翠竹珊珊江南地暖塞北天寒遊人去後無消息留得溪山到老看晦堂心舉手攀南斗翻身倚北辰出頭天外看誰是我般人鼓山圭巍巍堂堂磊磊落落閙處刺頭穩處著腳腳下線斷我自由鼻端泥盡君休斫莫動著千年故紙中合藥天童覺荷葉團團團似鏡菱角尖尖尖似錐風吹柳絮毛毬走雨打梨花蛺蝶飛徑山杲和𤇆釣月是生涯古䇿風高未足𧦹欵乃一聲天地闊祖師何處渡流沙或菴體猢猻喫毛蟲烏狗上佛殿大地雪漫漫澄江靜如練圓極岑生鐵鑄牛頭牽犂還拽杷智者笑欣欣愚人驚怪差古往今來幾百年更向鬼門重貼卦密菴傑前栽萵苣萵苣生火筯火筯生蓮花蓮花結木瓜木瓜才擘破撒出白油麻參堂仁昨夜深沙鑄鐵券阿那律陀來合伴醉來相打見閻王閻王握筆不能判却相勸彼此事同一家更莫前思後算㘞你恁麼斷公事大喫醋無庵全張果老破葫蘆呂洞賔失𨚫寶劒兩箇撒手相逢囊篋更無一線何仙姑鐵笛橫吹解道長江靜如練正堂辨身世悠悠不繫舟得隨流處且隨流今朝有酒今朝醉眀日無錢眀日愁石庵玿春眠不覺曉是處聞啼鳥夜來風雨聲花落知多少朴翁銛春生夏長淡飯粗茶魚投濁水彩奔齪家無凖範三春不是讀書天九夏炎炎直放禪唯有秋冬較些子不如打睡過殘年北澗簡圓覺經以大圓覺為我伽藍頌曰毫髮不留縱橫自由閫外乾坤廓落大方無外優遊眀眀祖師意明眀百草頭褫破狐疑網截斷愛河流縱有回天力爭如直下休四衢道中淨倮倮放出溈山水牯牛圓悟勤圓覺經恆作是念我今此身四大和合𩬇毛瓜齒等皆歸地唾涕膿血等皆歸水暖氣歸火動轉歸風四大各離今者妄身當在何處頌曰今者妄身當在何不應𦦨水更尋波狂心誤認鑑中影豈異迷頭演若多本覺一法華經佛放眉間白毫相光照東方萬八千世界頌曰蠻奴赤上皇州賣盡奇跨白牛貪著市朝人作市又隨歌舞上官樓多意氣好風流月冷珠簾挂玉鈎分眀忘𨚫來時路百尺竿頭輥繡毬圓極岑法華經假使滿世間皆如舍利弗盡思共度量不能測佛智頌曰雪子落紛紛烏盆變白盆忽然日頭出依舊是烏盆破庵先法華經觀世音菩薩普門品偈曰呪咀諸毒藥所欲害身者念彼觀音力還著於本人頌曰呪咀毒藥形聲之逆眼耳若通本人何失法眼益法華經譬如長者有一大宅於後宅舍忽然火起毒害火災衆難非一頌曰蝴蜂休戀舊時窠五百郎君不奈何欲火逼來無走路癡心要上白牛車門前羊鹿權為喻室內啀喍捴是訛逢㶿臭𤇆相惱處出身不用動干戈冶父川法華經如來如實知見三界之相無有生死若退若出亦無在世及滅度者非實非虛非如非異不如三界見於三界如斯之事如來明見無有錯謬頌曰岣嶁峯頭神禹碑字青石赤形模奇無目仙人才一見便應撫掌笑嘻嘻雲暗蒼龍化葛陂圓極岑火虐風叨水漬根石邊尚有舊苔痕化工肯未隨寒暑又孽清香為返魂間極雲法華經此經開方便門示真實相深固幽遠無人能到頌曰雖然幽遠涉途程到者方知不夜城鼓角聲寒蓮漏永佛燈猶作向來明圓極岑法華經云是法住法位世間相常住頌曰犬子便吠賊牛子便牽犂衲僧若恁麼未曾摸著皮楊岐會世間相常住黃鶯啼緣樹真箇可憐生動著便飛去朴翁銛法華經偈大通智勝佛十劫坐道場佛法不現前不得成佛道頌曰三際斷時凡聖盡十身圓處剎塵周無私應物隨高下抹過僧祇大劫修保寧勇種穀不生豆苗蒸沙豈能成飯大通智勝如來一箇擔板塵漢鼓山圭燕坐道場經十劫一一從頭俱漏泄世間多少守株人掉棒擬打天邊月徑山杲紅日杲杲切忌尋討拈得便用無非是寶鄭州梨青州棗大抵還他出處好月林觀太平時代不論兵路不賫糧戶不扃一劫坐來成事平生肝膽一時傾道場融劫初鑄就毗盧印古篆雕蟲尚宛然堪笑堪悲人不識却嫌字畫不完全環溪一法華經若有衆生聞是觀世音菩薩品者當知是人功德不少頌曰觀音門普普門𭣣才著欄衫便不羞昨夜猿啼新嶺上今朝鶴唳古溪頭惡風飄墯回光息欲火焚燒當處休瓔珞受來都不用平生活計冷湫湫冶父川文殊所説般若經清淨行者不入涅槃破戒比丘不入地獄頌曰平生踈逸無拘撿酒肆茶坊信意遊漢地不收秦不管又騎驢子過楊州保寧勇養就家欄水牯牛自歸自去有來由而令穩臥深雲裏秦不管兮漢不𭣣祖印明鵠白烏本玄松𣗥自曲清淨比丘僧却須入地獄鼓山圭壁上安燈盞堂前置酒臺悶來打三盞何處得愁來徑山杲僧問洞山詮清淨行者不入涅槃破戒比丘不入地獄時如何師云度盡無遺影還他越涅槃頌曰相好巍巍大丈夫一生無智恰如愚從來佛祖猶難望地獄天堂豈可拘丹霞淳清淨行者不涅槃破戒比丘無地獄天台相接到西川捴是自家親眷屬照堂一夜來村飲歸健到三四五摩挲青莓苔莫瞋驚著汝自得暉嘉州石像陝府鐵牛人平不語水平不流𡰱無著捴陪錢弄傀儡𢬵命打鞦渾家無眼見掩面蒼天或菴體事神者喫神事佛者喫佛神佛俱不事渾家窮徹骨肯堂充漢既不管秦亦不收人平不語水平不流月林觀犯重比丘清淨行平等性中無損益水裏不用覔魚蹤天邊何處觀鳥迹懶菴樞國有定亂劒家無白澤圖神仙張果老碎藥葫蘆朴翁銛清淨行者清淨破戒比丘破戒各自安貼家邦切忌放賊過界退菴奇飲官酒臥官街當處死當處埋寒山逢拾得撫掌笑咍咍此山應涅槃地獄本無差只為從來被眼遮三腳瞎驢才𨁝跳鑊湯爐炭即吾家高峯妙維摩經須菩提持鉢入維摩舍乞食時維摩詰取鉢盛飯謂言汝能於食等者諸法亦等諸法等者於食亦等如是行乞乃可取食乃至彼外道六師是汝之師因其出家彼師所墯汝亦隨墯乃可取食入諸邪見不到彼岸住於八難不得無難同於煩惱離清淨法汝得無諍三昧一切衆生亦得是定其施汝者不名福田供養汝者墯三惡道為與衆魔共一手作諸勞侶汝與衆魔及諸塵勞等無有異於一切衆生而有怨心謗諸佛毀於法不入衆數終不得滅度汝若如是乃可取食須菩提聞此茫然不知以何答置鉢欲出頌曰無邊無際休斟酌潮去潮來本自平清濁淺深并苦淡一般滋味逈分明保寧勇入林不動草入水不動波鑊湯無冷處合眼跳黃河鼓山圭獨坐許誰知青山對落暉花須連夜發不待曉風吹徑山杲白日街頭獨自行夜間屋裏獨自臥山高不礙白雲飛竹密不妨流水過照堂一邪見皈依外道師與師同墯復何疑憑君滿鉢盛香飯午日亭亭腹正飢張無盡七七四十九六六三十六是非才入耳渾家不和睦肯堂充獨弄單提單提獨弄劒刃上行寂然不動月林觀所生各不同所潤一雨普甜瓜徹蒂甜苦瓠連根苦冰谷衍青山白雲碧溪蘿月畫虎成狸只得一橛虛堂愚維摩經三十二菩薩各説不二法門至文殊云我於一切法無言無説無示無識離諸問答是為菩薩入不二法門殊又問維摩摩默然殊歎曰乃至無有語言文字是真入不二法門説是入不二法門時於此衆中五千菩薩皆入不二法門得無生法忍頌曰維摩大士去何從千古令人望莫窮不二法門休更問夜來眀月上高峰雪竇顯虛空鳥迹謾追尋幽鳥投聲又報春若識東西無異路淨名一室不平沉慈明圓毗耶城裏競頭走謾謂南星真北斗還知蚌鷸兩相持須盡落漁人手太洪恩一箇兩箇百千萬屈指尋文數不辨暫時放在暗窗前眀目與君重計算白雲端春有百花秋有月夏有涼風冬有雪若無間事在心頭便是人間好時節訥堂思毗耶城裏老維摩一默無言詭詐多三萬二千獅子座一時掀倒看如何無用全言言言兮飄風灑雪默默默兮雷轟電掣藕絲孔裏騎大鵬等間挨落天邊月懶菴需毗耶老子善藏機淵默雷聲徹四維今古競傳真不二豈知黃葉止兒啼尼無著捴有無語默謾徒勞居士何曾動一毫世祖功成三十六雲臺爭似釣臺高別峯印深入不二門巧盡反成拙一默定千差常説熾然説説拙萬古清風寒徹骨松源嶽維摩經不斷煩惱而入涅槃頌曰朝生暮死千萬遍一日幾回相見面展陳開旗放出來一指動時客戲見白雲端僧問投子如何是不斷煩惱而入涅槃師曰這箇師僧恁麼發人業頌曰雖然無背面觸處頭頭現吞𨚫太虛空吐出琉璃殿佛心才者箇師僧發人業賣油老翁説向人啼得血流無用處不如緘口過殘春文殊道維摩經觀身實相觀佛亦然頌曰眼空四海恣縱橫鼻孔遼天信行拏得電光為火把却來日午打三更或菴體維摩經佛以一音演説法或有怖畏或斷疑頌曰或有怖畏或斷疑雙眀一句絶針錐於斯切莫生欣厭覿面還須眼似眉禾山方金剛般若經世尊食時著衣持鉢入舍衛城乞食於其城中次第乞已還至本處𭣣衣鉢洗足已敷座而坐須菩提白佛言希有世尊頌曰食訖跏趺坐石床斗間間氣燭天光幾多業識茫茫者衲被蒙頭在醉鄉水菴一一字未曾談般若謾天謾地儘饒伊祇園乞食歸來後法會因由又是誰北澗簡衛城乞食沿門處祇苑𭣣衣洗足時善現無端讚希有斯文安得是如斯寶葉源金剛般若經應如是住如是降伏其心頌曰希有希有佛妙理極泥洹云何降伏住降伏信為難二儀法中妙三乘教喻寬善今諦𥊸六賊免遮攔傅大士七手八腳神頭鬼面棒打不開刀割不斷閻浮跳躑幾千回頭頭不離空王殿冶父川截斷從教來袞袞隨流未必去滔滔青山長鎖欲飛勢滄海合知來處高心聞賁金剛般若經凡所有相皆是虛妄若見諸相非相即見如來頌曰有相有求皆是妄無形無相墯偏枯堂堂密密何曾間一道寒光爍太虛冶父川映林映日一般紅吹落吹開捴是風可惜擷芳人不見一時分付與遊蜂心聞賁金剛般若經一切賢聖皆以無為法而有差別頌曰一金成万器皆由匠者智何必毗耶城人人説不二覺海元仁者見之謂之仁智者見之謂之智寒時向火熱時乘涼健即經行困即打睡仰面看天開口取氣保寧勇金剛般若經一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出頌曰佛祖垂慈實有權言言不離此經宣此經出處還相委便向雲中駕鐵船切忌錯會水出昆崘山起雲釣人樵客問來因只知洪浪巖巒闊不肯拋𮈔弄斧斤投子青長時誦不停非義亦非聲若欲受持者應須用眼𥊸寶相元金剛般若經應無所住而生其心頌曰山堂靜坐夜無言寂寂寥寥本自然何事西風動林野一聲寒鴈唳長天冶父川應無所住豁心空金屑依然著眼中驀地虛空連地脫大千經卷一時通孤雲權應無所住生其心廓徹圓眀處處真直下頂門開正眼大千沙界現全身呆堂定金剛般若經若為人輕賤是人先世罪業應墯𢙣道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提頌曰眀珠在掌有功者賞胡漢不來全無伎倆伎倆既無波旬失途瞿曇瞿曇識我也無雪竇顯水不洗水誰不知旋嵐常靜太驅馳千年曆日如能算免被巡官掌上推白雲端四序炎涼去復還聖凡只在剎那間前人罪業今人賤倒𨚫前人罪業山張無盡寶劒不失虛舟不刻不失不刻彼此為得倚待不堪孤然仍則鳥迹虛空有無忒思之法眼益半夜窗眀鄰家有火𫙙老敲門李老打鎖王婆呌船趙婆過渡油盡燈滅一場懡㦬佛鑑勤綴綴功過膠膠因果鏡外狂奔演若多杖頭擊著破竈墮竈墮破來相賀𨚫道從前孤負我天童覺金剛般若經如來所得阿耨多羅三藐三菩提於是中無實無虛頌曰菩提無實亦無虛幾箇男兒是丈夫穴不歸金鸑鷟碧潭空浸玉蟾蜍佛慧泉生涯如夢若浮雲活計都無絶六親得一雙清白眼笑他無限往來人冶父川金剛般若經過去心不可得現在心不可得未來心不可得頌曰過去現在未來心簸土揚塵無處尋坐臥經行無不是承當直下莫沉吟過去心不可得𭣣綸罷釣秋江碧扁舟古岸恣間眠明月蘆花深穩密現在心不可得法王家法存今昔謀臣猛將定封疆説甚陏珠并趙壁未來心不可得不可得中只麼得石含玉兮地擎山惟證乃知難可測千古流芳誰共知清風匝地有何極雪竇宗三際求心心不見兩眼依然對兩眼不須遺劒刻舟尋雪月風花常見面冶父川後念起時前念滅起滅之念何嘗別喚取機關木人問從頭弄盡元無説懶菴樞三清道士無仙骨八教闍𥟖毀梵書黑漆昆崘舞花鼓天親無著暗嗟吁或菴體去嵗春風燕子多社前先到舊時窠今年春色歸將半簾幕蕭蕭不見過寶葉源金剛般若經若以色見我以音聲求我是人行邪道不能見如來頌曰色見聲求也不妨百花影裏繡鴛鴦自從識得金針後一任風吹滿袖香塗毒䇿盡却耳根并眼底不知何處見如來數聲幽鳥啼寒木一片間雲鋪斷崖野庵璇金剛般若經一切有為法如夢幻泡影如露亦如電應作如是觀頌曰幻化空身即法身箇中無染亦無塵拈𢁈把筯如明了掃地燒香不倩人慈受深水中捉月鏡裏尋頭刻舟求劒騎牛覔牛空花陽焰夢幻浮漚一筆勾斷要休便休巴歌杜酒村田樂不風流處也風流冶父川作事存心貴要精不精終是不通靈棊逢絶處著方妙梅到寒時香愈清間極雲暑往寒來揔不知有無名相一時離正如黑漆屏風上醉寫盧同月蝕詩雪巖欽佛華嚴經世尊因普眼菩薩欲見普賢不能得見乃至三度入定遍觀三千大千世界覔普賢不能得見𨚫來白佛佛云汝但於靜三昧中起一念便見普賢普眼於是才起一念便見普賢乘六牙白象住於空中頌曰飄飄一鴈落寒空步步追空覔鴈蹤踏破草鞋跟子斷巍然獨坐大雄峯瞎堂遠瞿曇幾箇舌頭衆會幾箇眼睛頭頭物物剎剎塵塵自謾猶自可最若是謾人北澗簡華嚴經世尊告普眼菩薩頗有人能説幻術文字中種種幻相所住處不答云不也佛言普眼幻中幻相尚不可得何况普賢菩薩祕密身境界祕密語境界祕密意境界而入其中能入能見頌曰晃晃在心目昭昭居色塵莫將銀世界喚作假銀城北澗簡華嚴經菩薩以菩提心為家以如理修行為家法頌曰浪宕樓頭無藉在零丁利帝可憐生𢙣叉聚是此中入佛子住非他處成北澗簡華嚴經偈如有大經卷量等三千界在於一塵中一切塵亦然有一聰慧人淨眼悉能見破塵出經卷廣饒益衆生頌曰擬破一微塵分明昧此經如何破經卷出此一微塵北澗簡華嚴經我今普見一切衆生具有如來智慧德相但以妄想執著而不證得頌曰天蓋地載成團成塊周法界而無邊析鄰虛而無內及盡玄微誰分向背佛祖來償口業債問取南泉王老師人人只喫一莖菜天童覺華嚴經法界觀法身流轉五道名曰衆生故令衆生現時法身不現頌曰佛真法身抵死謾生自沽村酒自把磁瓶却著衫來作主人北澗簡楞伽經五法三自性二種無我頌曰破豈復作事焦種不因生孽芽如彼靈空槃大子毛輪垂法翳花開鼓山圭陝府鐵牛白癩嘉州大像耳聵兩箇病痛一般咄哉漆桶不快徑山杲般若心經是大神呪是大明咒是無上咒是無等等咒能除一切苦頌曰黯淡灘黯淡灘十度船來九度翻唯有三山陳上舍擔一柄傘岸上行奈我何無凖範是大神咒四大六根元不有是大明呪三世十方無透漏是無上咒海印圓光明已久是無等等咒七農工商各成就何故去年梅今歲柳顏色馨香依舊等間勘破悟桃花選甚法身藏北斗或菴體
