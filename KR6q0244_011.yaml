誰菴演睦州陳尊宿諱道明嗣黃檗學者扣激隨問遽荅詞語峻嶮諸方歸慕謂之陳尊宿初居睦州龍興寺晦迹藏用後歸開元今改兜率居房織蒲鞋以養母故有陳蒲鞋之號因見講僧乃名曰座主主應諾師曰擔板漢頌曰垂慈只要緫通靈不是宗師妄自生擔板直教湏放下免伊虛度百千生汾陽昭睦州喚隨卦斷回不回擔板漢楊無為二不重師承重至公諸方誰敢觸機鋒指教臨濟𠫭黃檗接得雲門嗣雪峯織屨只知供母飯閉門那更話禪宗樷林到處蒙霑潤莫測風雷起老龍腦後與一錐頭頭墮坑坎直饒喚不回也是虛擔板透過睦州關𠃵坤一隻眼長靈卓辛辛辣辣啀啀喍喍識濟北為大𣗳拶雲門墮險崖機峻莫偕言如枯柴夫是之謂陳蒲鞋圓悟勤電火光中休草草劍輪鋒上莫忉忉等閒放却全身入終不當頭犯一毫鼓山珪睦州擔板那容眨眼闊狹短長不湏增減徑山杲睦州擔板幾人扶喪者多應在半途言下要教通徹去逈然心眼頓醒甦椘安方睦州擔板漢作事𠇲分㭊衲僧鼻孔撩天言下要知端的南堂興朴寔頭禪無伎倆一句分明如擈相客來只是呌擔板不知的當誰擔板懶菴樞睦州檐板漢來見一邊淺深三尺水上下兩重天雪菴瑾山之峩峩水之湯湯冷眼覷著無處慚惶別峯印紅爐起浪拍天飛疾焰過風孰敢窺任是三頭并六臂到此休誇苐一機木菴永睦州見僧乃曰見成公案放汝三十棒曰某甲如是師曰三門頭金剛為甚麼舉拳曰金剛尚乃如是師便打曰這掠虛漢頌曰見成公案未除瑕放過方能脫鎻枷四海澄清人富庶更來石上種油麻覺海元見成公案便相當秤則稱𠔃斗則量非較當年三十棒至今平步也翱翔佛燈珣呼蛇易遣蛇難袖裡金槌不易看長安夜夜家家月誰知愁樂有多般海印信見成公案沒商量不動𮈔毫便廝當二十烏藤聊放過可怜雪上更咖霜無際𣲖見成底事沒商量剔起眉毛未廝當日暮碧天鴻雁斷海門斜去兩三行木菴永公案已見成放汝棒三十木馬走佀𤇆泥牛趂不及復菴封睦州因秀才相訪稱會二十四家書師以拄杖空中點一點曰會麼秀才罔措師曰又道會二十四家書永字八法也不識頌曰一點曾無異微塵刼不增百千諸佛眼同共此靈明明招謙禪師拄杖秀才筆伎倆皆手中出八法論書如未明面前一點黑如漆佛鑑懃一着機先用得親可憐窮子眼無筋湏知八法論書處前箭猶輕後箭深水庵一睦州上堂首座荅云在又曰寺主荅云在又曰維那荅云在三𫨻不同今當苐一向下文長付在來日頌曰八字打開十分漏泄孤危不立道方高伎倆更無隨意說別別南斗七号北斗八護國欽睦州示眾曰大事未明如喪考妣大事已明亦如喪考妣頌曰春去秋來古與今相逢休論幾時深飢飡渴飲無他事儘聽滿頭霜雪侵保寧勇楊子江頭波浪深行人到此盡沉吟他時若到無波處還佀有波時用心千峯琬青峰椘囙僧問大事已成為甚麼也如喪考妣師曰不得春風芲不開及至芲開又吹落頌曰家山歸到莫囙循竭力寅昏奉二親機盡功忘恩義斷便成不孝闡提人丹霞淳睦州常示眾曰忽然忽然大覺璉拈云不然不然頌曰忽然不然如鋏如鉗神仙秘訣父子不傳別峯印忽然忽然頭上是天不然不然脚下是地直下來也無處回避孤峯深睦州見僧來𠫭便喝曰上座如何偷常住果子曰某甲方來囙甚道偷常住果子師曰贓物現在聻頌曰傾盡寶山寶全身入荒草若是鳳凰兒不向那邊討松源岳睦州示眾曰汝等諸人還得箇入頭處也未若未得箇入頭處湏覓箇入頭處若得箇入頭處已後不得孤負老僧時有僧出禮拜曰某甲終不敢孤負和尚師曰早是孤負我了也又曰明明向你道尚自不會何况盖覆將來頌曰學道先湏入頭處既得入頭莫孤負明明向道尚猶迷何况言中曾盖覆本覺一睦州問僧近離甚處僧便喝師曰老僧被你一喝僧又喝師曰三喝四喝後作麼生僧無語師便打曰這掠虛漢頌曰兩喝與三喝作者知機變若謂騎𧆞頭二俱成瞎漢誰瞎漢拈來天下與人看雪竇顯睦州檐板漢觧使不觧筭人前嬴得五百家中着了一貫普庵玉睦州因僧問高揖釋迦不拜彌勒時如何師曰昨日有人問趂出了也曰和尚恐某甲不寔那師曰拄杖不在苕菷柄聊與三十頌曰出群湏是英靈漢敵勝還他師子兒選佛若無如是眼假饒千載亦奚為南堂興凜凜將軍令已行八荒四海要澄清提來劍氣干牛斗洗蕩氛埃見太平天童覺殺人不眨眼救人湏出手論寔不論虛合升始為斗高揖釋迦不拜彌勒喫棒趂出猶費力滴水冰生知未知拋塼引玉有人識月堂昌睦州囙僧問一氣還轉得一大藏教也無師曰有甚饆饠䭔子快下將來頌曰鈍钁頭邊得意時閒芲着子不愁伊幾人不善根株者只見枝頭更長枝長靈卓睦州只愛錐頭利這僧不見鑿頭方直饒轉得百千藏這般供養也尋常鼓山珪一氣轉一大藏教頓漸偏圓權與寔無邊妙義炳然彰元來一字也不識徑山杲等閒一問垂千古此樷林共播揚堪咲睦州無相度饆饠䭔子要先甞懶菴樞問若傾湫荅如倒岳出草羚羊時挂角明眼衲僧如何卜度尺短寸長一任貶剝投子舒快人一言快馬一鞭停囚長智十萬八千木菴永良玉不雕美言不文𤇆村三月裡別是一家春息庵觀睦州因僧問以一重去一重即不問不以一重去一重時如何師曰昨朝㘽茄子今日種冬𤓰頌曰重重去盡自平常春暖風和日漸長戶外鳥啼聲細碎岩芲狼藉滿山房自得暉登壇道士羽衣輕呪力雖窮法轉新拇指破開天地暗蛇頭攧落鬼神驚瞎堂遠披簑側笠千峯上引水澆𬞞五老前中有𤓰田難納履睦州倒退在傍邊南岩勝昨日㘽茄子今日種冬𤓰一聲河滿子和月落誰家咲菴悟睦州問一官人易中道百姓日用而不知且道不知箇什麼官人云不知道師曰酌然不知頌曰酌然不知無孔䥫槌當面一擲佛祖難窺肯堂充睦州囙僧問大眾臨筵合談何事師曰後園生菜熟水冷淘頌曰脫略情塵老睦州𧆞頭虎尾一時𭠎芳草渡頭韓幹馬綠楊堤畔戴嵩牛正堂辯睦州囙僧問如何是祖師西來意師云一隊衲僧來一隊衲僧去頌曰一隊衲僧來一隊衲僧去打破睦州關大地無寸土大川濟一隊衲僧來一隊衲僧去搆得搆不得銕蛇橫古路雪磯綱睦州曰裂開也在我捏聚也在我時有僧問如何是裂開師曰三九二十七菩提涅槃真如觧脫即心即佛我且與麼道你又作麼生曰某甲不與麼道師曰盞子擈落地碟子成七片曰如何是捏聚師乃斂手而坐頌曰溪邊嫰桺條條綠陌上桃芲𣗳𣗳紅勿謂東君無管帶更加暖日與和風佛性泰睦州囙僧問靈山還有蛇不師曰這蚯蚓頌曰水中鹽味色裡膠清若人辨得天下橫行草堂清福州烏石靈觀禪師嗣黃檗時老觀曹山行脚時問如何是毗盧師法身主師曰我若向你道即別有也曹山舉似洞山山曰好箇話頭秪欠進語何不更去問為甚麼不道曹山乃却來進前語師曰若言我不道即啞却我口若言我道即謇却我舌曹山歸舉佀洞山山深肎之頌曰烏石老古錐門風能峭絕有問毗盧師開口端的別齒有嚙鏃機天無苐二月軟語若金剛漚和是生滅南堂興毘盧師法身主通身是口寔難舉縮却舌頭啞口時獨許洞山暗相許不相許猫兒偏觧捉老鼠喝堂一烏石囙雪峰一日伺便扣門師開門峰驀胸搊住曰是凡是聖師唾曰這野狐精便推出閉却門峰曰也秪要識老兄頌曰一不作二不休賔主互換有來由焦磚打着連底凍赤眼撞着火柴頭松源岳峻硬門古莫儔曾郎欲入竟無由為渠八字打開着嬌綠覆田秧滿疇竹屋簡烏石囙雪峰扣門師問誰峰云鳳凰兒師曰作麼生峰云來啗老觀師開門搊住曰道道峰擬議師便托開掩却門峰住後示眾云我當時若入得老觀門你這一隊噇酒糟漢向甚處摸索雪竇云這孤恩負德漢有甚麼交涉當時入不得豈是教你入今既摸索不着累他雪峰俱在老觀門下頌曰養成羽翼鳳凰兒老觀門下偶差池冷地忽然思舊債却來別處討便冝𡰱無着捴烏石引次有僧來𠫭師引示之僧便去至晚問首座今日新到在什麼處曰當時便去了也師曰是則是只得一橛頌曰草舍柴門僻更幽何期過客也經由蒿湯𬾨禮不知愧猶對傍人賣口頭断槗倫唐相國裴休見黃檗囙見大安寺壁畫高僧真儀公曰真儀可觀高僧何在主事無對公曰此間有禪人否曰近有一僧投寺執投頗似禪者尋請至舉前話黃檗朗聲曰裴𠇲公應諾檗曰在甚麼處公當下知旨如獲髻珠頌曰鄷城寶劍沉埋久一道寒光射斗牛不是張華辨端的只應千古枉淹㽞慈受深翰墨場中喚得回桂林昨夜覺芲開暗香漏泄通消息散作人間調鼎才自得暉浮雲宿霧兩朦朧行徧千峰與萬峰驀地喚回霜夜夢舉頭親見月當空萬菴柔裴相國問僧看什麼經僧云無言童子經公曰有幾卷曰兩卷公曰既是無言為什麼却有兩卷僧無言新羅龜山代云若論無言非唯兩卷頌曰曾落石霜機外笏又扶麄行到唐天只將四海垂綸手鰕蟹魚龍一串穿虛堂愚裴相國入大安寺門諸大德曰羅睺羅以何為苐一日以密行為第一公不肎遂問此間有何禪者時龍牙在後園種菜遂請來問羅睺羅以何為第一牙曰不知公便拜曰破布褁真珠頌曰密行第一精鑑還希具擇法眼真箇不知黃龍新以何為第一不知㝡親切破布褁真珠傾城換不得月坡明洪州新興嚴陽尊者諱善信嗣趙州初𠫭趙州問一物不將來時如何曰放下着師曰既是一物不將來放下箇甚麼曰放不下擔取去師於言下大悟住山常有一蛇一𧆞隨從手中與食頌曰一物不將來肩頭擔不起言下忽知非心中無限喜惡毒既忘懷蛇虎為知己清風幾百年至今猶未已黃龍南移高就下縱威權觧脫門開信可憐不得空王真妙訣動隨聲色被勾牽真淨文不妨行細輸先手自覺心麄愧撞頭局破腰間斧柯爛洗清凡骨共仙游天童覺一物不將來教渠放下着廓爾悟無生活計俱拋却旻古佛𥁞力放不下着力擔不起將謂一物無元是自家底見得自家底心中大歡喜自茲家業興一舉九萬里龍門遠一物不將來兩手提不起直下要承當渾是自家底佛燈珣劈面呈機不等閒纖毫盡處重如山斷腸曲調如親𦗟流水悲風不用彈塗毒䇿赤心片片少人知滿口含霜特地疑奉報五湖學道者不湏孤負一雙眉月庵果趙州放下著碓觜忽生芲雖然無一事驗盡當行家雪堂行驀就膏肓打一鍼當時無處着渾身呵呵咲入嚴陽去蛇虎為隣不可尋密菴傑嚴陽携狗頭臭穢於人怕囙何老趙州與酬羊肉價野牛平杭州多福和尚嗣趙州因僧問如何是多福一樷竹師曰一莖兩莖斜曰學人不會師曰三莖四莖曲頌曰一莖兩莖斜其意毒如蛇三莖四莖曲無疑入地獄言下若知非心空及第歸堪咲蔣山老無端入荒草應菴華一莖兩莖斜踈影動龍蛇心疑生暗鬼眼病見空華三莖四莖曲還我一樷竹時引清風來落葉填山谷恁麼會得多福一樷竹若也不會三莖四莖曲無禪才興化軍梯山建福石梯禪師嗣茱萸一日見侍者托鉢上堂乃喚侍者者應諾師曰甚處去曰上堂齋去師曰我豈不知汝上堂齋去曰除此外別道箇甚麼即得師曰我只問你本分事曰和尚若問本分事某甲寔是上堂齋去師曰汝不謬為吾侍者頌曰父子相將草裡行星馳電捲迅雷轟賺他無限英靈漢錯認鞍鞽過一生辛菴儔益州大隨法真禪師嗣長慶安因僧問刼火洞然大千俱壞未審這箇壞不壞師曰壞曰恁麼則隨他去也師曰隨他去僧不肎後到投子舉前話子裝香遙禮曰西川古佛出世謂其僧曰汝速回去懺悔僧回大隨師已遷化僧再至投子子亦遷化頌曰切忌隨他不會他大隨此語播天涯真淨性中纔一念早是千差與萬差北塔祚懶菴的子大隨師人問隨他師亦隨返顧不能休駐意更生異見却狐疑汾陽為汝開天路萬別千差一道歸汾陽昭刦火光中立問端衲僧猶滯兩重關可憐一句隨他去萬里區區獨徃還雪竇顯隨他去隨他去千手大悲攔不住刼火光中相徃來銅睛䥫眼無尋處正覺逸壞與不壞俱非內外不隔𮈔毫尋常面對道吾真隨他去亦太無端袖裡金槌豈易看問罷不知何處去白楊風送壠頭寒佛慧泉刼火洞然大千何在壞與不壞漆桶不快肯更隨他去被謾又太煞若是箇中人終不到錯會法雲秀步步相隨是大隨左邊吹了右邊吹思量未免空𥱰氣何不㽞將暖肚皮保寧勇壞與不壞舌無骨驀面看時眼突出大隨猶在刼火中天下熬熬謾啾唧白雲端刼火洞然大千壞面前鼻孔鎮長在只為隨他一句言腰間失却箇皮袋地藏恩壞與不壞兩相猜劒閣龍舒謾徃來何人更有樊公脚一鴻門雙扇開慈受深刼火洞然俱敗壞青天白日愈光輝王孫醉寢迷春夢不覺鶯啼柳絮飛佛智裕臭𤇆蓬㶿中迸出鐵蒺蔾當陽如未委喪却目前機佛性泰壞與不壞言端語端舌頭咬破自覺心酸大隨投子終無兩般萬里區區獨自徃還椘安方陷虎之機総不知便隨流去落東西大隨自是持綱手放去𭣣來要驗伊圓照本六合傾翻劈面來暫披麻縷混塵埃因風吹火渾閑事引得游人不肯回壞不壞隨不隨徒將聞見強針錐太湖三萬六千頃月在波心說向誰通照逢了然無別法誰道印南能一句隨他去千山走衲僧𧉨寒鳴砌葉鬼夜禮龕燈吟罷孤窓外徘徊恨不勝唐景遵壞與不壞兩彩一賽本無是非說甚憎愛雲過長空了無𦊱碍君不見衲僧鉢袋子接得將來日裡晒佛鑑懃壞與隨他去如何不肯休未明端的意特地覓回頭龍門遠刼火洞然大千俱壞這箇魔魅百生冤債禪流若問壞不壞昨夜石人闘禮拜南堂興𠾑銕負鞍無固必牽犂拽𣞻不辭勞貪生逐日區區去誰管年高白髮饒簡堂機刼火光中共唱酬隨波逐浪謾悠悠剖盡衷腸人不會草鞋拈取盖龜休石庵玿才伸刦火光中問便觧隨他去復回回到悔來坡下路亂山依舊碧崔嵬北磵簡大隨庵側有一龜僧問一切眾生皮褁骨這箇眾生為甚骨褁皮師拈草履覆龜背上僧無語頌曰如龜六藏已彰名休向人前弄眼睛一隻草鞋都盖却直至如今猶未惺北塔祚問處爭如荅處親眼中難着透金塵長安一路無多地過得潼關有幾人佛慧泉分明皮上骨團團卦畫重重更可觀拈起草鞋都盖了大隨却被這僧謾白雲端露足藏頭可煞奇千年誰謂是靈龜雨傾不觧隨流去浮木相逢是幾時保寧勇皮骨曾將問大隨當頭一着更狐疑可憐無限尋聲迹不薦羚羊挂角時照覺捴大隨庵外一龜兒僧問如何骨褁皮草鞋盖了無人會白雲流水共依依地藏恩皮褁骨𠔃骨褁皮吉㐫徒自亂針錐草鞋覆了獨歸去千古何人識大隨普融平千古清聲老大隨機鋒壁立杳難窺未能直下超凡聖只道將鞋盖却龜禾山方懶庵的子大隨師一著當頭更莫疑大地山河都盖了他衲子下針錐旻古佛骨褁皮𠔃皮褁骨大隨老子無窠窟上士聞之咲未休中流特地生疑惑龍門遠皮褁骨𠔃骨褁皮分明道了復何疑拈起草鞋如未委不如別處且烏龜佛性泰法不孤起仗境方生烏龜不解上壁草鞋隨人脚行佛燈珣學道湏教正眼開莫將狂觧意中猜脫鞋龜上人難會遂使携囊特地來天童覺木禪庵畔定光老兒非銅非鐵無相無為有擎天之力有地之威有射鵰之手有囓鏃之機口如大海眼如眉人間天上許誰知南堂興骨褁皮兮皮褁骨大隨放出遼天鶻東西南北謾檯眸不知已過新羅國無凖範休將皮骨強分張得六藏時且六藏隻履盡情遮盖了這僧無事可思量此山應千載靈龜庵下出團團骨上卦重重草鞋盖却無頭尾且𦗟旁人定吉凶橫川珙大隨問僧甚處去曰峩眉禮普賢去師舉拂子曰文殊普賢総在這裡僧作圓相拋向後乃禮拜師喚侍者取一貼茶與這僧頌曰楖𣗖杖頭光閃爍錫羅捲褁面鄒鎪肩擔背負出門去好是無人敢駐㽞保寧勇大隨山下路縱橫老竹蒼藤處處生四海五湖為客慣二更無月也湏行慈受深識法者惧欺敵者亡水中辨乳源是鵝王天童覺一輪明月照瀟湘更不逢人問故鄉自是天涯慣為客任他猿呌斷人腸上方益把火入牛欄反身外面看梨芲千點白春雨幾聲寒月堂昌大隨囙僧問如何是和尚家風師曰赤土畫簸箕曰未審此理如何師曰簸箕有唇米跳不出頌曰赤土畫簸箕團團無縫𦉑佛眼覷不見海神不知價簸土揚塵無處尋山高海闊白雲深南堂興簸箕有唇米跳不出天下衲僧赤𩨘𩪸更湏撥轉上頭關十方世界黑佀漆應菴華大隨因僧問如何是佛法的的大意師曰山前麦熟也未頌曰山前麦熟報君知佛祖端由辨者稀莫學朱涇老禪伯滿舩空載月明歸象田卿大匠不巧大儒不學動輙中方圓舉皆成禮樂堪咲鄉村賣卜人徒勞鑽破烏龜殼無凖範大隨燒畬次忽見一蛇師以杖挑向火中曰咄這箇形骸猶自不放捨你向這裡死如暗得燈時有僧問云正恁麼時還有罪也無師曰石虎呌時山谷響木人吼處銕牛驚頌曰刼初刼末法弱魔強定光老子銕作脊梁文經武緯把定封疆碧天雲散祖風涼佛日光輝舜日長南堂興韶州靈𣗳如敏禪師嗣長慶安因僧問如何是和尚家風師曰千年田八百主曰如何是千年田八百主師曰郎當屋舍沒人修頌曰來機深辨有舒有卷移却案山重添鍼線千年田八百主直下承當還莾鹵郎當屋舍沒人修片瓦根椽誰去竪君不見甜𤓰徹蒂甜苦瓠連根苦月堂昌靈𣗳因僧問如何是祖師西來意師默然後遷化欲立行狀碑要選此語刻石時雲門為首座僧問先師默然處如何上碑雲門代云師頌曰師師師知知知三三兩兩過遼西一雙紅杏換消梨琅琊覺靈𣗳當初密對揚時中文采已全彰後人不見雲門老一字千般謾度量佛印元師之一字太巍巍獨向寰中定是非畢竟水湏朝海去到頭雲定覓山歸白雲端靈𣗳大師雲門首座只知立碑不覺話墮智海山僧為伊點破知燈是火如麻信火是燈能幾箇智海清師字相酬作者知韶陽千古特光輝范范宇宙人無到底誰明一字師旻古佛西來祖意若為酬手把明珠已暗投却被雲門添一字致令千古閙啾啾寶峯明靈𣗳面皮多葛怛韶陽板齒上生毛拍右膝會得國清才子貴拍左膝不會家富小兒嬌此庵元師之一字見還難直下應湏透祖關縱使祖関開正眼前頭更有萬重山佛照光師之一字太孤危文彩全無作者知不領韶陽提起處且默處認殘碑天目禮漳州浮石禪師嗣子湖上堂山僧開卜鋪能斷人貧富定人生死時有僧出云離却生死貧富不落五行請師直道師曰金木水火土頌曰達磨西來唯賣卜吉凶在汝不由人箇中只是依爻斷豈有人情踈與親本覺一金木水火土始終顛倒五六下四三初爻傳白𧆞苦苦卜得此卦一生貧遠信不來病人死懶庵需金木水火土一二三四五南泉王老師不打塩官鼓即庵覺金木水火土大蟲元是虎好咲李將軍藍田空沒羽無凖範福州靈雲志勤禪師嗣長慶安初在溈山因見桃芲悟道有偈曰三十年來尋劍客幾回落葉又抽枝自一見桃花後直至如今更不疑溈曰緣悟達永無退失善自護持有僧舉似玄沙沙云諦當甚諦當敢保老兄未徹在眾疑此語沙問地藏我恁麼道汝作麼生會藏云不是桂琛即走殺天下人頌曰分明歷世三十春因悟桃花色轉新人人盡得靈雲意不識靈雲是何人首山念二玄沙道處少人知密密相逢更莫疑今古相傳親的旨少年多是白頭兒昔日靈雲自有知桃花已落布華夷寰中劍當鋒者未徹橫身斬萬機汾陽昭傷嗟尋劍客桃芲遇春開靈雲一見處令我咲咍咍神鼎諲二月桃芲處處新靈雲一見更無親相逢盡道休官去林下何曾見一人慈明圓本無迷悟如麻獨許靈雲是作家借問徧叅諸祖客不知何處見桃芲雪竇顯春暖桃芲𣗳𣗳紅靈雲千古道還同玄沙㽞語樷林問南北東西路莫窮正覺逸不是玄沙定紀綱靈雲那得事全彰桃芲覺了咸皆委未徹何人共躰量師子離群山岳靜象王回顧海澄光二師不並歸何處釣魚舩上謝三郎浮山遠桃芲見後謂無疑壯志由來本是伊若問玄沙言未徹現前贓物自家知雲峯恱二月三月景和融遠近桃芲𣗳𣗳紅宗匠悟來猶未徹至今依舊咲春風黃龍南二龍象相逢世不群一來一去顯踈親時人不悟其中旨摘葉尋枝長客塵子路當時問要津滔滔天下丈夫人相逢相見若如此更有春風春又春翠岩真二學劍宗師定不差樷林浩浩是玄沙一塵纔舉知端的東海東邊萬萬家春暖桃芲帶露開靈雲一見悟靈臺玄沙諦當傳千古誰觧雌黃息眾猜淨照臻桃芲開處忽伸眉未徹玄沙也大奇幾度狂風吹擺後依前似火萬千枝佛慧泉二月春雨霽時小桃紅綻兩三枝紅白爭妍人盡見因甚靈雲獨不疑法雲秀靈雲偶尓見桃芲三十年來得到家何事玄沙未相保枯根株上別抽芽楊無為靈雲悟後復何如未徹無人辨得渠千古華山山脚下豈知潘閬倒騎驢白雲端萬年松下忽相逢𣗳鳴條浩浩風堪咲晚來無覓處崔嵬和雨在雲中保寧勇崑崙捧出無瑕玉赤水波心得夜光今古有誰能辨別釣魚舩上謝三郎成枯木奇一見桃芲後萬別千差更不疑獨有玄沙言未徹子孫幾箇是男兒真淨文蠢動含靈同一性山河大地盡知音昔人觧道黃鶯道似共桃芲說舊心雲居祐桃芲見了狐疑盡因甚玄沙却不然今古樷林爭浩浩欲驅良馬路揮鞭三祖宗靈雲老倒泄生涯消息傳來到謝家未徹根源箇端的教春力自開芲溈山秀靈雲聲價傳千古點撿元來未作家芳草滿園盡春色如何唯說悟桃芲地藏恩堪咲春風漏泄機桃芲新發舊年枝螺江有箇釣魚客咲殺靈雲道不疑佛國白春來物物盡紛華堪羨靈雲是作家一見桃芲心境絕老胡空自涉流沙雲盖昌靈雲眼中絕翳玄沙袖裡藏鋒把手直上峰頂一咲天地斗空佛心才靈雲見了絕譊訛獨步寰中不較多敢保老兄猶未徹令人疑着俻頭陀長靈卓靈雲一見不再見紅白枝枝盡着芲叵奈釣魚舩上客却來平地摝魚鰕洪覺範溪上桃芲開爛熳不知誰觧見靈雲頭頭緫是吾家物一念圓成盡属君通照逢靈雲昔日悟桃芲十里春風𣗳𣗳斜敢道老兄渾未徹夢中開眼見玄沙旻古佛山鳥芳時分外啼桃芲如火映前溪明明三十年來事可咲靈雲說悟迷祖印明陌上咲春風枝頭漏消息紅光爍太虛豈藉陽和力學劍宗師既不疑玄沙未徹㝡新奇掃除學路刮肌骨格外之機如電佛圓悟勤春來依舊一枝枝同地同天道不疑未徹之言人莫問令人特地咲嘻嘻龍門遠百煉精金大冶中任他騰燄亘天紅湏拈出教人看添得行家價轉豐開福寧十分風采露堂堂玉蕋璚枝末比量剛被傍人論好醜囙茲難嫁與潘郎佛性泰二月桃芲爛熳時靈雲一見更無疑玄沙未徹誰相委鼻孔來向下垂南華昺靈雲一枝迎曉露玄沙一朵已離披畢竟水湏朝海去到頭雲定覓山歸文殊道終日看天不舉頭桃芲爛熳始擡眸饒君便有遮天網到得牢關即便休佛燈珣盡道見桃芲悟道此語不知還是無茫茫宇宙人無那箇男兒是丈夫打破鬼門關日輪正當午一箭中紅心大地無寸土徑山杲桃芲尋劍客不語咲春風白頭歸未得家住海門東敢保老兄猶未徹玄沙之言何太切君看陌上桃芲紅盡是離人眼中𮕜鼓山珪似錦桃芲滿𣗳紅靈雲一見便心空當時不遇玄沙老爭得名喧宇宙中踈山如桃芲端的悟靈雲添得玄沙刼外春滿地不知何處去塵塵剎剎露全身椘安方玄沙未徹呷汁同罪千佛出世不通懺悔佛照光學劍難提鋒刃頭艶光芲發便心休不疑句播乹坤內得旨唯憑月滿秋雙泉瓊二玄沙聞舉悟中知當下云言未保伊一擊海濤皆湧沸天光回爍眼𭿇𭿇靈雲桃芲見親切英俊超越古今哲星簇孤輪明皎潔和刃精揮用無絕玄沙敢保君未徹雲水休話箇生滅新羅打鐵燒脚熱磨礱還用三尺雪道吾真滿樹桃芲行人競折靈雲悟後了無疑更有玄沙言未徹噓石明仰面穿針不見天低頭拾芬不見地天地針芥無處安堂堂面目眼中翳君不見諦當未徹在齪人趂大彩月堂昌桃芲春暖盡情開一見無疑頗俊不是釣魚舩上客無人把手上高臺東山空靈雲悟桃芲玄沙傍不肯多少癡禪和擔雪去填井今春芲又開此意誰能領端的少人知芲落春風靜國清紹春風二月半桃芲紅爛熳靈雲到處逢衲僧着眼看看看短棹孤舟誰居彼岸龍牙言一箇烏梅佀本形蜘蛛結網打蜻蜓蜻蜓落了兩片翼堪咲烏梅咬鉄釘天童淨一見便見猶隔䥫圍玄沙老漢腦後痛錐名高豈在鎸頑石路上行人口佀碑塗毒䇿靈雲一咲見桃芲三十餘年始到家此春風春雨後亂隨名字落天涯慈航朴靈雲親說悟桃芲端的無疑眼裡沙縱使玄沙言未徹相逢且喫趙州茶誰庵演乞兒拾得錫暗地空寶惜撞着明眼人一文也不直木菴永不疑不徹不失片片春風狼籍至今江北江南游子徒勞外覓休外覓明如杲日黑如漆別峯印三月桃芲爛熳紅靈雲打失主人翁隨邪逐惡玄沙老半是真情半脫空雲巢岩一見桃芲便垜眼銕圍生陷出無門倚墻傍壁知多少一度春來一斷魂少室睦一見不勞朱粉施玄沙掃帚畫蛾眉只知掩得靈雲醜落盡眉毛自不知朴翁銛紅入芳蹊錦色鮮酌然一點不相謾物歸元主自投合誰謂靈雲着眼看葛廬覃靈雲囙長生問混沌未分時如何師曰露柱懷胎曰分後如何師曰如片雲點太清曰只如太清還受點也無師不荅曰恁麼則含生不來也師亦不荅曰直得純清絕點時如何師曰猶是真常流注曰如何是真常流注師曰如鏡常明曰未審向上還有事也無師曰有曰如何是向上事師曰打破鏡來與汝相見頌曰午夜霜𤁒星斗寒長空雲盡山月落青天喫棒人盡知蒼龍退骨誰能覺金鳳衝開玉鎻關麒麟掣斷黃金索迢迢刼外孰能拘南北東西逈超卓雪竇宗金雞啄王𡖉飛出鳳凰兒入戶能長嘯歸家著錦衣佛鑑懃靈雲囙長慶問如何是佛法大意師曰驢事未去馬事到來頌曰靈雲因問出家才驢事前行馬後來長慶不明真寔地句中認影影難開子今報你諸禪侶九衢杲日照香街汾陽昭驢事未了馬事來鍾聲纔斷皷聲催祖師愛喫和羅飯北有文殊在五臺佛慧泉驢事未了馬事來一芲欲謝一芲開安南已得𤇆塵息塞北將軍唱凱回楊無為東行不見西行利南頭賣賤北賣貴橫千竪百筭河沙九九反成八十二保寧勇驢事未了馬事來鍾聲未了皷聲催春來縱步園閒看無限桃芲夾李開佛鑑懃問端如箭透𢬎墻頼值靈雲手𫨻長駿馬蹇驢皆控勒鞭教戰勝出沙場南岩勝松陰行不盡踈雨下無時世事幾興廢山中人未知蒙菴聡驢前馬後識靈雲滿眼風埃絕點塵行徧天台并雁蕩歸來重看錦江春心聞賁靈雲囙僧問如何是歸根得旨師曰早時忌却不憶塵生頌曰家破人已何所依無心無緒話求歸十年忌却來時路暫憶此時総不知投子青靈雲囙僧問如何是端坐念寔相師曰河裡失錢河裡摝頌曰河裡失錢河裡摝拈來天下任縱橫和雲買得南山地淺種深鋤恣意耕佛心才婺州金華俱胝和尚嗣天龍初住菴時有𡰱頂笠携錫遶師三匝曰道得即下笠子如是三問師皆無對𡰱便去師曰日勢稍晚何不且住𡰱曰道得即住師又無對𡰱去後師嘆曰我雖處丈夫之形而無丈夫之器不如棄庵往諸方𠫭尋知識去其夜山神告曰不湏離此將有肉身菩薩來為說法逾旬果天龍和尚到師迎禮具陳前事龍竪一指示之師大悟自此凡學者𠫭問師惟舉一指無別提唱將順世謂眾曰吾得天龍一指頭禪一生用不盡言訖示滅頌曰天龍一指悟俱胝當下無私物匪齊萬互千差寧別說直教今古勿針錐汾陽昭對揚深愛老俱胝宇宙空來更有誰曾向滄溟下浮木夜濤相共接盲龜雪竇顯老倒俱胝一指頭金華山下幾回秋至今坐石安禪處猶弄精魂未肯休佛印元丈夫無氣死無殊忽遇天龍陡頓蘇一指頭禪用不盡大悲千手費工夫野軒遵問荅機關豈易酧無錢難作好風流心中有事說不得只得忙忙竪指頭佛國白頓悟天龍一指頭河沙佛祖便同儔饒他鶖子懸河辨百億湏一芥𭣣旻古佛不用將心向外求箇中消息有來由報言達磨西來意只在俱胝一指頭佛鑑懃老大宗師竪指頭一生用得㝡風流玄沙拗折無人會年來年去冷颼颼龍門遠席簾蓬戶在門頭誰謂村居院落幽雨散雲𠬧山岳露珊瑚枝上挂金鈎惠照預俱胝一指頭喫飯飽方休腰纏十萬貫騎鶴上揚州徑山杲俱胝一指報君知朝生鷂子搏天飛若無舉鼎山力千里烏騅不易騎琅琊覺俱胝老子指頭禪二十年來用不殘信有道人方外術了無俗物眼前看所得甚簡施設彌寬大千剎海飲毫端麟龍無限落誰手重任公把釣竿天童覺獨脫風塵舉世無不明兵甲作良圖河清海晏來事自是時人不丈夫塗毒䇿俱胝一指禪古今成話欛打破鬼門關露柱尋無罅誰庵演一着高一着一步闊一步五百年間生指出這條路這條路十聖三賢皆罔措月林觀佳人睡起懶梳頭把得金釵插便休大抵還他肌骨好不塗紅粉也風流報恩演俱胝有一童子每見人問事亦竪指人謂師曰和尚童子亦會佛法凡有問皆如和尚竪指師一日潛袖刀問童曰聞你會佛法是否童曰是師曰如何是佛童竪指師以刀断其指童呌喚走出師召童子童回首師曰如何是佛童舉手不見指忽然大悟頌曰俱胝一指頭一毛九牛華岳連天碧黃河徹底流截却指急回眸青箬笠前無限事綠簑衣底一時休山堂淳俱胝鈍置老天龍利刃單提勘小童巨灵擡手無多子分破華山千萬重無門開瑞州末山𡰱了然禪師嗣大愚囙灌溪問如何是末山師曰不露頂曰如何是末山主師曰非男女相溪乃喝曰何不變去師曰不是神不是鬼變個什麼頌曰末山不露淩雲頂今古岧嶤在目前又道本無男女相非君莫辨火中蓮真淨文非男女相獨間間正躰堂堂孰可攀一句不傳千聖眼九天風靜月彎彎自得暉非男女相末山主今古堂堂常獨露常獨露兮見也麼清聲籍籍播寰宇月林觀
