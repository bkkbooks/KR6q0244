front:
  text: 禪宗頌古聯珠集序雞一寧武軍承宣使提舉隆興府王隆萬壽宮武功郡開國侯張掄撰西方聖人為一大事因緣故出現於世後以正法眼藏付囑迦葉傳至二十七世而達磨入于中夏設大法藥開甘露門直接上根不立文字逮今六百餘年獲菩提者不可勝數雖其心以無傳而傳其法以無説而説然機緣偈頌前後寖多玉句金章公案具在池州報恩寶鑑大師法應嘗因禪恱餘暇裒集採托由佛世尊以至古今宗師凡得機緣三百二十五則頌古一百二十二人目之禪宗頌古聯珠集可謂毗盧藏內全𭣣衆栴檀林中莫非香木開悟知見利益後來鋟木流通豈曰小補以豫夙慕宗乘樂推法施請為序引不獲固辭淳熙嵗在屠維大淵獻冬序本序法應自昔南遊訪道禪燕之暇集諸頌古咨參知識隨所聞持同學討論去取校定三十餘年採托機緣三百草五則頌二千一百首宗師一百草二人編排成帙命名禪宗頌古聮珠集願與天下學般若菩薩共之雖佛祖不傳之妙不可淂而名言初無字書安有蜜語臨機直指更不覆藏徹見當人本來面目故諸佛以一大事因緣出現於世譬喻言詞説法開示欲令衆生悟佛知見豈徒然哉池陽信士裒金刻板以廣見聞為大法光明之施淳熙二年乙未臘八日編次謹書通集序夫鼻祖西來不立文字直指而已時門人又有所謂不執文字不離文字而為道用已向第二機矣故有汝淂吾皮之記道不在言也審矣子以為何如曰非也道雖不在於言言而當終日言於道庸何傷否則一語猶以為贅也爰自一華敷而五葉聯芳六世傳而兩𣲖支衍機緣公案五燈燁如諸祖相繼有拈古焉有頌古焉拈古則見之於八方珠玉類要等集頌古則有寶鑑大師宋淳熙間居池陽報恩採集佛祖至茶陵機緣凡三百二十有五則頌古宗師一百二十有二人頌二千一百首目之曰禪宗頌古聮珠叢林尚之而板將漫滅因念淳熙至今垂二百載其間負大名尊宿星布林立頌古亦不下先哲惜乎聮繼之作闕如也每慚濫廁宗門且有年矣禪無所悟道無所詣欲作之復止之趑趄者亦屢矣元貞乙未叨尸義烏普濟山院事簡輒事續稿僅淂一二萍梗之蹤或出或處隨見隨筆草三四年間稍成次序機緣先有者頌則續之未有者增之加機緣又四百九十又三則宗師四百二十六人頌三千五十首題曰禪宗頌古聯珠通集將募板行與後學共惑者曰道不在是拈華微笑三拜淂髓初無一語與之而昭昭於心目之間道播無垠烏有如今日叶音韻事言句簧鼓後人俾其棄本逐末誠可歎哉豫笑而不答良久乃歌曰五雲影裏神仙現手把紅羅扇遮面急須著眼看仙人莫看仙人手中扇已而謂之曰子所論者手中扇也豫所集者果在扇邪噫知我罪我其惟此集乎時延祐戊午六月旦前住紹興路天衣萬壽禪寺錢唐沙門普會自序佛祖葛藤水浸不爛火燒不壞枝聮蔓衍派布無窮禪宗頌古聮珠者寶鑑大師法應集魯菴會公續集鋟梓行世久矣近以他故其板散落人間洪武己巳夏余慮其亡失託道友收贖庋藏于大慈山之幻居實六月草八日也明日舊置板處火作風烈燎及千數百家吁斯亦異矣然佛祖葛藤其果靈驗如此耶抑神物護持而致然耶敬捐衣資命工補完用廣流通永延慧命因書其淂板所由之異庸識嵗月云洪武二十五年嵗在壬申二月十有九日中天竺住山沙門幻居淨戒識
