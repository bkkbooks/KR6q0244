氣洗兵威定亂歸功更是誰一旦氛埃清四海垂衣皇化自無為天童覺太阿在手誰敢當鋒青山萬朵白雲重重京兆天寧璉學佛人人被熱謾撥塵見得幾何般狂風掃地雲吹散獨立闌干宇宙寬別峯印隱顯全該不露顏白雲繚繞舊家山石人半夜敲金鎻天曉泥牛過玉関㑃堂仁夾山因僧問如何是佛師曰此位無賔主曰尋常與甚人對談師曰文殊與吾携水去普賢猶未折芲來頌曰親言言處幾人知今古無儔類莫齊玉馬雪行歸夜半羚羊挂角日沉西投子青當頭不犯難開口假借傍來落二三卓尓混融無向背西天佛是老瞿曇成枯木大方獨立峭巍巍八面玲瓏萬象圍正坐當軒無位位圓通無碍應群機踈山如夾山因僧問如何是夾山境師曰猿抱子歸青嶂後鳥㗸芲落碧岩前後來法眼云我二十年秪作境話會頌曰月皎青松鶴夢長碧霄丹桂挂羚羊岩高壁仞千峰雪石筍生條半夜霜投子青蚌含明月珠生腹龍擁深雲雨洒空莫向平田翻巨浪直湏點點盡朝東丹霞淳古鏡重磨又一新一回出匣一驚人石頭城下風雷吼老老禪翁把要津寶峯祥二十年前此地遊木蘭芲發院新修如今再到經行地𣗳老無芲僧白頭鼓山珪境話會來猶未是却問而今作麼生清涼元自鼻頭直夾山依舊兩眉橫徑山杲古路雪深覆好山雲更遮雁聲天外急遊子夜還家瞞庵成月桂寒松碧嶂深石人未會雪中吟從前此曲知音少鶴唳青霄出鳳林成枯木山邊水邊待月明暫向人間借路行如今還向山邊去只有湖水無行路天目禮夾山示眾云目前無法意在目前不是目前法非耳目之所到頌曰九轉靈丹難却易一鎚便當易還難相逢話盡壺中事重把仙書子細看長靈卓年來萬事緫成魔老去閑添白𩬊多道泰不傳天子令時清休唱太平歌鼓山珪癡人面前休說夢生銕團上湏有縫明明說與却佯聾只管外邊閒打哄徑山杲握不成團撥不開德雲幾度下崔嵬有時行到海南岸密密還從舊路回最庵印夾山普請次維那命佛日送茶日云某甲只為佛法來不為送茶來那云和尚令請上座日云和尚即得日乃將茶去作務處見師遂撼茶碗作聲師不頋日云釅茶三五碗意在钁頭邊師曰有傾茶勢籃中幾箇甌日云有傾茶勢籃中無一甌便傾茶大眾俱以目視之日云大眾鶴望乞師一言師曰路逢死蛇莫打殺無底籃子盛將歸日云手執夜明苻幾箇知天曉師召大眾已有人也歸去來乃住普請頌曰路逢死蛇莫打殺無底籃子湏𩗺下徃徃事從閑話生莫將閑話為閑話朴翁銛擔板漢沒拘束餓死首陽山誓不食周粟虛堂愚夾山在溈山作典座溈問今日喫甚菜師曰二年同一春溈曰好好修事著師曰龍宿鳳巢頌曰相逢借問眾僧麋莫比庵園香飯施紫氣夜隨丹鳳轉金龍曉纏月中枝投子青變生為熟逐時新好是二年同一春龍宿鳳巢輕奮意調和味塞口多人正覺逸雨過龍苔蘚潤夜央金殿燭初紅宮姬雅奏昇平曲禁外虛勞視𦗟聡大洪預龍宿鳳巢裡二年同一春桂芲香擈擈平地是青雲大洪恩夾山甞遣一小師徧遊禪𠛴殊無趣向及聞師道譽遠播乃回省覲云和尚有如許奇特事何不早向某甲道師曰汝蒸飯時吾為着火汝行益時吾為展鉢甚處是孤負汝處小師因而悟入頌曰汝蒸飯時吾着火汝行益時吾展鉢尋常恁麼老婆心自是你儂機不活機若活夾山本無奇特事百川倒流閙聒聒癡絕冲夾山因僧問會處却不問不會處請師一言師曰戶挂凋林影中辨取頌曰威音那畔不能行撒手還家懶問程寢殿無人空寂寂滿窓唯有月虗明丹霞淳鄂州清平山令遵禪師嗣翠微囙僧問如何是大乘師曰井索曰如何是小乘師曰錢索又問如何是有漏師曰笊籬曰如何是無漏師曰木杓曰覿面相呈時如何師曰分付與典座頌曰有漏笊籬無漏木杓烜赫禪和妄生卜度伶俐座主何處摸索金牙觧使神鎗李廣箭穿雙鶚琅琊覺大乘小乘井索錢索有漏無漏笊籬木杓直下承當鼻孔失却法雲秀笊籬木杓錢貫井索見成家風受用廓落生涯放得信緣看佛法更於何處著不用安排只麼自然心地常安樂天童覺二乘諸漏扣空王雪後那堪半夜霜秦漢旌旗度沙漠唐虞黼黻拱岩廊張無盡笊籬木杓錢貫井索打瓦鑽龜徒勞卜度休卜度麒麟只有一隻角南華昺有漏笊籬無漏木杓學語禪流徒勞卜度江邊有箇釣魚人擲鉤驚起遼天鶴白鹿先笊籬木杓錢貫桶索說妙談玄俱是錯清平鼻孔塞𠃵坤天下衲僧無處摸明來握土成金悟去百草皆藥抝折俱𦙆指頭斷趙州略彴平常一句用無窮限量知見徒斟酌雪竇宗丈二鋼釘八尺鐵橛插在眼中猶自不瞥中庵空清平初㕘翠微便問如何是西來的的意微曰待無人即向汝說師良久曰無人也請和尚說微下禪牀引師入竹園師又曰無人也請和尚說微指竹曰這竿得恁麼長那竿得恁麼短師雖領其微言猶未徹出住大通上堂舉初見翠微機緣謂眾曰先師入泥入水為我自是我不識好𢙣頌曰父子相逢意已彰尊卑何必敘炎涼叮嚀指點家園事行盡荒郊話短長大洪遂土埋處處鐵菱角半夜經由未覺難天曉嶺根傷中倒方知行過鐵門関雪堂行舒州投子山大同禪師嗣翠微趙州問大死底人却活時如何師曰不許夜行投明須到州曰我早猴白伊更猴黑頌曰活中有眼還同死藥忌何湏鑒作家古佛尚言曾未到不知誰觧撒塵沙雪竇顯大死底人同活人三千豪俠又隨塵李陵本是𠬧番將却作降番上將身佛印元死去活來牙上露投明湏到已先行誰家別舘池塘裏一對鴛鴦晝下成白雲端虛空產出鐵牛兒頭角分明也大奇破澄潭深處月夜闌牽向雪中歸長靈卓趙州觧撚無𮈔線投子能穿沒鼻針好手手中呈好手紅心心內中紅心佛鑑懃大死底人還却活不許夜行投明到陳州人出許州門翁翁八十重年少鼓山珪禾黍不陽艶競栽桃李春翻令力畊者半作賣芲人徑山杲我疑千年蒼玉精化為一片秋水骨海神欲護護不得鰲頭一旦忽擎出正堂辯棚前夜半弄傀儡行動威儀去就全子細思量無道理裏頭畢竟有人牽雪菴瑾投子因僧問如何是十身調御師下禪床立又問凡聖相去幾何師亦下禪床立頌曰水出崑崙浪接連天高地逈秀林巒禪床略下雲山斷凡聖無踪海岳寒投子青老婦低垂事舅姑起來爭免面糢糊強將雲髻高高綰遮得傍人眼也無白雲端投子下禪牀雲中迸電光胡僧歸漠土六月下嚴霜佛慧泉投子示全機清風動翠微十身何處是贏得眼如眉佛心才愛向江邊弄釣𮈔碧潭深處有嘉魚釣頭不是無香餌箇底如何釣得渠長靈卓捉賊分明要見贓十身調下繩牀曾經巴硤猿啼夜銕作心肝也斷腸佛鑑懃投子下禪床通身誰辨的擬議即千差覿面難相識京兆天寧璉投子下繩床今朝為舉揚驢前馬後漢切忌亂承當徑山杲玉麟帶角離霄漢金鳳㗸芲下綵樓野老不嫌公子醉相將携手街遊水菴一投子下繩床終非孟八郎不搖三寸舌未免鬼分贓眼底欲條直臨機爭探囊裂破古今無面目縱橫何處有関防或庵躰投子因僧問月未圓時如何師曰吞却三箇四箇曰圓後如何師曰吐却七箇八箇頌曰七八雖然正好觀四三焉得便顢頇靈光萬古輝天地隱顯尋常不用摶洞山聡圓缺曾伸問老翁石龜𠾑子引清風昨朝木馬潭中過出金烏半夜紅投子青圓後圓前作者知四三七八觧呈機令人長笑善吞吐㽞與樷林作是非正覺逸吞却三四枚吐出七八箇吞吐総完全不知是什麼保寧勇吞却易吐還難湏頂上天風寒昨夜三更白如晝不知誰共倚闌觀佛性泰投子投子機輪無阻要吞即吞要吐即吐若還殢齒粘牙爭得超今邁古石庵玿投子因僧問和尚住此山有何境界師曰丫角女子白頭𮈔頌曰山家世界別塵世罕曾聞只可自怡恱不堪持贈君持贈君還也奇丫角女子白頭𮈔正覺逸丫角女子白頭𮈔猛燄堆中雪片飛一等住山誰可擬閑雲流水不同歸白雲端芲萼樓前春正濃濛濛柳絮舞晴空金錢擲罷嬌無力咲倚闌干屈曲中懶庵樞住山境界問如何女子雙鬟鬂已皤覿面不逢休更會白雲飛過舊山河天目禮投子因僧問春雨淋淋百草為什麼不抽芽師曰芭蕉只麼長僧問如何是玄中玄師曰去年端午今年亦然曰畢竟如何師曰故非同別誰說前後僧問如何是苐二月師曰仲春漸暄曰如何是苐一月師曰孟春猶寒頌曰投子投子超今邁古遇人識人頭灰面土一月二月寒暄說說住峰高處見翠微紅蓮舌上無橫骨龍門遠孟春猶寒苐一月仲春漸暄苐二月若無閑事挂心頭便是人間好時莭江南并兩浙春寒與秋熱蒙庵岳投子囙僧問一大藏教還有奇特事也無師曰演出大藏教僧又問黃龍新一大藏教還有奇特事也無新曰演入大藏教頌曰頓漸偏圓權寔空有釘觜鐵舌河目海口一道清虛亘古今八角磨盤空裡走圓悟勤演出大藏教言端語亦端兩頭都坐斷一劒倚天寒冶父川一出一八半合半開羸鶴翹寒木狂𤠔嘯古臺要知奇特事當甚破草鞋木庵永投子因僧問曹溪猶如指月靈山猶如畫月如何是真月師曰昨夜三更轉向西頌曰昨夜三更轉向西曉來任運落前溪舉頭不薦團欒底無限清風付與誰慈受深昨夜三更轉向西昏昏宇宙幾人迷澄潭影轉風初息猿狖微聞嶺外啼懶庵需昨夜三更轉向西明眼宗師為指迷若於話下尋端的未免泥中又洗泥已菴深投子囙僧問如何是露地白牛師曰叱叱曰飲噉何物師曰喫喫頌曰玉角霜毛露地牛人間天上顯踪由不同雪嶺時時吼肎若溈山日日𠬧洞山聡露地白牛起問端隨機叱叱齒牙寒不知飲噉是何物喫喫直教滄海乹𠃵明慧覺投子問僧甚麼處來曰東西山禮祖師來師曰祖師不在東西山僧無語頌曰蒼龍帶雨離深洞彩鳳𠾑芲入帝關一句古今無滲漏祖師不在東西山雪堂行投子因僧問如何是學人一卷經師曰題目分明頌曰半滿金言玉轉環靈山一會受欺謾拈來題目分明也付與兒孫着眼看佛心才投子因雪峰侍立師指菴前一磈石曰三世諸佛緫在裡許峰曰湏知有不在裏許者師乃歸庵中坐一曰不快漆桶頌曰說明道白埋塵混垢變化有由敗露不走誰知暗裡骨橫抽要在轟轟霹靂手月堂昌有客釣鰲魚區區走五湖不知泥裏蚌滿腹是驪珠佛鑑懃投子因僧問刼火洞然時如何師曰寒凜凜地頌曰天地為爐萬物焦石人駕浪渡雲霄風生半夜霜威重月落冰寒逼鬂凋投子青投子因僧問如何是本來人師曰共坐不相識曰恁麼則禮拜去也師曰暗寫愁腸寄與誰頌曰共坐同行世莫知幾人當面便逢伊縱饒紹續家門者半是貧寒乞養兒保寧勇投子因僧問一切聲是佛聲是否師曰是曰和尚莫𡱰沸椀鳴聲師便打僧又問麤言及細語皆歸苐一義是否師曰是曰喚和尚作一頭驢得麼師便打頌曰投子投子機輪無阻放一得二同彼同此可憐無限弄潮人畢竟還落潮中死忽然活百川倒流閙聒聒雪竇顯一條拄杖兩家使一徃一來無彼此者僧若得投子機隨手拈來打投子圓悟勤投子與僧遊山僧見蟬殼遂問殼在這裏蟬向什麼處去師拈蟬殼就其耳畔作蟬鳴聲其僧有省頌曰輕薄寒蟬殼枯乾敗葉形拈來臨耳畔連噪兩三聲南堂興投子指雨示僧云日來好雨且道什麼處來僧無語後囙看華嚴經方有省頌曰陌上遊人競採芳不知眼底度春光夜來一陣落芲雨一百十城流水香絕象鑒百芲香裏鷓鴣啼白面郎君醉似泥赫日光中開得眼福城東際草萋萋竹屋簡投子因僧問三身中那身說法師乃彈指頌曰三身說法問端由彈指輕輕海岳𠬧金鎻塔開紅日晚夜深人咲碧峰頭投子青投子因僧問菩提煩惱是一是二師曰是二僧便問如何是菩提師曰且坐喫茶曰如何是煩𢙉師曰這僧聒噪人出去頌曰入草親尋草裡人重重有路掌中平不遇大商空突曉日高猶𦗟打三更木菴永
