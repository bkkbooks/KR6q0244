金毛獅子頌曰花藥欄莫顢頇星在稱兮不在盤便與麼太無端金毛獅子大家看雪竇顯遊子奔馳不少安但知門外逐歌歡自家田地荒來久只看人間花藥欄成枯木是處三春花藥欄五湖禪客不須看尋枝摘葉應難會牙爪分明子細觀雲溪恭金谷春光長滿眼紅藥花梢香爛熳昨夜西風一陳寒遍地殘芳落何限王孫醉倒不知歸猶向欄邊索金盞上方益清淨法身花藥欄眉毛刺倒須彌山誰將玉笛傳凄怨吹過蘆藂明月彎佛智裕清淨法身花藥欄分明一點不相瞞有誰得意春風裏時到階前子細看退耕寧雲門因僧問如何是學人自己師曰遊山玩水曰如何是和尚自己師曰賴遇維那不在頌曰南嶽山前徑山後瀑布聲如雷電吼拈却笠子露頂行著草鞋赤腳走佛慧泉學人自己遊山玩水只知破草鞋忘却來時年幾楊無為遊山玩水須究宗旨莫作等間遊山玩水黃蘗勝杖藜林下步莓苔擾擾勞生眼未開好是落花隨緑水一時流出洞中來地藏恩遊山玩水事尋常早晚歸來鬢欲霜破草鞋回首看數聲猿呌白雲鄉開福寧遊山玩水數如麻誰識韶陽老作家截斷跛師三寸舌回頭總是舊生涯肯堂充遊山玩水萬萬千千孰透韶陽語中帶玄鐵山仁朝西天暮東土玩水遊山徐行欵步是則不動道場不是亦在裏許誰為證明石霜角虎呆堂定東村王大翁從來不睹是却將別人田喚作自己地絶象鑒雲門因僧問殺父殺母佛前懺悔殺佛殺祖甚處懺悔師曰露頌曰石火流星曾未急璇璣電轉一何遲雲門露字突然出著眼看時鷂子飛正覺逸簸土揚塵無避處將門直到御樓前回頭不見來時路下是黃泉上是天白雲端露超宗越祖人言渠返魂香我道伊撾塗毒鼓天童覺重關金鎖不用鑰匙舌根不動韶陽已知典牛遊椎鑼擂鼓轉船頭席卷波翻喊激流赤腳上船乘快便順風相送下楊州卍菴顏雲門露猛如虎達磨師不是祖豈不見鹽官老須彌為椎虛空為鼓又不見禾山老解打鼓休莾鹵甜瓜徹蒂甜苦瓠連根苦喝一喝應菴華斗換風雷吼星移海嶽昏誰知席帽下元是昔愁人退谷雲雲門因僧問如何是正法眼師曰普頌曰普之一字豈尋常擡首須看掣電光擬議思量生會解堪嗟剜肉作身瘡洞山聰普之一字天然別著眼看時如電掣宇宙茫茫無處尋稱鎚著硬如鐵正覺逸説佛説法廣鋪舒矢上加尖也太愚明眼衲僧傍覷見一條拄杖兩人舁大愚芝頂上有來真箇瞎輝天鑒地不同時大悲手裏休擎手獨自夜行誰得知白雲端但無一切心自然合大道應用在臨時莫分妙不妙真淨文應機無出老韶陽法眼咨詢普字當機會若非獅子子一場間夢過瀟湘圓通仙正法眼普伶俐衲僧多錯舉休錯舉冬至寒食一百五楊無為明暗雙雙照用分幾人親到孟嘗門街頭不識真彌勒却向靈山問世尊瞎堂遠雲門因僧問如何是啐啄之機師曰響頌曰有問啐啄機雲門答云響昨日雷震天夜來山水長真淨文啐啄之機響字酬過空雷電忽傾湫夜來雱霈漫天雨幾處波濤打釣舟圓通仙白牯問狸奴虛空酬萬象電激不停蹤谷虛誰答響啐兮啄兮清機歷掌回頭𨍏轢範秦時舌上葛藤長萬丈心聞賁一啐一啄當頭響合母不離窠子已出殼絶象鑒雲門因僧問如何是雲門劒師曰祖頌曰吹毛寶劒問雲門來者投機豈更存路逢劒客如何也甑人携手向南奔北塔祚吹毛寶劒不須抽迸匣清光射斗牛曰用全彰人不見雲門祖字為君酬雲溪恭三尺秋光匣裏藏時逢作者露鋒鋩如今四塞狼煙靜不展紅旗歸故鄉圓通仙雲門因僧問如何是吹毛劒師曰骼又曰胔頌曰誰謂吹毛劒雲門骼可知一朝權在手方見令行時真淨文雲門因僧問佛法如水中月是否師曰清波無透路曰和尚從何得師曰再問復何來曰正與麼時如何師曰重疊關山路頌曰灼然水月非難取自是時人手不親韶石老師拈出了關山重疊越光新白雲端遍界不藏清波澄寂互換投機箭鋒相直提起向上鉗鎚石火電光莫及便恁麼隔關山碧潭雲外不相關圓悟勤盡却命根方可關門一挨一拶電湧雷奔佛法水中月耳裏眼裏説差之毫𨤲失之千里南北東西知幾幾月堂昌清波無透路轉處少人知斫却月中桂清光付與誰湛堂深雲門示衆曰藥病相治盡大地是藥那箇是自己頌曰藥忌由來鑒作家示徒親切病如麻十方三世諸知識赫日光中雷電車五祖戒藥病相治事可嗟如何於此墮群邪未語已前誰辨的洎乎開口見萌芽不在思惟休卜度徒勞管見強紛拏世上多有如斯者不知羞耻數如麻北塔祚盡大地是藥古今何太錯閉門不造車通途自寥廓錯錯鼻孔遼天亦穿却雪竇顯左眼不見山河右眼不見日月直得百花開時一一為君分別白雲端被裏出指水中露觜屈指眼開搖觜身起藥病不相治何須盡大地反笑老雲門失却娘生鼻月堂昌太譊訛全殺活絶承當無摸索寰中意氣閫外籌略倒退三千里盡大地是藥錯錯利劒七星光閃爍圓悟勤雲門問僧光明寂照遍河沙豈不是張拙秀才語僧曰是師曰話墮也頌曰叶路縱橫得自由牢關捩轉妙全收箇中密意人難會喝下須教水倒流禾山方萬丈龍門勢倚空懸崖撒手辨魚龍時人只看𮈔綸上不見蘆花對蓼紅月菴果問來答去無偏黨鐵壁銀山作麼通縱奪臨機言話墮遂令千古動悲風踈山如與奪雙行定是非韶陽用處太孤危這僧若與金剛眼趙璧連城一道歸旻古佛分明寫出與君看意在鈎頭不在盤縱使石人開得口不知猶被舌頭謾松源嶽當的帝都丁伊憂乙噎嚶若教呼吸正誤殺世間人石鼓夷雲門曰衲僧家須有巴鼻方識得天下人如何是衲僧巴鼻代云德山頌曰雲門舌上有龍泉愛把金針黑地穿要會衲僧巴鼻子一條紅線兩人牽慈受深雲門普請搬柴路次見僧遂拋下一片柴曰一大藏教只説者箇頌曰處處緑楊堪繫馬家家門口透長安一條大路平如掌自是時人措足難慈受深汝水向東流楚水從南至皆歸大海中鹹淡同一味頂門具眼底衲僧試向其中辨淺深佛性泰一大藏教説這箇雲門飄下是甚麼直饒於此徹根源眨得眼來還蹉過浙翁琰雲門因僧問生死到來如何排遣師展手曰還我生死來頌曰針眼魚吞大千界蟭螟蟲吐妙高山太虛包括無遺漏萬彙全歸指掌間起復減去還來石橋路斷通身黑那知華頂是天台圓悟勤飢便喫飯困來打眠長安城外一望平田絶中邊離言詮將軍不識烏騅馬海底犀牛把角鞭呆堂定雲門因僧問秋初夏末前程若有人問作麼生祇對師曰大衆退後曰未審過在甚麼處師曰還我九十日飯錢來頌曰大衆退後衲僧去就豈用機關那容體究蓑翁老熟慣風波橈棹不施船放溜天童覺夏未秋初萬萬千石頭路滑腳皮穿這僧劒刃翻身疾也被雲門索飯錢石田薰雲門因僧問如何是法身向上事師曰向上與汝道即不難作麼生會法身曰請和尚鑒師曰鑒即且置作麼生會法身曰與麼與麼師曰這箇是長連床上學得底我且問你法身還解喫飯麼僧無對頌曰西江一吸竟無痕三世如來一口吞鳳髓龍肝香積飯萬般嘗過不須論南堂興二韶陽機鋒迅雷霹靂僧問法身喫飯不喫學語之流卒説不出山河大地聊充飢四海五湖輕一吸未識雲門向上機秪尋向下轉生疑通身是飯如何喫無口從來亦不飢雲門問新到你是甚處人曰新羅人師曰將什麼過海曰草賊大敗師曰為什麼在我手裏曰恰是師曰𨁝跳無對本覺一云者兩箇有頭無尾漢頌曰新羅衲子罕曾逢風月詢來也略同可惜為山爭一簀徒勞賔王各無功雲門曰三家村裏賣卜東卜西卜忽然卜著也不定僧便問忽然卜著時如何師曰伏惟頌曰賣卜三家村裏頭吉凶禍福辨端由忽然卜著僧來問生死唯將一句酬雲門曰平地上死人無數過得荊𣗥林是好手時有僧出云與麼則堂中苐一座有長處也師曰蘇嚕蘇嚕頌曰舉手攀南斗移身倚北辰出頭天外看須是箇般人水菴一聲如鳴玉靜邊門誰幽人不見君花到海堂將寂寞繡衣猶把麝香熏虛堂愚將軍令下閃旌旗胡騎紛紛頓失威縱有突然驍驟者不知身已𨺻重圍斷橋倫雲門示衆曰古佛與露柱相交是苐幾機僧無語師曰你問我與你道僧遂問師曰一條縚三十文曰如何是一條縚三十文師曰打與自代前語云南山起雲北山下雨頌曰南山雲北山雨四七二三面相覩新羅國裏僧上堂大唐國裏未打鼓苦中樂樂中苦誰道黃金如糞土雪竇顯一道神光初不覆藏超見緣也是而無是出情量也當而無當岩花之粉兮蜂房成蜜野草之滋兮麝臍作香隨類三尺一丈六眀眀觸處露堂堂天童覺油然南山雲沛然北山雨露柱笑呵呵燈籠超佛祖中涌邊沒西天東土樓閣門開盡日間野老不知何處去圓悟勤古佛頭拄天露拄腳地上古今來成一體頭拄天兮戴帽子腳地兮沒草鞋同赴大悲院裏齋佛鑑勤雲門有時云燈籠是你自己把鉢盂噇飯底不是你自己有僧問飯是自己時如何師曰者野狐精三家村裏漢師却曰來來不是你道飯是自己曰是師曰驢年夢見三家村裏漢頌曰終朝噇飯費工夫不識燈籠是鉢盂多少三家村裏漢忙忙樹上捉鮎魚慈受深雲門示衆曰拆半裂三針筒鼻孔在甚麼處為我一一拈出來看自代曰上中下頌曰昔年曾扣睦州關負義忘恩當等間見説吳音俱變盡語言渾似廣南蠻虛堂愚雲門因僧問撥塵見佛時如何師曰佛亦是塵田菴顏為廬山圓通西堂為衆入室舉此公案問慈元菴慈隨聲便喝以手撥胸曰佛亦是塵復頌曰撥塵見佛佛亦是塵問了答了直下翻身勸君更𥁞一杯酒西出陽關無故人雲門因僧問如何是雲門一路師曰親頌曰雲門一路親眼裏不容塵自從五代于戈後得見升平有幾人楊無為雲門示衆曰柱杖子化為龍吞却乾坤了也山河大地甚處得來頌曰拄杖子吞乾坤徒説桃花浪裏奔燒尾者不在拏雲攫霧曝腮者何必喪膽忘魂拈了也聞不聞直須灑灑落落休更紛紛紜紜七十二棒且輕恕一百五十難放君雪竇顯養就黃龍變化豺驀然乎地一聲雷比圖對面教人見吞却乾坤吐出來佛鑑勤衲僧拄杖子為龍却不尊橫拈吞佛祖倒握撼乾坤眼裏有睛皮有血直須一棒一條痕狸奴白牯休相笑只今親侍絶兒孫投子舒雲門因僧問久雨不晴時如何師曰劄頌曰久雨不晴雲門道劄陽烏奮羽翰蛟龍縮鱗鬣為是時莭為是佛法一箭兩垜謾猜量眼裏瞳人眉搭颯佛智裕雲門這一劄吹毛光透匣若不是張華徒勞眼眨眨月坡明雲門問僧近離甚處曰西禪師曰西禪何有言句僧展兩手師與一掌曰某甲話在師却展兩手僧無語師又打頌曰虎頭虎尾一時收凜凜威風四百州却問不知何大險師云放過一著雪竇顯將成之山不進一簣老倒雲門坐而獲利釣鼇釣鯨手假高慣曾下海涉波濤緩放急收自得便浮家泛宅何飄飄月堂昌雲門因僧問一切智通無障礙時如何師曰掃地潑水相公來頌曰掃地潑水相公來人人眀鏡挂高臺碧油幢下呵呵笑青眼何妨特地開慈受深掃地潑水相公來聲高隘喝繡旗開天上玉麟來瑞世堪作人間將相才水菴一一切智通無障礙掃地潑水相公來覿面當機如激電寒山撫掌笑咍咍拙菴光雲門因有講僧參經時乃曰未到雲門時恰似初生月及乎到後曲彎彎地師得知乃召問是你道否曰是師曰甚好吾問汝作麼生是初生月僧乃斫額作望月勢師曰你如此已後失却目在僧經旬日復來師又問你還會也未曰未會師曰你問我僧便問如何是初生月師曰曲彎彎地僧罔措後果然失目頌曰雲門新月曲彎彎管見初明豹一斑點鐵化為金即易勸人除却是非難慈受深恰似初生月兩口無一舌到了曲彎彎把火入牛欄問他以手便斫額猴黑誰知有猴白向後失目果然是要見長人過深水月堂昌雲門上堂因聞鐘聲乃曰世界與麼廣闊為甚麼向鐘聲披七條僧無語師曰七里灘頭多蛤子頌曰七條披向鐘聲上遍界難藏比丘相若以色見音聲求迦葉師兄是虗妄鼓山圭七里灘頭多蛤子太陽一出口俱開平生肝膽雖然露狡鶻何曾逐臭來無菴全鐘聲披起鬱多羅信手拈來不在多堪笑當年明上座狼忙馳逐太奔波率菴琮試問鐘聲披七條輕輕擊著無明發買來糊餅是饅頭苦觀世音菩薩笑菴悟會則事同一家不會萬別千差不會事同一家會則萬別千差無門開雲門因僧問如何是祖師西來意師曰沒即道或曰長連牀上有粥有飯或曰山河大地頌曰有時順水流舟去轉柂看看又逆風船到岸時人出陸山重重又水重重絶象鑒黃金與瓦礫恣意亂拋擲高價無人酬一地成狼籍竹屋簡雲門曰直得乾坤大地無纖毫過患猶是轉句不見一色始是半提更須知有全提時莭頌曰百尺竿頭弄嶮是非海裏橫身更有全提底時莭只堪惆悵不堪陳松源嶽雲門因僧問如何是最初一句師曰七九六十三頌曰七九六十三休云是對談當機如不薦更去問瞿曇本覺一雲門因僧問如何是大修行底人師曰一榼在手頌曰手中一懺絶痕瑕道𥊸途傳轉見賖作者至今拈不起依然獨自挈歸家大中隆雲門因僧問如何是沙門行師曰會不得曰為甚麼會不得師曰秪守會不得頌曰君問沙門行沙門行最高若教人會得業性卒難逃智門祚雲門一日問明教今日喫得幾箇糊餅曰五箇師曰露柱喫得幾箇曰請和尚茶堂裏喫茶頌曰等間垂借問端由不負平生盡吐酬竭力為人須是徹方知茶味解人愁投子青韶陽門下足英明直嵗之才又哲英雲萃堂前凹凸處不勞心力一齊平正覺逸雲門問僧江西湖南還聞長觜鳥説禪麼曰不聞師拈拄杖曰禪頌曰鴉鳴鴉鵲鳴鵲天然自會不從人學跛腳阿師放過一著拈起拄杖口邊吹𠴨𠴨猶勝鷓鴣啼三月提壺沽美酒杜鵑相勉不如歸雲門拈起糊餅曰我只供養兩浙人不供養向北人衆無語自代曰天寒日短兩人共一碗頌曰半在河南半河北一片虛凝如墨黑冷地思量愁殺人叵耐雲門這老賊龍華本雲門齋次拈起匙筯曰我不供養南僧只供養北僧時有僧問為甚麼不供養南僧師曰我要鈍置伊曰為什麼只供養北僧師曰一箭兩垜有僧拈問只如前意作麼生師曰好即同榮頌曰拈來匙筯普相呈不供南僧供北僧換却眼睛曾莫顧熟謾都為不惺惺本覺一雲門齋時問僧曰人喫飯飯喫人僧無語師自代曰謝師答話頌曰老倒雲門強指迷這僧無語顯全機勸君不用他尋覔一飽自然忘百飢鐵山仁雲門到江州陳操尚書請齋才見便問儒書中即不問三乘十二分教自有座主作麼生是衲僧行腳事師曰曾問幾人來曰即今問上座師曰即今且置作麼生是教意曰黃卷赤軸師曰這箇是文字語言作麼生是教意曰口欲談而辭喪心欲緣而慮忘師曰口欲談而辭喪為對有言心欲緣而慮亡為對妄想作麼生是教意書無語師曰見説尚書看法華經是否曰是師曰經中道一切治生産業皆與實相不相違背且道非非想天有幾人退位書無語師曰尚書且莫草草三經五論師僧拋却特入叢林十年二十年尚不奈何尚書又爭得會書禮拜曰某甲罪過頌曰作家慣戰不齎糧奪鼓攙旗勢莫當虎驟龍驤誰辨的反思仁義勝剛強尼無著揔雲門上堂拈起拄杖曰凡夫實謂之有二乘析謂之無緣覺謂之幻有菩薩當體即空衲僧家見拄杖便喚作拄杖行但行坐但坐不得動著頌曰二乘菩薩何言盡諸佛凡夫早晚休世事但將公道斷人心難似水長流鼓山圭掣開金殿鎖撞動王樓鍾泣露千般草吟風一樣松徑山杲雲門是箇老闍𥠖衲僧巴鼻幾時知拄杖從教不得動春來未免倒抽枝懶菴樞膽逐灘灘盡心隨浪浪飛舟人報灘盡心膽一時歸孤峯源雲門上堂光不透脫有兩般病一切處不明面前有物是一又透得一切法空隱隱地似有箇物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒透得法身去放過即不可子細檢點將來有甚麼氣息亦是病頌曰森羅萬象許崢嶸透脫無方礙眼睛掃彼門誰有力隱人胸次自成情船橫野渡涵秋碧棹入蘆花照雪明串錦老漁懷就市飄飄一葉浪頭行天童覺雲門示衆曰讀經千卷紙上語頌曰先天後地本寥廓撥草尋芳途路樂不得春風花不開花開又被風吹落或菴體雲門因僧問達磨面壁意旨如何師曰念七又僧問南泉達磨面壁意旨如何泉曰天寒無被蓋頌曰一人會上竿一人會穿井伎倆雖不同總是一般病識得者般病衲僧鼻孔都穿盡慈受深雲門念七開口則失禿却舌頭有甚氣息東山源達磨面壁雲門念七兩箇漆桶多虛少實明眼衲僧如何委悉當知劒去久矣不用刻舟尋迹無相範
