body:
  text: 僧録司右闡教兼靈谷禪寺住持淨戒重校祖師機緣六祖下第四世趙州諗三十五則附清涼益一則葉縣省一則趙州觀音院從諗禪師嗣南泉師初謁南泉泉問汝是有主沙彌無主沙彌師曰有主沙彌泉曰那箇是你主師近前躬身曰仲冬嚴寒伏惟和尚尊侯萬福泉器之許其入室頌曰解把一莖野草喚作丈六金身會得頭頭皆是道眼中童子面前人顏如如試問如何是主人進前義手敘寒溫但知北極群星拱不見黃河徹底渾寶葉源趙州一日問南泉曰如何是道泉曰平常心是道師曰還可趣向也無泉曰擬向即乖師曰不擬爭知是道泉曰道不屬知不屬不知知是𡚶覺不知無記若真達不疑之道猶如太虗廓然蕩豁豈可強是非耶師於言下悟理頌曰平常心是道舉步入荒草翻嗟王老師到底不能曉不能曉玉兔金烏任飛走雲峯恱欲識平常道天然任自然行船冝舉棹走馬即加鞭若遇飢來飯還應困即眠盡從緣所得所得亦非緣佛鑑勤二所淂亦非緣當人自了然雨中看皓月火裏汲清泉直立頭垂地橫眠腳指天應須與麼會方契祖師禪若謂平常心是道枝蔓向上更生枝貼肉汗衫如脫了喚來眼上與安眉鼓山圭勸君不用苦勞神喚作平常轉不親冷淡全然沒滋味一回舉著一回新徑山杲趙州昔日見南泉言下投機自廓然要會平常心是道平常不住道方玄本覺一白日遲遲兮花菲菲白一雲流水兮兩相依長安路上人迹稀南泉也落苐二機慈受深礙淂銅盤不打老鼠所以抽身入還從屋裏來圾教臺凳穩聊且勸三杯兄呼弟應殷勤處留淂兒孫辨劫灰月堂昌遇飯喫飯遇茶喫茶千重百匝四海一家解却粘去却縛言無言作無作廓然本體等虗空風從虎兮雲從龍圓悟勤萬里長空雨霽時一輪明月瑩清輝浮雲掩斷千人目見淂嫦娥面者稀龍門遠向道平常心是道斬釘截鐵妙中妙若將玄路擬思量連纍兒孫入荒草業識茫茫知不知終日紅塵無價寶大溈智玄途不涉透離微道合平常發上機無影樹頭春色曉金雞啼在不萌枝足菴鑒悟淂平常達本鄉時人多怕落平常青春只有九十日爛醉都無一百場雪菴瑾春有百花秋有月夏有涼風冬有雪若無間事挂心頭便是人間好時莭無門開趙州一日問南泉曰知有底人向甚麼處去泉曰山前檀越家作一頭水牯牛去師曰謝師指示泉曰昨夜三更月到窗頌曰拽脫鼻頭何處是亂拋泥水恣縱橫日斜倒坐騎驢去又見東山片月生保寧勇出窟金毛奪父機同聲哮吼衆狐疑三更窗月如清晝誰敢重來弄嶮巇寶峯祥眼中見慣是尋常又不驚人又久長留淂寒窗夜來月三更依舊照茅堂鼓山圭度體裁衣量水打碓毫髮不差且居門外徑山杲南泉搖頭趙州擺尾子細看來二俱失利慈受深檀越家中作水牛𭣣來放去任優遊不曾犯著人苗稼何必南泉對趙州照堂一戴角擎頭笑一場父子家和醜外揚知有底人何處去春來依舊百花香冶父川掣開金殿鎖撞碎玉樓鍾貪程未歸客徒自覔行蹤木菴永趙州一日到茱萸執拄杖於法堂上從東過西萸曰作甚麼師曰探水萸曰我這裏一滴也無探箇甚麼師以杖倚壁便下頌曰逐步移笻探淺深果然滄海碧沉沉一雙足迹分明在將謂歸家不可尋保寧勇古今難透趙州關取次施為不等間拄杖靠來斜倚壁輕如毫髮重如山佛鑑勤茱萸這裏無一滴趙州無言便走出春去秋來三百年拄杖至今猶倚壁鼓山圭深淺聊將拄杖探忽然平地起波瀾傾湫倒嶽驚天地到海方知徹底乾徑山杲趙州有語標𨓍柏今古藂林光烜爀若到茱萸堂上行到底反成箇老賊地藏恩趙州探水誰能知委一滴也無洄澓袞沸靠却拄杖囉囉哩哩文殊道一滴也無費盡工夫靠倒拄杖何處逢渠香爐上一堆牛糞氣東壁上倒挂大葫蘆典牛遊趙州曾探水茱萸無一滴東覷西覷了拄杖便靠壁滄海深處歸何人辨端的椘安方平地鼓波濤青天轟霹靂腳下爛如泥身上元不濕古往今來幾百年拄杖依然空靠壁無際𣲖趙州因僧問如何是清淨伽藍師曰丫角女子曰如何是伽藍中人師曰丫角女子懷胎頌曰橫胸抱腹藏龍種剖膽㓟肝觸鳳胎勿謂此兒容易淂須知出自痛腸來汾陽昭咄這老竭淂恁饒舌清淨伽藍一時漏泄金剛門外笑呵呵菩薩堂中聲哽咽海印信丫角女子出天真清淨伽藍蓋淂人世俗不知林下意無錢難淂買紅裙佛鑑勤趙州因僧問外方忽有人問趙州説什麼法如何祗對師曰鹽貴米賤頌曰鹽貴米賤諸事成現擬欲商量腦後箭懶菴需趙州因僧辭師曰甚處去曰諸方學佛法去師竪起拂子曰有佛處不淂住無佛處急走過三千里外逢人不淂錯舉曰與麼則不去也師曰摘楊花摘楊花頌曰截斷三關過者稀臨鋒誰解振全威楊花摘處何人見風送漫天似雪飛佛慧泉堂堂好箇丈夫兒剛被胡麻取次欺若解奮拳張意氣世間何處可容伊保寧勇青山不異白玉無瑕茫茫流水擾擾黃花有佛處纖毫不立無佛處萬別千差長安路上未歸客尋溪由自摘楊花天童覺三千里外兩重關衲子紛紛過者難回首石橋南北路楊花風散雪漫漫普融平有佛處不得住生鐵稱鎚被蟲蛀無佛處急走過撞著嵩山破竈墮三千里外莫錯舉兩箇石人相耳語恁麼則不去也此話已行遍天下摘楊花摘楊花唵嚤呢噠哩吽𠷑吒徑山杲摘楊花摘楊花打鼓弄琵琶昨日栽茄子今日種冬瓜訥堂思有佛處不淂住春風蕩蕩飛楊絮無佛處急走過一葉漁舟江面破林裏烏鵲去又來園中桃李開還謝舜若多神相太空無目仙人逢暗夜白楊順鐵山崩倒壓銀山盤走珠兮珠走盤密把鴛鴦間繡出金針終不與人看松源嶽有佛無佛不淂住三千里外無憑據趙州贏淂口皮光却是這僧知落處虗堂愚趙州因僧問承聞和尚親見南泉是否師曰鎮州出大蘿蔔頭頌曰因問當初淂法緣不言東土及西天鎮州有菜名蘿蔔濟却飢瘡幾萬年汾陽昭鎮州出大蘿蔔天下衲僧取則只知自古自今爭辨鵠白烏黑賊賊衲僧鼻孔曾拈得雪竇顯鎮州蘿蔔播華夷萬物還他本土冝孰謂當時人獨愛至今更是好充飢正覺逸陶潛彭澤唯栽柳潘嶽河陽只種花何似晚來江上望數峯蒼翠屬漁家海印信衲僧巴鼻徒穿鑿平實商量紹祖宗多謝張公勤苦力滿園留得過深冬佛慧泉鎮州出大蘿蔔頭報君來處須分曉衲僧多是渾淪吞子細淂他滋味少白雲端鎮州蘿蔔天然別滿口眀眀説向人薄福闡提人不信一枚稱淂重三斤保寧勇鎮州出菜名蘿蔔過後思量却難淂王老兒孫不覆藏逢人直露真消息長靈卓趙州古佛尚多言蘿蔔出生鎮府田天下衲僧多咬嚙齒間蹉過老南泉文殊道參見南泉王老師鎮州蘿蔔更無私拈來塞斷是非口雪曲陽春非椘詞徑山杲趙老機關沒淺深鎮州蘿蔔接藂林過後思量也難淂入泥入水老婆心大溈智鎮州出大蘿蔔頭師資道合有來由觀音寺裏有勒東院西邊有趙州鼓山圭青出於藍冰生於水寸步不通白雲萬里或菴體些兒活計口皮邊點著風馳與電旋謾説鎮州蘿蔔大何曾親見老南泉石菴玿親見南泉箇眼目老人説話無拘束只因菜氣不曾除帶纍兒孫咬蘿蔔野雲南趙州因秀才問曰佛不違衆生願是否師曰是曰某甲欲覓和尚手中拄杖淂否師曰君子不奪人所好曰某甲非君子師曰我亦不是佛頌曰當機轉處不躊躇琉璃盤裏走眀珠趙州老子村校書一條拄杖兩人舁石菴玿趙州因參百丈丈問甚處來師曰南泉來曰南泉近日有何言句示徒師曰無事之人直須悄然去曰悄然一句且致𢗅然一句作麼生道師進前三步丈便喝師作縮身勢丈曰大好悄然師便出去頌曰作家相見彼此難搆𢗅然悄然進前縮後捏不成塑不就大路不行草裏走佛鑑勤門裏有門外有不作嚴平犯牛斗師子吼野干鳴摘出離婁眼裏晴一手縮一手伸重陽決定九月九掀反海嶽訪知音赤骨力窮露雙肘瞎堂遠趙州示衆曰佛之一字吾不喜聞幻菴覺拈云諸人切忌恁麼會既不恁麼會又作麼生會乃頌曰佛之一字不喜聞去年依舊今年春今年春間降大雪陸墓烏盆變白盆趙州因大衆晚參師曰今夜答話去也有解問者出來時有一僧便出禮拜師曰比來拋磚引玉却引淂箇𡐊子法眼問覺鐵觜先師意作麼生覺云如國家拜將相似乃問甚人去淂時有人出云某甲去淂云爾去不淂法眼云我會也頌曰探竿影草幾人知正似將軍一面旗斬將安營都在我倒騎鐵馬上須彌慈受深千年田八百主誰當機辨來處趙州要答話拋磚引墼子覺老話端倪如拜將相似去淂去不得言下分緇素箇裏高於萬仞峯不動纖毫擒佛祖圓悟勤趙州上堂金佛不度爐木佛不度火泥佛不度水真佛內裏坐頌曰泥佛不度水神光照天地立雪如未休何人不雕偽金佛不度爐人來訪子胡牌中數箇字清風何處無木佛不度火常思破竈墮杖子忽擊著方知孤負我雪竇顯併却泥佛金木佛趙州放出遼天鶻東西南北謾擡頭萬里重雲只一突白雲端泥佛不度水法華前陳曾止止君之退步若參詳不使縱然波浪起金佛不度爐海上江山入畫圖千手大悲徒著力却慚舜若眼眉粗木佛不度火多口阿師曾議過隈刀避箭不堪論無限英雄又蹉過大溈秀金佛木佛泥佛度爐度水度火盡入趙州紅爐烈𦦨光中鍛過一聲白雪陽春萬古無人能和鼓山圭九十七種妙相顧陸青難狀趙州眼目精眀覷見心肝五臟徑山杲木佛不度火甘露臺前逢達磨惆悵洛陽人未來面壁九年空冷坐金佛不度爐坐嘆勞生走道途不向華山圖上看豈知潘閬到騎驢泥佛不度水一道靈光照天地堪羡玄沙老古錐不要南山要鱉鼻三聖昌三佛形容總不真眼中瞳子面前人若能信淂家中寶啼鳥山花一樣春冶父川金佛不度爐風光滿帝都少年花酒客大醉幾人扶木佛不度火大士無人我毫𨤲念不差永劫遭羈鎖泥佛不度水眀月照千里風高古木秋凍盡長江底金佛不度爐窮源有處無木佛不度火渾崙咬不破泥佛不度水何處不是你真佛屋裏坐趙州言是禍水牯會耕田黃牛能拽磨常菴崇金佛不度爐圓光爍太虗直下便薦得不用更躊躇木佛不度火院主眉毛墮烈𦦨亘天紅舍利無一顆泥佛不度水衲僧難下觜擬議隔千山迢迢十萬里真佛內裏坐趙州休話墮覿面便承當擡眸即蹉過金佛木佛泥佛穿來擲過閻浮更説真佛在內無端已被塗糊尼無著總真佛屋裏坐開口成話墮幸自可憐生教我説甚麼月林觀泥佛金佛木佛度水度火度爐妙體本來無處所莫將真佛強塗糊天目禮趙州因尼問如何是密密意師以手掐之尼曰和尚猶有這箇在師曰却是你有這箇在頌曰密密深深意最長幾人冷地錯商量師姑若會趙州掐鐵打心肝也斷腸慈受深兜羅綿樣硬贅頭河北風流老趙州醎處著鹽淡添水軒頭一笑更無休正堂辨猛虎深藏淺草窠幾回眀月入煙蘿頂門縱有金剛眼未免當頭蹉過他高峯妙趙州因僧辭師問甚處去曰閩中去師曰彼中兵馬隘你須回避始得曰向甚麼處回避師曰恰好頌曰僧去閩中路不遙報言軍馬閙嘈嘈問師回避歸何處恰好安眠日正高汾陽昭聞説閩中兵馬多叮嚀遊子避干戈臨岐指箇藏身處無限雄師不奈何正覺逸七閩歸路日爭鋒回避須教不見蹤恰好藏身何處是青山雲外萬千重佛慧泉趙州因僧遊五臺問一婆子曰臺山路向甚麼處去婆曰驀直去僧便去婆曰好箇師僧又恁麼去後有僧舉似師師曰待我去勘過眀日師便去問臺山路向甚麼處去婆曰驀直去師便去婆曰好箇師僧又恁麼去師歸院謂僧曰臺山婆子為汝勘破了也頌曰臺山路上老婆禪南北東西萬萬千趙州勘破人難會來往草鞋徹底穿汾陽昭趙州勘破婆子葉落便合知秋天下幾多禪客五湖四海悠悠慈明圓靈龜未兆無凶吉變動臨時在卜人路頭問破誰人委王老東村怒目嗔投子青趙州作者勘婆婆太平時代用干戈趙州收得龍泉劒掃盡煙塵揔是他佛印元僧問遊臺路婆直指不誤雖然徑直言奈緣多恁去趙州勘破歸會者憑何據月色曉堂分雲𭣣山嶽露浮山遠傑出叢林是趙州老婆勘破沒來由而今四海清如鏡行人莫與路為讎黃龍南撥動干戈老趙州坐觀勝敗有良謀婆婆勘破人誰委多少禪流錯路頭海印信趙州勘破老婆禪語默分明在目前近日五湖參學者剛於岐路走如𤇆淨照臻言中辨的老禪和驀直臺山路不蹉勘破却回人莫問嶽陽船子洞波雲峯恱昔日趙州為主將老婆戰罷許誰評而今何事臺山路却被時人取次行大溈秀臺山一路去悠悠親到還他古趙州勘破老婆回首日長江依舊向東流佛慧泉干戈中立太平基塊雨條風勝古時婆子為君勘破了趙州腳迹少人知白雲端何事趙州婆子話雄雄今古振嘉聲高空有月千門閉大道無人獨自行保寧勇趙州一勘老婆也千古英風價轉新南去北來由未薦臺山從此長荊榛照覺揔似狂不狂趙州老或凡或聖人誰曉是非長短任君裁婆子被伊勘破了真淨文趙州問路婆子答云直與麼去皆云勘破老婆婆子無你雪處同道者相共舉景福順勘破不勘破婆子能招禍直饒千眼補陀人也是大蟲看水磨雲居祐趙州勘破事非真走殺臺山路上人要識婆婆親指處一回舉首一回新地藏恩臺山路上婆往往人問過末後趙州知一言便勘破雲蓋智是箇遊臺發問端婆婆指路盡顢頇可憐眼裏無筋骨却把時人一樣看佛國白撥動煙塵老古錐坐觀勝負有誰知從來古路平如掌自是行人不見歸圓覺演婆指臺山路不差遊人恁麼去無涯趙州勘破歸來後四海五湖同一家草堂清驀直臺山路不迂趙州親去定賢愚古今來往何妨礙未透金塵終是粗三祖宗臺山山下路崎嶇多少行人在半途五里牌邊相借問不知駑馬是龍駒上方益臺山路上白頭婆無限行人幾度過直道玄關人不曉趙州特地斷誵訛雲溪恭叢林老作是無儔凜凜威風四百州一擊鐵關曾粉碎恩大難將雨露酬真如哲驀直去驀直去不逐指頭不行舊路大丈夫漢乾坤獨步兜率恱本欲平夷道路反成土上加泥而今五湖四海剛被勘婆話迷圓通仙臺山有路是人過兩兩三三借問多要識趙州親勘破舌頭無骨奈渠何成枯木高握金鞭出禁城霜風凜凜馬蹄輕𤇆塵掃盡歸來後四海行人賀太平普融平五臺山路入嵯峨驀直饒聲指似他更有趙州多事漢歸來道我勘婆婆張無盡勘破誰知老趙州玉鞭鞭起臥金牛臺山今古行人口笑飲清風味轉幽長靈卓兩重問答絶誵訛趙老於中却勘婆若不全身探虎安能徹底驗仙陀禾山方趙州親勘破臺山勿兩岐只這老婆子蹤迹少人知佛心才燕趙當年有一僧干戈聚裏等聞行定亂不携三尺劒至今天下絶攙搶寶峯祥老婆心切勿交加要路逢渠指不差休問禹門求變化風雷只在葛洪家旻古佛趙州勘破路難過無限平人走似梭日暮臺山空寂寂至今猶未絶誵訛少林通臺山路上老婆禪驀直教人好進前賴得趙州親勘破從茲四海路平然雲蓋昌行路難行路難最難難過是臺山唯有趙州公驗正昂頭掉臂總間間總間間遂府出鉢盂湛堂凖臺山一路坦平自是行人不慣明鏡醜婦之冤智者愚人之患踈山常臺山古路是人遊箇箇尋婆問路頭堪笑趙州才勘破寥寥千古使人愁踈山如玉簫吹作鳳鸞吟惹動遊人離別心一陳東風捲寨廓四方八面少知音佛智裕臺山路坦平婆子苦商量趙州勘破了清風滿大唐高菴悟天下禪和説勘破爭知趙州已話墮引得兒孫不丈夫人人黠過冷地臥徑山杲劈面三拳連腮七掌盡大地人不知痛癢鼓山圭臺山路上人難進獨有趙州親到來勘破老婆回首處從此行人眼不開椘安方指路婆婆在五臺禪人到此盡癡呆一拳打破扶桑國杲日當空照九垓西蜀廣道者老婆元是魔王腳三軍不動旗閃爍趙州無柄鐵掃菷掃蕩煙塵空索索石頭回婆子只知指路雞犬被人偷去直得趙州勘了這回緊閉門戶戲魚靜二趙州老老大大不解山中打坐自言去勘婆子倒被婆子勘破善繫無繩約善行無轍迹不戰屈人兵直面當機疾老婆勘破五臺山有誰參透趙州關圓悟勤年老成精不謬傳趙州古佛嗣南泉招魂喪命因圖象良馬追風纍索牽勘破了老婆禪説向人前不直錢天童覺賊是小人智過君子大𡚶語成便白拈去膽大心粗無你會處稽首趙州大法王主典牛遊大用全提似海深魔軍戰退鬼難禁趙州勘破婆婆處草偃風行無處尋南堂興趙州老子爛泥裏刺勘破老婆藂林受賜婆婆不在五臺山平地行人作易難驀直坦然今古路區區却過趙州關雪竇宗臺山路驀直去趙老見婆無別語勘破回來知不知莫信間人説是非冶父川三月春光上國遊祥雲瑞氣瑣龍樓親從宣德門前過更問行人覔汴州文殊道婆子幾年尋劒客趙州勘破有誵訛解使不由家富貴風流何在著衣多訥堂思一按牛喫草一與賊過梯早知燈是火飯熟也多時遁菴演干戈中有太平基不用干戈始淂之若無舉鼎山力千里烏騅不易騎明大禪四海同一家兩口同一舌趙州勘婆了有理向誰説卍菴顏踞坐臺山古路頭往來雲衲被戈矛趙州提起那羅箭穿過髑髏即便休尼無著揔天高地厚人難見海闊山遙只自知勘破却回休借問得便冝是落便冝密菴傑趙州舌頭連天老婆眉毛覆地分明勘破歸來無限平人瞌睡妙慧尼淨智趙州勘破百發百中趂淂老鼠打破油甕佛照光村婆暴富誑唬閻趙州賣俏矢上加尖或菴體驀直驀直青天白日勘破了也一文不直月林觀本是山中人愛説山中話五月賣松風人間恐無價蒙菴嶽臺山路上箇婆婆平地無風起丈波下却斗門通底閘更無一滴到黃河無凖範勘破婆子面青眼黑趙州老漢謾我不淂文殊業趙州言勘破心頭打額頭如何無轉智特地覔冤讎野雲南趙州問僧甚處來僧云摘茶來師曰間頌曰道著不著何處摸索背後龍鱗面前驢腳反身筋斗孤雲野鶴阿呵呵雲蓋智趙州一日敲火問僧曰老僧喚作火汝喚作甚麼僧無語師曰不識玄旨徒勞念靜頌曰二趙州眼放光爍破四天下鉢盂上安柄至今成話欛老衲證直下是非著不淂著不淂處好承當木人昨夜通消息南海波斯過大唐野菴璇趙州因一婆子令人送錢請轉藏經師受施了却下禪床轉一匝乃曰傳語婆轉藏經已竟其人回舉似婆婆曰比來請轉全藏如何秪為轉半藏頌曰一走下禪床行一轉看了如來五千卷婆子年高眼尚明夜深月下穿針線慈受深左轉右轉金剛寶劒全藏半藏由基發箭紅心心裏中紅心驚淂須彌頭倒旋正堂辨趙州一匝天輪轉婆子知音未足酬普為人天開正眼大千沙界一毫收足菴鑑不知兀坐常輪轉空下禪床繞一遭背面却言虧一半老婆𢙣業自家招天目禮趙州劒氣衝牛斗婆子神符懸肘後一條拄杖兩人扶好手手中誇好手殺六巖輝趙州因僧侍次遂指火問曰這箇是火你不淂喚作火老僧道了也僧無對復策起火曰會麼曰不會師曰此去舒州有投子和尚汝往禮拜問之必為汝説因緣相契不用更來不相契却來其僧到投子子問近離甚處曰趙州子曰趙州有何言句僧舉前話子曰汝會麼曰不會乞師指示子下禪床行三步却坐問曰會麼曰不會子曰你歸舉似趙州其僧却回舉似師師曰還會麼曰不會師曰投子與麼不較多也頌曰二我喚作火汝即不可已道了也喚作甚麼楊無為趙州喚作火全身入荒草我今不是渠渠今正是我月林觀趙州回僧問如何是祖師西來意師曰𨓍前柏樹子曰和尚莫將境示人師曰我不將境示人曰如何是祖師西來意師曰前柏樹子頌曰前柏樹地中生不假牛犂嶺上耕正示西來千種路鬱密稠林是眼睛汾陽昭前柏樹趙州道廬陵米價吉陽敷三嵗兒童皆念得八十翁翁會也無浮山遠趙州前柏天下走禪客養子莫教大大了作家賊慈明圓七百甲子老禪和安貼家邦苦是他人問西來指柏却令天下動干戈雪竇顯千里靈機不易親龍生龍子莫回循趙州奪淂連城璧秦主相如總喪身入門何必辨來機老倒禪和不自知柏樹前剛指示反令平地下針錐雲峯恱趙州有語前柏禪者相傳古到今摘葉尋枝雖有解須知獨樹不成林黃龍南三柏蒼蒼示祖心趙州此話播藂林盤根抱莭在金地禪者休於格外尋萬木隨時有雕喪趙州𨓍柏鎮長榮不獨凌霜抱真莭幾奏清音對月明趙州全不犯工夫覿面寧存細與粗重疊示君君不見𨓍前柏樹本來無兜率恱深院盤根翠色幽老師曾指示禪流年年不改凌霜莭下載清風何日休正覺逸趙州𨓍前柏三冬刮地寒處處緑楊堪繫馬家家門首透長安天衣懷人問𨓍前柏豫是嶺南客反憶臘月天雪裏梅花拆海印信僧問西來意趙州柏樹𨠩皮下若有血官差不自由翠巖真青青柏何年植祖意分眀示趙州海變桑田有窮劫靈苗無影不凋秋照覺總造化無私不思力一一青青嵗寒色長短大小在目前可笑時人會不淂真淨文趙州𨓍柏衲僧苦厄井口轆轤橫吞不淂野軒遵前柏樹示禪流幾箇親曾見趙州眀年更有新條在惱亂春風卒未休保寧勇趙州下柏森森摘葉尋枝古到今眀眼衲僧如覷著西來祖意合平沉楊無為趙州柏森然直露滴風清添翠色摘葉尋枝不可求盤根萬古終無極大溈秀真箇怪時方識怪是精靈眼識精靈時人不會西來旨只看青青柏在佛國白羚羊挂角絶狐疑翠柏前演妙機此道不將人境會杲天紅日夜長輝羅漢南舌頭無骨趙州老柏樹前説向渠好是晚來無限意𠴨𠴨啼鳥噪禪居三祖宗萬里長空雨霽時一輪眀月映清輝浮雲掩斷千人目淂見姮娥面者稀佛鑑勤前柏樹子少悟出常情雨過山添翠雲𭣣日月眀湛堂凖青青柏指西來趙老門風八字開嵗寒枝有深深意誰把靈根著處栽佛燈珣西來祖意問如何柏樹前指似他射虎不真徒沒羽至今天下有誵訛踈山如天下禪和咬少林趙州有語前柏前柏老倒禪和眼赫赤不善東西失本源屈我觀音作胡客五祖戒趙州前柏衲僧皆罔測一堂雲水僧盡是十方客琅琊覺趙州前柏眼裏電光掣雲外往來多村翁行步劣道吾真一兔橫身當古路蒼鷹才見便生擒後來獵犬無靈性空向枯椿舊處尋承天宗蘇武不拜韓信臨朝恁麼會淂十萬迢迢瞞菴成前柏樹宿根深葉葉真珠寸寸金佛祖長長出不淂千古萬古只如今南堂興打人罵人易勸人除却難不識饒人處急水下高灘崇覺空趙州柏説向禪客黑漆屏風松蘿亮隔佛日才百寶光攢無見頂是大神咒最靈奇揭諦波羅僧揭諦石人半夜失烏雞正堂辨前柏樹子不是祖師心莫執一時見便千古音龍牙言前柏樹子分眀向君舉大雪滿長安燈籠吞佛祖塗毒䇿靜鞭聲裏駕頭來緊握雙拳打不開打淂開雲壓香塵何處是靜鞭聲裏駕頭來瞎堂遠西來祖意𨓍前柏鼻孔寥寥對眼睛落地枯枝才𨁝跳松蘿亮隔笑掀騰天童淨前柏樹子一二三四五竇八布衫穿禾山解打鼓石菴玿快人一言快馬一鞭趙州𨓍柏洗腳上船退菴奇清涼法眼禪師舉柏樹子話問覺鐵觜承聞趙州有此話是否覺曰先師無此語莫謗先師好眼曰真師子兒頌曰前柏樹子趙州無此語承言須會宗勿自立規矩佛印元僧問西來柏樹酬何必斯言謗趙州令人長憶清涼老一句當年喚轉頭大溈秀新羅鷂子刺天飛鈍鳥籬邊懞不去趙州柏一何高誰道先師無此語白雲端日炙風吹瘦影孤趙州嘗指倚𨓍株升元大小清涼老未會先師此語無正覺逸趙州無語幾人知江北江南見者稀山寺桃花復何在相逢空愛白公詩大洪遂前柏樹子趙州無此語若是本色人直下未相許真淨文誰道先師無此語焦尾大蟲元是虎胡蜂不戀舊時窠猛將豈在家中死急著眼却回顧若會截流那下去匝地清風隨步舉慧通旦趙州𨓍前柏樹子崑崙眼睛如點漆笑他法眼謗先師覺公心苦口如蜜雪堂行行主無人能賽姐姐更是好手騰身百尺竿頭打箇背翻筋斗正堂辨趙州有箇柏樹話禪客相傳遍天下多是摘葉與尋枝不能直向根源會覺公説道無此語正是惡言當面罵禪人若具通方眼好向此中辨真假文殊道一人背手抽金鏃一人反身控角弓南北東西競頭看果然一鴈落寒空巳菴深葉縣省和尚回僧問柏樹子話省曰我不辭與汝説還信麼曰和尚重言爭敢不信省曰汝還聞簷頭雨滴聲麼其僧豁然不覺失聲云㖿省曰汝見箇甚麼道理僧以頌對云簷頭雨滴分眀歷歷打破乾坤當下心息頌曰一前柏樹子簷頭雨滴聲風來荷折柄千古意分明簷頭滴滴分明歷歷碧眼黃頭二俱不識識不識普天匝地成狼籍東山源趙州問僧發足甚處曰雪峯師曰雪峯有何言句示人曰尋常道盡十方世界是沙門一隻眼你等諸人向甚處屙師曰闍𥟖若回寄箇鍬子去頌曰南望雪峯由萬里北遊未踏趙州關賺他一隻破鍬子二百餘年去不還正覺逸石橋一路滑如答閩嶺風高凍不開相見盡言遊歷去幾人曾到雪峯來佛慧泉沙門隻眼不容物萬象森羅從彼出鍬子何人識趙州放行底事須綿密海印信大地是眼何處屙天下不奈雪老何趙州寄箇鍬子去方淂此語圓堶堶鼓山圭大地是眼沒處屙衲僧到此便聱訛須知別有安身訣會淂安身事更多咄鍬子安著在甚麼處照堂一雪峯何處屙趙州寄鍬子沙門一隻眼狼籍乃如此阿呵呵大唐國裏鼓聲起新羅國裏舞婆娑別峯印大地一隻眼誰敢屙其中鍬子寄將去那知到雪峯橫川珙趙州謂衆曰我向行腳到南方火爐頭有箇無賔主話直至如今無人舉著頌曰蒙頭不覺睡開眼從教𦦨𦦨紅若謂平常便無事須防豆爆冷灰中心聞賁無賔主話意深深流落藂林古到今火冷灰寒口挂壁衲僧凍死不知心石田薰趙州上堂至道無難唯嫌揀擇才有語言是揀擇是眀白老僧不在眀白裏是汝還護惜也無時有僧問既不在眀白裏護惜箇甚麼師曰我亦不知僧曰和尚既不知為甚麼不在眀白裏師曰問事即淂禮拜了退頌曰至道無難言端語端一有多種二無兩般天際日上月下檻前山深水寒髑髏識盡喜何立枯木龍吟消未乾難難揀擇眀白君自看雪竇顯至簡至易同天同地揀擇眀白云何護惜口似椎眼如眉涉語默蚿憐夔堪笑卞和三獻玉縱榮刖却一雙足圓悟勤世間無物可羅籠獨有嵳峩萬仞峯忽若有人猛推落騰身雲外不留蹤隨菴緣至道無難萬水千山唯嫌揀擇鵠黑烏白才有是非還護惜不會不知全得力眀白裏頭如放行腰金猶頌青青麥月堂昌亂撒眀珠顆顆晶走盤應不貴金聲誰家女子能針線一串穿來不剩星無菴全趙州因僧問至道無難唯嫌揀擇是時人窠窟否師曰曾有人問我老僧直淂五年分踈不下頌曰象王嚬呻師子哮吼無味之談塞斷人口南北東西烏飛兔走雪竇顯分踈不下五年強一葉舟中載大唐渺渺兀然波浪裏誰知別有好思量白雲端五年分踈不下一句元無縫罅只知推過商量誰信分眀𨠩價玲瓏底相知莽鹵底相訝寧可與曉事人相罵不可共不曉事人説話天童覺五年分踈不下往往反成話須知至道無難於此誰知縫罅佛鑑勤天雷如鼓雲騰致雨雨霽雲收新月一鈎至道無難唯嫌揀擇五年分踈太隔脈東海鯉魚多赤稍南山大蟲有白額月堂昌風雨濛濛烏雲靉靉贔屭上山狐狸入海隨後追尋龍王不在咄呆堂定天高地厚尋常事海𤄃山重更要論霹靂震摧山鬼獨携霜劒定乾坤無菴全趙州因僧問至道無難唯嫌揀擇如何是不揀擇師曰天上天下唯吾獨尊曰此猶是揀擇師曰田厙奴甚處是揀擇僧無語頌曰似海之深如山之固蚊虻弄空裏猛風螻蟻撼於鐵柱揀兮擇兮當軒布鼓雪竇顯團團秋月印天心是物前頭有一輪入蝦蟆無出路却冤天道不平勻白雲端金毛師子大開口門天旋地轉雷擊電奔修羅喪膽外道亡魂含靈蠢動莫不沾恩佛鑑勤當門一脈透長安遊子空嗟行路難不是人前誇俏措金鎚擊碎萬重關無庵全趙州因僧問至道無難唯嫌揀擇才有語言是揀擇和尚如何為人師曰何不引盡此語曰某甲秪念淂到這裏師曰至道無難唯嫌揀擇頌曰水灑不著風吹不入虎步龍行鬼號神泣頭長三尺知是誰相對無言獨是立雪竇顯驅山塞海也尋常所至文眀始是王但見皇風成一片不知何處有封疆白雲端針線工夫妙入神沿情接意一何親太平胡越無疆界誰是南人與北人佛鑑勤紫綾紅錦青絲線巧手織來成一片其中縫罅不能無爭奈時人見不見龍門遠曰曖風和鶯囀新柳垂金線繫東君東君不惜無私力一點花紅一點春無菴全趙州因僧問如何是道師曰墻外底曰某甲不問這箇道師曰你問那箇道曰大道師曰大道透長安頌曰知道還他老倒翁親言相指事匆匆關山路遠終須到一徑長遙君任通投子青趙老家風不熱謾問他大道答長安有誰平步歸家去多是區區自作難水菴一大道透長安言端語亦端臘盡雪消去春來依舊寒松源嶽趙州因僧問道人相見時如何師曰呈漆器頌曰作家相見時堂堂呈漆器烏龜落漆桶也有苐一義南堂興潄石泠泠古澗陰喬松千尺帶寒青多應只看昂霄操誰信根頭有茯苓南叟茂道人相見問如何舉手寒溫事已多老倒趙州呈漆器嶽陽船子洞波趙州因僧問白雲自在時如何師曰爭似春風處處間頌曰爭似春風處處間花開花落豈相關白雲自在猶難擬飄鼓無心滿世間佛印元趙州因僧問祖意教意是同是別師曰會淂祖師意便是教意頌曰波斯讀梵字冥窑人作詩烏頭倣佛附子依俙竹密不妨流水過山高豈礙白雲飛湛堂凖趙州回與文遠行乃指一片地曰這裏好造箇巡鋪文遠便去路傍立曰把將公驗來師遂與一摑曰公驗分明過頌曰雖然公驗各隨身去住皆由守鋪人踏破草鞋歸去後落花啼鳥一般春佛鑑勤天子居閙市裏山僧在百草頭擺手御街來往不怕巡火所由鼓山圭一正一邪一倒一起文遠趙州靴裏動指徑山杲鑽頭閙藍遠侍者刺腦膠盆老趙州兩箇人前誇好手而皮三寸不知羞蒙菴聰趙州因僧問如何是祖師西來意師曰板齒生毛頌曰九年面壁自虗淹爭似當初一句傳板齒生毛猶可事石人踏破謝家船投子青趙州與文遠論義曰鬪劣不鬪勝勝者輪果子遠曰請和尚立義師曰我是一頭驢遠曰我是驢胃師曰我是驢糞遠曰我是糞中蟲師曰你在彼中作甚麼遠曰我在彼中過夏師曰把將果子來頌曰兩陳交鋒勢莫窮信旗獵獵卷秋風邊不用深深入勒馬歸來却有功慈受深趙州老古錐家風繼金粟文遠小廝兒中師子屬共撫無絃琴同唱還鄉曲花簇簇錦簇簇一片好良田瞥尓生荊𣗥赤腳漢趂兔著靴人喫肉南堂興趙州因僧問如何是佛師曰殿裏底曰殿裏者豈不是泥龕塑像師曰是曰如何是佛師曰殿裏底頌曰酸甜滋味本天然帶葉連枝顆顆圓南贍部洲人未識菴摩羅果信虗傳保寧勇不立孤危機本峻趙州老子玉無瑕當頭指出殿裏底剗盡茫茫眼裏花雪堂行如何是佛殿裏底世出世間難可比萬國同歌河海清稽首拜手元是你月林觀一尊殿裏佛兩度放毫光凖擬酬高價無疑亂度量蒙菴聰趙州因學人問乍入叢林乞師指示師曰喫粥了也未曰喫粥了也師曰洗鉢盂去其僧忽然省悟頌曰床窄先臥粥稀後坐濟濟鏘鏘瀟瀟灑灑要會趙州洗鉢盂了事沙消一箇泉大道梅花落盡杏花披未免春風著出被一氣不言含有象萬靈何處謝無私白雲端粥了令教洗鉢盂粗心往往更心粗直饒到此分眀了也是平生不丈夫佛陀遜趙州喫粥話尋常問禪客心若不負人靣上無慚色雲蓋智喫粥了也洗鉢盂家常逐日最相於西來何處半零落六祖癡頑不讀書三祖宗二乍入藂林伸一問鉢盂洗却更何疑從前官路無迂曲底事遊人不見歸乍入藂林乞指示大施門開無擁滯往往靈山受記人未有如斯箇次苐正覺逸粥了尋常洗鉢盂奈何依樣畫葫蘆靈光洞徹河沙界是則名為大丈夫雲居祐喫粥了洗鉢盂何曾指示曹溪路謾言隨衆三十年記淂展單忘却筯楊無為之乎者也衲僧鼻孔大頭向下禪人若也不會問取東村王大姐湛堂凖粥了令教洗鉢盂趙州此語不相辜茫茫宇宙人無數幾箇男兒是丈夫慈受深粥了令教洗鉢盂豁然心地自相符而今參飽藂林客且道其間有悟無天童覺乍入藂林問作家由來枯木別抽芽鉢盂洗了相逢著又淂濃烹一碗茶長靈卓大隱居廛小隱山世人無路淂相干五湖禪客朝朝用誰解回頭子細看草堂清叢林乍入問來由喫粥無過洗鉢休有意氣時添意氣不風流處也風流開福寧宗師垂手貴天真肯事雕蟲篆刻新只向平田淺草處等間推出玉麒麟佛性泰推窮物理成家計會合時機便識心多謝春風無厚薄貧家桃李也成陰護國元開單展鉢每相親十二時中處處真直下要眀端的旨韶陽句外露全身保寧勇喫粥了也未誰道趙州有指示粥後還教洗鉢盂敢問諸人悟也無趙州老孰為儔把斷要津水逆流伶俐衲僧才眨眼釣魚船子下楊州龍門遠趙州指示洗鉢盂衲子奔馳枉費工日用不知何處覔分眀説向似盲聾南堂興喫粥了也洗鉢盂已是分眀説向渠有時冷地思量著點鐵成金舉世無月林觀十方通透八靣玲瓏駿駒顧影狐兔潛蹤尼無著捴粥了令教洗鉢盂鐵船無底要人扶片帆高挂乘風便截海須還大丈夫密菴傑乍入藂林乞師指示拈出鉢盂令去洗行盡千山與萬山回頭撞著自家底不須指不須洗烜爀靈光照天地而今高挂在虗空長靈室內展腳睡文殊道相逢陪酒又陪歌醉倒家中要我駝駝到家中猶罵詈不知醒後又如何且菴仁只為分眀極反令所淂遲早知燈是火飯熟也多時無門開鶴立松梢月魚行水底天風光都占斷不費一文錢息菴觀只將乍入來伸請一到叢林志便高喫粥了也洗鉢去宗師不用更忉忉橫川珙
