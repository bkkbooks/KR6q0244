body:
  text: 僧錄司右闡教兼靈谷禪寺住持淨戒重校祖師機緣六祖下苐七世瑞岩彥一則羅山閑五則玄沙備十九則長慶稜七則保福展六則鏡清怤十則鼓山晏三則翠岩參一則太原孚四則台州瑞岩師彥禪師嗣巖頭師尋居丹丘瑞岩坐磐石終日如愚每日喚主人公復應諾乃曰惺惺著他後莫受人謾後有僧㕘玄沙沙問近離甚處曰瑞巖沙曰有何言句示徒僧舉前話沙曰一等是弄精魂也甚奇恠乃曰何不且在彼住曰已遷化也沙曰而今還喚得應麼僧無對頌曰一生長喚主人公不受人謾逈不同今日惺惺何處去滿山松栢起悲風佛國白彎彎新月聚三星誰信心王本自寧可笑瑞巖方丈老夜深呼喚強惺惺祖印明瑞岩家風喚主人公昨夜南山𧆞咬大蟲徑山杲一主人公死一主人公活若觧弄精魂兩頭皆透脫鼓山珪自呼自應已惺惺不受欺謾理不輕池內白蓮香未已詹前山色四時青白楊順瑞巖常喚主人公突出湏彌最上峯大地掀翻無覔處笙歌一曲畫樓中天衣哲不施棒喝喚主人公鵝王擇乳鴨類不同高原泉水洗水𠔃金金瑞巖徹底老婆心自携去沽村酒却著衫來作主人無量壽學道之人不識真只為前認識神無量刦來生死本癡人喚作本來身無門開磐陀漠漠秘蒼苔終日加趺兩𩯭摧縱使不曾呼喚著何嘗謾得阿師來天目禮風前一曲動離情調古無人和淂成自唱自斟還自飲至今猶自不惺惺別山智福州羅山道閑禪師嗣巖頭閩王請開堂師陞座方𠬧斂僧伽𥠖乃曰重便下座閩王近前執手云靈山一會何異今日師曰將謂是箇俗漢頌曰羅山忍後不能禁大展家風吼一音紙墨如山書莫盡衲僧休向義中尋洞山聦紛紛雪影耀閩天閩主欣逢倍樂然一旦春風吹大地更無一點在階前白雲端須彌座上斂伽𥠖海口潮音闡大機世主大檀能藻鑒靈山嘉會愈增輝踈山如一道直如弦千古應無對縱有囓鏃機髑髏成粉碎栢堂雅瑞世優曇見最難異香浮動曉風寒自非世主垂青眼却作閑花野草看寶葉源羅山初謁石霜問起滅不停時如何霜云直須寒灰枯木去一念萬年去凾蓋乾坤去純清絕點去師不契後謁巖頭理前問頭喝曰是誰起滅師於此大悟頌曰斫斷老葛藤打破狐狸窟豹披霧而變文龍乘雷而換骨咄起滅紛紛是何物天童覺是誰起滅就窠打刼擊殺烏龜救淂跛鼈殺六岩輝起滅不停誰解看當機一拶透重關東西緫是長安路蕩蕩無拘自徃還無凖範冷水點沸湯舌頭不出口可惜老巖頭慈悲成過咎石田薰羅山在禾山遊同行矩長老出門次師把拄杖向前一攛矩無對師曰石牛攔古路一馬勿雙駒後有僧舉似踈山山曰石牛攔古路一馬生三寅頌曰春有百花夏有熱秋有凉風冬有雪若無閒事掛心頭便是人間好時節照堂一不門前路春歸又一年落花紅滿地芳草碧連天鼓山珪出門握手話分携古道迢迢去莫追却笑波心遺劒者區區空記刻舟時徑山杲羅山一日問巖頭和尚三十年前在洞山來又不肯洞山是否頭曰是又問和尚豈不是承嗣德山又不肯德山頭曰是師曰不肯德山即且置只如洞山有什麼虧欠處頭良久曰洞山好佛只是無光師便禮拜頌曰一箇銕額銅頭一人三頭六臂二俱借人鼻孔却與洞山出氣南岩勝不肯宗師滿大唐羅山禮拜錯商量洞山無佛人難措慚愧岩頭口放光卍菴顏羅山因無軫上座問秖如巖頭道洞山好佛秖是無光未審洞山有何虧便道無光師召軫軫應諾師曰灼然好箇佛秖是無光曰大師為甚麼撥無軫話師曰甚麼處是陳老師撥你話處快道快道軫無語師打三十棒趂出軫舉似招慶慶一夏罵詈至夏末自來問師乃分明舉似慶便作禮懺悔曰洎錯恠大師頌曰格外談驚人句懵懂禪和徒指注酌然好箇佛無光言下迷宗空自忙頼有知音招慶在譊訛一夏為雌黃雌黃出暗寫愁膓寄知識佛性泰福州玄沙師備禪師嗣雪峯示眾曰諸方老宿盡道接物利生且問汝只如盲聾瘂三種病人汝作麼生接若拈鎚竪拂他眼且不見共他說話耳又不聞口復瘂若接不淂佛法盡無靈驗時有僧出曰三種病人和尚還許人商量否師曰許汝作麼生商量其僧重出師曰不是不是有僧持此語請益雲門門曰汝禮拜著僧禮拜起門以拄杖挃僧退後曰汝不是患盲復喚近前來僧近前門曰汝不是患聾門曰還會麼曰不會門曰汝不是患瘂其僧於此有省頌曰盲聾瘖瘂杳絕機冝天上天下堪笑堪悲離朱不辨正色師曠豈識玄𮈔爭如獨坐虗牎下葉落花開自有時復云還會麼無孔鐵鎚雪竇顯退後近前兼對辯相逢逅難回面春風驀地撼前還見落花千萬片白雲端雲門老子手親眼親因風吹火不費精神盲者便視聾者便聞雖然無語掛在口唇三種病人一種法門佛鑑懃盲聾瘖瘂接不得玄沙枉費閒心力扁鵲盧醫拱手歸三人俱是膏肓疾鼓山珪玄沙三種病人語透出雲門六不𠬧莫待是非來入耳從前知己返為讎徑山杲權生聾瞽瘂𤸷要顯吾宗驗作家金剛截銕如泥碎透金纔動失玄沙汾陽昭欲知三種人應用理常新未有纖毫法能為中外塵永明壽一二三見聞覺更是誰頓銷爍花簇簇處鷓鴣啼草薰薰時鴛鴦飛玄沙老玄沙老頼遇當年欠一著諦當之言徒唯然中間樹子半零落翠巖真玄沙三種接人諸人口耳現在不要開眼尿床特地移山塞海花裏幽禽語不休風光滿地誰人買塗毒䇿玄沙三種病人有理不在高聲引得香嚴老子却來樹上懸身龍門遠玄沙以毒出人毒三種病人同一屋堪笑雲門老古錐河裏失錢河裏摝或菴體盲聾瘖瘂不相干莫被玄沙恣熱謾一句與君重剖露老君頭戴楮皮冠晦室明聾盲瘖瘂捉敗了也更問如何聾盲瘖瘂月林觀曲設多方驗作家有誰親見老玄沙耳聾口瘂眼睛瞎五濁眾生數似麻橫川珙玄沙見僧來禮拜乃曰禮拜著因我淂禮拜汝頌曰拜我得禮你自笑沒道理豈獨玄沙翁天下人不是覺海元因我得禮你扶倒又扶起要行即便行要止即便止寶峯明夫子不識字達磨不會禪玄沙無此語切莫妄流傳徑山杲利刀自斷命根不要依草附木若有一法與人永入舌地獄鼓山珪因我得禮你牽牛去飲水岸上蹄踏蹄水中觜對觜高菴悟因我得禮你崑崙臥潭底雖然浪拍天身上無滴水雪堂行因我淂禮你分明好慚愧玄沙不是癡咄開眼休瞌睡照堂一說你說我轉見話墮大地眾生元無一箇典牛游老鼠咬生銕十分滋味別猫兒左右看嚥唾也不徹正堂辯因我得禮你窮源須到底九九八十一閻羅王是鬼卍菴顏因我淂禮你事從叮囑起誰知白蘋風不在秋江裏天目禮囙我得禮你莫放屁撒屎帶累天下人錯認自家底蒙菴聦玄沙一日普請徃海坑斫柴見一虎僧曰和尚虎師曰是汝虎歸院後僧問適來見虎云是汝未審尊意如何師曰娑婆世界有四重障若人透淂許汝出陰界東禪齊曰上座古人見了道我身心如大地虛空如今人還透淂麼雪竇云要與人天為師前面端的是虎頌曰前虎後虎急須看取𪷤烈威風生獰爪距今古樵人不回顧喪身失命知何數若回顧雄雄坐斷山前路佛慧泉猛虎當途獨振威爪上真箇利如錐可憐不覺亡身者碎骨収來良可悲保寧勇宗師方便大慈悲是汝之言寔古錐萬里神光騰頂後肯將生死嚇愚癡龍門遠欲識玄沙虎覿面是誰覩直下透牢關全機超佛祖禾山方玄沙見虎是汝多少人明自己色聲逼滿太虗有底纖毫依倚永明壽老玄沙太饒舌覿面明明重漏泄衲僧於此便承當驗來未免眼中屑屑屑誰甄別火發新羅燒脚熱海印信山中有虎人世上有人虎常磨笑裏刀利牙爪可怖寄語花狸奴莫教渠上樹慈受深前靣有虎元來是汝更問如何冤苦冤苦月堂昌玄沙一日遣僧送書上雪峯和尚峯開緘唯白紙三幅問僧會麼曰不會峰曰不見道君子千里同風僧回舉似於師師曰遮老和尚蹉過也不知頌曰故遣馳書通遠信不干文字示家風回來却報玄沙語蹉過分明理更封汾陽昭玄沙封白紙雪老却同風嗟過人難會古曲調不同真如喆玄沙封白紙雪老把火披元來不識字白日走須彌雲蓋智玄沙象骨眼睛烏白紙三番便當書千里同風多錯會一條拄杖兩人扶慈受深翻漁艇承家業笑出蘆花月正圓地闊天長三幅紙同風千里為誰宣佛心才白紙三張通信去展開千里却同風陽春轉入胡笳曲不是風吹別調中佛性泰三番白紙問寒暄千里同風月滿船奪淂高標全用處盤蛇口內打鞦韆丹霞淳白紙連封寄雪峯雪峯由是喜同風中間蹉過無人識齋後江城打暮鍾佛陀遜白紙馳來上雪峯雪峯千里却同風玄沙蹉過人難會熨斗煎茶銚不同真淨文鵽𩾗夜夜連聲呌月下同人不忍聞啼淂血流無用處不如緘口過殘春文殊道三張白紙千里同風宗師蹉過衲子迷踪金烏飛出海門東風從虎𠔃雲從龍野雲南千里同風見不差僧持此語報玄沙不知蹉過如何也莫是玄沙蹉過他橫川珙玄沙因雪峯召曰備頭陀何不徧叅去師曰達磨不來東土二祖不徃西天雪峯然之頌曰驀然趯倒便知休百粵青山更不游從此七閩江上月至今空照釣漁舟佛國白釣魚船上謝三郎趯倒須彌返故鄉應笑途中未歸客伶俜旅泊向他邦本覺一未離閩底已還家纔跨飛鳶又眼花堪笑曾郎更心毒烏籐輕放老玄沙遯菴演玄沙南游莆田縣排百戲迎接來日師問小塘長老昨日許多喧閙向什麼處去也塘提起衲衣角師曰料掉沒交涉法眼別云昨日有多少喧閙法燈別云今日更好笑頌曰夜壑藏舟澄源著棹魚龍未知水為命折筯不妨聊一攪玄沙師小塘老凾蓋箭鋒探竿影草潛縮也老龜巢蓮游戲也華鱗弄藻天童覺今日靜愀愀昨日閙啾啾風定花猶落鳥鳴山更幽北磵簡人前提起袈裟角堪笑無端露醜惡二老風流出當家未明向上那一著無際𣲖玄沙問鏡清教中道菩薩摩訶薩不見一法為大過失且道不見什麼法清指露柱云莫是不見遮箇法麼師曰浙中清水白米汝喫佛法未會在頌曰雪老門高兒女盛又能情重貴天倫把家幹蠱雖相似也有貪盃落草人虗堂愚密機深設穽利刃疾交鋒汗馬無人識重論蓋代功東叟玄沙因鏡清問學人乍入業林乞師指箇入路師曰還聞偃谿水聲否曰聞師曰是汝入處頌曰從這裏入頭上脚下俱濕雖然通淂咽喉未免一場氣息風浙浙浪悠悠清風何處起人在木蘭舟佛慧泉一滴偃溪水四海少人聞直饒玄會淂也是弄精魂法雲秀天生碧眼崑崙兒有藝過人自不知幾度黑風翻大海波心出沒自閒嬉白雲端風飄碎玉千峯雪雨滴岩花萬國春堪聽偃溪流水意潺潺終日不聞聞羅漢南投老玄沙付鏡清返聞來聽偃溪聲如今洗耳滄浪在誰肯臨流便濯纓旻古佛滔滔無問說只為太親切有誰曾共聞山河齊漏泄楚安方玄沙指示太深深引線須憑一寸針聞與不聞門外語勸君休向偃溪尋文殊道乾坤獨立從這裏入風吹不著雨打不濕月林觀一𣲖寒泉下翠微玄沙拈出為真機鏡清雖向聞中入流水何曾洗是非銕山仁玄沙因叅次聞燕子聲乃曰深談實相善說法要便下座時有僧請益曰某甲不會師曰去誰信汝頌曰紫燕飛來繞畫梁深談實相響浪浪千言萬語無人會又逐流鶯過短墻本覺一薄宦奔南北長憐客路塵濛濛烟雨裏深憶故園春延壽慧殺活交馳千聖不共救淂眉毛失却鼻孔空叟印玄沙因僧問如何是學人自己師曰用自己作麼雲門云沒量大人被語脉裏轉却僧問如何是學人自己門云忽然路上有人喚衲僧齋你也隨分淂飯喫頌曰是你自己莫相鈍置衲子兩兩三三秪道早眠晏起大中隆玄沙驢前雲門馬後更問如何合取狗口雪菴瑾玄沙因僧問如何是清淨法身師曰膿滴滴地頌曰滴滴通身是爛膿釣魚船上顯家風時人只看𮈔綸上不見蘆花對蓼紅天衣懷膿滴滴地金色光法身全體露堂堂釣螺江上曾分化一葉漁舟泛渺茫楊無為清淨法身無可比病後依前滴滴膿燕鴻呌斷秋光老落葉飄來一樣紅懶菴樞滴滴通身是爛膿更無一點落西東若言不是知音者未免風吹別調中高峯妙玄沙因僧侍次以柱杖指靣前地上一點白問曰還見麼曰見師如是三問其僧三云見師曰你也見我也見為什麼道不會頌曰你見我見十分成現打破荊𣗥林方知無背靣一點從教徹古今黑白未分何處辨玄沙因僧問如何是親切底事師曰我是謝三郎頌曰本是釣魚船上客偶除髮著袈裟祖佛位中留不住夜來依舊宿蘆花雪竇顯親伸端的問君言莫比流沙少室傳昨夜鴈回雙嶺後謝家人立月明前投子青閩山滄海浪悠悠父子生涯一釣舟忽尓翻深猛省大家𠬧拾去來休草堂清杪秋時節水雲鄉千頃蘆花未著霜江景不將零碎賣一時分付謝三郎祖印明蕭蕭蘆葦映江流獨棹孤蓬漾小舟細雨斜風渾不顧一心只在釣竿頭笑翁堪玄沙示眾曰若論此事喻一片田地四止界分結契賣與諸人了也只有中心樹子猶属老僧在頌曰萬事由王老師樹子未属你在廣額屠兒成佛二祖大師償債鼓山珪祖父田園都賣了四邊界至不曾留柰何由有中心樹惱亂春風卒未休徑山杲祖父田園俱属我中間樹子豈由他連枝帶葉和根要見兒孫意氣豪遯菴演玄沙曾指上頭關四海禪流覺未閑惟有漢朝天子貴彭城垓上信旗還姜山愛玄沙曰亡僧面前正是觸目菩提萬里神光頂後相頌曰嶺中奇特是玄沙垂語諸方不易加亡僧靣前真心驗後人子細莫周遮石門聦亡僧雖不是亡僧既是菩提道自通若更二途斟酌會非但無知兼耳聾般若柔就中至直是玄沙觸目全真話不亡者靣前親證驗更無偏黨絕周遮藂林浩浩爭唇吻恰似虗空捉幻花汾陽昭天衣懷云亡僧靣前即且置只如活人背後底是箇甚麼頌曰且置亡僧靣前事活人背後若為逢自從打破雲南國直至如今塞北通本覺一玄沙云萬里神光頂後相沒頂之時何處望事已成意已休此箇來踪觸處周智者聊聞猛提取莫待須失却頭頌曰神光頂後照無邊萬里區區豈足言若問玄沙端的意霜天夜半髑髏寒本覺一玄沙嘗訪三斗菴主纔相見主曰莫恠住山年深無坐具師曰人人盡有為什麼菴主無曰且坐喫茶師曰菴主元來有在頌曰傍菴來徃路相通步步相隨躡去蹤山遠年深人不到一溪流水質長松率菴琮玄沙見鼓山來作一圓相山曰人人出者箇不淂師曰情知你向驢胎馬腹裏作活計曰和尚又作麼生師曰人人出者箇不淂曰和尚恁麼道淂某甲為什麼道不淂師曰我淂汝不淂頌曰作者好求無病藥馬腹驢胎何處著鼓山當日可憐生鼻孔遭人白拈却本覺一玄沙見三人新到鳥打普請鼓三下卻歸方丈新到具威儀了亦去打普請鼓三下卻入僧堂久住來白云新到輕欺和尚師曰打鍾集眾勘過大眾集新到不赴師令侍者去喚新到纔出僧堂卻於侍者背上拍一拍云和尚喚你侍者至師處新到便歸堂久住乃問和尚何不勘新到師曰我與你勘了也最菴印云可惜放過這僧乃頌曰玄沙明修棧道新到暗度陳倉夜行各不相投投明共到咸陽嚴號令按條章明明四海清如鏡更於何處覔邊疆福州長慶慧棱禪師嗣雪峯與保福遊山福問古人道妙峯山頂莫即遮箇便是也無師曰是即是可惜許僧問鼓山只如稜和尚恁麼道意作麼生山曰孫公若無此語可謂髑髏徧野白骨連山頌曰因上高巖到頂頭僧人致問已圓周是即便是可惜許只恐同音別處游汾陽昭妙峯孤頂草離離拈淂分明付與誰不是孫公辨端的髑髏著地幾人知雪竇顯八萬四千非一一七金山內海滔滔妙高峯頂平如掌誰把長竿釣巨鼇草堂清携手相將孰共行目前唯覩妙高山雲泥不隔來時路付與兒孫觸處看佛心才囓鏃交鋒是作家不孤來問這些些知時及節因行事可惜茲人返嘆嗟般若柔是即是𠔃可惜許擬心早涉三千里行人念路客思家達磨杖頭挑隻履獃堂定妙高孤頂忽登臨浩浩無風白浪深除却鏡清長慶外此時誰更是知音寶葉源長慶因僧問如何是正法眼師曰有願不撒沙保福云不可更撒也頌曰願力山高豈足誇藏身露影數如麻若非保福親曾見誰信稜公更撒沙寶葉源長慶曰緫似今日老胡有望保福云緫似今日老胡絕望頌曰天高鳴鴈侵雲舉地肅𧉨螿入草鳴渾是一秋風景裏客愁幾逐異鄉情東叟長慶上堂撞著道伴交肩過一生叅學事畢頌曰驀路相逢交臂過眉毛趯起莫蹉跎平生叅學明何事悟了寧消一剎那本覺一長慶因僧問如何淂不疑不惑去師乃展兩手僧不進語師曰汝更問我與汝道僧再問師露膊而坐僧禮拜師曰汝作麼生會曰今日風起師曰恁麼道未定人見觧汝於古今中有甚麼節要齊得長慶若舉淂許汝作話主其僧但立而已師却問汝是甚麼處人曰向北人師曰南北三千里外學妄語作麼僧無對頌曰展手之時萬仞摧枯河無水月無來若疑別問龐居士石女黃梅誰共陪投子青長慶因僧問有問有荅賔主歷然不問不荅時如何師曰相逢盡道休官去林下何曾見一人頌曰人人盡道我心休問著何曾有地頭口說心違謾自己業河迅速任漂流智門祚長慶因僧問眾手淘金誰是淂者師曰有伎倆者淂曰學人還淂也無師曰大遠在頌曰眾手淘金淂者誰纖塵窒礙豈能為洪波浩渺黃金遠四事無成空手歸智門祚眾手淘金誰可得巧有伎倆必能克陏侯淂珠聞京西卞和獻玉在河北湛堂凖漳州保福從展禪師嗣雪峯長慶云寧說阿羅漢有三毒不說如來有二種語不道如來無語只是無二種語師曰作麼生是如來語曰聾人爭淂聞師曰情知和尚向苐二頭道慶却問作麼生是如來語師曰喫茶去雲居錫云什麼處是長慶向苐二頭道處頌曰頭兮苐一苐二臥龍不鑒止水無處有月波澄有處無風浪起稜禪客稜禪客三月禹門遭點額雪竇顯如來語為君舉任是聾人淂聞未免和泥合土喫茶保福亦憨癡似向雷門撾布鼓佛慧泉不說如來二種語三三為九須重數何謂聾人爭淂聞狐裘未免還移主白雲端無是無非歸掌握有聞有見隔關山始知一種如來語不在世人情解間佛鑑懃苐一頭苐二頭清風明月兩悠悠將軍戰馬今何在野草閒花滿地愁南華昺撞墻撞壁曲不藏直摘葉拈花與儉寧奢羅漢有三毒如來有二語聾人爭淂聞依舊喫茶去保福老保福老銕眼銅睛還失了月堂昌便恁喫茶去還知苐二頭可憐長慶老特地一場愁寶葉源保福因雪峯上堂曰諸上座望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也師舉問鵝湖僧堂前相見即且置秖如望州亭烏石嶺甚麼處相見鵝湖驟步歸方丈師低頭入僧堂頌曰望州烏石與堂前相見相逢萬萬千唯有鵝湖并保福此時相見解推遷汾陽昭望州烏石常相見何故禪人却背違保福鵝湖雖淂意埋兵曾未展鏘旗海印信登山過水幾區區特地相逢問道途堪笑華山陳處士長安路上倒騎驢大洪遂密密堂堂早二三本來無物更何堪癡人見了生歡喜作者相逢滿靣慚龍門遠望州烏石與僧堂業識茫茫不可當提起衲僧拄杖子五湖四海沸如湯徑山杲藕𮈔引鯨鼇針鋒輥芥投望州烏石嶺未唱已先酬大唐擊鼓新羅舞覿面相呈不相覩圓悟勤望州烏石僧堂前驟步低頭隔大千若是咬人師子子返身不在草頭邊一翁如保福因僧問雪峯平生有何言句淂似羚羊掛角時師曰我不可作雪峯弟子不淂頌曰人前慣出手退三添作九有眼未嘗看無家自能走雪峯之句羚羊挂角作他弟子沒來由龍蛇陣上看謀畧月堂昌雪峯未審何言句淂似羚羊掛角時拊擊自然皆率舞不須羗管隔雲吹虛堂愚保福問僧殿裏底是甚麼曰和尚定當有師曰釋迦佛曰和尚莫謾人好師曰却是汝謾我又問飯頭鑊闊多少曰和尚試量看師以手作量勢曰和尚莫謾某甲師曰却是汝謾我又問僧汝作甚麼業來淂恁麼長大曰和尚短多少師蹲身作短勢曰和尚莫謾人好師曰却是汝謾我又問僧汝名甚麼曰咸澤師曰忽遇枯涸時如何曰誰是枯涸者師曰我是曰和尚莫謾人好師曰却是汝謾我頌曰保福四謾人其中道理親兩兩從頭舉雙雙句後明若也更不會新羅打鐵丁洞山聡竿木隨身老作家逢場作戲更難加謾人謾我無人會水長船高眼裏沙雪竇顯一箇人謾四箇人四人謾一一謾親思量一代謾人漢𮞏代相謾謾殺人佛國白一般見淂有多般若也謾他實自謾要識展公端的處水闊山高天色寒東林緫保福從來不謾人問著禪流緫及身浴鑊量來闊多少兩長一短是誰真堅保福因僧侍立問曰汝恁麼心曰甚麼處是某甲心處師拈一塊土度與僧曰拋向門前著僧拋了却來曰甚麼處是某甲心處師曰我見築著磕著所以道汝心頌曰晨朝有粥齋時飯展鉢開單飽便休築著磕著如薦淂不風流處也風流尼無著緫保福與甘長老相看鄭十三娘纔坐定師乃問承聞十三娘子叅見溈山是否曰是師曰溈山遷化向甚麼處去鄭起身偏床而立甘曰閑時說禪口似懸河何不道取鄭曰鼓這兩片皮堪作甚麼甘曰不鼓這兩片皮又作麼生鄭曰合取狗口頌曰溈山遷化絕音容趯起眉毛何處去十三娘子側身時放出金毛師子子南堂興禪禪鄭十三娘握玉鞭正法眼更叅三十年南岩勝杭州龍𠕋寺道怤禪師即鏡清嗣雪峯僧問學人未達其原請師方便師曰是什麼原曰其原師曰若是其原爭受方便僧禮拜退後侍者問曰和尚適來莫是成他問否師曰無曰莫是不成他問否師曰無曰未審畢竟意作麼生師曰一點水墨兩處成龍其原一作其源頌曰成龍兩處若為分碧眼黃頭笑未聞莫恠鏡清多意氣他家曾謁聖明君正覺逸鏡水平湖碧湛然茫茫曾未達其源王維妙手堪圖畫一點成龍兩處全保寧勇手把空行未是難難中難是問其源其源未達柰何也且看成龍點下分雲溪恭學人未問指其源句裏明機好細觀自語不能知落處煩他我作費言端本覺一冰稜鎻斷長河口不見人從鳥道來一陣風回脩竹裏玉闌干上雪成堆心聞賁源泉混混望無涯澄湛平如鏡靣開兩處成龍一點墨幾人換却眼睛來寶葉源鏡清問僧門外什麼聲曰雨滴聲師曰眾生顛倒迷己逐物和尚作麼生師曰洎不迷己曰洎不迷己意旨如何師曰出身猶可易脫體道應難頌曰虛堂雨滴聲作者難酬對若謂曾入流依前還不會會不會南山北山轉霶霈雪竇顯是甚麼聲雨滴浩浩迷己逐物眾生顛倒楊無為簷前雨滴聲正在眼中鳴貪他簑笠者失却舊茅亭長靈卓順流逆流轉物物轉良觀音快逢其便出身脫體自分明門外依前雨滴聲圓悟勤明頭便打暗裏閃過盡底活時死中要坐門外簷間雨滴聲眾生顛倒逐迷情可憐洎不迷己處出得身來體未明月堂昌簷頭雨滴階前地濕法法現成人信不及更問如何長江水急慈受深簷頭雨滴聲歷歷太分明若是未歸客徒勞側耳聽白楊順門外依然雨滴聲万般巧說爭如實平生心膽向人傾相見還同不相識卍菴顏直下全提是鏡清脫難出易語分明這僧更是能親切聽得簷頭雨滴聲寶葉源鏡清問僧門外是甚麼聲曰蛇齩蝦蟆聲師曰將謂眾生苦更有苦眾生頌曰將謂眾生苦更有苦眾生相見易得好共住難為人卍菴顏鏡清問僧門外什麼聲曰鵓鳩聲師曰欲得不招無間業莫謗如來正法輪頌曰聞聲見色非聞見見色聞聲是見聞欲得不招無間業莫謗如來正法輪卍菴顏鏡清因僧問聲前絕妙請師指歸師曰許由不洗耳曰為甚麼如此師曰猶繫脚在曰某甲秖如此師意又如何師曰無端夜來鴈驚起後池秋頌曰飄風揚塵落花流水聲前絕妙無處著觜驚起後池秋許由不洗耳容貌好西施開唇不露觜方菴顯鏡清因僧問學人啐請師啄師曰還得活也無曰若不活遭人恠笑師曰也是草裏漢頌曰古佛有家風對揚遭貶剝子母不相知是誰同啐啄啄覺猶在殼重遭撲天下衲僧徒名邈雪竇顯語見人心苗見地頭痛痒喝如聾諸方開口不同用寶印全機繼祖風佛國白啐啄之機不謬傳軒轅寶鑑正當軒萬緣喪盡泥中土四海澄清月在天本分鉗鎚須煆煉自家爐且磨研相逢莫問㕘玄事此去西天萬八千佛鑑懃河目海口釘觜銕舌雞宿鳳巢素非其鴨直饒啐啄同時未免當頭一劄佛性泰鏡清因僧問如何是大道之源師曰這裏流出頌曰從這裏流出滔滔無盡曰巨浪湧千尋誰知無一滴無凖範鏡清一日於僧堂前自擊鍾曰玄沙道底玄沙道底僧問玄沙道甚麼師畫一圓相僧曰若不久㕘爭知與麼師曰失錢遭罪雪竇云洎被打破蔡州圜悟云爛泥裏有硬刺頌曰鏡清湖心拋一餌錦鱗躍浪上鈎來幾乎掣斷竿頭線引得傍觀下釣臺石溪月鏡清問雪峯古人有言峯便倒臥良久起曰問甚麼師再問峯云虛生浪死漢頌曰尋常愛客恨無來及至人來懶話陪空臥早知眠不當虗勞紅熖落寒灰投子青鏡清因僧問新年頭還有佛法也無師曰有曰如何是新年頭佛法師曰元正啟祚萬物咸新曰謝師荅話師曰鏡清今日失利頌曰七寶盃酌蒲萄酒金花紙寫清平詞春風院靜無人見閒把君王玉笛吹心聞賁新年佛法荅云有小盡依前二十九玉麟掣斷黃金勒𨚫向雲中大哮吼懶菴樞又僧問眀教寬新年頭還有佛法也無師曰無曰日日是好日年年是好年為甚𨚫無師曰張公喫酒李公醉曰老老大大龍頭蛇尾師曰眀教今日失利頌曰新年佛法荅云無會得依前在半途誰把扁舟清夜笛月眀吹過洞湖懶菴樞新年佛法播真風笑殺街頭賀嵗翕三級浪高何處去謾將雙劒定雌雄雪堂行南堂興云鏡清道有時失利眀教道無亦失利且道譊訛在什麼處頌曰新年景物漸舒蘇佛法徒勞問有無得失是非都喪𨚫波斯鼻孔自來建隆原穩密田地神通游戲佛法新年頭有無俱失利一槩等虗空豈容立巴鼻草上之風祖令行誰云雷罷不停聲圓悟勤新年佛法鏡清有須信親言出親口新年佛法眀教無西天鬍子沒髭可笑兩翁同失利南海波斯失却鼻太平今夜太郎當還如雪上更加霜嵗寒孫𬛜𭣣却劒釣魚舡上謝三郎佛鑑懃福州鼓山興聖神晏國師嗣雪峯一日㕘雪峯峯知其緣熟忽起搊住曰是什麼師釋然了悟亦忘其了唯舉手搖曳而已峯曰子作道理邪曰何道理之有峯審其懸解撫而印之頌曰驀被曾郎搊著胷平生途路忽然窮無端擡手輕搖曳笑倒南方大頂峯竹屋蕳皷山上堂垂語曰鼓山門下不淂咳嗽時有僧咳嗽一聲師曰作甚麼曰傷風曰傷風即得頌曰遼空一箭九重城雪老門風儘有聲見說禁班宣號令那邊渾不許人行虗堂愚鼓山有偈示眾曰直下猶難會尋言轉更若論佛與祖特地隔天涯師舉問僧汝作麼生會僧無語乃謂侍者曰某甲不會請代一轉語者曰和尚與麼道猶隔天涯在僧舉似師師喚侍者問汝為這僧代語是否者曰是師便打趂出院頌曰國師之子太慈悲入草何如出草時射透九重聖箭子依前特地隔天涯石溪月明州翠岩令㕘禪師嗣雪峯上堂曰今夏與諸兄弟語論看翠岩眉毛還在麼此依傳燈所載五燈會元典傳燈異乃曰一夏與兄弟東語西話看翠岩眉毛在麼長慶云生也雲門云關保福云作賊人心虗翠岩芝云為眾竭力禍出私門頌曰翠岩示徒千古無對關字相酬失錢遭罪老倒保福抑揚難得嘮嘮翠岩分明是賊白珪無玷誰辨真假長慶相諳眉毛生也雪竇顯青山岌岌緣水滔滔穿過鼻孔落盡眉毛大洪遂作賊保福擔枷過狀生也長慶迷真逐妄掩關雲門秋江月亮老倒翠岩眉在眼上死心新金鎚血色透雲袍閫外威權膽氣豪打破魔王山鬼窟碧潭深處釣鯨鼇南堂興天魔謗佛桀犬吠堯巍巍大人聖德可昭蒙菴岳萬鈞之弩射何人箭未離弦已喪身帶累盲龜失浮木欲來火裏透金塵伊菴權發言先要心無愧為事應須理處長莫學里閭無信者從朝至暮錯商量虛堂愚太原孚上座嗣雪峯鼓山問父母未生時鼻孔在什麼處師曰老兄先道曰如今生也汝道在什麼處師不肯山却問作麼生師曰將手中扇子來山與扇子再徵之師默置山罔測乃敺之一拳頌曰父母未生前鼻孔在何處藂林老作家俱昧藏身句鼓山雖見機未免撑門戶搖扇太原孚播弄閒家具山中春色深飛花落無數佛慧泉父母未生前生也只如然一般拈掇能奇特直下渾如火裏蓮輝今耀古極妙窮玄大可憐清風長滿座一念八千年圓悟勤高安灘頭百雜碎象骨峯前眼搭癡敢道鼓山無鼻孔藂林千古笑嘻嘻正堂辯孚上座叅雪峯峯聞乃集眾師到法堂上顧視雪峯便下看知事明日却上禮拜曰某甲昨日觸忤和尚峯曰知是般事便休頌曰李廣將軍古今無對深入虜全身遠害不動干戈贏小㨗至今邊塞嘉聲在海印信雪峯集眾待孚公上堂一顧便西東明日却云曾觸忤公案從來是幾重本覺一針頭削銕牛背毛多將少使冷作熱燒直上法堂便下去觸忤和尚重觧註知是般事休便休茫茫塞壑與填溝月堂昌壯氣如虹上法堂就籬縛犍恰相當若言觸忤老和尚雪上無端又著霜秤岩玉孚上座初在楊州光孝事講涅槃經有禪者阻雪因徃𦗟講至三因佛性三德法身廣談法身妙理禪者失笑師講罷請禪者喫茶曰某甲素志狹劣依文觧義適蒙見笑且望見教禪者曰實笑座主不識法身師曰如此解說何處不是曰請座主更說一遍師曰法身之理猶若太虗竪窮三際橫亘十方彌綸八極包括二儀隨緣赴感靡不周徧曰不道座主說不是秖是說得法身量邊事實未識法身在師曰既然如是當為我說曰座主還信否師曰焉敢不信曰若如是座主輟講旬日室內端然靜慮収心攝念善惡諸緣一時放却師依所教從初夜至五更聞鼓角聲忽契悟扣禪者門曰阿誰師曰某甲禪者咄曰教汝傳持大教代佛說法夜來為甚麼醉酒臥街師曰禪德自來講經將生身父母鼻孔𢬆捏從今已去更不敢如是曰且去來日相見師遂罷講徧歷諸方頌曰一曲單于風引長孚公聞處是宮商至今夜夜維揚客空𦗟樓頭聲斷膓本覺一誰將畫角吹江城一曲梅花隔岸𦗟宿酒乍醒金鴨冷海棠枝上月猶明懶菴樞孚上座掌雪峯浴室一日玄沙上問訊雪峯曰此間有箇老鼠子今在浴室裏沙曰待與和尚勘破言訖到浴室遇師打水沙曰相看上座師曰已相見了沙曰什麼刦中曾相見師曰瞌睡作麼沙却入方丈白峯曰已勘破了峯曰作麼生勘伊沙舉前語峯曰汝著賊也頌曰象王象子儘相隨岸上人看蹄蹄香草細餐知飽足歸來不待日頭低虛堂愚孚上座因鼓山赴大王請雪峯門送回至法堂乃曰一隻聖箭直射九重城裏去也師曰是伊未在峯曰渠是徹底人師曰若不信待某甲去勘過遂趂至中路便問師兄向甚麼處去山曰九重城裏去師曰忽遇三軍圍繞時如何山曰他家自有通霄路師曰恁麼則離宮失殿去也山曰何處不稱尊師拂袖便回峯問如何師曰好隻聖箭中路折却了也遂舉前話峯乃曰奴渠語在師曰這老凍膿猶有鄉情在頌曰洞天無璧月無遮朝斗先生扣齒牙風撼古壇松子脫打反頭上楮冠斜絕象鑑青童雙勒玉騘嘶淡白春衫綠帶圍半夜歸來花底過金鞭敲落亂紅飛竹屋簡二九重城裏本非遙射折重重箭倍饒忽遇三軍圍饒處分明有路直通霄
