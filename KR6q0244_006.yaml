因齊慶讚識得當靣主人翁眉毛决定遮雙眼佛鑑勤鐘鼓聲聲已喚齊堂前作舞老公家雖然一鉢充飢困不覺牙生滿口沙懶菴樞鴆鳥落溪魚鱉死毒龍行徑草菜枯坐中若有江南客休向人前唱鷓鴣簡堂機作舞金牛錯用心喚人喫飯笑欣欣黃金自有黃金價何必和沙賣與人天目禮嵩山和尚嗣馬祖因與龐居士喫茶士舉橐子曰人人𥁞有分為什麼道不得師曰秪為人人𥁞有所以道不得曰阿兄為甚麼却道得師曰不可無言也曰灼然灼然師便喫茶七曰阿兄喫茶為甚麼不揖客師曰誰曰龐公師曰何須更揖後丹霞聞乃曰若不是嵩山幾被個老翁惑亂一上士聞之乃令人傳語霞曰何不會取未舉橐子時頌曰未舉橐子已前衲僧難為下觜識得這個靈苗不向黃泉作鬼不作鬼何准擬一拳拳倒黃鶴樓一踢踢翻大海水南堂興七碗清風生兩腋一回舉著便惺惺相逢不用輕相揖須要當頭道姓名正覺顯嵩山與龐公見衆僧擇菜次師曰黃葉即去青葉即留士曰不落青黃又作麼生師曰道取好曰互為賓主也大難師曰却來此間強作主宰曰誰不與麼師曰是曰不落青黃就中難道師笑曰也解與麼道士重大衆師曰大衆放你落機處頌曰蹉過處甚分明無耳僧人子細𦗟但得白雲消散𥁞夕陽斜照數峯青佛鑑勤不落青黃道取好互為賓主也大難重衆僧便下去後回相見作何顏大圓智膠投漆水和乳一卷一舒全賓全主誰言不落青黃就中要人道取誰道取分付鑊湯熟蒸爛煮佛𪫬泰則川和尚嗣馬祖因龐居士相看次師曰還記得見否頭時道理否曰猶得阿師重舉在師曰情知久參事慢曰阿師老耄不啻龐公師曰二彼同時又爭幾許曰龐公鮮健且勝阿師師曰不是勝我秖缺汝個幞頭士拈下幞頭曰恰與師相似師大笑而已頌曰初見石頭久參事慢阿師老耄龐公鮮健一頂幞頭機鋒互換大笑呵呵風和日暖正覺顯則川與龐居士摘茶次士問曰法界不容身師還見我否師曰不是老僧洎答公話曰有問有答蓋是尋常師乃摘茶不𦗟士曰莫怪適來容易借問師亦不顧士喝曰這無禮儀老漢待我一一舉向明眼人師乃拋却茶籃便歸方丈頌曰相逢相識謾相邀碧水溪深隔斷橋無限說辭殊不𦗟急扄門戶更徒勞保寧勇二老機關誰共委幞頭捋下髮髼鬆山深不記來時路倣佛猿啼碧澗中懶菴樞二八佳人巧畫眉穿簾入戶意如癡空勞笑語相調戲白髮山翁肯采伊寶葉源則川一日在方丈內坐居士來見乃曰只知端居丈室不覺僧到參時師垂下一足士便出行三兩步却回師乃𭣣足士曰可謂自由自在師曰我是主士曰阿師只知有主不知有客師喚侍者點茶士作舞而出南堂興拈云好則川亦好龐公看他兩作家恁麼相見如二龍玩寶兩無相傷所謂入林不動草入水不動波到這裏方知有自由自在分且道是什麼得恁麼靈驗良久復頌曰衲子懷中寶文星袖裏珠夫子步亦步夫子趨亦趨又則川善唱居士能舞雲既從龍風亦從虎師子頻呻象王回顧北斗藏身月宮趂兔破草鞋不移寸步樂行不如苦住富客不如貧王趍前退後說來端舞袖高歌却回去正覺顯欣州打地和尚嗣馬祖自江西領旨常晦其名凡學者致問唯以棒打地示之時謂之打地和尚一日被僧藏却棒然後致問師但張其口僧問門人曰秖如和尚每日有人問便打地意旨如何門人即於竈內取柴一片擲在釜中頌曰請問吾師皆打地問處雖殊理不殊古人總在斯門入早是慈悲曲為渠般若柔紫府山前真正事柱杖常擎在手中南北問津無限衆唯將打地報盲聾汾陽昭棒棒打著地始信無虛棄秪見鑿頭方失却錐頭利慈受深端坐似無為逢人却打地嚇得虛空神走入波斯鼻福州寶壽樂江西椑樹和尚嗣馬祖一日因道吾從外歸師問甚麼處去來曰親近來師曰用簸這兩片皮作麼曰借師曰他有從汝借無作麼生曰秪為有所以借頌曰從來父子不相離石女何勞更問伊昨夜寒嵓無影木白雲深處露橫枝丹霞淳椑𣗳臥次道吾近前牽被覆之師曰作麼曰蓋覆師曰臥底是坐底是曰不在這兩處師曰爭奈蓋覆何曰莫亂道頌曰椑𣗳臥起道吾蓋覆一喝當頭掀翻路布圓悟勤相逢不相避個裏聊遊戲喝一喝反天覆地大圓智石林和尚嗣馬祖見龐居士來乃竪起拂子曰不落丹霞機試道一句子士奪却拂子却自竪起拳師曰正是丹霞機曰與我不落看師曰丹霞患啞龐公患聾曰恰是師無語士曰向道偶爾頌曰檐東過西移前作後馬首千差佛面百醜月堂昌作家相見別無道理彼既搖頭此亦搖尾頭尾相應須存終始多少杜撰禪和一向撥波求水佛鑒勤潭州秀溪和尚嗣馬祖因谷山問聲色純真如何是道師曰亂道作麼山却從東過西立師曰若不恁麼即禍事也山又從西過東立師乃下禪床方行兩步被谷山捉住曰聲色純真事作麼生師便打一掌山曰三十年後要個人下茶也無在師曰要谷山這漢作甚麼山呵呵大笑頌曰樓前巧燕雙雙語林上嬌鶯對對飛因看古人無義語等間又得一聯詩佛鑒勤兩陳交鋒笑似嗔雙眉倒車眼生筋溪山雲月誰為侶南北東西絶近鄰瞎堂遠浮杯和尚嗣馬祖一日凌行婆來禮拜師與坐喫茶婆乃問𥁞力道不得底句分付阿誰師曰浮杯無剩語曰未到浮杯不妨疑著師曰別有長處不妨拈出婆斂手哭曰蒼天中更添怨苦師無語曰語不知偏正理不識倒邪為人即禍生後有僧舉似南泉泉曰苦浮杯被這老婆摧折一上婆後聞笑曰王老師猶少機關在澄一禪客逢見行婆便問怎生是南泉猶少機關在婆乃哭曰可悲可痛一罔措婆曰會麼一合掌而立婆曰伎死禪和如麻似栗一舉似趙州州曰我若見這臭老婆問教口啞一曰未審和尚怎生問他州便打一曰為什麼却打某甲州曰似這伎死漢不打更待幾時連打數棒婆聞却曰趙州合喫婆手裏棒後僧舉似趙州州哭曰可悲可痛婆聞此語合掌歎曰趙州眼光爍破四天下州令僧問如何是趙州眼婆乃竪起拳頭僧回舉似趙州州作偈曰當機覿面提覿面當機疾報汝凌行婆哭聲何得失婆以偈答曰哭聲師已曉已曉復誰知當時摩竭國幾喪目前機頌曰掌內摩尼曾不顧誰能護惜娘生袴浮杯不會老婆禪直至如今遭點污徑山杲三電光石火尚猶遲伎死禪和那得知轉面回頭擬尋討夕陽已過緑梢西眼光爍破四天下婆子拳頭無縫𦉑當機覿面事如何猛虎脊梁誰解跨動絃別曲葉落知秋擬議不來休休休休中菴空行婆能擊塗毒鼓遠近聞之皆膽怖唯有南泉與趙州同死同生殊不顧阿呵呵伎死禪和不奈何佛𪫬泰年少行藏獨倚樓一家女子百家求只因不入浮杯綱對鏡看看白𥁞頭笑翁堪潭州龍山和尚亦云隱山嗣馬祖洞山與密師伯經由見溪流菜葉洞曰深山無人因何有菜隨流莫有道人居否乃共議撥草溪行五七里間忽見師贏形異貌放下行李問訊師曰此山無路闍𥟖從何處來洞曰無路且置和尚從何而入師曰我不從雲水來曰和尚住此山多少時耶師曰春秋不涉曰和尚先住此山先住師曰不知曰為甚麼不知師曰我不從人天來曰和尚得何道理便住此山師曰我見兩個泥牛闖入海直至于今絶消息頌曰泥牛入海無消息天上人間何處覓謂言春去秋復來步步乘騎得渠力保寧勇撥草瞻風海上遊海山深處葉隨流相將行到水窮處果見厖眉老比丘這比丘冷啾啾清風為線明月為鈎一合乾坤作釣舟孤峯絶頂垂綸坐不風流處也風流南堂興眼目高低鼻孔橫淺深輕重不多爭蚊虻蠆上挨肩入鸑鷟牙根借路行便把長河攪酥酪敢將粟柄作禾莖隱山未是潛身處出沒任他烏兔更瞎堂遠襄州龐蘊居士見馬祖初謁石頭乃問不與萬法為侶者是甚麼人頭以手掩其口豁然有省後參馬祖問曰不與萬法為侶者是甚麼人祖曰待汝一口吸𥁞西江水即向汝道士於言下䪺領玄旨頌曰一口吸𥁞西江水萬古千令無一滴要知儻理不儻親馬祖可惜口門窄白雲端風吹日炙露尸骸泣問仙人覔地埋忍俊不禁多口老陰陽無處可安排保寧勇吸𥁞西江向汝道馬師家風不草草截流一掉破烟寒天水同秋清渺渺天童覺一口吸𥁞西江水洛陽牡丹新吐蘂簸土楊塵勿處尋擡眸撞著自家底五祖演一口吸盡西江水道頭便合自知尾可憐龐老馬大師相逢對面千萬里佛鑑勤一口吸𥁞西江水大師也是不得已偶被龐公借問來𥁞力道得只如此文殊道借問乾坤獨步人全提分付太言親西江吸𥁞無㳙滴誰解喉門鎖要津石門易一口吸𥁞西江水鷓鴣啼在深花裏自有知音笑點頭其來不入聾人耳寶峯照一口吸𥁞西江水領上桃花香撲鼻枝枝葉葉𥁞含春也是因我得禮你高菴悟大海波濤闊小人方寸深海枯終見底人死不知心鼓山圭一口吸西江通身不隱藏聖凡不到處頂上放祥光椘安方一口吸𥁞西江栗𣗥𡎺殺老龐當陽若也吞得管取海內無雙圓悟勤一口吸𥁞西江水㳙滴不留洪浪起駒兒自是不尋常嘶風弄影斜陽裏白楊順一口吸𥁞西江馬駒殺老龐不用燒錢引鬼自然安貼家邦尼無著總吸𥁞西江今古無雙及第歸也本身妵龐典牛游龐公孰謂問頭親馬祖言猶泥齒唇吸𥁞西江禁不住嶮崖句裏笑翻身水菴一一口吸𥁞西江水碓觜生花猶未已葉葉枝枝垂雨露須藏在針鋒裏大禪明一口吸𥁞西江水龐老不曾明自己爛醉如泥膽似天鞏縣茶瓶三隻觜松源嶽密呾哩狐密咀哩智開口動舌是甚滋味㘞你莫癡簡堂機西江一吸了無餘突出堂堂大丈夫𥁞道世間胡赤誰知更有赤胡密菴傑稱鎚搦出油間言長語休腰纏十萬貫騎鶴上揚州堂仁淨裸裸赤灑湎沒可把喏可知禮也退菴休一口吸𥁞西江水千手大悲提不起碓觜生花春畫長狸奴白牯皆歡喜普菴玉一著高一著一步闊一步馬駒殺人住住住住住枯禪鏡居士見丹霞霞作走勢士曰猶是拋身勢作麼生是嚬呻勢霞便坐士向前以柱杖畫個七字於下畫個一字曰因七見一見一忘七霞便起去士曰更坐少時猶有苐二句在霞曰向這裏著語得麼士遂哭出去頌曰因七見一見一忘七月在中央天無四壁十方虛空掃踪滅跡通身是口說不出青黃碧緑亂搽抹嗄南堂興因七見一尋踪訪跡見一忘七青天白日苐二句中因凶得吉掛劒虛堂歸去來忠之言難可失哀哀哀方菴顯居士訪丹霞於霞前立少時便出去霞不顧士却來坐霞却來士前立少時便歸方丈士曰汝出我入未有事在曰者老翁出出入入有甚了期士曰略無些子慈悲曰引得個漢到這田地士曰把甚麼引霞拈起居士幞頭曰恰似一個師僧士拈幞頭安霞頭上曰恰似一個俗人霞應喏三聲士曰猶有些子氣息在霞拋下幞頭曰大似個鳥紗巾士亦應喏三聲師曰昔時氣息爭解忘得士彈指三下曰動天動地頌曰一出一入徐行欵步庠序威儀風流俏措互換誰分僧俗禮於茲富足正覺逸丹霞與龐公終日用神通是處游歷𥁞全身遍界中千峯勢到嶽邊止萬𣲖流歸海上融大圓智燒木佛老有甚心肝賣笟籬翁家破人殘相追相逐相激相歡難難倚天長劒兮射斗光寒攪海蒼龍兮不觸波瀾看看家家有路透長安南堂興居士見丹霞來遂不語亦不起霞乃提起拂子士便拈起槌子霞曰只與麼別更有在士曰此回見師不似於前曰不妨減人聲價士曰本來要折倒汝一上曰與麼則啞却天然口去士曰汝啞却本分猶纍我啞却霞擲下拂子便行士召然闍𥟖霞不顧士曰不為患啞兼亦患聾頌曰丹霞初訪龐公日覿面分明竟不言堅拂只因無外物拈捶何別有天然回頭患啞真兼實拂袖如聾外復玄欲得會師相見處石人行處笑喧喧般若柔古人覿面機相見無可道堅拂有丹霞拈槌是龐老龜毛逐語斜兔角隨意倒患啞仍患聾分明好更好汾陽昭動絃別曲葉落知秋聾畜槌拂彼此相酬有意氣時添意氣不風流處也風流塗毒䇿掛角羚羊亡氣息倚天長劒用無痕纖波不動寒蟾影無限魚龍暗吐吞正覺顯居士因辭藥山山命十禪客相迭至門首士乃指空中雪曰好雪片片不落別處有全禪客曰落在甚處士遂與一掌全曰也不得草草士曰恁麼稱禪客閻羅老子未放你在曰居士作麼生士又掌曰眼見如盲口說如啞雪竇顯別云初問但握雪團打復頌曰雪團打雪團打龐老機關沒可把天上人間不自知眼裏耳裏絶瀟灑瀟灑絶碧眼胡僧難辨別龐公全提滴水滴凍藥山闍𥟖兩眼定動機不發時一場困夢本自天真阿誰解用真淨文全禪相送龐公正值滿天雪下片片不落別處可憐有口如啞直饒握得成團鷂過新羅去也解道前路善為免得東打西打也大奇三年留客住莫待去時飢上方益三尺寒光射斗牛鏌鎁提處鬼神愁蠻夷不識將軍令誤入重圍血頸流冶父川禪師頭上漫漫腳下漫漫拄定即易瞥轉還難金剛寶劒逼人寒不墮機鋒句外看石溪月雲居悟曰若有人問雲居落在甚麼處即向伊道落在雪裏大衆會麼頌曰落在雪裏不犯腳手釘觜鐵舌也難下口揮掌雪團劈面來打著金剛腦背後居士有偈曰有男不婚有女不嫁大家團欒頭共說無生話頌曰收拾山雲海月情團欒鼻直眼眉橫龜毛拂子兔角杖敲得虛空嚗嚗聲石溪月春至花開秋後葉落父子團欒識甚好惡枯禪鏡不說是不說非楊眉瞬目奸裏放癡父慈子孝無他事渾家一味討便宜尼間林英男兒懶墯女無良多口翁翁快口娘討𥁞便宜不知足何曾有個會無生間極雲居士偈曰十方同聚會個個學無為此是選佛場心空及第歸頌曰幞頭塵土靴襴破選佛場中無兩個若道心空及第歸頂上一槌難放過佛慧泉風月山川共一家誰來語下定龍蛇太白不曾登便殿筆頭昨夜自生花心聞賁喪盡生涯賣笟籬白拈火裏討便宜看來伎倆只如此也道心空及第歸佛照光居士一日曰難難十石油麻𣗳上攤婆應聲曰易易百草頭邊祖師意靈照曰也不難也不易飢來喫飯困來睡頌曰口子喃喃略不休把却笟籬做火遊有個女兒不肯嫁他年定作老丫頭懶菴樞冤家復冤家面面咸相覩品弄沒絃琴清聲播千古息菴觀居士以家業𥁞投湘水女子靈照日將笟籬鬻於市中頌曰鬢角堆雲美態嬌笟籬數柄杖頭挑入廛寧可無人問撞著行家定不饒圓照本爺將活計沈江水纍如㳂街賣笟籬不是家貧連子苦此心能有幾人知無際𣲖父既心空及第歸女兒依樣畫蛾眉一家只了一家事那得間錢買笟籬居士因賣竹漉籬下橋典撲女子靈照一晃亦去爺邊倒士曰你作甚麼女曰見爺倒地某甲相扶士曰賴是無人見頌曰憐兒不覺笑嗄嗄却於中路碾泥沙黃龍老漢當時見一棒打殺者冤家黃龍南居士倒地靈照扶起乞兒技倆討甚巴鼻應菴華孝順藏五逆人前醜莫遮今生親骨肉夙世惡冤家南叟茂龐公倒地靈照扶起至今幾百年清風猶未已猶未已東海鯉魚千尺觜巳菴深居士坐次問靈照曰古人道明明百草頭明明祖師意如何會照曰老老大大作這個語話士曰你作麼生照曰明明百草頭明明祖師意士乃笑頌曰萬里無雲銀漢橫大方玄路等間行阿爺智量世希有女子圓光頂𩕳生或菴骵龐老家聲千古在說難說易互相酬就中靈照較些子祖意分明百草頭成首座居士將入滅謂靈照曰視日早晚及午以報照遽報日已中矣而有食也士出戶觀次靈照即登父座合掌坐亡士笑曰我女鋒捷於是更延七日頌曰家有全棚樂新翻調不同分明恨離別却是喜相逢西岩惠一櫚戲舞渾家樂鼓樂喧天恣攛掇戲衫卸下許誰知無端笑倒黃番綽北海心居士臨示寂州牧于公頔問疾次士謂之曰但願空諸所有慎勿實諸所無好住世間皆如影響言訖就枕公滕而化頌曰欲識窮源處何人為指迷夕陽雞犬外桃李自成溪虛堂愚龐婆入鹿門寺作齊維那請疏意回向婆拈梳子插向髻後曰回向了也便出去頌曰龐婆移轉髻邊梳一假風流舉世無萬事但將公道斷維那不用筆頭書慈受深維那對衆要宣揚返被婆婆笑一場挈轉牙梳重注腳相逢猶更錯商量呆堂定
