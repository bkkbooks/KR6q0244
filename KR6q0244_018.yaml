斤不用稱稱頭那肯坐於蠅一念才生筋骨露徒勞更覔定盤星北塔祚五彩畫牛頭黃金為點額春晴二月初農人皆取則寒食賀新正鐵錢三五百福嚴雅金烏急玉兔速善應何曾有輕觸展事投機見洞山跛鱉盲龜入空谷花簇簇錦簇簇南地竹兮北地木因思長慶陸大夫解道合笑不合哭雪竇顯三年一閏大家知也有顢頇不記時昨夜鴈回沙塞冷帶霜梧葉又披披投子青火麻皮子若何分臘雪煎茶解醉君更有路行人未到野花含笑舊枝春法昌遇打鼓弄琵琶相逢兩會家去年一百五令嵗又還他浮山遠橫眸讀梵字彈舌念真言吹火長尖觜柴生滿竈煙大愚芝如何是佛麻三斤咄大地茫茫愁殺人翠岩真一片初生月蛾眉畫碧空水中魚避釣雲外鳥防弓野軒遵問佛三斤麻齋僧怕夜茶春來寒食後古木噪寒鴉海印信同袍參學問通津來扣宗師佛正因為説三斤麻最好三斤天下説尖新幾多匠者頻拈掇奈緣緇素有踈親子今更為重稱過那吒太子析全身道吾真洞山有語麻三斤衲子擎拳問要津因憶舊年看草字張顛顛後更無人雲峯恱雲起千山曉風高萬木秋石頭城下水浪打釣魚舟佛慧泉斤兩分眀不負君眼中瞳子莫生瞋百年三萬六千日得欣欣處且欣欣白雲端洞山麻三斤分眀欠一著衲僧放不下尋言空摸索雲蓋智江南三月鷓鴣天雨過諸峯景物鮮行盡天涯諳世事買鞋須是大光錢三祖宗尺璧未為重片言不可輕領取鈎頭意莫認定盤星地藏恩南天地暖北天寒水陸相通見不難無限黃花兼翠竹任他千古往來看草堂清洞山的的麻三斤眀月堂前贈若人碧眼厖眉才舉首又隨雲雨暗驚神長靈卓三斤足稱洞山麻撥動錙銖萬里差啼淂血㳅無用處夜來依舊宿蘆花張無盡千峯勢到嶽邊住萬𣲖聲歸海上消迸出紅爐金彈子眼睛定動靣皮焦南華昺鴻鵠一舉千里飛鑽天鷂子與天齊鳳凰不是凡間鳥為瑞為祥自有時龍門遠洞山麻三斤真鍮不金將錢買五彩壁上畫天神琅瑘覺洞山麻三斤斤兩不謾人語稀難問事貌古易傳神慈受深現前三昧料水打碓漏泄天機失錢遭罪文殊能洞山佛話三斤麻縛殺藂林老作家最好風前一聲邃江城五月落梅華石眀鍾在扣谷受響池印月鏡含像曾非展事投機豈是預搔待癢點鐵成金舉直錯枉一箭雕一雙一摑血一掌君不見踈而不漏兮恢恢天網圓悟勤驢尾豬頭牛腳迹三斤麻皮露消息志公杖頭剪刀尺從來雨下階頭濕玉泉璉洞山老勿踈親答佛法麻三斤無靣目得人憎見淂徹賺殺人妙峯善水斷流山突兀為君放出遼天鶻擬欲風前瞬息時擡眸已是成窠窟非窠窟咄咄咄塗毒䇿洞山初因僧問如何是正法眼師曰紙撚無油頌曰洞山宗匠較些些紙撚無油驗作家老倒禪和針子眼説禪説道會如麻翠岩真洞山初上堂言無展事語不投機承言者喪滯句者迷還得麼你衲僧分上到這裏須具擇法眼始得秪如洞山恁麼道也有一場過且道過在甚麼處頌曰只要楔抽釘為人解粘去縛如何洞山老人先自螣蛇繞腳鼓山圭言無展事語不投機承言者喪滯句者迷逢人不得錯舉徑山杲展事無回互投機通一線洞山無眼筋入地獄如箭南岩勝金陵奉先深禪師嗣雲門同明和尚到淮河見人牽網有魚從網透出師曰眀兄俊哉一似箇衲僧相似眀曰雖然如此爭如當初不撞入網羅好師曰眀兄你欠悟在眀至中夜方省頌曰透網金鱗是衲僧鐵壁銀山膽不驚眀老三更方瞥地任教千嶂碧層層大溈智網中跳出便飛騰好箇天然俊衲僧何似當初未入網悟來方始是知音鼓山圭俊哉一跳透重淵霹靂追之去不還却笑龍門燒尾者依然點額在波瀾徑山杲師子咬人狂狗逐塊三十里來方始悟何似當初莫入去冶父川饒州薦福承古禪師嗣雲門即古塔主僧問如何是佛師曰莫莫又問如何是祖師西來意師曰莫莫頌曰古人一莫切忌啖啄臨濟權寄庫德山頓蕭索截斷佛祖機關顯出頂門一著子細審思量分眀欠一著且道欠那一著雪堂行莫莫拈出一條斷貫索任從我佛及衆生撩天鼻孔都穿却松源嶽韶州雙峰興福竟欽禪師嗣雲門僧問賔頭盧應供四天下還得遍也無師曰如月入水問如何是用而不雜師曰眀月堂前垂玉露水精殿裏粲真珠頌曰混而不雜體常虛雪月交光類莫如應處萬端無挂礙片雲自在卷還舒自得暉汝州首山省念禪師嗣風僧問如何是佛師曰新婦騎驢阿家牽曰未審此語甚麼句中𭣣師曰三玄𭣣不得四句豈能該曰此意如何師曰天長地久日月齊眀頌曰新婦騎驢阿家牽誰後復誰先張三與李四拱手賀堯年從上諸聖捴皆然起坐忪諸沒兩般有問又須向伊道新婦騎驢阿家牽神鼎諲得不得傳不傳歸根得旨復何言憶昔首山曾漏泄新婦騎驢阿家牽黃龍南手提巴鼻腳踏尾仰靣看天聽流水天明送出路傍邊夜靜還歸茅屋裏道吾真新婦騎驢阿家牽王老空中駕鐵船井底挂帆風勢惡須頂上浪滔天海印信新婦騎驢阿家牽傍觀笑渠顛倒顛歸來舉目暮雲合嶺上蟾蜍光未圓天寧璉七手八腳三頭兩靣耳聽不聞眼覷不見啼得血流無用處不如緘口過殘春保寧勇張顛不似首山顛不動毫芒百怪全猶淂黃龍再拈出四方眀眼若為傳新婦騎驢阿家牽低頭拾得一文錢十字街頭拍手笑東村王老屋頭穿真淨文首山有語古今傳此語休云返倒顛新婦醉騎驢子去是人笑道阿家牽佛國白新婦騎驢阿家牽面如滿月目如蓮更將羅袖相牽挽一假風流遍大千慈受深新婦騎驢阿家牽體假風流得自然堪笑效顰鄰舍女向人添醜不成妍天童覺莫問新婦阿家免煩上路波吒遇飯喫飯遇茶喫茶同門出入宿世冤家五祖演新婦騎驢阿家牽碧玉羅紋頂上旋播土揚塵尋不見元來只在舊山前文殊道新婦騎驢阿家牽萬里滄溟駕鐵船參差島嶼分諸國倣佛星河共一天南華昺阿家新婦兩同條咫尺家鄉路不遙可笑騎驢覔驢者一生錯認馬鞍橋鼓山圭新婦騎驢阿家牽步步相隨不著鞭歸到畫堂人不識從今懶更出人前徑山杲阿家新婦最相憐新婦騎驢家便牽幾度醉歸眀月夜笙歌引入畫堂前護國元新婦快騎驢阿家引鞭走石筍夜抽條靣南看北斗湛堂深新婦騎驢阿家牽草裏尋常万万千誰在後兮誰在先不須特地苦加鞭牧菴忠蹇驢須是阿家牽媳婦嬌癡懶著鞭在舍只知七十二出門方見化三千簡堂機首山因僧問親到寶山空手回時如何師曰家家門前火把子頌曰家家門前火把子今古分眀須記取五更鍾後聽雞鳴失曉朝官不帶帽石門聰門前火把寶山回玄學之徒遍九垓南海岸頭波浪起西番氊帽樣時栽翠岩真空手歸時誰肯信驢馱馬載入門來家家舉起火把子半夜天如白日開白雲端首山因僧問如何是佛法大意師曰椘王城畔汝水東流頌曰椘王古城畔汝水向東流兩岸競垂釣幾人能直鈎正覺逸椘王城畔水東流逐浪隨波早晚休誰謂謝郎生計在夜深眀月上孤舟佛慧泉椘王城畔水東流樹倒藤枯笑不休好是自從投子去更無人解道油油真淨文椘王城畔水東㳅今古朝宗是到頭逐浪隨波如未息輸他漁父泛孤舟溈山秀椘國城邊水去東發船便被打頭風蘆花灣裏𥊸漁唱尉斗煎茶銚不同三祖宗椘王城畔水東流日夜波濤去不休巖下忽逢湘水客謂言依舊注悠悠雲溪恭千波萬浪曾無盡去槳來帆浩莫窮謝客睡醒孤月白間吹一笛渡頭風普融平椘王成畔水東流南地禪僧北地遊眼目直教從淺辨權𢖍爭奈出常流金篦為子挑除翳驢上穿靴背打毬翠岩真椘王城畔水東流獨腳山魈踢氣毬貪著六么花十八斷頭船子下楊州瞎堂遠暑往寒來春復秋夕陽西去水東流茫茫宇宙人無那箇親曾到地頭雪岩欽首山因僧問如何是祖師西來意師曰風吹日𬉹頌曰日𬉹風吹不計年行人塵路辨應難擬心早已深三尺更教誰問箇中玄洞山聰風吹日𬉹少人知頂仰先賢對此機饒君曠劫生前會穿耳胡僧也皺眉法華舉曰𬉹風吹問袒來紅塵亘野眼難擡忙忙役役知多少二月春深動地雷翠岩真風吹日𬉹橫臥荒草觸著毒氣全身便倒天寧璉曰𬉹風吹也大奇根鏘匹馬將家兒皇圖自古元無事撥動煙塵更是誰三祖宗日𬉹風吹當路頭衲僧見後莫遲留我令到此堪惆悵葉落花紅經幾秋雲溪恭風吹日𬉹點朱點漆行人嗟嘆共誰相識汾陽昭首山拈竹篦示衆曰汝諸人若喚作竹篦則觸不喚作竹篦則背汝諸人且道喚作甚麼速道速道頌曰竹篦舉起成生殺豈可容人亂札錐劈脊一揮如薦淂銀山鐵壁也光輝照堂一拈起竹篦子如何便到家祕魔若不會隨後却擎叉鼓山圭背觸非遮護眀眀為舉揚吹毛元不動遍地是刀鏘徑山杲不觸又不背徒勞生擬議開口更商量白雲千萬里此菴元黑漆竹篦非觸背大地山河俱粉碎咬人獅子急反身莫學韓攎猶逐塊遁菴演罵他還自罵瞋他還自瞋戒之慎之出乎爾者反乎爾者也卍菴顏辨龍蛇眼定乾坤粲粲一天星斗分拈起竹篦言背觸眀眀刺腦入膠盆笑翁堪拈起竹篦行殺活令背觸交馳佛祖乞命無門開野干鳴獅子吼喪盡生涯不容開口虛堂愚首山示衆賔無二賔主無二主公案頌曰賔主有無俱遣外行藏須要出常情無棲泊處開門戶月到中霄不敢眀虗堂愚首山因僧問如何是學人親切處師曰五九盡日又逢春曰畢竟如何師曰冬到寒食一百五頌曰日暮陰雲郊野深重陽到後菊花新不因西嶠殘冰盡爭得東山一帶春投子青首山因僧問如何是菩提路師曰襄縣五里曰向上事如何師曰來往不易頌曰問路窮途擬進程緑楊鶯語送行人牌標五里向君説莫道常年不指陳投子青首山因僧問如何是學人用心處師曰怪你一問遲也頌曰未語難眀迷悟情發言方表赤心人秖貪進步求名玉爭信靈苗不受春投子青
