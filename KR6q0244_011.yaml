body:
  text: 僧錄司右闡教兼靈谷禪寺住持淨戒重校祖師機緣六祖下苐五世臨濟十七則睦州十七則烏石覩一則裵休四則嚴陽一則多福一則石梯一則大隨六則靈𣗳二則浮石一則靈雲五則俱胝二則未山𡰱一則鎮州臨濟義玄禪師嗣黃蘗初在黃蘗隨眾㕘侍時堂中苐一座即睦州勉令問話師乃問如何是祖師西來的的意檗便打如是三問三遭打遂告辭苐一座云早承激勸問話惟蒙和尚賜棒所恨愚魯且徃諸方行脚去座遂告檗云義玄雖後生却甚奇特來辭時碩更垂提誘來日師辭檗檗指徃大愚師遂叅大愚愚問曰什麼處來師曰黃檗來愚曰有何言教師曰親問西來的的意蒙和尚便打如是三問三轉被打不知過在什麼處愚曰黃檗恁麼老婆為汝得徹困猶覔過在師於是大悟曰佛法也無多子愚乃搊師永領曰適來道我不會而今又道無多子是多少來是多少來師向愚肋下打三拳愚托開曰汝師黃檗非干我事師返黃檗檗問曰汝回太速生師曰只為老婆心切檗曰遮大愚老待見與他一頓師曰說什麼待見即今便打遂鼓檗一掌檗唫唫大咲此依傳燈錄所載聡珠元本并聯燈錄五燈會元皆大同小異溈山問仰山臨濟當時得大愚力得黃檗力仰云非但騎虎頭亦觧把虎尾頌曰睡眼三番打不開忽然狂踙吼如雷君看馬帶紅纓𥿈只是去年曾秀才野軒遵一拳拳到黃鶴樓一趯趯翻鸚鵡洲有意氣時添意氣不風流處也風流白雲端雷電喧轟海岳𠯑一家愁閉雨中門狂風忽起烏雲散白日滿天星斗分保寧勇雷電風行便合𠇲巨鼇無便上灘頭反身一吸滄溟竭鍾皷山河四百州照覺捴便言佛法無多子大丈夫兒肎自乖肋下三拳明有信不黃檗付將來真淨文樷林猛烈是黃檗拈棒便打途中客回到大愚却知恩老婆面上與一摑黃檗勝一槌便當未為奇六十山藤是太遲至竟不能知痛痒上堂猶道拂蒿枝佛國白三度龍門點額回高安灘裡浪如雷湧身再向洪波激透出滄溟眼便開雲溪恭九包之𨿅千里之駒真風度籥露機發樞劈面來時飛電卷迷雲破處太陽孤捋虎見也無箇是雄雄大丈夫天童覺點額三回下禹門雙腮曝日赤如焚一朝忽透桃花浪騰騰頭角生風雲風雲生𠔃不可㽞揚髫獵獵歸瀛洲老龍相見還相問吐出明珠更不羞上方益問的的意不是作戲三轉被打有甚巴鼻旻古佛鷲峯痛打不死高安輕撥便活見機獨露三拳當鋒誰辨一喝長靈卓臨濟度三夏不㕘黃檗禪上來六十棒手脚遂忙然忽悟婆心切反行肋下拳無人知此意林下憶三玄張無盡劈開華岳連天色放出黃河到海聲瞎驢死後蒿枝折大地如今有幾人龍門遠資糧更不著些些岐路年深恐轉賖直下痛施三頓棒夜來依舊宿蘆苓真淨文打破當年山鬼窟豁開正眼耀𠃵坤三拳肋下無多子一喝雷轟迸海門佛𪫬泰黃檗棒頭曾不顧高安拳下錯商量茲徧界生荊𣗥佛法初無一寸長佛照光棒下承當早自欺𦗟人饒舌固非冝縱知佛法無多子爭佀當時未問時遯菴演黃檗堂前喫棒去大愚肋下築拳來若言佛法無多子到底分明眼未開誰菴演一䪺渾家盡滅門更加兩頓累兒孫銀山鐵壁俱穿透萬里無雲宇宙分密菴傑黃檗高安老骨撾端居寰海定龍蛇尿床鬼子無巴鼻一箇葫蘆販兩家笑翁堪黃檗山頭喫棒大愚肋下築拳佛法的的大意猶隔十萬八千破菴先三度扣關轉不開赤手迢迢空徃來忽然業鏡百雜碎始覺前滿面灰木菴永禍福無門口自招三遭瞎棒打驢腰可憐敗國亡家恨萬古春風吹不消天目禮臨濟師黃檗何曾把手行堂腮并築肋孝順兩邊生朴翁銛𣗳鳴條浩浩風雨雲反覆在其中千波萬浪驚天地到海方知信不通虛堂愚臨濟出世後唯以棒喝示徒凡見僧入門便喝頌曰臨濟喝霹靂一聲邪腦裂忽然透出蒼龍宂擊碎明珠抝角折海印信入門便喝已是忉怛無限杜禪和由更論該括大洪恩萬里青霄絕點塵一聲霹靂震𠃵坤茫茫宇宙人無幾箇如今有腦門白雲端一劍定𤇆塵憑何辨主賔梯山齊入貢誰識聖明君大洪遂當鋒喝喝震春雷萬蟄龍蛇眼豁開忽若反身無伎倆任千古臥塵埃佛國白驀然一喝迅雷奔蟄戶雖開命少存若有轉身方用路休觀芳草怨王孫道塲如赫日光中轟然霹霹禹門浪急風高無限錦鱗點額普融平一喝當機疾怒雷爍迦羅眼頂門開西天四七二三老那箇堪任這一槌佛心才順𨒫無蹤聖凡泯迹白日青天雷奔電激正法眼藏滅無傳臨濟老漢白拈賊雲岩因驀地如雷喝一聲聖凡此不㽞情直饒刦火焚三際此喝常存性轉明雲盖昌蟄戶幽扄凍不開虛空忽震一聲雷龍一一拏雲霧蚯蚓頭頭食土埃張無盡入門便喝全無巴鼻引得兒孫美粥飯氣徑山杲張公未醉李公扶此嘉聲滿道途却被金剛開口咲誰能愛你護身符佛燈珣龍控懸河海月秋𤇆霞風雨一時𭣣波濤急急人難會截断千江水不流剋符道者入門便喝絕商量空奮雙拳立紀綱反轉殺人三角眼樷林千古受灾殃佛照光喑嗚叱咤萬人氣索佛法商量猶欠一著𡰱無著捴相逢便喝忉忉怛怛十字街頭打併榼典牛游喝下忽雷驚聲前休領略當鋒囓鏃時蹉過苐一著不在壁立處豈向平地泊野水白連天秋空飛一鴞應菴華之乎者也雪月風芲頭面各別事同一家或菴躰晴空轟霹靂官路栽荊𣗥沒興遭逢著前㐫後不吉無凖範臨濟囙黃檗普請鋤茶園檗後至師問訊按钁而立檗曰莫是困耶師曰纔钁地何言困檗便打師接杖推倒檗呼維那拽起我來那拽起曰和尚爭容得這風漢檗却打維那師钁地曰諸方即火葬我這裡活埋頌曰奪旗掣皷著精神父子雖親法不親為報四方禪客道等閒莫作守株人真淨文百頭馬裏一頭騾踢踏縱橫不奈何今日風顛臨濟是却令黃檗打維那佛鑑懃黃檗倒地維那扶起火葬活埋清風未已真如喆黃檗活作死醫臨濟死作活用維那聽事不真未免喚鍾作甕月堂昌臨濟㘽私次黃檗曰深山裏㘽許多作麼師曰與後人作古記乃將鍬拍地兩下檗拈起拄杖曰汝喫我棒了也師作噓噓聲檗曰吾宗到汝此記方出頌曰帶礪山河畫土疆漢高殿下有張良千言萬語無人會又逐流鶯過短墻翠岩真手裡钁頭今日用喻已玉石千鈞重直饒八臂大那吒盡力搖來搖不動佛鑑懃風吹雨打莭還枯千尺龍蛇插太虛堪咲兒孫無伎倆一生此被搽糊懶菴樞臨濟示眾曰汝等諸人赤肉團上有一無位真人常向諸人面門出入汝若不識但問老僧時有僧問如何是無位真人師便打云無位真人是什麼𠃵屎橛後雪峰聞乃曰臨濟大佀白拈賊頌曰卞璧無瑕奪日輝秦王雖愛不輸機可憐又入相如手一陣清風滿路歸佛印元春風浩浩烘天地是處山藏𤇆靄裡無位真人不可尋落芲又見隨流水白雲端播土揚塵沒處藏面門出入太郎當撒𡱁撒尿渾閑事浩浩誰分臭與香保寧勇眉橫鼻直眼睛烏擒住元來是鬼奴𡱁橛拋來渾不管看人猶自面糢糊上方益樷林獨步更無雙臨濟機鋒不可當至今四百年來事亦有兒孫再舉揚道場如無位真人面門出入凡聖不名死生何立雖然徧界不曾藏恍𠔃惚𠔃無處拾雲盖昌無位真人臨濟道勸君不用更尋討鳥道無功游者稀百尺竿頭要親到通照逢聲色不干眼耳天地本自同根岩下忽聞啼鳥反身又到松門佛心才無位真人赤肉團興來擺手出長安將軍自有嘉聲在不得封俠也是閑踈山常面門出入每相見日月由來不識真海岳慣游知己少反身㱕臥嶺頭雲踈山如面門出入見還難無位真人咫尺間去路一身輕似葉高名千古重如山鼓山珪腦後見腮村僧大開眼了作夢雖然趂得老鼠一棒打破油甕徑山杲萬法一如不用揀一如誰揀誰不揀即今生死本菩提三世如來同箇眼長沙岑赤肉團上無位真人左眼八兩右眼半斤貴買賤賣黃金白銀保寧勇漳泉福建頭匾如扇只可聞名不可見面真淨文好芲當面貼認著被渠使不認貼芲時滿口有牙齒無位真人處處獻新攔胸扭住不落主賔𠃵𡱁橛𠃵𡱁橛三人證龜作箇鼈月堂昌無位真人不隱藏面門出入露堂堂應機接物頭頭現直得家聲播大唐禾山方鑄印銷印全提正令要識綱宗不隔一瞬尼無著捴春雪滿空來觸處是芲開不知園裏樹那箇是真梅訥堂思棒頭落莭來反本閃電光中立信旗殃害樷林無雪處幾人錯認口頭肥或菴躰臨濟問院主甚處去來曰州中𥽀黃米來師曰雜得盡麼曰𥽀得盡師以拄杖劃一劃曰還雜得這箇麼主便喝師便打典座至師舉前話座曰院主不會和尚意師曰你又作麼生座禮拜師亦打頌曰功德天黑暗女有智主人俱不取後代兒孫渾莾鹵宏綱委地憑誰舉正覺逸院主下喝典座禮拜臨濟令行古今獨邁真如喆臨濟全機格調高棒頭有眼察秋毫掃除狐兔家風峻變化魚龍雷火燒活人劒殺人刀倚天照雪利吹毛一等令行滋味別十分痛處是誰遭天童覺寶劍持來刃佀霜幾回臨陣斬蠻王有情有理俱三叚一道寒光射斗傍白雲端𥽀米闍𥟖意氣驕輕如春雪自飄飄纔方落地人皆愛力不禁風當下消佛鑑懃一堆紅燄亘晴空不問金銀銕錫冋入裡盡教成水去那容蚋泊其中徑山杲萬里無雲青天白月斗轉星移雷奔電激展得勝旗奪連城壁唱太平歌吹無孔笛南堂興吹毛在握逞全威不許依門傍戶窺是聖是凡俱坐斷直教千古轉光輝塗毒䇿行喝也打禮拜也打臨濟大師可知禮也巳菴深不問是誰俱截斷殺人湏是上將軍棒頭有眼明如日要識真金火裡看無禪才臨濟到京行化至一家門首曰家常添鉢有婆曰太無厭生師曰飯也未曾得何言太無厭生婆便閉却門頌曰千尺𮈔綸直下垂錦鱗撥剌上鈎時斜風細雨歌歸去醉倒蓬窓百不知別峯印家常添鉢繞村行驀地一聲無厭生化主分明嫌少在籬門掩却強惺惺天目禮添鉢家常乞食時柴門掩處莫遟疑白牯手叚重拈起鐵眼銅睛換却伊野牛平蠅見血鶻提鳩拳來踢報膠漆相投難提掇處轉風流虛堂愚臨濟陞堂有僧出師便喝僧亦喝便禮拜師便打又有僧來舉起拂子僧禮拜師便打又有僧來師亦舉拂子僧不顧師亦打又有僧來㕘師舉拂子僧曰謝和尚指示師亦打雲門代云秪冝老漢大覺云得即得猶未見臨濟機在頌曰大抵宗師謁者難得盤桓處且盤桓儂家自有同風事蘆管橫吹宇宙寬翠岩真主賔都落苐三機陣陣開旗不展旗石火光中分勝負倒騎鐵馬上湏彌鼓山珪五月五日午時書赤口毒舌盡消除更饒急急如律令不湏門上畫蜘蛛徑山杲棒頭有眼眼裡無筋多逢濁富罕遇清貧自入洞門𤇆鎻斷不知世上幾經春雪菴瑾閃電光中賔主分虛空背上立綱宗祖師活計只如此後代兒孫掃地空松源岳臨濟上堂次兩堂首座相見同時下喝僧問師還有賔主也無師曰賔主歷然師名眾曰要會臨濟賔主句問取堂中二首座頌曰兩堂上座緫作家其中道理有分拏賔主歷然明佀鏡宗師為點眼中芲汾陽昭啐啄之機箭拄鋒瞥然賔主當時分宗師憫物垂緇素北地黃河徹底渾慈明圓箭鋒相拄自譊訛李廣雙鵰射得多堪咲人來望天際歷然飛鷂過新羅佛印元兩堂上座齊下喝眼裡瞳人帶金屑錐刀同用不能分黑漆崑崙迷夜月浮山遠一喝湏教水𨒫流歷然賔主未輕酬當人若觧通消息半夜扶桒出日頭海印信兩堂齊下喝歷然分賔主著此機關南金賤如土地藏恩賔主歷然句下分三玄此振𠃵坤如今多少途中客盡日區區獨自奔雲溪恭兩陣交鋒作者機當人施設在臨時若逢李廣將軍手定國安邦付與誰草堂清離婁明不到師曠𦗟亦訛箇中識賔主日午下星河黃龍震以平報不平王法本無親臨濟雖明眼也是黃龍精徑山杲兩堂齊喝主賔分照用同時透