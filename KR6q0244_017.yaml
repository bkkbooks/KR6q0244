body:
  text: 僧録司右闡教兼靈谷禪寺住持淨戒重校祖師機緣六祖下第七世韶州雲門文偃禪師嗣雪峯師示衆曰人人自有光明在看時不見暗昏昏作麼生是諸人自己光眀自代云厨庫三門又云好事不如無頌曰自照列孤眀為君通一線花謝樹無影看時誰不見見不見倒騎牛兮入佛殿雪竇顯徹底昏昏不待看拄天拄地黑漫漫三門厨庫長相對一徑松風滿院寒白雲端恍恍惚惚若亡若存築著磕著厨庫三門金烏照不破玉兔又西奔不知是何物能為天地根佛心才夜眀簾外千峯秀鸞鏡臺前萬象殊掃蹤滅迹不立錙銖誰為佛殿誰是香厨敲出鳳凰五色髓擊碎驪龍眀月珠圓悟勤黑黑無問東西與南北厨庫三門相對高撑天拄地同聚墨雖然好事不如無敢保韶陽會不得正覺逸人人自有光明在看時不見暗昏昏踢倒三門與厨庫此時明暗自然分蔚嘯岩雲門上堂乾坤之內宇宙之間中有一寶祕在形山拈燈籠向佛殿裏將三門來燈籠上作麼生自代云逐物意移又曰雲起雷興頌曰看看古岸何人把釣竿雲冉冉水漫漫明月蘆花君自看雪竇顯嶺上白雲舒復卷天邊皓月去還來低頭却入茅薝下不覺呵呵笑幾回白雲端看看野草間花極撩亂三月洞江上春煙霄飛過瀟湘岸溈山秀帝網交羅幾萬般形山消殞影團團拈來不是無尋處只在乾坤宇宙間佛心才虎豹文章麒麟頭角輝天燦地堆山積嶽拶破靣門兮蓋色騎聲截斷羅籠兮解粘去縛罷却干戈百草頭萬里秋天飛一鶚圓悟勤開眼也著合眼也著擬議躊躇放過一著遁菴演隱隱煙村聞犬吠欲尋尋不見人家忽於橋斷溪回處流出碧桃三四花斷橋倫雲門示衆曰十五日已前不問汝十五日已後道將一句來衆無對自代曰日日是好日頌曰去却一拈得七上下四維無等匹徐行踏斷流水聲縱觀寫出飛禽迹草茸茸煙空生巖畔花狼籍彈指堪悲舜若多莫動著動著三十棒雪竇顯日日是好日風來樹點頭九江煙靄裏月上謝家樓海印信日日是好日誰言無等匹甜瓜徹蒂甜未必甜如蜜大洪恩冰消河北岸花發樹南枝到處有春色天涯亦早歸上方益破二作一分三成六著串數珠數不足南辰信手攀北斗回身觸豁開戶牖正當軒玉兔金烏如轉軸傳不傳得不得那知陌上春條緑圓悟勤日日是好日佛法世法盡周畢不須特地覔幽玄只管鉢盂兩度濕尼無著捴雲門上堂聞聲悟道見色明心遂舉起手曰觀世音菩薩將錢買糊餅放下手曰元來秪是饅頭頌曰買得欣欣急走歸不知放手却成非直饒超過毗盧頂也落韶陽苐二機上方益小院春風特地寒佳人寂寞倚闌干斷腸曲調無人聽更把琵琶月下彈慈受深見色心光現聞聲道已彰掣電光中分皂白海潮音裏辨宮商韶陽老慈門普發機直用千鈞弩圓悟勤見色眀心事已差聞聲悟道更交加觀音妙智慈悲力荊𣗥林中優鉢華徑山杲南無觀世音菩薩補陀巖上紅蓮舌不知成佛是何時打刀須是并州鐵鼓山圭撲落非他安排不多蓋覆自在隱顯包羅擡頭失却舊時路拈篙便上別人渡轉易作難貧成富千人萬人恁麼去月堂昌頓超見色聞聲句不涉明心悟道言花落烏啼巖下寺月明人喚渡頭船雪菴瑾一曲風前信是誰調高爭肯落今時見無人會曲中意又把雲簫特地吹簡翁敬雲門每見僧必顧視曰鑒僧擬議乃曰咦後德山圓明大師刪去顧字謂之抽顧叢林目雲門顧鑒咦有抽顧頌頌曰雲門抽顧笑嘻嘻擬議遭他顧鑒咦任是張良多計䇿到頭於此也難施北塔祚雲門抽顧自有來由一點不到休休休休真淨文韶陽一鑒生鐵餕餡直下咬破莫怪相賺鼓山圭雲門抽顧頌衲僧眼皮重眼皮重七八量雷車打不動打不動抽顧頌時念陀三兩聲追薦東村李鬍子生西天山裏孟八郎強健福田院裏貧兒呌喚乞與我一文大光錢五祖戒韶陽為人最急切未入門來已甄別若於顧鑒裏承當大棒打落天邊月典牛遊雲門因僧問如何是和尚家風師曰門前有人讀書頌曰藂林在處有家風且與雲門事不同門外若有讀書者任是顏回亦不通北塔祚家風施設不無私獨有雲門語可疑偏囑讀書人若到急來通報汝須知為他老杜王摩詰愛我高吟落韻詩覺海元讀書人到切須看無絃難遇知音者端的家風説與君沒階趨進翼如也佛慧泉讀書人報來豈在之乎者孔子與周公皆不及門也天目禮雲門因僧問如何是祖師西來意師曰日裏看山頌曰日裏看山也是常西來祖意謾商量金毛獅子希逢有多是狐狸喚作狼北塔祚日裏看山好清風拂白雲夜來何處火燒出古人墳東京淨因佛日日裏看山滿眼青千巖萬壑鬪縱橫洞門疑是雲遮斷到者須知路坦平楊無為日裏看山言簡語端後進初機切在諦觀黃檗勝匡真不惜兩莖眉日裏看山對祖機臘月火燒春又緑只冝飛走會相依三祖宗兩餘江上兩三峯堆疊煙嵐不記重眼裏看來端的瞎耳根聞處出天聰佛鑑勤坦然曾問老師安爭似韶陽一句傳日裏莖山仙掌露夜深猿呌月當軒投子青日裏看山大難大難重重峭壁疊疊危巒只見嵐光拂拂爭知瀑布潺潺上方益日裏看山好好在什麼處要見老雲門不落苐二句月林觀日裏看山酬所問分明開口見心肝若於句裏求宗旨墮在嵳峩疊嶂間退耕寧雲門因僧問如何是透法身句師曰北斗裏藏身頌曰藏身北斗最分明只為人多見不精巧妙妄陳心意解却如平地作深坑昏燈日晝何曾易青竹黃花滿地生汾陽昭老倒雲門泛鐵船江南江北競頭看可憐無限垂鈎者隨例茫茫失釣竿雪竇顯雲門透法身法身何許人鴈回沙北塞鸚鵡戀西秦靈竹通南嶽峯高北嶽低行人泣淚兩遲疑火星昨夜移牛斗照見西瞿人不知投子青鑿斷龍門透碧津洪流驟雨豈停塵謫仙拏月沉江底漁舟笑殺謝家人天衣懷要透龍門特地難却成平地起波瀾凡鱗欲得風雷便且向桃花浪裏看佛印元人問透法身隨冝為指陳大地如膠漆長江波蹙顰法華舉北斗藏身句雲門道處看南辰分六角北斗七星攢春雨霏霏潤秋風颯颯寒崑崙牽白象歌謠入大安浮山遠北斗藏身為舉揚法身從此露堂堂雲門賺殺他家子直至如今謾度量玉澗林天上有星皆拱北人間無水不朝東時人欲識藏身處拈起簸箕別處春黃龍南雲門透法身從此沒踈親盡道和風暖三春寒更新道吾真東西南北上下四維橫身宇宙拶破須彌甘露天五陵公子遊花慣未第貧儒自古多冷地看他人富貴等間不奈幞頭何白雲端北斗藏身句有由未明南北起戈矛風清月朗無雲夜莫認文星作斗牛照覺總東湧西沒北斗藏身法王法令德非有鄰真淨文北斗藏身句最玄未明向上謾勞傳黃河輥底流今古華嶽三峯頭指天三祖宗藏身北斗最分明四畔無雲廓太清猿鳥自啼山自寂水流巖下響泠泠草堂清北斗藏身坐不安開軒落日倚危闌雲收月出空如水剎剎塵塵總一般佛心才何事文星與酒星一時分付與先生高吟大醉三千首留與人間伴月明五祖演透出毗盧頂上光夜來星轉斗中藏禪家不掐天師訣也解交乾步罡張無盡北斗藏身句商量幾萬般貪觀天上月誰覺骨毛寒踈山如雲門透法身分明語露親移步登山頂峯高與月鄰楚安方南北東西萬萬千乾坤上下兩無邊相逢相見呵呵笑屈指擡頭月半天普雲圓雲門透法身劃斷釋迦音文殊休惆悵普賢謾沉吟五祖戒北斗藏身事坦然法身無狀透何邊後人不曉前人意水底撑船捉月天法華舉北斗藏身句擬議即差訛鑽天白鷂子不戀舊時窠慈受深飽粥飽飯一味早眠晏起何待封侯典牛遊昨夜東風落萬紅半隨流水半隨風何須短艇撑明月自與桃源一派通開善祖藏身北斗道彌昌三腳蝦蟆著錦襠多少病貓食死鼠日中擡首眼無光東山空天地廣無邊何云藏北斗跛腳老雲門未明三八九天目禮北斗裏藏身虛空中出沒道得一句來日頭東畔出橫川珙雲門因僧問如何是一代時教師曰對一説頌曰對一説太孤絶無孔鐵鎚重下楔𨵻浮樹下笑呵呵昨夜驪龍拗角折別別韶陽老人得一橛雪竇顯對一説遼天鶻萬重雲只一突韶陽老韶陽老南北東西無處討正覺逸對一説卷盡五千四十八風花雪月任流傳金剛腦後添生鐵五祖演對一説何卓絶畐塞虛空一團鐵飢來不顧飯如雷箇箇聚頭爭嚙齧龍門遠對一説五教三乘盡該攝龍宮海藏任縱橫水底泥牛吞却月佛性泰海藏龍宮金文玉牒逗器觀機破關擊莭三百餘會振綱宗四十九年同箇舌阿剌剌對一説諦當之言如截鐵圓悟勤雲門因僧問不是目前機亦非目前事時如何師曰倒一説頌曰倒一説分一莭同死同生為君決八萬四千非鳳毛三十三人入虎別別擾擾匆匆水裏月雪竇顯倒一説清人骨萬里無片雲拋下一團雪別別老大禪翁甘滅舌正覺逸倒一説這饒舌無端都把天機泄四海九州徒蹶蹶飛出龍宮鑽蟻野軒遵是賊識賊以楔出楔鳥迹空雲鏡像水月教兒師子迷蹤訣上樹老貓安身法活鱍鱍倒一説等間翻却狐狸圓悟勤雲門因僧問如何是塵塵三昧師曰鉢裏飯桶裏水頌曰鉢裏飯桶裏水多口阿師難下觜北斗南星位不殊白浪滔天平地起擬不擬止不止箇箇無裩長者子雪竇顯朝打三千未為多暮打八百未為少鉢裏飯兮桶裏水人前切忌無分曉白雲端塵塵三昧彼彼不外千峯向嶽百川赴海更無一法不如來只箇堂堂觀自在天童覺見之不取思之千里杓聽將來笊籬無耳二月三月花開時路岐芳馥春風起直下是休擬擬鉢裏飯桶裏水湛堂凖鉢裏飯桶裏水關口見膽求知已擬思便落二三機對面忽成千萬里韶陽師較些子斷金之義兮誰與相同匪石之心兮獨能如是天童覺塵塵三昧鉢飯桶水雲門眼中者僧身裏捏合起來無處藏𡎺著磕著埋沒你月堂昌鉢裏飯桶裏水狗子咬人不露齒堪笑韶陽老古錐倒地至今猶未起無菴全南頭買貴北頭賣賤只可聞名不可見面且菴仁雲門因僧問如何是雲門一句師曰臘月二十五頌曰臘月二十五一曲超今古鎮州大蘿蔔生長在深土佛慧泉雲門一曲二十五不涉宮商角徵羽有人問我曲因由南山起雲北山雨黃龍南臘月二十五一曲無人舉韶陽老古錐屈指從頭數楊無為一曲韶陽古調清多年木石化為精廣陵傳去人何在留得杜鵑啼月明大洪遂臘月二十五騎驢不打鼓春風百草生冢上添新土真淨文臘月二十五韶陽曲調普欲會箇中意先天為心祖通照逢憶昔雲門老古錐曾將今日示當機奇哉二百年來事長作胡笳曲調吹圓通仙雲門曲調格何高轉使愁人不奈何明月清風無價數一時分付與仙陀長靈卓韶陽一曲二十五不屬五音亘今古剎剎觀音妙智力塵塵能救世間苦旻古佛臘月二十五雲門一曲新一回聞舉著笑殺洛陽人訥堂思臘月二十五雲門沒腸肚一曲盡情彈淳音超太古明眼衲僧休莽鹵肯堂充雲門一曲徹髓徹骨霽雪千峯寒梅破萼啐啄公子風流鳴木鐸松源嶽雲門一曲從來無譜韻出五音調高千古就中妙旨許誰知幾擬黃金鑄子期無凖範雲門因僧問如何是法身師曰六不收圓悟云一不立頌曰一二三四五六碧眼胡僧數不足少林謾道付神光卷衣又説歸西竺西竺茫茫無處尋夜來却對乳峯宿雪竇顯六不𭣣兮調最新能歌何待繞梁塵和風滿檻花千樹不換乾坤別是春白雲端一不立六不𭣣突然那更有蹤由無限青山留不住落花流水太悠悠圓悟勤村歌社舞那伽定疥狗泥豬清淨身透徹根塵無佛法優曇花現十洲春秀巖瑞六不𭣣一不立清淨法身何處覔夜來一陳吹葉風掃盡浮雲月照壁掩室開雲門因僧問如何是超佛越祖之談師曰糊餅頌曰超談禪客問偏多縫𦉑披離見也麼糊