body:
  text: 僧録司右闡教兼靈谷禪寺住時淨戒重校祖師機緣六祖下苐三世百丈海九則南泉願草七則鹽官安三則㱕宗常七則乳源一則大梅常四則五泄默一則洪州百丈山懷海大智禪師嗣馬祖師再參馬祖祖於禪床角取拂子示之師曰只者個更別有祖乃放舊處祖曰你已後將什麼為人師却取拂子呈之祖曰只者個更別有師以拂子掛安舊處方侍立祖振威一喝後檀信請住大雄山岩巒峻極故號之百丈師謂衆曰佛法不是小事老僧昔日被馬大師一喝直淂三日耳聾黃蘗聞舉不覺吐舌頌曰每因無事侍師前師指繩床角上懸舉放却㱕本位立分明一喝至今傳汾陽昭悟了遊方却再還全機大用久當權若無喝下忘知解良馬何曾離淂鞭佛印元大寂雄峯再會時相將行處草離離回頭一喝乾坤暗兩耳俱聾總不知正覺逸一喝叢林辨者稀耳聾今古強針錐燈籠拊掌呵呵笑露柱低頭却皺眉海印信一喝分眀守死灰青天赫日起風雷傍人拊掌呵呵笑唯有知音吐舌來淨照臻放收誰道沒譊訛漏泄機關見也麼一喝如雷聞者喪耳聾三日未為多佛慧泉未眀大智再參尋相逐相隨用不任斷浪絶流全體現一聾三日孰知音照覺總客情步步隨人轉有大威光不能現突然一喝雙耳聾𨚗吒眼開黃蘗面真淨文願視拈來事已同師資相見展家風因思昔日鼻頭痛一喝分明三日聾佛國白木馬殺閻浮人泥牛飲竭滄溟水霹靂滿空山嶽摧看看平地波濤起保寧勇馬祖親傳古佛心海禪百丈是知音當時一喝聾三日無見無聞直至今智海清雨霽遊雲尚未歸晴空忽地一聲雷嶺梅已得春消息不比山桃一例開上方益放去拈來更有誰青山時見白雲歸孤峯坐斷無餘事翻笑蟾輪對落暉京兆府天寧璉馬駒一喝大雄峯聲入髑髏三日聾黃蘗聞之驚吐舌江西從此立宗風張無盡百丈重來參馬祖相逢便指曹溪路休言一喝雙耳聾須知別有親聞處踈山常大機大用不虛傳掛拂遭呵豈偶然打破盡瓶歸去後從教千古黑漫漫南華昺掛拂遭呵耳便聾衲僧奚苦驗宗風金剛腦後抽生鐵華嶽三峯倒卓空龍門遠江西一喝動乾坤大用全機是滅門三日耳聾風過樹纍他黃蘗喪兒孫鼓山圭馬駒腳下喪家風四海從茲信息通烈火焰中攢得月巍巍獨坐大雄峯徑山杲掛拂親遭喝當下舌頭脫把起便相呈為君重提掇要知三日聾大地如塵末椘安方著船頭把釣竿浪粗風緊得魚難翻思幾處雲為兩只見四方爭出山翠岩真父子相逢臭味同龍泉寶劒再磨礱要明馬祖當年喝大地山河盡耳聾慈受深迅雷吼破澄潭月當下曾經三日聾去却膏肓必死疾叢林從此有家風虎丘隆一喝非唯三日聾龍威虎勢也潛踪從前汗馬無人識只要重論蓋代功訥堂思父子相將草裏遊人前拈弄幾包羞迅雷一震驚天地直得滄溟絶點流懶菴需頂門一擊塗毒鼓生殺全機振古今雪後始知松柏操事難方見丈夫心尼無著總馬駒蹴非驢事要使兒孫腳下行三日耳聾猶可怪謾勞灼卜聽虛聲牧菴忠喝聲絶處怒雷收喪盡家風一不留總是戰爭收拾得却因歌舞破除休石菴玿真金無變色因甚聾三日一字入公門九牛車不出肯堂充風雲會合又相期覿靣難明苐一機霹靂一聲天地迫西河師子却生兒龍牙言世路風波不見君愁腸暗寫共誰論迅雷才震清飈起白日一天星斗分木菴永匹馬單鎗與麼來鐵連之陳勢難開忽然一棒鑼聲響不動干戈得勝回野雲南一喝當頭雷電奔人聞說亦暗消魂看來豈止聾三日直至如今海嶽昏雪菴瑾啐啄之機類不同飛星撒火髑髏空偷心死盡難為語忽見金烏出海東虛堂愚溈山問仰山百丈再參馬祖竪拂因緣此二尊宿意旨如何仰曰此是顯大機之用溈曰馬祖出八十四人善知識幾人得大機幾人得大用仰曰百丈得大機黃蘗得大用餘者盡是唱導之師溈曰如是如是頌曰家肥生孝子國霸有謀臣拳頭劈口捶未到無兒孫龍門遠百丈侍馬祖遊山次見野鴨飛過祖曰是甚麼師曰野鴨子祖曰甚麼處去也師曰飛過去也祖𢬟師鼻頭師負痛失聲曰阿耶耶阿耶耶祖曰又道飛過去也師於此契悟頌曰野鴨飛空却問僧要傳祖印付心燈應機雖對無移動才𢬟綱宗道可增汾陽昭野鴨子知何許馬祖見來相共語話盡山雲海月情依然不會還飛去却把住道道雪竇顯師資間向草中行野鴨飛鳴意忽生鼻孔𢬟翻成底事新羅日午打三更智海清流水有西東蘆花無背向沙鳥忽飛來漁人驚夜唱誰道月明無處尋元來只在秋江上上方益野鴨過前溪千峯凜寒色相顧不知歸未免資傍擊破疑團葛怛銷梢風直上透青霄雲山海月渾餘事一語歸宗萬國朝圓悟勤馬師憫汝無知識借來野鴨通消息直得鼻頭鮮血流費盡老婆多少力佛鑑勤草裏尋常萬萬千報云飛去豈徒然鼻頭是甚間皮革十字縱橫一任穿龍門遠野鴨野鴨無來無去飛去飛來本無去住忽然把住鼻頭看大地山河全體露太平古野鴨羣飛勢莫留瞥然一過已高秋和聲著平生痛短綆毋勞繫鼻頭佛燈珣野鴨從空過張三逢李大岸上繫孤舟黃牛解拽磨白楊順心燈不可付祖印亦難傳野鴨飛過去得鼻頭穿橫川珙百丈侍馬祖遊山歸侍者寮哀哀大哭同事問汝憶父母耶師曰無曰被人罵耶師曰無曰你哭作什麼師曰我鼻孔被大師得痛不可徹同事曰有甚因緣不相契師曰你問取和尚去同事問馬祖曰海侍者有何因緣不契在寮中哭告和尚為某說祖曰是伊會也汝自問取同事歸寮曰和尚道汝會也教我自問汝師乃呵呵大笑同事曰適來哭如今為甚却笑師曰適來哭如今笑同事罔然頌曰一回思想一傷神不覺反然笑轉新雲在嶺頭間不徹水流澗下太忙生龍門遠有時笑有時哭悲喜交并暗催促此理如何舉向人斷絃須是鸞膠續徑山杲有時笑兮有時哭調高和寡難拘束一𣲖清音徹九天風前誰解聮芳躅妙峯善哭不徹笑不徹倒腹傾腸向君說父子非親知不知擡頭腦後三斤鐵松源嶽百丈因溈山五峯雲嵓侍立次師問溈山併却咽喉唇吻作麼生道溈曰却請和尚道師曰不辝向汝道恐已後喪我兒孫又問五峯峯曰和尚也須併却師曰無人處斫額望汝又問雲嵓嵓曰和尚有也未師曰喪我兒孫頌曰却請和尚道虎頭生角出荒草十洲春盡花凋殘珊瑚樹林日杲杲雪竇顯三和尚也併却龍頭陳上看謀略令人長憶李將軍萬里天邊飛一鶚和尚有也未金毛師子不踞地兩兩三三舊路行大雄山上空彈指三箇兒即盡長成大家將本去經營其間消折兄嫌弟也有贏錢弟怨兄保寧勇却請和尚道千人萬人所不到杲日朦朧海靣紅清風凜凜霜天曉佛鑑勤三和尚也併却後人要前人腳其餘利鈍不同途畢竟到頭輸一著和尚有也未且向自身明見地未能展翼逆風飛少逐青雲千里志百丈因僧問如何是奇特事師曰獨坐大雄峯僧禮拜師便打頌曰祖域交馳天馬駒化門舒卷不同途電光石火存機變堪笑人來捋虎雪竇顯巍巍獨坐鎮雄峯三尺龍泉握掌中堪笑人來挨白刃立為虀粉在誰躬正覺逸巍巍獨坐大雄山咳唾風生天地寒直下棒頭開正眼隔雲千里望長安野軒遵雄峯獨坐鎮巍巍四海歌謠滿路岐任是通身鋒刃者到來無不竪降旗海印信大機大用豈虛然獨坐雄峯是有權稍若錯傳王令者腦門須喫棒三千白雲端大雄峯頂獨巍巍直下橫分八字眉賴得縮頭知進退未嘗容易敢相虧保寧勇獨坐大雄峯言談宇宙空不行峯頂上四海路難通寶峯祥清風括地氣橫天獨坐雄峯有大權哮吼一聲岩洞裂更無狗迹到門前佛鑑勤醬裏著鹽雪中送炭才捋虎棒頭有眼怪來獨坐大雄山他家曾上頭關圓悟勤雄峯獨坐不囊藏捉敗分明已見贓設或更求奇特事野狐涎唾涴諸方無際𣲖百丈機先疾似風巍巍獨坐大雄峯要知奇特中奇特明月難教下碧空石田薰百丈每上堂有一老人常隨衆聽法衆退唯老人不退師問汝何人也曰吾非人也於過去迦葉佛時曾住此山因學人問大修行人還落因果也無某甲對曰不落因果遂五百生墮野狐身今請和尚代一轉語貴脫野狐身師曰汝問乃問大修行人還落因果也無師曰不昧因果老於言下大悟作禮曰某甲已脫野狐身住在山後敢乞依亡僧事例師令維那白椎告衆食後送亡僧衆驚異食後師領衆至山後岩下以杖挑出一死野狐乃依法火葬師至晚上堂舉前因緣黃蘗便問古人錯祗對一轉語五百生墮野狐身轉轉不錯合作個什麼師曰近前來與汝道蘗近前與師一掌師拍手笑曰將謂胡赤更有赤胡靈源和尚觀諸家頌野狐話復為頌曰明明道不落老人何曾錯的的言不昧百丈何曾會不會將不錯渾然宣妙覺不落與不昧卓尓摽正位全機因果有來由脫體升沈無忌諱非自非是誰是言下迷宗生擬議再問重教舉一回潛觀徹底起風雷逆風喝轉雷聲絶飲氣歸家藏醜拙他日如何舉似人雄峯撑破秋天月畫師畫地獄畫出百千般駐筆從頭看特地骨毛寒百丈政老人當日曾祗對五百生來由自悔一言才出駟難追纍他百丈成羣隊落不落昧不昧逃得須赴滄海寄語修行大徹人從來十字難更改佛印元不昧不落二俱是錯取捨未忘識情卜度執滯言詮無繩自縛廓爾太虛何處摸索海印信問來答去盡因緣流落寰區數百年自古自今諸衲子一人傳了一人傳淨照臻不落不昧成羣作隊師子咬人韓獹逐塊大洪恩大雄曾决野狐因五百生前錯墮身不落不昧如未曉年華又歷幾秋春照覺總五百生前墮野狐元來用處太心粗一字尚能招是報那堪心地更糢糊佛迹昱大雄山裏大雄師曾謂言中脫野狐一劒令傳家國靜狼烟無使息亨途三祖宗不落不昧僧俗本無忌諱丈夫氣宇如王爭受囊藏被蓋一條楖𣗖任縱橫野狐跳入金毛隊大庾嶺圓五百生前墮此身而今依舊入紅塵相逢盡道休官去林下何曾見一人真如哲二大冶紅爐烹佛烹祖規模鎔盡識者罔措六合英雄無限幾箇能知痛癢臨川羡人取魚不如歸家結網寶峯祥百丈親曾見野狐為渠參請太心粗而今敢問諸禪客吐得狐涎盡也無枯木成不落與不昧依前入皮袋不昧與不落皮袋俱拋却令人長憶李將軍萬里天邊飛一鶚草堂清萬丈洪崖倚碧空人間有路不能通奈何一點雲無得舒卷縱橫疾似風兜率恱臨機只為語偏枯五百生來墮野狐姹女已歸霄漢去呆郎由自守寒爐圓通仙韓信收齊密用機食其烹處共攢眉到頭自有榮身計蓋代之功復是誰道場如入骨忿難攄背楚復投吳將謂胡鬚赤更有赤鬚胡雄峯常獨坐寥寥鎮八隅黃龍震大智虛明徹果因一言超脫野狐身雄峯極目烟霄裏列耀分輝拱北辰雲溪恭百丈堂前驗野狐還如水上捺葫蘆而今到處全機入便好當場捋虎鬚禾山方江北江南問野狐只因昧落有差殊鴻門一開雙扇那箇男兒是丈夫上方益百丈野狐因果何如善財未了再見文殊溈山秀不落與不昧當機無人會一箇老狐兒走入金毛隊羅漢南大雄山下古路縱橫野狐岩中師子踞地狂風蕩盡落殘花獨有清香來撲鼻佛心才不落分明不昧親老人何事脫狐身丈夫氣𨦣衝牛斗方見臨危不悚人踈山常化形來問大修行當下金篦刮眼睛轉得野狐成百丈夜來依舊野干鳴張無盡魚行水濁鳥飛毛落至鑒難逃太虛寥廓一往迢迢五百生只緣因果大修行疾雷破山風震海百鍊精金色不改圓悟勤醉眠醒臥不歸家一身流落在天涯祖佛位中留不住夜來依舊宿蘆花龍門遠不昧與不落老人何太錯不落與不昧分明如是對重舉示諸人諸人會不會萍蕪斷處是青山行人更在青山外文殊道修行不落與不昧盡作野狐涎唾腥拾取娘生窮相口拶開雲路吸雷霆佛智裕不落因果何曾墮不昧因果何曾脫當堂鏡破兩頭忘掃影滅蹤無摸索無摸索何倚托秋風吹梧桐樹葉鳴嚗嚗佛性泰一言才諦當便脫野狐身早知雨是水不作兩般聲佛燈珣百丈野狐兩耳卓朔脫兮不昧墮兮不落不昧不落何是何錯若於當處不留情萬里晴空步寥廓踈山如百丈野狐塞鴈𠾑蘆李廣神箭張顛草書鼓山圭不落不昧石頭土塊陌路相逢銀山粉碎拍手呵呵笑一場明州有個憨布袋徑山杲不落不昧徒云解會言下知歸牢關粉碎椘安方明鏡當臺鑒者稀禪人到此擬何之直饒點破秋天月元來只是野狐兒琅琊覺百丈野狐語至言粗怛薩阿竭吾有吾廬翠岩真語路分明在憑君子細看和雨西風急近火轉加寒道吾真不落藏鋒不昧分要伊從此脫狐身相逢盡道休官去林下何曾見一人真淨文一尺水一丈波五百生前不奈何不落不昧商量也依前撞入葛藤窠阿呵呵會也麼若是你灑灑落落不妨我哆哆和和神歌社舞自成曲拍手其間唱哩囉天童覺含血噴人先污其口百丈野狐失頭狂走驀地喚回打個筋斗崇覺空諦觀五百生前事不昧何如不落親因果歷然殊可怕人人盡道野狐精牧菴忠颯颯春風動物華園林開葉又開花歸來謾與佳人說鸞鏡臺前雲𩯭斜白楊順不昧不落作麼會會得依前墮野狐一夜凉風生畫角滿船明月泛江湖台州鴻福文不昧不落將錯就錯百丈野狐一坑埋却尼無著總不是翻濤手𬾉誇跨海鯨由基方撚鏃枝上衆猿驚宣祕禮一人道不落一人道不昧夜來一陳狂風生浪打石頭如粉碎自得暉秉大火聚燒太虗空達磨不會眼瞎耳聾塗毒䇿不向東山久薔薇幾度花白雲他自散明月落誰家正堂辨世人住處我不住世人行處我不行全身跳入野狐窟贏得風流五百生肯堂充百丈堂前辨野狐紫羅帳裏撒真珠誰家別館池塘裏一對鴛鴦水上浮靈岩安不落不昧二俱是錯取捨未忘識情卜度執滯言詮無繩自縛春至花開秋來葉落錯錯誰知普化搖鈴鐸蘇州定慧信動口生荊𣗥移身墮野狐趙州來鬪富東壁掛葫蘆或菴體不落不昧誣人之罪不昧不落無繩自縛可憐柳絮隨春風有時自西還自東三峯印不落不昧東倒西擂鐵壁銀山一時粉碎不昧不落且無造作誠哉是言不從人學月林觀二不昧不落錯錯錯錯不落不昧莫莫莫莫坐致太平實難摸索墮脫知何處憑君子細看潮來無別浦木落見他山天目禮墮狐身與脫狐身葉落花開幾度春名利只隨騎馬客是非不到釣魚人朴翁銛大雄山下老狐精千古叢林惱殺人若遇金毛師子子看伊無處著渾身石菴玿百丈野狐石女無夫一回淚下滄海乾枯率菴琮不落不昧兩彩一賽不昧不落千錯萬錯無門開不落因果突出野狐人心似鐵官法如爐不昧因果得脫野狐頂上無骨頷下有鬚虛堂愚百丈普請鉏地次一僧聞飯鼓聲舉起鉏頭大笑便歸師曰俊哉此是觀音入理之門歸院乃喚其僧問適來見什麼道理便與麼僧曰適來聞鼓聲動歸喫飯去來師乃笑頌曰孰云意在钁頭邊一擊圓通徹大千大笑低頭歸去後飢餐且莫與人傳水菴一風前一曲動離愁那個行人不舉頭手把花枝半遮面不令人見轉風流無凖範天生個樣鐵崑崙機智偏能入海門無限差收拾了却來空手敘寒溫簡翁敬百丈因一女子聯竪録作一僧哭上法堂師曰作甚麼女曰父母俱喪請和尚選日師曰明日來一時埋却頌曰百丈山頭坐不遙女人山下哭嘷咷一時埋向清涼地至孝方能今古超汾陽昭此理分明答教人爺娘俱喪向師深雖道分燈傳正法一時埋却始為親延壽慧百丈因黃蘗問從上諸聖以何法示人師良久蘗曰後代兒孫將何傳授師曰我將謂你是個人便歸方丈頌曰國泰由來自偃兵路逢劒客也須呈雖然猛虎不食子正令他時作麼行本覺一池州南泉普願禪師嗣馬祖示衆曰喚作如如早是變了也今時師僧須向異類中行歸宗聞曰雖行畜生行不得畜生報師曰孟八郎又恁麼去也頌曰張公移住向深村被賊潛身入後門鍋子一時偷去了更來敲碗玩兒孫保寧勇父不慈子不孝作之在前悔之在後明眼衲僧難緘其口佛日才喚作如如已變名廓然無聖豈容情其間妙叶皆同類不有玄暉辨濁清護國欽涅槃寂滅本無名喚作如如早變生若問經中何極則石人夜𦗟木雞鳴本覺一南泉有時曰文殊普賢昨夜三更相打每人與二十棒趂出院也趙州曰和尚棒教誰喫師曰且道王老師過在什麼處趙州禮拜而出頌曰普賢昨夜鬪文殊趂出還同兩手祛却道趙州行正令從茲王老一時無佛印元彩雲影裏仙人現手把紅羅扇遮面無人著眼看仙人却看隨後紅羅扇佛鑑勤鴛鴦繡出世無雙好手元來更有強呈罷各歸香閣去金針難把度蕭郎佛燈珣二俱不了隨合多少縱使夜行投明未到月堂昌霧起龍吟風生虎嘯兩口一舌異音同調文殊普賢佛法見南泉趙州日月面據令而行指顧間𥁞情貶向鐵圍山圓悟勤布鼓當軒為擊來臥龍驚起出岩隈千峯秀色憑誰寫一帶澄江古鏡開無菴全是賊識賊精識精南泉無過強惺惺趙州禮拜歸堂去前箭猶輕後箭深石菴玿春風吹落碧桃花一片流經十萬家誰在畫樓沽酒處相邀來喫趙州茶石鼓夷南泉因到莊所莊主預𬾨迎奉師曰老僧居常出入不與人知何得排辦如此莊主曰昨夜土地報道和尚今日來師曰王老師修行無力被鬼神覷見侍者便問和尚既是善知識為甚麼被鬼神覷見師曰土地前更下一分飯頌曰土地堂前一分飯只為當年圖口辦行年在坎鬼臨身奉勸禪人休贊嘆大圓智石上栽花分外奇枝頭春色暗芳菲馨香遍界無人嗅一任狂風取次吹伊菴權南泉曰江西馬祖說即心即佛王老師不恁麼道不是心不是佛不是物恁麼道還有過麼趙州禮拜而出僧隨問州曰上座禮拜了便出意作麼生曰汝却問取和尚僧問師曰適來諗上座意作麼生師曰他却領得老僧意旨頌曰不是心兮不是物那吒夜入蒼龍窟鐵鞭擊碎明月珠從教大地如翻墨雪竇宗深深深汲古今淺淺淺渾成現水瑩玉壺江澄素練跳出桃花三級浪戴角擎頭乘快便點額魚馬師口下空躊躇圓悟勤古佛場中不展戈後人剛地起譊訛道泰不傳天子令時清休唱太平歌龍門遠剔起便行三萬里只今休去八千年分明更為從頭舉一任諸方取次傳鼓山圭倒腹傾腸說向君不知何事尚沉吟如今便好猛提取付與世間無事人徑山杲金剛南際老番王反著襴衫入大唐牛首旃檀都賣了唯垂鼻孔不囊藏正堂辨心佛物兮俱不是坐斷舌頭除藥忌橫拈倒用總由他活捉魔羣穿却鼻南岩勝不是心不是佛不是物通身一串金鎖骨趙州參見老南泉解道鎮州出蘿蔔吳元昭不是心不是佛不是物以拂子擊禪床為君擊碎精靈窟天上人間知不知鼻孔依前空突兀誰菴演不是心佛不是物六六依前三十六因思長慶陸大夫解道合笑不合哭尼無著總華嶽三峯翠插天上頭無路可躋攀不知誰有神仙手折取峯頭十丈蓮開善謙餓鬼鞭死尸仙人禮枯骨野犬吠荒丘鐵山空突兀六合羣靈競出頭不知何處為窠窟或菴體倒腹傾腸幾個知更無絲髮可相依直饒徹底承當去也落他家苐二機靈岩日突出難辨辨得出師子翻身師子窟哮吼一聲天地空驚起須高突兀月林觀剃頭頭光生洗腳腳清爽脫衣上床眠抓著通身癢雪菴瑾不是心不是佛不是物瀝𥁞野狐涎躍反山鬼窟平田淺草裏露出焦尾大蟲太虛寥廓中放出遼天俊鶻阿呵呵露風骨等間拈出衆人前畢竟分明是何物咄咄遁菴珠鯨飲海水𥁞露出珊瑚枝海神知貴不知價留與人間光照夜朴翁銛慣弄瑤琴與琵琶清音歷歷遍天涯堪嗟不入聾人耳空使西山月又斜息菴觀夫子不識字達磨不會禪大唐天子國依舊化三千松源嶽破業亡家後渾身沒處安倒拈無孔笛吹過汨𤄷灣如菴用不是心佛物開口已話墮更擬問如何好與劈面唾殺六岩輝不是心兮不是物白頭生得黑頭鶻覷破門前下馬臺通身冷汗黑如墨蓬菴會南泉因黃蘗首座一日捧鉢於師位坐師乃問長老甚年中行道曰威音王已前師云也是王老師兒孫蘗遂過本位頌曰彼此老來誰記得人前各自強惺惺一坑未免俱埋却幾個如今眼子青龍門遠威音王佛是兒孫王老當時開大言黃蘗見機分主伴典刑千古定宗門踈山如明明攪動一缸屎却把麝香燒旖旎許多香氣不曾聞渾身坐在屎缸裏蒙菴嶽南泉捧鉢入堂來賔主分明肯自乖莫把威音論戒臘本無位次可差排天目禮黃蘗下座南泉上坐常州紙貴一狀領過北澗簡黃蘗能施陷虎機奈何王老䇿猶奇舌頭反轉聊相問直得移身舊路歸簡翁敬南泉問黃蘗定慧等學明見佛性是否蘗曰十二時中不依倚一物師曰莫便是長老見處否蘗曰不敢師曰漿水錢且置草鞋錢教誰還頌曰兩陳交鋒戰不難埋兵調𨶜何人曉只解輪鏘趂勢來喪身失命有多少海印信獵獵奔馳勢不休草深風徑更堪愁翻身師子無尋處空使行人說路頭佛慧泉昨夜銀蟾跨箕尾驀然一陳天風起卷𥁞千重萬重雲碧空寂寂凝如水佛鑑勤問答分明已切磋幾人於此覓譊訛少年曾决龍蛇陳老倒還𦗟稚子歌龍門遠水乳不分菽麥難辨擔帶病深改移功淺十二時中不依倚明見佛性有此理漿水錢在草鞋裏月堂昌李下不得整冠瓜田豈可納履行藏自要分明免見傍人說你懶菴樞南泉因僧問師歸文室將何指南師曰昨夜三更失却牛天明起來失却火頌曰昨夜三更失却牛天明起來失却火腰未繫兮鞋未穿面不洗兮頭不裹保寧勇奴顏婢膝走人間羞見羊裘七里灘文叔雖為天子貴子陵元作故人看希叟曇丈室端居無隱乎更何言語可名模失牛遭火分明道還覺眉毛在也無寶葉源南泉因東西兩堂各爭猫兒師遇之白衆曰道得即救取猫兒道不得即斬却也衆無對師便斬之趙州自外歸師舉前語示之州乃脫草履安頭上而出師曰汝適來若在即救得猫兒也頌曰兩堂上座未開肓猫兒各有須爭一刀兩假南泉手草鞋留著後人行汾陽昭兩堂俱是杜禪和撥動烟塵不奈何賴得南泉能舉令一刀兩假任偏頗雪竇顯二公案圓來問趙州長安城裏任閒遊草鞋頭戴無人會歸到家山便即休手把狸奴定死生禪人空使口相爭趙州救得成何事恰似天明打五更佛印元提起兩堂應𥁞見拈刀要取活狸奴可憐皮下皆無血直得橫尸滿道途白雲端二狸奴夜靜自舒張引手過頭露爪長王老室中巡邏了狼忙走出恐天光雪刃含光射斗牛不唯天地鬼神愁命根落在南泉手直下看看兩假休保寧勇二狸奴頭上角重生王老門前獨夜行天曉不知何處去椘山無限謾崢嶸一刀兩假南泉令當頭高著趙州閾劈面若無宗正眼又隨流水落人間照覺總狼烟起處看兵機不是將軍孰辨伊兩假一刀垓下令威風千古霸雄基圓通仙當機不薦眼如癡豈辨鋒鋩未露時日暮草鞋頭帶去暗中拊掌笑嘻嘻成枯木作者縱橫斬萬機趙州頭戴草鞋時當臺寶鑑無私燭離匣金刀豈亂揮羅漢南伯牙之絃鸞膠可續調古風淳霜月可掬南泉南泉龍象繼躅佛心才二草鞋頭戴與誰論四海無風浪自平解道曲終人不見江頭贏得數峯青五色狸奴𥁞力爭及乎按劒總生盲分身兩處重相為直得悲風動地生龍門遠二安國安家不在兵魯連一箭亦多情三千劒客今何在獨許將軍建太平要得狸奴覿面酬渾如鉗口鎖咽喉一刀兩假從公斷直得悲風動地愁佛燈珣二堂前飯店重新販屋裏揚州勝外求頭戴草鞋高跨步晚春江景也風流斬了猫兒問諗師草鞋頭戴自知時兩堂不是無言對只要全提向上機踈山如南泉提起為諸人自是諸人眼不親付與趙州呈好手拈來覿靣便翻身椘安方捕鼠有功人競愛霜刀揮處罷相爭太平本是將軍致不許將軍見太平石明縮水酒越濃負心人越窮鐵剛刀自利不用苦磨礱草鞋頭戴今何在我見牽來劈面春闡提照石裏藏金誰辨別遊人但見蘚痕斑却被石人窺得破鐵船載入洞山雪竇宗放去若雷奔𭣣來如掣電不識李將軍徒學穿楊箭南堂興二趙州牙如劒𣗳南泉口似血盆兩個無孔鐵槌打就一合乾坤釋迦老子不會問取彌勒世尊手握乾坤殺活機縱橫施設在臨時滿堂兔馬非龍象大用堂堂總不知胡文定公安國南泉提起下刀誅六臂修羅救得無設使兩堂俱道得也應流血滿街衢廣德光孝慜提起分明斬處親落花飛絮撲行人頭戴草鞋出門去四月圓荷葉葉新李楶青蛇提起血腥臊幾個男兒有膽毛直下血流猶未覺舉頭還見鐵山高簡堂機南泉一刀斬了趙州戴履摩挲雖然子承父業滿地老鼠奈何典牛游當日臨崖看滸眼至今觀水憶南泉趙州頭戴草鞋去漁翁腰帶好牽船龍牙言克己堂前開飯店股肱屋裏販揚州頭戴草鞋呈醜拙湊成一假好風流或菴體手按吹毛豈易為兩堂要活死猫兒趙州上𣗳安身法多少傍人眼搭別峯印南泉揮劒斬猫兒殺活唯憑作者知權柄一朝如在手分明看取令行時尼無著總二草鞋頭戴有譊訛諸老機鋒會得麼道泰不傳天子令時清休唱太平歌一刀兩假絶譊訛天下禪和不奈何頭戴草鞋重漏泄知恩者少負恩多木菴永趙州若在倒行此令奪却刀子南泉乞命無門開𥁞力提持只一刀狸奴從此脫皮毛血流滿地成狼藉暗為春風染小桃無凖範一刀成兩假釋得二僧爭草鞋頭戴出猫兒無再生橫川珙南泉因僧問訊義手而立師曰太俗生其僧便合掌師曰太僧生僧無對頌曰合掌太僧義手太俗撒手出門山青水緑換步移身振古風木人共唱無生的大洪遂南北東西無不利令人深愛老南泉眉毛廝結如相似鼻孔遼天不著穿龍門遠南泉示衆曰王老師要賣身阿誰要買一僧出曰某甲買師曰他不作貴價不作賤價汝作麼生買僧無對頌曰王老明明要賣身一時分付與傍人可憐天下爭酬價請續此句佛印元貴賤非同價不常個中交道沒商量趙州布衫應時用一任間人說短長泉太道南泉鋪席大開張差寶希壓市行競買雖多酬價少至今天下錯商量野軒遵賣身王老難為價貴賤俱非不易酬若使當時無退悔喚來分付與園頭海印信王老哀不惜身臨危將賣與何人若無令子輕酬價往往一年空過春保寧勇不作貴兮不作賤翻覆高低隔一線利害分明說向人憐悧衲僧見不見呆堂定南泉與歸宗麻谷同去參禮南陽國師先於路上畫一圓相曰道得即去宗便於圓相中坐谷作女人拜師曰與麼則不去也宗曰是什麼心行師乃相喚曰不去禮國師頌曰國師欲見多般圓坐端居拜請看不去同音聞便解久經行陳奪旗幡汾陽昭由基箭射猿繞𣗳何太直千個與萬個是誰曾中的相呼相喚歸去來曹溪路上休登陟復云曹溪路坦平為什麼休登陟雪竇顯三人同行必有我師焉擇其善者而從之其不善者而改之翠岩真三個同人去選官偶值清風明月夜或吟或詠或彈琴夜靜更闌猶未捨忽覺夫明歸去來他時自有知音者海印信漫漫大地盈尺雪江湖一片難分別漁父披簑月下歸誰道夜行人路絶保寧勇三人禮拜南陽去半路抽身信已通休論東西與南北此心千里自同風草堂清巧奪豪拈浪苦辛誰能於此辨踈親落花芳草空岐路細雨斜風不見人旻古佛重南陽好在三人半路不空回道存目擊猶多事若遇知音請舉來雲岩因同氣相求事可論一回見面一歡情兩行何處間文字一隊誰家好弟兄龍門遠同坑無異土千古少人知月下休相喚還從舊路歸開福寧南泉麻谷與歸宗道眼元來總不通去禮國師瞻相好區區只到半途中踈山如手携花鼓到城根反著麻鞋過短門笑把柴頭書古字大家來步月黃昏月堂昌野店齊餘聊問津作家竿木鎮隨身相逢𥁞道休官去林下何曾見一人尼無著總氣直語直眼親手親峯巒競秀紅紫爭春神通妙用施呈𥁞要見國師猶隔津且菴仁金針繡出王鴛鴦石女擎來不覆藏剛被木人偷眼覷至今兩兩不成雙萬菴柔各將財本去經營上國如天好趂晴未出門時先算帳如何得到鳳凰城虛堂愚圓相中間坐底誰更施女拜各呈機國師道大遍天下不許尋常人得知橫川珙南泉玩月次趙州指月問曰何時得恁麼師曰王老師二十年前亦恁麼來曰只今作麼生師便歸方丈頌曰劒落寒潭謾刻舟霜花浪急使人愁若憑言語論高下贏得南泉一默酬虎頭上座趙州捧出菱花鏡王老親拈白玉槌一擊當陽今瓦碎此心能有幾人知幾人知兩個分明是赤眉風前月下揚家醜笑倒靈山老古錐慈受深皎月團團麗碧天趙州王老玩階前二人心眼俱相似光彩從來共宛然本覺一劒落寒潭謾刻舟霜花浪急使人愁漁翁罷釣歸深塢一隻鴛鴦落渡頭上方嶽南泉因趙州問道非物外物外非道如何是物外道師便打州捉住棒云已後莫錯打人去師云龍蛇易辨衲子難謾頌曰軟纏藏鋒入陳來𥁞將擒下眼瞪開死生一决英雄士文武雙行將相才保寧勇龍蛇能易辨衲子最難謾性淨秋空闊心清巨海寬天涯毫末見世界掌中觀萬法不為侶西江一吸乾南堂興南泉住菴時有一僧到菴師向其僧道某甲上山待到齊時作飯自喫了送一分來山上少時其僧自喫了却一時打破家事就床臥師不見來遂歸見僧臥師亦去一邊而臥僧便起去師住後曰我往前住菴時有個伶俐道者直至如今不見頌曰吹毛劒利逆水波清丈夫志氣不順人情君征塞北我伐西秦千古萬古共樂升平南堂興短袴長衫白苧巾咿咿月下急推輪洛陽路上相逢著𥁞是經商買賣人虛堂愚斬猫機用未為過猶勝廚中打粥鍋才有此心招此報惡人無奈惡人何寶葉源南泉謂座主曰你與我講經得麼主曰和尚與某甲說禪某甲與和尚講經師曰不可將金彈子換銀彈子去頌曰盤走珠兮珠走盤當機脫略好生觀世人知貴不知價信手拈來也不雖正堂辨南泉因僧問和尚百年後向什麼處去師曰山下作一頭水牯牛去曰某甲隨和尚去還得也無師曰汝若隨我即須㗸取一莖草來頌曰類中難辨要分明戴角披毛卒未醒㗸取草來方定動頭頭物物自真靈汾陽昭行履從來異類中不知頭角與誰同若𠾑水草時相見擺尾搖頭四野風佛印元異類中行得自由拽穿鼻孔卒難收草枝㗸得相逢處高臥深雲任白頭佛慧泉南泉在山上刈茅次有僧問南泉路向什麼處去師拈起鎌子曰我這鎌子是三十文錢買曰我不問這個南泉路向什麼處去師曰我用得最快頌曰苑鎌使得快如風三十青蚨建大功南泉向上路難到到者方知觸處通照覺捴茆鎌三十文錢買覿面高提苐一籌直下便知歸去路也須更上一層樓圓通仙二撥草瞻風探祖禪誰知草裏有南泉分明一句無私語徹骨風生天地寒王老真機迅若風示人方便孰能通苑鎌舉起神鋒露驚得泥牛過海東智海清問路分明指路頭青蚨三十不輕酬用時最快無機巧無味之談塞衆流真如哲我這鎌子用得快當時三十文錢買南泉門下路岐通寄語行人著精彩天童覺匆匆禪客問南泉欵假徒勞痛下鞭今日為君重漏泄翩翩孤鴈下遙天道場如南泉曰三世諸佛不知有狸奴白牯却知有頌曰喫官酒臥官街當處死當處埋沙場無限英雄漢堆山積嶽露尸骸大溈智三世諸佛不知有一一面南看北斗狸奴白牯却知有戴角擎頭師子吼四稜塌地又團欒八角磨槃空裏走擬推尋劈脊摟拈得鼻孔失却口為問普化一頭驢何似子胡一隻狗圓悟勤三世諸佛不知有老老大大外邊走眼皮蓋𥁞五須大洋海裏翻筋斗徑山杲二狸奴白牯却知有瀑布不溜青山走堪笑無端王老師錯認簸箕作尉斗越鳥巢南枝胡馬斯北風狸奴并白牯寸步不曾通千山都坐斷萬𣲖𥁞朝東天王才合掌那吒撲帝鍾或庵骵野老祭江神乞兒打筋斗莫作兩般看等是揚家醜朴翁銛南泉魯祖杉山歸宗四人離馬祖處去各住菴於路分袂處師插下柱杖曰道得也被這個礙道不得也被這個礙歸宗拽柱杖打師一下曰只是者個王老師說什麼礙與不礙魯祖曰只此一句大播天下宗曰還有不播者麼祖曰有宗曰作麼生是不播者祖作掌勢頌曰同門曰朋同志曰友同門同志始終相守長大分離得緣好醜同條生也大家知同條死也誰知有一句分明播天下無味之談塞人口大圓智難兄難弟一二三四同母而生個個相似竿木隨身逢場作戲莫言礙塞不得一句播天播地佛鑑勤礙與不礙龍吟霧起播與不播蠅附驥尾南北東西千里萬里俊哉正覺顯南泉巡堂次牽一頭牛入堂首座以手拊牛背一下師便休去趙州以草二束放在首座前頌曰等將草料好供看何故皮毛要一般惹起羣中相似者翻令頭角不完全寶葉源南泉訪百丈丈問甚處來師曰江西來文曰還將得馬大師真來麼師曰只這是丈曰背後底師拂袖便出頌曰八面當風秪這是拂袖之談動天地堪愛賣身王老師不作賤兮不作貴龍門遠兄難兄弟難弟馬祖真只這是撼動西江十八灘水面無風波自起石溪月南泉因趙州問明頭合暗頭合師便歸方丈州到僧堂前曰堂頭老漢被我一問直得無言可對首座曰莫道和尚無語自是上座不會州便掌曰這一掌本是堂頭老漢喫頌曰大事當陽已皎然十分須是更周圓堂中上座黑如漆冷地為誰喫暗拳保寧勇南泉示衆曰王老師自小養一頭水牯牛擬向溪東牧不免食他國王水草向溪西牧亦不免食他國王水草如今不免隨分納些些總不見得頌曰溪東去溪西去難免官家苗稅賦直饒隨分供輸未解牽牛去住楊無為垂垂楊柳暗溪頭不問東西却自由幾度醉眠牛背上數聲橫笛一輪秋懶菴樞南泉水牯自天然隨分些些任變遷大笑一聲天地窄更無佛法與人傳月林觀不放溪東西隨分納些兒冷暖只自知分明說向誰木菴永南泉水牯忘鞭索南北東西共一家王稅及時都納了牧童橫笛遠山斜天目禮不如隨分納些些喚作平常事已差緑草溪邊頭角露一簑烟雨屬誰家鐵牛印南泉一日因齊次乃自將生盤去首座前出生時杉山堅和尚為首座乃曰無生師曰猶是末師才行數步座乃召曰長老長老師回顧曰作麼座曰莫道是末頌曰古老巡堂親掠生渡水行舟不易耕莫道無生猶是末纖毫不了亂縱橫智門祚南泉問座主講得甚麼經曰彌勒下生經師曰勒甚麼時下生曰現在天宮未來師曰天上無彌勒地下無勒頌曰禪床驚振被搽糊惹得兒孫不丈夫柱杖劈頭連打出也教知道赤胡龍門遠雲居悟云昔日東山和尚謂衆曰天上無彌勒地下無勒十字街頭被人喚作賊且道此人被他喚作賊歡喜則是煩惱則是元來也不歡喜也不煩惱何故為伊有個著到處乃頌曰被人喚作賊吞聲便飲氣雖然言語惡真個好滋味不向如來行處行丈夫自有衝天志上天下地無勒安名立字是何因黃金自有黃金價終不和沙賣與人文殊道南泉因趙州問離四句絶百非請師道師下座歸方丈州曰這老和尚每常口吧吧地及其問著一言不措侍者曰莫道和尚無語好州便打一掌云這一掌合是王老師喫頌曰離四句絶百非作者相諳識得伊跳下禪床便歸去從他鷂子摶天飛智門祚南泉一日不赴堂侍者請赴堂師曰我今日在莊上喫油糍飽曰和尚不曾出入師曰汝去問莊主者方出門忽見莊主歸謝和尚到莊喫油糍頌曰咄哉王老師赤窮身也賣喫些油糍歸至今被人怪典牛游不出方丈門已到莊上坐好一飣油糍至今咬不破萬菴如騎虎穿市過把火去偷猪主人開眼睡鄰舍呌失驢卍菴顏偷喫油糍賣弄口觜年老成魔謾神鬼潛菴光阿魏無真水銀無假老倒南泉可知禮也復菴封無業示衆曰若有一毫頭聖凡情念未𥁞未免入驢胎馬腹裏去白雲端曰直饒一毫頭聖凡情念頓盡亦未免入驢胎馬腹裏去瞎漢但恁麼會頌曰無業何太切白雲何太孤胡鬚將謂赤更有赤鬚胡南巖勝一道如弦直心親手更親箭穿紅日影方是射鵰人鼓山圭杭州鹽官齊安國師嗣馬祖一日喚侍者曰將犀牛扇子來者曰破也師曰扇子既破還我犀牛兒來者無對投子代云不辭將出恐頭角不全資福代作圓相心中𥁞牛字石霜代云若還和尚即無也保福云和尚年尊別請人好頌曰犀牛扇子用多時問著元來捴不知無限清風與頭角盡隨雲雨去難追雪竇顯可憐一柄犀牛扇謾道曾遭已破除無限清風隨手處卓然頭角出寰區白雲端扇子破索犀牛圈欒中字有來由誰知桂轂千年魄妙在通明一點秋天童覺老師底死索犀牛用處其誰得自由侍者不知頭角具鼻根繩索被他𭣣祖印明明月冷相照清風卒未休鹽官無限意何用覔犀牛草堂清犀牛扇子用多年歷掌清機授手傳頭角不全𭣣拾取雨餘風月滿長川佛燈珣扇上犀牛從古畫索來既破要元牛縱教戴子重描出不是當時那一頭勝因戲魚靜炎暑蒸人汗似湯鹽官用底豈尋常輕搖休問犀牛在拈出清風宇宙凉虎丘隆犀牛扇子有來由幾度拈來幾度休荷葉亂傾珠的皪一番雨過碧溪頭懶菴樞扇子分明都破了鹽官却又索犀牛須知侍者難開口無可還他即便休天目禮鹽官一日謂衆曰虗空為鼓須彌為椎甚麼人打得衆無對有人舉似南泉泉云王老師不打這破鼓法眼別云王老師不打頌曰南泉王老太無端却逐鹽官作樂官西祖令嚴行禁上免它禪會錯欣歡南岩勝虛空為鼓須彌為椎要打便打莫問是誰應菴華國師費力置面鼓猶勝塗毒萬千千解打南泉非好手至今天下勿聲冤野牛平鹽官因僧問如何是本身盧舍那師曰與老僧過淨瓶來僧將淨瓶至師曰却安舊處著僧安了復來問如何是本身盧舍那師曰古佛過去久矣頌曰兩手分明過淨瓶不知身已在隍城直饒便具金剛眼也較溈山半月程上方益鳥之行空魚之在水江湖相忘雲天得志擬心一𮈔對面千里知恩報恩人間幾幾天童覺廬山歸宗智常禪師嗣馬祖一日剗草次有講僧來參忽見一蛇過師以鋤斷之僧曰久嚮歸宗元來是箇粗行沙門師曰你粗我粗曰如何是粗師竪起鋤頭曰如何是細師作斬蛇勢曰與麼則依而行之師曰依而行之且致甚處見我斬蛇僧無對頌曰廬嶽宗師接上機斬蛇特地施慈悲高苑座主驚忙怕却道粗心錯是非汾陽昭大用縱橫掣電機爍迦羅眼尚膠𥻿迷徒夢裏爭唇吻𨚫憶隨他去一隨海印信千尋竿上翻筋斗大海波心擲釣鈎大體還他肌骨好不搽紅粉也風流南華昺斬蛇𨚫非小小事直是教他脫苦輪座主高苑心未泯如何胡亂妄通言橫川珙歸宗示衆曰吾今欲說禪諸子捴近前大衆進前師曰汝𦗟觀音行善應諸方所僧問如何是觀音行師彈指曰諸人還聞麼曰聞師曰一隊漢向這裏覔箇什麼以拄杖打趂呵呵大笑歸方丈頌曰無學彈指超圓通耳根淨透出聞不聞妙哉觀音行棒頭指出金剛王嶮惡道中為津梁圓悟勤歸宗因泥壁次白舍人來師便問君子儒小人儒白曰君子儒師乃打泥盤一下白遂過泥與師師接得便使良久云莫便是快俊底白侍郎否曰不敢師曰秪有過泥分頌曰堂堂非是小人儒得得深雲訪隱居已與過泥殊不耻更何言外見親踈寶葉源歸宗因小師辭乃問甚處去曰諸方學五味禪去師曰諸方有五味禪我這裏只有一味禪僧便問如何是和尚一味禪師便打僧曰會也會也師曰道來道來僧才開口師又打頌曰五味與一味喫了須噫氣金輪峯下令行時凜凜清風誠可畏石明私醞香醇價又輕至今官路少人行歸宗一味如連苦蹉過叢林幾後生長靈卓歸宗因僧問如何是玄旨師曰無人能會曰向者如何師曰有向即乖曰不向者如何師曰誰求玄旨又曰去無汝用心處曰豈無方便門令學人得入師曰觀音妙智力能救世間苦曰如何是觀音妙智力師敲鼎蓋三下曰子還聞麼曰聞師曰我何不聞僧無語師以棒趂下頌曰三聲鼎蓋普門開苦海勞生喚不回九十春光今又半空飛花片點莓苔絶岸湘歸宗因僧問如何是觸目菩提師翹足曰會麼曰不會師曰三個見在一任選取頌曰觸目菩提一撮沙示渠三個更周遮衲僧相見呵呵笑春鳥喃喃罵落花海印信歸宗因江州刺史李渤問嘗聞須納芥子渤則不疑芥子納須莫是妄談否師曰人傳史君讀萬卷書是否曰不敢師曰身如椰子大萬卷書向什麼處著李俯首而已頌曰放開日月明把定乾坤黑一劄不回頭滿地生荊𣗥龍宮海藏兮非多石火電光兮非急君不見紫霄峯下墨池邊八駿如風追不及佛慧泉芥納須特地疑琴書拋下扣禪扉忽聞萬卷難藏處瞥轉神機唯自知唯自知丹桂和根得歸佛心才芥納須驗祖風清機歷歷妙難窮要知萬卷書來處跳出當人智鑑中禾山方用𥁞自己心笑破他人口八角磨盤空裏走金毛獅子變作狗喝一喝雪堂行萬卷詩書一時頭角才跨宗門便施謀略古歸宗真老作只顧滿彎弓不知誰見雙鵰落絶毫絶𨤲如山如嶽堂堂氣宇冠儒林浩浩清風播寥廓癡禪妙韶州乳源禪師嗣馬祖上堂西來的的意不妨難道大衆莫有道得者出來試道看有僧出才禮拜師便打曰是什麼時莭出頭來後人舉似長慶慶云不妨不妨頌曰祖意西來豈易量擡眸已是錯承當闍𥟖不解知時莭開眼堂堂入鑊湯此山應西來的的意何如舉唱多憐在半途勾賊到門還破賊信知身佩辟兵苻趙善期通判明州大梅法常禪師嗣馬祖住山後馬祖令一僧到問曰和尚見馬祖得個什麼便住此山師曰馬祖向我道即心是佛我便向這裏住曰馬祖近日佛法又別師曰作麼生別曰近日又道非心非佛師曰這老漢惑亂人未有了日任汝非心非佛我只管即心即佛僧回舉似馬祖祖曰大衆梅子熟也頌曰只將馬祖鉛刀子裂破漫天鐵網羅碧沼夜敲荷葉雨至今貧恨一身多一關溥荷衣松食住深雲蓋是當年錯見人埋沒一生心即佛萬年千載不成塵野雲南郎心葉薄妾冰清郎說黃金妾不應假使偶然通一笑半生誰信守孤燈簡翁敬大梅因龐居士問久嚮大梅未審梅子熟也未師曰你向什麼處下口曰百雜碎師曰還我核子來頌曰大梅梅子熟龐老已先知正眼驗真要相逢拍手歸松源嶽龐公親到竪降旗一劒當頭斬萬機不是從前生咬破為他梅子熟多時辛菴儔大梅因夾山與定山同行定山曰生死中無佛即無生死夾山曰生死中有佛即不迷生死二人互相不肯同上大梅夾山乃問曰不知那個親那個踈師曰一親一踈夾山曰未審那個親師曰且去明日來夾山來日上方丈再問師曰親者不問問者不親夾山住院後曰我當初在大梅失却一隻眼雲峯恱云夾山只知失却一隻眼殊不知換得一隻眼圓悟云是則兩口金剛王寶劒要且拂掠虛空金山則不然生死為諸佛根基諸佛乃生死爐鞴若解險絶承當即證六通八解乃頌曰有佛不迷無佛則無大梅頂門正眼劃時已驗親踈家抱荊山璞人握靈蛇珠失却與換得同歸故殊途作家金鎚當面擲臨機俊鷂趂不及將謂赤胡更有胡赤未曾拈出定盤星多少行家怨不平待得權衡來就手方知斤兩自分明心聞賁生死有無佛虛名如電拂俊鷂摶天飛不打籬邊鶻無缺無餘若太虛不知誰解強名模冶父川同行自古不相肯峯頂老人何足論山凹落盡桃花片流水依前繞竹門懶菴樞竹籬茅舍酒旗斜一個葫蘆敗兩家酒後不知天與地歸來滿地是桃花雪菴瑾苦瓠連根苦甜瓜徹蒂甜兩般滋味惡終後入黃泉應菴華佛之一字強安排有無生死一坑埋大梅老子舌無骨臘月蓮花火裏栽雲巢岩青天白日切忌尋覓更問如何抱贓呌屈無門開大梅因僧問如何是祖師西來意師曰西來無意鹽官聞之乃曰一個棺材兩個死漢玄沙云鹽官是作家雪竇云三個也有頌曰活中死眼無作有用方寸不移十方獨弄巧拙不到處鹽官有出身親言出親口雞犬閙比鄰月堂昌二因事長智認渠遭纍反身曉行全家富貴競頭擡薦自埋沒逆順是非誰可出提起是令放得行兩手扶犂水過膝婺州五泄山靈默禪師嗣馬祖遠謁石頭便問一言相契即住不契即去頭據坐師便行頭隨後召曰闍𥟖師回首頭曰從生至死秪是這個回頭轉腦作麼師言下大悟乃拗折柱杖棲止焉頌曰石頭據坐五泄便去石頭喚回却成多事翠岩芝在途在舍若為酬莫把先師一例求雄雄宇宙如王者未免半邊無髑髏龍門遠欲去高聲喚得回當時心眼一齊開要知不假修持力生死悠悠任往來成枯木
